version: '1.0'
workspace:
  name: FAST Self-Modification Loop
  description: >-
    Generalized architect → coder → reviewer pipeline for running
    structural changes against any mounted repo. Each step is a
    claude-code bundled agent with real filesystem access and
    data-contract gates on every output. This is the productized
    form of the self-modification loop — triggered by any system
    workspace via the run-self-mod-task signal.

# This workspace is the reusable form of the parity-plan workspace.
# Key differences from parity-plan/workspace.yml:
#   1. All three agents are claude-code (not llm). Architect needs
#      fs access to read arbitrary plan sections per-task.
#   2. The task signal carries the source-of-truth location
#      (plan_path + plan_section_heading) so the architect can
#      read any plan, not just parity-plan.md.
#   3. target_repo is parameterized — the architect/coder/reviewer
#      all operate on a caller-specified mounted path, defaulting
#      to /workspace/atlas.
#   4. Skills attached here are the meta-skill for the loop itself;
#      they don't encode task-specific content.

skills:
  - name: "@tempest/fast-self-modification"

signals:
  run-self-mod-task:
    provider: http
    title: Run a self-modification task
    description: >-
      Execute a structural change against a mounted repo via the
      architect → coder → reviewer pipeline. The architect reads
      the specified plan section as source of truth, produces a
      design memo with verbatim citations, the coder writes files,
      and the reviewer cross-references files against the plan
      directly (not against the memo).
    config:
      path: /webhooks/run-self-mod-task
    schema:
      type: object
      properties:
        task_id:
          type: string
          title: Task ID
          description: Slug for the task (e.g. "phase1a-interfaces")
        task_brief:
          type: string
          title: Task brief
          description: What to build, in prose. The architect expands this by reading the plan section.
        target_repo:
          type: string
          title: Target repo path
          description: Mounted path in the daemon container. Defaults to /workspace/atlas.
          default: /workspace/atlas
        plan_path:
          type: string
          title: Plan file path
          description: Path (relative to target_repo) to the authoritative plan document.
        plan_section:
          type: string
          title: Plan section heading
          description: >-
            Heading text to locate inside plan_path, e.g. the
            section on three-adapter design.
        target_files:
          type: array
          items:
            type: string
          title: Target files
          description: Expected files to create/modify. Advisory — architect may extend.
      required:
        - task_id
        - task_brief
        - plan_path
        - plan_section

  reflect-on-last-run:
    provider: http
    title: Reflect on the last run
    description: >-
      Reads a completed session's architect memo, coder output, and
      reviewer findings. If a new failure pattern is detected,
      emits a full replacement SKILL.md in reflection-output.
      Does NOT publish — the apply-approved-reflection signal is
      the separate human-gated publish step.
    config:
      path: /webhooks/reflect-on-last-run
    schema:
      type: object
      properties:
        session_id:
          type: string
          description: Session to reflect on. If omitted, uses most recent completed.
      required: []

  apply-approved-reflection:
    provider: http
    title: Apply an approved reflection to the self-mod skill
    description: >-
      Takes a prior reflection session ID, reads its reflection-output,
      verifies the reflector's confidence >= 0.9, and publishes the
      proposed new SKILL.md content as a new version of
      @tempest/fast-self-modification via the daemon skill upload
      endpoint. Records the previous version for rollback.
    config:
      path: /webhooks/apply-approved-reflection
    schema:
      type: object
      properties:
        reflection_session_id:
          type: string
          description: >-
            Session ID of a completed reflect-on-last-run run that emitted a
            proposal. Optional — if omitted, the apply step walks recent
            sessions on this workspace and picks the most recent reflect run.
      required: []

agents:
  task-router:
    type: user
    agent: task-router
    description: >-
      Custom Python WASM agent. Deterministic quick-fix vs full-fsm
      router. Reads task_brief + target_files from the signal config
      and decides whether the task is small enough to skip the
      architect step. If quick-fix, the FSM transitions directly to
      step_implement. If full-fsm, it goes to step_research as today.
      Closes the cross-artifact integration gap by being the first
      load-bearing FSM consumer of the task-router agent.
    prompt: |
      You are the task router. Read your config (task_brief + target_files),
      apply the deterministic routing rules, and emit ok({route, rationale,
      estimated_files_changed}). No LLM call.

  architect:
    type: atlas
    agent: claude-code
    description: >-
      Reads the task's plan section from the mounted target repo,
      produces a structured design memo with verbatim plan
      citations. Uses claude-code (not llm) so it has real fs
      access to arbitrary plans.
    prompt: |
      You are the architect for a FAST self-modification task.
      The target repo is mounted at the path in your task config
      (target_repo, defaults to /workspace/atlas).

      ## Required reading (EVERY TASK — do this first)

      1. Read {target_repo}/{plan_path} — find the section heading
         that matches plan_section (use fs_grep or fs_read_file).
         Extract the verbatim interface/type declarations or spec
         content from that section.
      2. Read {target_repo}/CLAUDE.md — hard repo conventions.
      3. Read any existing files that your task will extend (listed
         in target_files or inferred from the brief).
      4. Read /skills/fast-self-modification/SKILL.md in your
         sandbox for the meta-rules on how this loop operates.

      ## Contract: plan_citations is REQUIRED

      Your design memo is structurally invalid if plan_citations
      is empty or contains paraphrases. Every interface or spec
      detail in files_to_create MUST appear verbatim in a
      plan_citation. The data contract rejects empty citations.

      Citation format:
        {
          "file": "<plan_path>",
          "line_start": <N>,
          "line_end": <M>,
          "verbatim": "<exact text from plan, including newlines>"
        }

      If the plan does NOT contain a signature for something you
      want to design, STOP. Do not invent. Return an empty
      files_to_create with integration_notes explaining what is
      missing from the plan.

      ## Output

      Structured JSON conforming to design-memo-result. Required
      fields: plan_citations (non-empty), files_to_create,
      integration_notes.
    env:
      ANTHROPIC_API_KEY: from_environment

  coder:
    type: atlas
    agent: claude-code
    description: >-
      Writes code into the target repo per the architect's design
      memo. Follows CLAUDE.md conventions strictly. Runs deno check
      and deno lint before reporting.
    prompt: |
      You are the coder for a FAST self-modification task. The
      target repo is mounted at target_repo (defaults to
      /workspace/atlas), which is your workDir.

      Your input contains a design memo with files_to_create,
      files_to_modify, tests_needed, and verbatim plan_citations.

      Rules (zero exceptions):
      1. Follow the memo exactly. Do not invent files not in
         files_to_create.
      2. Copy the verbatim content from plan_citations into the
         file contents. Do not paraphrase or reshape.
      3. Follow CLAUDE.md conventions: Deno, Zod v4, @atlas/logger,
         node:* builtins (not Deno APIs), static imports, no any,
         no as (except as const on string literals), no !
         non-null assertions.
      4. Run `deno check` on every file you create or modify.
      5. Run `deno lint` on every file you create or modify.
      6. If check or lint fails, fix and retry before reporting.

      Report as structured JSON per coder-result contract:
      files_written (with line counts), tests_added,
      deno_check_passed, deno_lint_passed, summary (2-3 sentences).
    env:
      ANTHROPIC_API_KEY: from_environment

  reviewer:
    type: atlas
    agent: claude-code
    description: >-
      Reviews coder output against the plan directly (not against
      the memo). Emits verdict with required plan_line citations
      on every finding.
    prompt: |
      You are the reviewer for a FAST self-modification task.
      The target repo is mounted at target_repo (defaults to
      /workspace/atlas). Use your fs tools.

      ## HARD RULE — review against the plan, not the memo

      The architect's memo may be wrong. Your job is to check
      whether the coder's files match the PLAN, not whether they
      match the memo. Read the plan file directly from the target
      repo.

      Review protocol:

      1. Read {target_repo}/{plan_path}. Find the section matching
         plan_section. Extract the authoritative interface/type
         declarations.

      2. Read each file the coder wrote (paths in impl-output.
         files_written). Compare line-by-line to the plan's
         declarations.

      3. Read {target_repo}/CLAUDE.md for convention rules.

      4. Run `deno check` and `deno lint` on coder's files. Record
         the results. A lint warning is a finding.

      5. Cross-check the coder's deno_check_passed /
         deno_lint_passed claims by running them yourself. Do not
         trust the coder's self-report.

      ## Drift categories

      Check for:
      - Missing fields / methods / parameters vs plan
      - Wrong parameter types or order
      - Extra methods not in the plan
      - Wrong return types
      - Wrong abstraction (e.g. plan says storage, coder wrote lifecycle)
      - Zod v4 violations
      - CLAUDE.md hard-rule violations

      ## Verdict rules

      - APPROVE: interfaces match plan verbatim, CLAUDE.md
        conventions followed, deno check/lint pass.
      - NEEDS_CHANGES: minor drift fixable in one pass.
      - BLOCK: fundamental drift (wrong abstraction, missing
        methods on a main interface). Architect needs to re-engage.

      ## Citation requirement (REJECTS INVALID OUTPUT)

      Every finding MUST include a plan_line field citing the
      line in the plan file (format: "relative/path.md:line" or
      "relative/path.md:start-end"). A finding without a citation
      is structurally invalid — the data contract rejects it.

      ## Output

      Structured JSON per review-result contract. If all checks
      pass, return APPROVE with a brief summary and empty findings.
    env:
      ANTHROPIC_API_KEY: from_environment

  reflector:
    type: user
    agent: reflector
    description: >-
      Custom Python WASM agent (Tier-5 SDK authorship). Reads a
      completed session via daemon HTTP, computes structural signals
      deterministically, and uses a single focused ctx.llm.generate_object
      call (claude-haiku) for the new-pattern judgment. Replaces the
      previous claude-code reflector — ~10x cheaper and more
      reliable. Does NOT publish; emits a structured proposal that
      apply-approved-reflection consumes.
    prompt: |
      You are the reflector for the FAST self-modification loop.
      Your job is to learn from completed sessions and propose
      updates to @tempest/fast-self-modification.

      The FAST daemon is reachable at {platformUrl} (provided in
      your config). The atlas monorepo is at /workspace/atlas
      (target_repo, provided in config).

      ## Protocol

      1. Read the session you are reflecting on. If config has
         a session_id, fetch it via:
         GET {platformUrl}/api/sessions/{session_id}
         Otherwise query the most recent completed session on
         a workspace.
      2. Read the current @tempest/fast-self-modification skill:
         GET {platformUrl}/api/skills/@tempest/fast-self-modification
         (or equivalent) — extract the current SKILL.md and
         version number.
      3. Analyze the session's agentBlocks:
         - step_research: did architect produce real plan_citations?
         - step_implement: did coder report deno_check_passed +
           deno_lint_passed? Any files_to_modify missed?
         - step_review: verdict + findings. Any findings flag a
           failure mode not already in the skill's table?

      ## Decide: is a skill update warranted?

      A skill update is warranted when:
      - A new failure mode appeared that isn't in the
        "Failure-mode → structural-fix mapping" table
      - Or an existing rule was violated in a way that suggests
        the rule's wording is unclear
      - Or a pattern was observed across 2+ sessions that deserves
        a new Rule in the "Five rules" section

      A skill update is NOT warranted for single-run anomalies or
      for cases where existing rules already cover the situation.

      ## Output: the reflection-result contract

      If an update is warranted, produce:

      {
        "outcome": "APPROVE|NEEDS_CHANGES|BLOCK|TIMEOUT",
        "matches_known_failure": false,
        "new_failure_mode": {
          "symptom": "<short observed pattern>",
          "root_cause": "<mechanistic explanation>",
          "structural_fix": "<contract/agent-type/FSM change>"
        },
        "skill_update_proposed": true,
        "new_skill_md": "<COMPLETE replacement SKILL.md text, including frontmatter>",
        "diff_summary": "<2-4 sentence human-readable diff summary>",
        "confidence": <0.0-1.0 float>,
        "current_skill_version": <integer from GET skills API>,
        "summary": "<one-line summary for the ledger>"
      }

      If no update warranted:

      {
        "outcome": "APPROVE|NEEDS_CHANGES|BLOCK|TIMEOUT",
        "matches_known_failure": true|false,
        "known_failure_row": "<row name if matched, else null>",
        "skill_update_proposed": false,
        "summary": "<one-line summary>"
      }

      ## Rules

      - Do not propose prompt rewrites. Propose contract, agent-
        type, or FSM-state changes.
      - confidence < 0.9 means "surface for human review, do not
        auto-apply." >= 0.9 means "strong proposal, human should
        fast-track."
      - Never publish the skill yourself. Emit new_skill_md in the
        output. A separate human-gated signal
        (apply-approved-reflection) handles publishing.
      - When emitting new_skill_md, include the ENTIRE file content
        including frontmatter. Partial content will fail the
        skill-updater step.
      - Keep the five-rules structure intact. Add rows to the
        failure-mode table by extension, not rewrite.
    env:
      ANTHROPIC_API_KEY: from_environment

  skill-updater:
    type: user
    agent: skill-publisher
    description: >-
      Custom Python WASM agent (Tier-5 SDK authorship). Pure
      mechanical: GET reflection session, verify confidence
      threshold, GET current skill metadata for previous_version,
      POST new content via multipart upload. Sub-second runtime
      vs the prior claude-code agent's multi-minute latency. No
      LLM calls.
    prompt: |
      You are the skill-updater for the FAST self-modification
      loop. Your input contains a reflection output with a
      proposed new SKILL.md and confidence score.

      The FAST daemon is reachable at {platformUrl}.

      ## Protocol

      1. Verify confidence >= 0.9 in the reflection input. If not,
         return applied=false with rationale "below threshold".
      2. Fetch current skill metadata:
         curl -s {platformUrl}/api/skills | jq for
         namespace=tempest, name=fast-self-modification.
         Record latest_version as previous_version.
      3. Write the reflection's new_skill_md to /tmp/new-skill.md
         inside your sandbox.
      4. Tar the content:
         tar czf /tmp/skill.tar.gz -C /tmp new-skill.md
         (ensure the tar contains a file named SKILL.md — if the
         daemon expects that exact name, rename before taring)
      5. Upload:
         curl -s -X POST {platformUrl}/api/skills/@tempest/fast-self-modification/upload \
           -F "archive=@/tmp/skill.tar.gz" \
           -F "skillMd=@/tmp/new-skill.md"
      6. Parse the response. Expect JSON with a .published.version
         field. Record as new_version.
      7. Construct the rollback_command:
         A shell command that would re-publish the previous version
         (requires fetching the previous version's content, which
         is an open question — for now, log it as a TODO string).

      ## Output contract (skill-apply-result)

      {
        "applied": true|false,
        "new_version": <integer>,
        "previous_version": <integer>,
        "skill_namespace": "tempest",
        "skill_name": "fast-self-modification",
        "rollback_command": "<shell command or 'TODO'>",
        "confidence_observed": <float>,
        "confidence_threshold": 0.9,
        "rationale": "<why applied or why not>",
        "summary": "<one line>"
      }

      ## Rules

      - NEVER publish if confidence < 0.9. Return applied=false
        with rationale "below threshold".
      - NEVER skip the previous_version fetch. Rollback requires it.
      - If the upload fails, do not retry — return applied=false
        with the curl error in rationale.
      - The daemon may reject upload on schema violation. Surface
        the error, do not swallow it.
    env:
      ANTHROPIC_API_KEY: from_environment

jobs:
  execute-self-mod-task:
    title: Execute self-modification task
    description: >-
      Architect → coder → reviewer FSM with data contracts between
      every step. Runs against any mounted target repo.
    triggers:
      - signal: run-self-mod-task
    fsm:
      id: self-mod-pipeline
      initial: idle
      states:
        idle:
          entry:
            - type: code
              function: cleanup
          'on':
            run-self-mod-task:
              target: step_route

        step_route:
          entry:
            - type: code
              function: prepare_route
            - type: agent
              agentId: task-router
              outputTo: route-output
              outputType: routing-result
            - type: emit
              event: ROUTED
          'on':
            ROUTED:
              - target: step_implement
                guards:
                  - guard_route_quick_fix
              - target: step_research
                guards:
                  - guard_route_full_fsm

        step_research:
          entry:
            - type: code
              function: prepare_research
            - type: agent
              agentId: architect
              outputTo: memo-output
              outputType: design-memo-result
            - type: emit
              event: ADVANCE
          'on':
            ADVANCE:
              target: step_implement
              guards:
                - guard_memo_done

        step_implement:
          entry:
            - type: code
              function: prepare_implement
            - type: agent
              agentId: coder
              outputTo: impl-output
              outputType: coder-result
            - type: emit
              event: ADVANCE
          'on':
            ADVANCE:
              target: step_review
              guards:
                - guard_impl_done

        step_review:
          entry:
            - type: code
              function: prepare_review
            - type: agent
              agentId: reviewer
              outputTo: review-output
              outputType: review-result
            - type: emit
              event: ADVANCE
          'on':
            ADVANCE:
              target: completed
              guards:
                - guard_review_done

        completed:
          type: final

      functions:
        cleanup:
          type: action
          code: |
            export default function cleanup(context, event) {
              // session-scoped results clear between runs
            }

        prepare_route:
          type: action
          code: |
            export default function prepare_route(context, event) {
              // Stash task input early so quick-fix path (which skips
              // prepare_research) still has it available downstream.
              var taskId = event.data && event.data.task_id;
              var brief = event.data && event.data.task_brief;
              var targets = (event.data && event.data.target_files) || [];
              var repo = (event.data && event.data.target_repo) || '/workspace/atlas';
              var planPath = event.data && event.data.plan_path;
              var planSection = event.data && event.data.plan_section;

              if (!taskId || typeof taskId !== 'string') {
                throw new Error('Missing required input: task_id');
              }
              if (!brief || typeof brief !== 'string') {
                throw new Error('Missing required input: task_brief');
              }

              context.setResult('task-input', {
                taskId: taskId,
                brief: brief,
                targets: targets,
                target_repo: repo,
                plan_path: planPath,
                plan_section: planSection,
              });

              return {
                task: 'Route ' + taskId + ': quick-fix vs full-fsm',
                config: {
                  task_brief: brief,
                  target_files: targets,
                },
              };
            }

        guard_route_quick_fix:
          type: guard
          code: |
            export default function guard_route_quick_fix(context, event) {
              var r = context.results['route-output'];
              return r !== undefined && r && r.route === 'quick-fix';
            }

        guard_route_full_fsm:
          type: guard
          code: |
            export default function guard_route_full_fsm(context, event) {
              var r = context.results['route-output'];
              return r !== undefined && r && r.route === 'full-fsm';
            }

        prepare_research:
          type: action
          code: |
            export default function prepare_research(context, event) {
              // Called via ROUTED event from step_route, so event.data does
              // NOT carry the original signal payload. Pull from task-input
              // which prepare_route already stashed.
              var task = context.results['task-input'];
              if (!task) throw new Error('Task input not found (prepare_route should have stashed it)');

              if (!task.plan_path || typeof task.plan_path !== 'string') {
                throw new Error('Missing required input: plan_path');
              }
              if (!task.plan_section || typeof task.plan_section !== 'string') {
                throw new Error('Missing required input: plan_section');
              }

              return {
                task: 'Design memo for ' + task.taskId + ': ' + task.brief,
                config: {
                  task_id: task.taskId,
                  task_brief: task.brief,
                  target_files: task.targets,
                  target_repo: task.target_repo,
                  plan_path: task.plan_path,
                  plan_section: task.plan_section,
                },
              };
            }

        guard_memo_done:
          type: guard
          code: |
            export default function guard_memo_done(context, event) {
              return context.results['memo-output'] !== undefined;
            }

        prepare_implement:
          type: action
          code: |
            export default function prepare_implement(context, event) {
              var memo = context.results['memo-output'];
              var task = context.results['task-input'];
              if (!task) throw new Error('Task input not found');
              // Quick-fix path bypasses architect — memo is undefined.
              // We pass the raw task brief instead so the coder has guidance.
              var quickFix = memo === undefined;
              return {
                task: quickFix
                  ? 'Implement ' + task.taskId + ' (quick-fix path, no memo): ' + task.brief
                  : 'Implement ' + task.taskId + ' per design memo',
                config: {
                  workDir: task.target_repo,
                  task_id: task.taskId,
                  memo: memo || null,
                  task_brief: task.brief,
                  target_files: task.targets,
                  quick_fix: quickFix,
                },
              };
            }

        guard_impl_done:
          type: guard
          code: |
            export default function guard_impl_done(context, event) {
              return context.results['impl-output'] !== undefined;
            }

        prepare_review:
          type: action
          code: |
            export default function prepare_review(context, event) {
              var memo = context.results['memo-output'];
              var impl = context.results['impl-output'];
              var task = context.results['task-input'];
              if (!impl || !task) {
                throw new Error('Missing impl or task input');
              }
              // Quick-fix path: memo is undefined (architect skipped).
              return {
                task: 'Review ' + task.taskId + ' against plan',
                config: {
                  workDir: task.target_repo,
                  task_id: task.taskId,
                  plan_path: task.plan_path,
                  plan_section: task.plan_section,
                  memo: memo || null,
                  changes: impl,
                  quick_fix: memo === undefined,
                },
              };
            }

        guard_review_done:
          type: guard
          code: |
            export default function guard_review_done(context, event) {
              return context.results['review-output'] !== undefined;
            }

      documentTypes:
        routing-result:
          type: object
          properties:
            route:
              type: string
              enum: [quick-fix, full-fsm]
            rationale:
              type: string
            estimated_files_changed:
              type: integer
          required:
            - route
            - rationale

        design-memo-result:
          type: object
          properties:
            plan_citations:
              type: array
              description: REQUIRED non-empty. Verbatim quotes from the plan source of truth.
              items:
                type: object
                properties:
                  file: { type: string }
                  line_start: { type: integer }
                  line_end: { type: integer }
                  verbatim: { type: string }
                required: [file, verbatim]
              minItems: 1
            files_to_create:
              type: array
              items:
                type: object
                properties:
                  path: { type: string }
                  purpose: { type: string }
                  key_types:
                    type: array
                    items: { type: string }
                required: [path, purpose]
            files_to_modify:
              type: array
              items:
                type: object
                properties:
                  path: { type: string }
                  changes: { type: string }
                required: [path, changes]
            tests_needed:
              type: array
              items: { type: string }
            integration_notes:
              type: string
          required:
            - plan_citations
            - files_to_create
            - integration_notes

        coder-result:
          type: object
          properties:
            files_written:
              type: array
              items:
                type: object
                properties:
                  path: { type: string }
                  lines_added: { type: integer }
                  lines_removed: { type: integer }
                required: [path]
            tests_added:
              type: array
              items: { type: string }
            deno_check_passed: { type: boolean }
            deno_lint_passed: { type: boolean }
            summary: { type: string }
          required:
            - files_written
            - deno_check_passed
            - summary

        review-result:
          type: object
          properties:
            verdict:
              type: string
              enum: [APPROVE, NEEDS_CHANGES, BLOCK]
            findings:
              type: array
              items:
                type: object
                properties:
                  severity:
                    type: string
                    enum: [CRITICAL, WARNING, SUGGESTION]
                  file: { type: string }
                  line: { type: integer }
                  description: { type: string }
                  plan_line:
                    type: string
                    description: REQUIRED. Source citation like "docs/plans/parity-plan.md:582-634".
                required: [severity, description, plan_line]
            summary:
              type: string
          required:
            - verdict
            - summary

      tools: {}

  reflect-on-last-run:
    title: Reflect on a completed session
    description: >-
      Reads a session's structured output and proposes updates to
      the meta-skill if a new failure mode appeared.
    triggers:
      - signal: reflect-on-last-run
    fsm:
      id: reflect-pipeline
      initial: idle
      states:
        idle:
          'on':
            reflect-on-last-run:
              target: step_reflect
        step_reflect:
          entry:
            - type: code
              function: prepare_reflect
            - type: agent
              agentId: reflector
              outputTo: reflection-output
              outputType: reflection-result
            - type: emit
              event: ADVANCE
          'on':
            ADVANCE:
              target: completed
              guards:
                - guard_reflect_done
        completed:
          type: final
      functions:
        prepare_reflect:
          type: action
          code: |
            export default function prepare_reflect(context, event) {
              var sid = event.data && event.data.session_id;
              // Reflector agent reads session via its own tools;
              // we just pass the optional session id along.
              return {
                task: 'Reflect on session ' + (sid || 'latest'),
                config: {
                  session_id: sid || null,
                },
              };
            }
        guard_reflect_done:
          type: guard
          code: |
            export default function guard_reflect_done(context, event) {
              return context.results['reflection-output'] !== undefined;
            }
      documentTypes:
        reflection-result:
          type: object
          properties:
            outcome:
              type: string
              enum: [APPROVE, NEEDS_CHANGES, BLOCK, TIMEOUT]
            matches_known_failure: { type: boolean }
            known_failure_row:
              anyOf:
                - { type: string }
                - { type: "null" }
              description: >-
                Name of the matched failure-mode row, or null if no
                match. Always present even on no-update outcomes.
            new_failure_mode:
              anyOf:
                - type: object
                  properties:
                    symptom: { type: string }
                    root_cause: { type: string }
                    structural_fix: { type: string }
                - { type: "null" }
              description: >-
                Structured proposal for a new failure-mode table row,
                or null when no new pattern is warranted.
            skill_update_proposed: { type: boolean }
            new_skill_md:
              anyOf:
                - { type: string }
                - { type: "null" }
              description: Full replacement SKILL.md, or null on no-update.
            diff_summary:
              anyOf:
                - { type: string }
                - { type: "null" }
            confidence:
              anyOf:
                - { type: number }
                - { type: "null" }
            current_skill_version:
              anyOf:
                - { type: integer }
                - { type: "null" }
            session_summary:
              type: object
              description: Structural facts about the analyzed session.
            rationale:
              anyOf:
                - { type: string }
                - { type: "null" }
            summary: { type: string }
          required:
            - outcome
            - matches_known_failure
            - skill_update_proposed
            - summary

      tools: {}

  apply-reflection:
    title: Apply an approved reflection
    description: >-
      Takes a completed reflection session ID and publishes the
      proposed SKILL.md to the daemon. Only publishes when the
      reflector's confidence >= 0.9. Human-gated: this is a
      separate signal from reflect-on-last-run precisely so a
      human (or later, an approver agent) reviews the proposal
      before publishing.
    triggers:
      - signal: apply-approved-reflection
    fsm:
      id: apply-pipeline
      initial: idle
      states:
        idle:
          'on':
            apply-approved-reflection:
              target: step_apply
        step_apply:
          entry:
            - type: code
              function: prepare_apply
            - type: agent
              agentId: skill-updater
              outputTo: apply-output
              outputType: skill-apply-result
            - type: emit
              event: ADVANCE
          'on':
            ADVANCE:
              target: completed
              guards:
                - guard_apply_done
        completed:
          type: final
      functions:
        prepare_apply:
          type: action
          code: |
            export default function prepare_apply(context, event) {
              // Optional reflection_session_id — if omitted, the
              // skill-publisher agent walks recent sessions itself and
              // picks the most recent reflect-on-last-run with
              // skill_update_proposed=true. This makes the signal safe
              // to fire periodically from cron without an explicit ID
              // (e.g., from the autopilot's apply-approved-grilled-xylem
              // backlog task).
              var sid = (event.data && event.data.reflection_session_id) || null;
              return {
                task: sid ? ('Apply reflection from session ' + sid) : 'Apply latest approved reflection',
                config: {
                  reflection_session_id: sid,
                },
              };
            }
        guard_apply_done:
          type: guard
          code: |
            export default function guard_apply_done(context, event) {
              return context.results['apply-output'] !== undefined;
            }
      documentTypes:
        skill-apply-result:
          type: object
          properties:
            applied:
              type: boolean
            new_version:
              type: integer
            previous_version:
              type: integer
            skill_namespace:
              type: string
            skill_name:
              type: string
            rollback_command:
              type: string
            confidence_observed:
              type: number
            confidence_threshold:
              type: number
            rationale:
              type: string
            summary:
              type: string
          required:
            - applied
            - rationale
            - summary

      tools: {}
