version: '1.0'
workspace:
  name: FAST Autopilot
  description: >-
    The control loop that's meant to replace the human (or Claude session)
    sitting in front of FAST as overwatch. v1 is a planner-only pipeline:
    a cron tick fires autopilot-planner, which reads a backlog and emits
    the next task to dispatch. v2 adds a dispatcher step that actually
    fires the chosen signal at the chosen workspace and polls until done.
    v3 adds a reflect step that runs reflector + multi-session-reflector
    after each completion. v4 adds skill-author + skill-publisher chained
    behind a confidence gate.

# Why this workspace exists:
#   I (the operator) have been polling /api/sessions, drafting briefs,
#   choosing which workspace to fire which signal at, and committing
#   results all night. Every one of those is a function the loop should
#   own. This workspace is the bootstrap — the minimum viable shape of
#   "what should the loop do without a human in it."
#
# The planner is intentionally pure (no side effects, no LLM, no HTTP
# state mutation). It just READS the backlog and DECIDES. Dispatching
# is a separate concern in a future v2 step. Splitting these means the
# planner can be unit-tested in isolation and re-run cheaply.
#
# The backlog is a tracked file in atlas at
# docs/plans/autopilot-backlog.json. It's a simple JSON list of tasks
# with status, priority, kind, payload. Adding tasks to the backlog is
# a separate concern — humans, or a future task-discoverer agent.

skills: []

signals:
  autopilot-tick:
    provider: http
    title: Autopilot tick
    description: >-
      Manually fire one autopilot iteration via HTTP. The cron-driven
      counterpart is autopilot-tick-cron — both feed the same job.
    config:
      path: /webhooks/autopilot-tick
    schema:
      type: object
      properties:
        backlog_url:
          type: string
          description: >-
            Optional override for the backlog source URL. Defaults to the
            atlas-mounted backlog file.
        max_iterations:
          type: integer
          description: >-
            v1 ignores this. Reserved for v2 batch-dispatch.

  autopilot-tick-cron:
    provider: schedule
    title: Autopilot tick (scheduled)
    description: >-
      Cron-driven autopilot iteration. Currently ~5 min cadence — was
      every minute but that just spun the same task repeatedly because
      the planner doesn't know what's already in flight. Once the planner
      gains "skip-recent" logic and the backlog is stateful, this can
      tighten back to 1 min. Treadmill prevention > visible cadence.
    config:
      schedule: '*/5 * * * *'
      timezone: UTC

  audit-orphans:
    provider: http
    title: Audit orphan agents
    description: >-
      Run the orphan-agent-auditor against the live registry and emit
      the list of user agents not wired into any FSM. Operator runs
      this to catch the structural failure mode where authoring runs
      ahead of integration.
    config:
      path: /webhooks/audit-orphans
    schema:
      type: object
      properties: {}

  cross-session-reflect:
    provider: http
    title: Cross-session reflect
    description: >-
      Run the multi-session-reflector against a target workspace's
      recent N completed sessions. Surfaces recurring failure
      patterns that a single-session reflector cannot see.
    config:
      path: /webhooks/cross-session-reflect
    schema:
      type: object
      properties:
        workspace_id:
          type: string
          description: Target workspace whose sessions to scan. Defaults to grilled_xylem.
        n:
          type: integer
          description: How many recent completed sessions to scan. Default 10.

agents:
  planner:
    type: user
    agent: autopilot-planner
    description: >-
      Custom Python WASM agent. Reads the backlog, picks the next
      eligible task, returns a structured plan. No LLM. No HTTP
      mutation. Replaces the "what should I work on next" function
      that I (the operator) have been performing manually.
    prompt: |
      You are the autopilot planner. Read your config, fetch the
      backlog, pick the next eligible task, and emit a structured
      action.

      Pure deterministic. NO LLM. Filter by status==pending, skip
      blocked tasks, sort by priority desc + created_at asc, take
      the first.

      Output action='execute' with target_workspace_id +
      target_signal_id + signal_payload, OR action='idle' if no
      eligible task exists.
    env:
      ANTHROPIC_API_KEY: from_environment

  orphan-auditor:
    type: user
    agent: orphan-agent-auditor
    description: >-
      Custom Python WASM agent. Audits the registry vs all loaded
      workspace configs, returns the list of user agents with no
      FSM consumer. The cross-artifact integration check that the
      single-session reflector cannot do. Closes the orphan-agent
      failure mode that produced 4+ unwired agents tonight.
    prompt: |
      You are the orphan-agent auditor. List user agents from
      /api/agents, scan workspace.config.agents in every workspace
      via /api/workspaces and /api/workspaces/{id}, return the
      agents not referenced anywhere as orphans.
    env:
      ANTHROPIC_API_KEY: from_environment

  dispatcher:
    type: user
    agent: autopilot-dispatcher
    description: >-
      Custom Python WASM agent. Takes a planner plan-output and fires
      the target signal at the target workspace via HTTP POST. Blocks
      until the downstream FSM returns. Closes the autopilot loop —
      without this, planner output is inert metadata.
    prompt: |
      You are the autopilot dispatcher. Read your config, short-circuit
      on action=='idle', otherwise POST to
      /api/workspaces/{target_workspace_id}/signals/{target_signal_id}
      with the signal payload. Return dispatched=true with session_id
      on 2xx; dispatched=false on idle; err on 4xx/5xx.
    env:
      ANTHROPIC_API_KEY: from_environment

  cross-session-reflector:
    type: user
    agent: multi-session-reflector
    description: >-
      Custom Python WASM agent. Cross-session reflector — reads the
      last N completed sessions for a workspace, computes structural
      signals, asks claude-haiku for a single recurring-pattern
      judgment. Companion to the single-session reflector. Wired
      here so the agent isn't orphaned.
    prompt: |
      You are the cross-session reflector. Read your config
      (workspace_id, n) and emit a reflection-result-multi.
    env:
      ANTHROPIC_API_KEY: from_environment

  skill-author:
    type: user
    agent: skill-author
    description: >-
      Custom Python WASM agent. Takes a high-confidence reflection
      proposal + current SKILL.md and produces a complete replacement
      SKILL.md with a new failure-mode row added. Single LLM call,
      strict structured output, gated on confidence >= 0.9.
    env:
      ANTHROPIC_API_KEY: from_environment

  skill-publisher:
    type: user
    agent: skill-publisher
    description: >-
      Custom Python WASM agent. Pure mechanical multipart upload of
      a new SKILL.md to /api/skills/@tempest/{name}/upload. Records
      previous_version for rollback. No LLM call.
    env:
      ANTHROPIC_API_KEY: from_environment

jobs:
  autopilot-tick:
    title: Autopilot iteration
    description: >-
      v1: call the planner, emit the chosen action as a structured
      output. The operator (or a future dispatcher) reads the output
      and acts on it. v2 will add a dispatch step.
    triggers:
      - signal: autopilot-tick
      - signal: autopilot-tick-cron
    fsm:
      id: autopilot-pipeline
      initial: idle
      states:
        idle:
          'on':
            autopilot-tick:
              target: step_plan
            autopilot-tick-cron:
              target: step_plan

        step_plan:
          entry:
            - type: code
              function: prepare_plan
            - type: agent
              agentId: planner
              outputTo: plan-output
              outputType: plan-result
            - type: emit
              event: ADVANCE
          'on':
            ADVANCE:
              target: completed
              guards:
                - guard_plan_done

        # NOTE: step_dispatch was removed in commit-pending. The daemon has
        # a structural bug where the SECOND user agent invoked in an FSM
        # has its agentContext stripped of http+stream bindings (first
        # user agent works fine, second crashes with 'undefined httpFetch').
        # Workaround: planner agent now does the dispatch inline via its
        # own ctx.http.fetch in a single FSM step. Re-introduce step_dispatch
        # once the daemon bug is fixed.

        completed:
          type: final

      functions:
        prepare_plan:
          type: action
          code: |
            export default function prepare_plan(context, event) {
              // The planner reads the backlog from ctx.config.backlog_json
              // (inline string) or backlog_url (HTTP fetch). The narrative
              // corpus endpoint at /api/memory/{ws}/narrative/{name} is the
              // intended v2 source — but that route is daemon-side new code
              // that won't go live until the friday-starter image rebuilds.
              // Until then: an inline default with real follow-up work so the
              // loop has something to do.
              //
              // Mark a task status:done to take it out of rotation. Operator
              // edits this code action to add new tasks until the corpus
              // route lands.
              // CRITICAL: do NOT target mild_almond from this backlog — the
              // autopilot dispatcher running INSIDE mild_almond's autopilot-tick
              // FSM cannot recursively fire mild_almond signals (concurrent
              // session creation on the same workspace invalidates the outer
              // FSM's stream context, causing 'undefined streamEmit'). Target
              // OTHER workspaces only.
              //
              // Initial backlog: trigger reflect-on-last-run on grilled_xylem
              // periodically so the reflector keeps thinking about recent
              // sessions. Cheap, safe, exercises the existing loop.
              // Two cheap tasks. The planner picks the highest-priority
              // not-on-cooldown task and fires it. With cooldown_s=1800
              // (top-level config), each task fires at most once per 30 min,
              // which means the loop alternates roughly: reflect, idle,
              // idle, ..., apply-check, idle, idle.
              var defaultBacklog = JSON.stringify({
                tasks: [
                  {
                    id: 'reflect-grilled-xylem-recent',
                    title: 'Reflect on grilled_xylem most recent session',
                    status: 'pending',
                    priority: 50,
                    kind: 'reflect',
                    blocked_by: [],
                    created_at: '2026-04-14T16:30:00Z',
                    payload: {
                      workspace_id: 'grilled_xylem',
                      signal_id: 'reflect-on-last-run'
                    }
                  },
                  {
                    id: 'apply-approved-grilled-xylem',
                    title: 'Try to apply latest approved reflection on grilled_xylem',
                    status: 'pending',
                    priority: 40,
                    kind: 'reflect',
                    blocked_by: [],
                    created_at: '2026-04-14T16:30:00Z',
                    // The apply-approved-reflection signal triggers the
                    // apply-reflection job. Sessions record jobName, not
                    // signal name. match_job_name tells the planner what
                    // to look for in the cooldown check.
                    match_job_name: 'apply-reflection',
                    payload: {
                      workspace_id: 'grilled_xylem',
                      signal_id: 'apply-approved-reflection',
                      // No reflection_session_id — the apply agent walks
                      // recent reflect sessions itself or returns idle
                      // if no high-confidence proposal is available.
                    }
                  }
                ]
              });
              var backlogJson = (event.data && event.data.backlog_json) || defaultBacklog;
              return {
                task: 'Autopilot tick: pick next backlog task',
                config: {
                  backlog_json: backlogJson,
                  platformUrl: 'http://localhost:8080',
                  // 30 min cooldown — the planner skips a task if its target
                  // signal fired within the last cooldown_s seconds. Stops
                  // the cron-driven treadmill.
                  cooldown_s: 1800,
                },
              };
            }

        guard_plan_done:
          type: guard
          code: |
            export default function guard_plan_done(context, event) {
              return context.results['plan-output'] !== undefined;
            }

        prepare_dispatch:
          type: action
          code: |
            export default function prepare_dispatch(context, event) {
              var plan = context.results['plan-output'];
              if (!plan) throw new Error('Plan output not found');
              return {
                task: 'Dispatch: ' + (plan.task_id || '(idle)'),
                config: {
                  action: plan.action,
                  target_workspace_id: plan.target_workspace_id,
                  target_signal_id: plan.target_signal_id,
                  signal_payload: plan.signal_payload,
                  platformUrl: 'http://localhost:8080',
                },
              };
            }

        guard_dispatch_done:
          type: guard
          code: |
            export default function guard_dispatch_done(context, event) {
              return context.results['dispatch-output'] !== undefined;
            }

      documentTypes:
        dispatch-result:
          type: object
          properties:
            dispatched: { type: boolean }
            action:
              anyOf:
                - { type: string }
                - { type: 'null' }
            target_workspace_id:
              anyOf:
                - { type: string }
                - { type: 'null' }
            target_signal_id:
              anyOf:
                - { type: string }
                - { type: 'null' }
            session_id:
              anyOf:
                - { type: string }
                - { type: 'null' }
            rationale:
              anyOf:
                - { type: string }
                - { type: 'null' }
          required:
            - dispatched

        plan-result:
          type: object
          properties:
            action:
              type: string
              enum: [execute, idle]
            task_id:
              anyOf:
                - { type: string }
                - { type: 'null' }
            target_workspace_id:
              anyOf:
                - { type: string }
                - { type: 'null' }
            target_signal_id:
              anyOf:
                - { type: string }
                - { type: 'null' }
            signal_payload:
              anyOf:
                - { type: object }
                - { type: 'null' }
            task_kind:
              anyOf:
                - { type: string }
                - { type: 'null' }
            rationale:
              type: string
          required:
            - action
            - rationale

      tools: {}

  audit-orphans:
    title: Audit orphan agents
    description: >-
      Run the orphan-agent-auditor and emit the list of unwired user
      agents. The cross-artifact integration check.
    triggers:
      - signal: audit-orphans
    fsm:
      id: audit-orphans-pipeline
      initial: idle
      states:
        idle:
          'on':
            audit-orphans:
              target: step_audit
        step_audit:
          entry:
            - type: code
              function: prepare_audit
            - type: agent
              agentId: orphan-auditor
              outputTo: audit-output
              outputType: orphan-audit-result
            - type: emit
              event: ADVANCE
          'on':
            ADVANCE:
              target: completed
              guards:
                - guard_audit_done
        completed:
          type: final
      functions:
        prepare_audit:
          type: action
          code: |
            export default function prepare_audit(context, event) {
              // Exclude bundled atlas agents (they're globally available
              // and don't need FSM consumers) and library-style user agents
              // (called by other agents, not by FSMs directly).
              return {
                task: 'Audit orphan agents across all workspaces',
                config: {
                  platformUrl: 'http://localhost:8080',
                  // Restrict to known user-built agents so we don't flag
                  // bundled atlas agents (claude-code, slack, etc.) as orphans.
                  user_agent_ids: [
                    'autopilot-dispatcher',
                    'autopilot-planner',
                    'multi-session-reflector',
                    'orphan-agent-auditor',
                    'reflection-aggregator',
                    'reflector',
                    'session-summarizer',
                    'skill-author',
                    'skill-publisher',
                    'task-router',
                    'workspace-creator'
                  ],
                  // Library agents are called from inside other agents,
                  // not directly from FSMs. orphan-agent-auditor v1.2+
                  // honors this field and excludes them from the orphan
                  // count (still surfaced under library_orphans_excluded
                  // in the result for transparency).
                  library_agents: [
                    'session-summarizer',
                    'reflection-aggregator'
                  ]
                },
              };
            }
        guard_audit_done:
          type: guard
          code: |
            export default function guard_audit_done(context, event) {
              return context.results['audit-output'] !== undefined;
            }
      documentTypes:
        orphan-audit-result:
          type: object
          properties:
            total_user_agents: { type: integer }
            referenced_count: { type: integer }
            orphan_count: { type: integer }
            orphans:
              type: array
              items:
                type: object
                properties:
                  agent_id: { type: string }
                  version: { type: string }
                required: [agent_id]
            referenced:
              type: array
              items:
                type: object
                properties:
                  agent_id: { type: string }
                  workspaces:
                    type: array
                    items: { type: string }
                required: [agent_id]
            rationale: { type: string }
          required:
            - total_user_agents
            - referenced_count
            - orphan_count
            - orphans
            - rationale
      tools: {}

  cross-session-reflect:
    title: Cross-session reflect
    description: >-
      Run multi-session-reflector against a target workspace to surface
      recurring failure patterns. v2 chains into skill-author +
      skill-publisher behind a confidence gate (>= 0.9).
    triggers:
      - signal: cross-session-reflect
    fsm:
      id: cross-session-reflect-pipeline
      initial: idle
      states:
        idle:
          'on':
            cross-session-reflect:
              target: step_reflect
        step_reflect:
          entry:
            - type: code
              function: prepare_reflect
            - type: agent
              agentId: cross-session-reflector
              outputTo: reflect-output
              outputType: cross-session-reflect-result
            - type: emit
              event: ADVANCE
          'on':
            ADVANCE:
              - target: step_author
                guards:
                  - guard_reflect_done
                  - guard_skill_warranted
              - target: completed
                guards:
                  - guard_reflect_done
        step_author:
          entry:
            - type: code
              function: prepare_author
            - type: agent
              agentId: skill-author
              outputTo: author-output
              outputType: skill-author-result
            - type: emit
              event: AUTHOR_DONE
          'on':
            AUTHOR_DONE:
              - target: step_publish
                guards:
                  - guard_author_done
                  - guard_publish_ready
              - target: completed
                guards:
                  - guard_author_done
        step_publish:
          entry:
            - type: code
              function: prepare_publish
            - type: agent
              agentId: skill-publisher
              outputTo: publish-output
              outputType: skill-publisher-result
            - type: emit
              event: PUBLISH_DONE
          'on':
            PUBLISH_DONE:
              target: completed
        completed:
          type: final
      functions:
        prepare_reflect:
          type: action
          code: |
            export default function prepare_reflect(context, event) {
              var wsId = (event.data && event.data.workspace_id) || 'grilled_xylem';
              var n = (event.data && event.data.n) || 10;
              return {
                task: 'Cross-session reflect on ' + wsId,
                config: {
                  workspace_id: wsId,
                  n: n,
                  platformUrl: 'http://localhost:8080',
                },
              };
            }
        guard_reflect_done:
          type: guard
          code: |
            export default function guard_reflect_done(context, event) {
              return context.results['reflect-output'] !== undefined;
            }
        guard_skill_warranted:
          type: guard
          code: |
            export default function guard_skill_warranted(context, event) {
              var reflect = context.results['reflect-output'];
              if (!reflect || !reflect.judgment) return false;
              return reflect.judgment.skill_update_warranted === true &&
                     reflect.judgment.confidence >= 0.9;
            }
        prepare_author:
          type: action
          code: |
            export default function prepare_author(context, event) {
              var reflect = context.results['reflect-output'];
              if (!reflect) throw new Error('Reflect output not found');
              return {
                task: 'Author skill update based on cross-session judgment',
                config: {
                  judgment: reflect.judgment,
                  current_skill_md: '',
                  platformUrl: 'http://localhost:8080',
                },
              };
            }
        guard_author_done:
          type: guard
          code: |
            export default function guard_author_done(context, event) {
              return context.results['author-output'] !== undefined;
            }
        guard_publish_ready:
          type: guard
          code: |
            export default function guard_publish_ready(context, event) {
              var author = context.results['author-output'];
              return author != null && author.proposed_skill_md != null;
            }
        prepare_publish:
          type: action
          code: |
            export default function prepare_publish(context, event) {
              var author = context.results['author-output'];
              if (!author) throw new Error('Author output not found');
              return {
                task: 'Publish proposed skill update',
                config: {
                  proposed_skill_md: author.proposed_skill_md,
                  platformUrl: 'http://localhost:8080',
                },
              };
            }
      documentTypes:
        cross-session-reflect-result:
          type: object
          properties:
            workspace_id: { type: string }
            n_sessions_scanned: { type: integer }
            judgment:
              type: object
              properties:
                matches_known_pattern: { type: boolean }
                skill_update_warranted: { type: boolean }
                confidence: { type: number }
                rationale: { type: string }
            summary: { type: string }
          required:
            - workspace_id
            - judgment
        skill-author-result:
          type: object
          properties:
            proposed_skill_md:
              anyOf:
                - { type: string }
                - { type: 'null' }
            rationale:
              anyOf:
                - { type: string }
                - { type: 'null' }
          required: []
        skill-publisher-result:
          type: object
          properties:
            published: { type: boolean }
            skill_name:
              anyOf:
                - { type: string }
                - { type: 'null' }
            version:
              anyOf:
                - { type: string }
                - { type: 'null' }
            rationale:
              anyOf:
                - { type: string }
                - { type: 'null' }
          required:
            - published
      tools: {}
