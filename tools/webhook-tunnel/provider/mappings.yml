# Webhook payload mappings — defines how external webhook payloads are
# transformed into Friday signal payloads.
#
# As of 2026-05-15 only `github` ships built-in. Bitbucket and Jira were
# removed: workspace agents own parsing + (optional) signature verification
# directly. Users register Bitbucket / Jira / custom webhooks via
# `/hook/raw/{workspaceId}/{signalId}` — the raw provider forwards the
# full JSON body without filtering or transformation. See the
# `wiring-external-webhooks` skill for the agent-side pattern.
#
# Each provider entry below has:
#   - event_header: HTTP header containing event type (GitHub)
#   - event_field: body field containing event type (when no header)
#   - signature_header: header for HMAC-SHA256 verification
#   - events: mapping of event names to actions filter + field extraction
#
# Dot-path notation extracts nested values: "pull_request.html_url"
# Array index notation: "push.changes[0].new.name"

providers:
  github:
    event_header: x-github-event
    signature_header: x-hub-signature-256

    events:
      pull_request:
        actions: [opened, reopened, synchronize]
        mapping:
          pr_url: "pull_request.html_url"

      issues:
        actions: [opened, labeled]
        mapping:
          issue_url: "issue.html_url"
          issue_key: "issue.number"
          title: "issue.title"
          action: "action"

      push:
        mapping:
          ref: "ref"
          repo: "repository.full_name"
          sha: "after"
          pusher: "pusher.name"
