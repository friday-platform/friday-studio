# Cases migrated from tools/evals/agents/small-llm/small-llm.eval.ts.
# Each test runs against every provider declared in promptfooconfig.yaml.
#
# Per-test `vars.system_prompt` loads the right system template from
# `prompts/`. The single chat-format prompt (`prompts/chat.json`) injects
# both `system_prompt` and `input` into a system/user message pair, so the
# model receives a real role-split (matches the production AI-SDK call).
#
# Scoring matches the original eval:
#   - Relevance: required keywords appear in output (case-insensitive)
#   - StatusLine: rejects fail-patterns, requires -ing verb, ≤50 chars
#   - Latency / Cost: floor in shared/defaultTest.yaml

# ─── Claude Code — tool invocations ──────────────────────────────────────────

- description: 'claude-code/tool — write file'
  vars:
    system_prompt: file://prompts/claude-code.txt
    input: '{"toolName":"Write","input":{"file_path":"/tmp/agent-output.txt"}}'
  assert:
    - type: icontains-all
      value: [writing, output.txt]
      metric: Relevance
    - type: javascript
      value: file://assertions/status-line.js
      metric: StatusLine

- description: 'claude-code/tool — read package.json'
  vars:
    system_prompt: file://prompts/claude-code.txt
    input: '{"toolName":"Read","input":{"file":"package.json"}}'
  assert:
    - type: icontains-all
      value: [reading, package.json]
      metric: Relevance
    - type: javascript
      value: file://assertions/status-line.js
      metric: StatusLine

- description: 'claude-code/tool — bash npm install'
  vars:
    system_prompt: file://prompts/claude-code.txt
    input: '{"toolName":"Bash","input":{"command":"npm install"}}'
  assert:
    - type: icontains-all
      value: [npm, install]
      metric: Relevance
    - type: javascript
      value: file://assertions/status-line.js
      metric: StatusLine

- description: 'claude-code/tool — edit index.ts'
  vars:
    system_prompt: file://prompts/claude-code.txt
    input: '{"toolName":"Edit","input":{"file_path":"src/index.ts","changes":"..."}}'
  assert:
    - type: icontains-all
      value: [editing, index.ts]
      metric: Relevance
    - type: javascript
      value: file://assertions/status-line.js
      metric: StatusLine

# ─── Research — progress updates ─────────────────────────────────────────────

- description: 'research — AI safety'
  vars:
    system_prompt: file://prompts/research.txt
    input: 'stage: analyzing, context: AI safety developments'
  assert:
    - type: icontains-all
      value: [ai, safety]
      metric: Relevance

- description: 'research — Parker Conrad'
  vars:
    system_prompt: file://prompts/research.txt
    input: 'stage: starting, topic: Parker Conrad background research'
  assert:
    - type: icontains-all
      value: [parker, conrad]
