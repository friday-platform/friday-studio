# ─── Web search — progress lines ────────────────────────────────────────────

- description: 'web-search — Wroclaw news'
  vars:
    system_prompt: file://prompts/web-search.txt
    input: |
      Find recent news from Wrocław, Poland from the last 23 hours. Look for
      local news, events, developments, and stories specifically related to
      Wrocław city.
  assert:
    - type: icontains-any
      value: [wrocław, wroclaw, news, finding, searching, researching]
      metric: Relevance
    - type: javascript
      value: file://assertions/status-line.js
      metric: StatusLine

- description: 'web-search — gravel bikes'
  vars:
    system_prompt: file://prompts/web-search.txt
    input: |
      What are new options for gravel bikes which fit larger than 2-inch tires?
      Prefer titanium frames, but open to carbon as well.
  assert:
    - type: icontains-any
      value: [gravel, bike, finding, searching, researching]
      metric: Relevance
    - type: javascript
      value: file://assertions/status-line.js
      metric: StatusLine

- description: 'web-search — Parker Conrad'
  vars:
    system_prompt: file://prompts/web-search.txt
    input: 'Who is Parker Conrad?'
  assert:
    - type: icontains-any
      value: [parker, conrad, researching]
      metric: Relevance
    - type: javascript
      value: file://assertions/status-line.js
      metric: StatusLine

- description: 'web-search — quantum computing news'
  vars:
    system_prompt: file://prompts/web-search.txt
    input: 'Latest quantum computing news'
  assert:
    - type: icontains-any
      value: [quantum, finding, searching]
