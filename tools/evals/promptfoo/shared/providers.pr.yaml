# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
#
# Cheap PR-CI matrix. Only friday-sm + friday-md, single integration path
# (openai: via proxy) — keeps PR wall-clock + API spend bounded.
# Nightly runs use the full providers.yaml.

- id: openai:chat:friday-sm
  label: groq-8b
  config:
    apiBaseUrl: http://localhost:4000/v1
    apiKey: '{{env.LITELLM_MASTER_KEY}}'
    temperature: 0
    max_tokens: 256
    stream: false

- id: openai:chat:friday-md
  label: haiku-4-5
  config:
    apiBaseUrl: http://localhost:4000/v1
    apiKey: '{{env.LITELLM_MASTER_KEY}}'
    temperature: 0
    max_tokens: 256
    stream: false
