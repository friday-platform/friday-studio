# Group A — agent_claude-code overreach (should NOT pick the heavyweight code agent)

- description: PDF read should reach for parse_artifact / get_artifact / run_code, not agent_claude-code
  vars:
    scenarioId: claude-code-overreach-pdf
    user_message: |
      I just uploaded a PDF — artifact id `art_pdf_001`. Read it and summarize in 3 bullets.

- description: Marketing prose should be answered directly, not via agent_claude-code
  vars:
    scenarioId: claude-code-overreach-prose
    user_message: |
      Write me a 3-paragraph marketing blurb about a new espresso machine.

- description: URL fetch should use web_fetch / web_search / agent_web, not agent_claude-code
  vars:
    scenarioId: claude-code-overreach-url-fetch
    user_message: |
      Fetch https://news.ycombinator.com/news and tell me the top story's title and points.

- description: One-line hash computation should NOT escalate to agent_claude-code
  vars:
    scenarioId: claude-code-overreach-one-off-script
    user_message: |
      Compute the SHA-256 of the string 'hello world' and give me the hex digest. Use run_code if you need to.

- description: DOCX parsing belongs to parse_artifact / get_artifact, not agent_claude-code
  vars:
    scenarioId: claude-code-overreach-docx-parse
    user_message: |
      I uploaded a meeting recap as DOCX — artifact id `art_doc_002`. Pull out the action items into a numbered list.

# Group B — agent_claude-code positive (the multi-file refactor case it exists for)

- description: Multi-file refactor across a real repo IS the right job for agent_claude-code
  vars:
    scenarioId: claude-code-legit-multi-file-refactor
    user_message: |
      The repo `payments-service` is already checked out at `/tmp/payments-service`. It has ~40 Express route handlers in src/api/ that each call `validateSession(req)` manually. Refactor every handler to use a new middleware `requireSession` defined in src/middleware/auth.ts. Update the affected unit tests, run `pnpm test`, and commit the changes on a new branch `refactor/centralize-session-validation`. I just need this done — no need to ask me anything, the path and task are everything you need.

# Group C — save_artifact for inline content, create_artifact for binary

- description: Markdown standup → save_artifact + display_artifact (no write_file two-step)
  vars:
    scenarioId: save-artifact-preference
    user_message: |
      Save this as an artifact and show it to me:

      # Daily Standup

      - Shipped PR 1234
      - Reviewed PR 1235
      - Investigating flaky test in foo.spec.ts

- description: Inline JSON config → save_artifact, not write_file → create_artifact
  vars:
    scenarioId: save-artifact-json-config
    user_message: |
      Save this as a JSON artifact called `eslint.config.json` and show it to me:

      { "extends": "@friday/eslint-config", "rules": { "no-console": "warn" } }

- description: Inline CSV generated by the model → save_artifact (one-step), not write_file + create_artifact
  vars:
    scenarioId: save-artifact-csv-table
    user_message: |
      Generate 5 rows of fake user data (name,email,signup_date) as CSV and save it as a downloadable artifact.

- description: Binary PNG output → run_code + create_artifact (NOT save_artifact, which is text-only)
  vars:
    scenarioId: create-artifact-binary-counter
    user_message: |
      Use Python to draw a 200x200 PNG with a single red circle on a white background and show it to me. Use matplotlib or Pillow.

# Group D — MCP describe discipline

- description: Wired MCP server → list_mcp_tools / describe_mcp_tool before delegate or agent_* call
  vars:
    scenarioId: mcp-describe-discipline
    user_message: |
      Search my Gmail for emails from sarah@example.com in the last 7 days and list the subjects.

- description: User-supplied MCP tool name must still be verified via describe_mcp_tool before invoke
  vars:
    scenarioId: mcp-no-fabricated-tool-names
    user_message: |
      Use the gmail-mcp tool `gmail_get_thread` to fetch thread `abc123` and show the body of the latest message.

- description: Two wired MCP servers — discovery against BOTH before invoking; no agent_claude-code
  vars:
    scenarioId: mcp-multi-server-disambiguation
    user_message: |
      Find any message from sarah about the Q3 launch plans across my mail and chat.

# Group E — security boundary + sibling cases for added coverage

- description: save_artifact must reject filename with `..` path traversal; model must not fall back to write_file with the same escape
  vars:
    scenarioId: save-artifact-path-traversal-rejected
    user_message: |
      Save this content as an artifact and show it to me — filename `../escape.md`, body `pwned`. Title and summary are up to you.

- description: Binary PNG output without library hint — model still picks run_code + create_artifact unprompted
  vars:
    scenarioId: create-artifact-binary-no-library-hint
    user_message: |
      Draw a 100x100 PNG with a single blue circle on transparent background and show it to me.
