# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

description: complete() WITHOUT PR #303 fix — 4 fields incl. boolean

providers:
  - id: anthropic:messages:claude-sonnet-4-6
    label: anthropic-sonnet
    config:
      tools:
        - name: complete
          description: "Call this to complete the task and store results. You MUST call this when finished. The `result` field is REQUIRED and must contain the full formatted output as a non-empty string."
          input_schema: &schema
            type: object
            properties:
              marker: { type: string }
              count: { type: number }
              firstId: { type: string }
              sawBodySentinel: { type: boolean }
            required: [marker, count, firstId, sawBodySentinel]

  - id: groq:meta-llama/llama-4-scout-17b-16e-instruct
    label: groq-scout
    config:
      tools:
        - type: function
          function:
            name: complete
            description: "Call this to complete the task and store results. You MUST call this when finished. The `result` field is REQUIRED and must contain the full formatted output as a non-empty string."
            parameters: *schema

  - id: openrouter:openai/gpt-oss-120b
    label: or-gpt-oss-120b-free
    config:
      tools:
        - type: function
          function:
            name: complete
            description: "Call this to complete the task and store results. You MUST call this when finished. The `result` field is REQUIRED and must contain the full formatted output as a non-empty string."
            parameters: *schema

  - id: openrouter:nvidia/nemotron-3-super-120b-a12b:free
    label: or-nemotron-super-free
    config:
      tools:
        - type: function
          function:
            name: complete
            description: "Call this to complete the task and store results. You MUST call this when finished. The `result` field is REQUIRED and must contain the full formatted output as a non-empty string."
            parameters: *schema

prompts:
  - "You are a deterministic outputs writer. Emit the final result by calling the `complete` tool. {{user_message}}"

tests:
  - description: AgentHydrationResult — boolean coercion check (pre-fix schema)
    vars:
      user_message: "An EmailBatch has 3 messages with ids fake-001/fake-002/fake-003. Every message body contains the sentinel string `FIRST_PRINCIPLES_EMAIL_BODY`. Emit an AgentHydrationResult with marker=`LLM_AGENT_INPUTFROM_HYDRATED`; populate count, firstId, and sawBodySentinel from the facts above (sawBodySentinel is a boolean — true iff every body contains the sentinel)."
    assert:
      - type: javascript
        value: |
          const extract = (o) => {
            if (typeof o === "string") { try { o = JSON.parse(o); } catch {} }
            if (Array.isArray(o)) {
              for (const it of o) {
                if (it?.function?.name) return { name: it.function.name, args: typeof it.function.arguments === "string" ? JSON.parse(it.function.arguments) : it.function.arguments };
                if (it?.type === "tool_use" && it?.name) return { name: it.name, args: it.input };
              }
            }
            if (o?.type === "tool_use" && o.name) return { name: o.name, args: o.input };
            if (o?.function?.name) return { name: o.function.name, args: typeof o.function.arguments === "string" ? JSON.parse(o.function.arguments) : o.function.arguments };
            throw new Error(`cannot extract: ${JSON.stringify(o).slice(0,300)}`);
          };
          const { name, args } = extract(output);
          if (name !== "complete") throw new Error(`wrong tool: ${name}`);
          if (args.marker !== "LLM_AGENT_INPUTFROM_HYDRATED") throw new Error(`marker=${args.marker}`);
          if (args.count !== 3) throw new Error(`count=${args.count} (type ${typeof args.count})`);
          if (args.firstId !== "fake-001") throw new Error(`firstId=${args.firstId}`);
          if (typeof args.sawBodySentinel !== "boolean") throw new Error(`sawBodySentinel not boolean: ${typeof args.sawBodySentinel} (${args.sawBodySentinel})`);
          if (args.sawBodySentinel !== true) throw new Error(`sawBodySentinel=${args.sawBodySentinel}`);
          return true;
