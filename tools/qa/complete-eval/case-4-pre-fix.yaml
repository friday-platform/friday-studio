# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

# Pre-PR-#303 schema shape: no additionalProperties: false, no strict: true.

description: complete() WITHOUT PR #303 fix — array of nested objects

providers:
  - id: anthropic:messages:claude-sonnet-4-6
    label: anthropic-sonnet
    config:
      tools:
        - name: complete
          description: "Call this to complete the task and store results. You MUST call this when finished. The `result` field is REQUIRED and must contain the full formatted output as a non-empty string."
          input_schema: &schema
            type: object
            properties:
              marker: { type: string }
              messages:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    subject: { type: string }
                    body: { type: string }
                  required: [id, subject, body]
            required: [marker, messages]

  - id: groq:meta-llama/llama-4-scout-17b-16e-instruct
    label: groq-scout
    config:
      tools:
        - type: function
          function:
            name: complete
            description: "Call this to complete the task and store results. You MUST call this when finished. The `result` field is REQUIRED and must contain the full formatted output as a non-empty string."
            parameters: *schema

  - id: openrouter:openai/gpt-oss-120b
    label: or-gpt-oss-120b-free
    config:
      tools:
        - type: function
          function:
            name: complete
            description: "Call this to complete the task and store results. You MUST call this when finished. The `result` field is REQUIRED and must contain the full formatted output as a non-empty string."
            parameters: *schema

  - id: openrouter:nvidia/nemotron-3-super-120b-a12b:free
    label: or-nemotron-super-free
    config:
      tools:
        - type: function
          function:
            name: complete
            description: "Call this to complete the task and store results. You MUST call this when finished. The `result` field is REQUIRED and must contain the full formatted output as a non-empty string."
            parameters: *schema

prompts:
  - "You are a deterministic outputs writer. Emit the final result by calling the `complete` tool. {{user_message}}"

tests:
  - description: EmailBatch with 3 synthetic messages (pre-fix schema)
    vars:
      user_message: "Emit an EmailBatch with marker=`FIRST_PRINCIPLES_EMAIL_BATCH` and exactly 3 messages: ids fake-001/fake-002/fake-003, subjects `Synthetic digest 1`/`Synthetic digest 2`/`Synthetic digest 3`, bodies must each contain the sentinel `FIRST_PRINCIPLES_EMAIL_BODY` (e.g. `FIRST_PRINCIPLES_EMAIL_BODY message 1`)."
    assert:
      - type: javascript
        value: |
          const extract = (o) => {
            if (typeof o === "string") { try { o = JSON.parse(o); } catch {} }
            if (Array.isArray(o)) {
              for (const it of o) {
                if (it?.function?.name) return { name: it.function.name, args: typeof it.function.arguments === "string" ? JSON.parse(it.function.arguments) : it.function.arguments };
                if (it?.type === "tool_use" && it?.name) return { name: it.name, args: it.input };
              }
            }
            if (o?.type === "tool_use" && o.name) return { name: o.name, args: o.input };
            if (o?.function?.name) return { name: o.function.name, args: typeof o.function.arguments === "string" ? JSON.parse(o.function.arguments) : o.function.arguments };
            throw new Error(`cannot extract: ${JSON.stringify(o).slice(0,300)}`);
          };
          const { name, args } = extract(output);
          if (name !== "complete") throw new Error(`wrong tool: ${name}`);
          if (args.marker !== "FIRST_PRINCIPLES_EMAIL_BATCH") throw new Error(`marker=${args.marker}`);
          if (!Array.isArray(args.messages)) throw new Error(`messages not array`);
          if (args.messages.length !== 3) throw new Error(`messages.length=${args.messages.length}`);
          for (let i = 0; i < 3; i++) {
            const m = args.messages[i];
            if (typeof m.id !== "string") throw new Error(`messages[${i}].id not string`);
            if (typeof m.subject !== "string") throw new Error(`messages[${i}].subject not string`);
            if (typeof m.body !== "string") throw new Error(`messages[${i}].body not string`);
            if (!m.body.includes("FIRST_PRINCIPLES_EMAIL_BODY")) throw new Error(`messages[${i}].body missing sentinel`);
          }
          if (args.messages[0].id !== "fake-001") throw new Error(`messages[0].id=${args.messages[0].id}`);
          return true;
