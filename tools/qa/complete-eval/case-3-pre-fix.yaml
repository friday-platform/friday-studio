# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

description: complete() — primitive + array of primitives (ArrayReviewResult)

providers:
  - id: anthropic:messages:claude-sonnet-4-6
    label: anthropic-sonnet
    config:
      tools:
        - name: complete
          description: "Call this to complete the task and store results. You MUST call this when finished. Required fields: marker (string), totalCount (number), firstIds (array of strings)."
          input_schema: &schema
            type: object
            properties:
              marker: { type: string }
              totalCount: { type: number }
              firstIds:
                type: array
                items: { type: string }
            required: [marker, totalCount, firstIds]



  - id: groq:meta-llama/llama-4-scout-17b-16e-instruct
    label: groq-scout
    config:
      tools:
        - type: function
          function:
            name: complete
            description: "Call this to complete the task and store results. You MUST call this when finished. Required fields: marker (string), totalCount (number), firstIds (array of strings)."
            parameters: *schema



  - id: openrouter:openai/gpt-oss-120b
    label: or-gpt-oss-120b-free
    config:
      tools:
        - type: function
          function:
            name: complete
            description: "Call this to complete the task and store results. You MUST call this when finished. Required fields: marker (string), totalCount (number), firstIds (array of strings)."
            parameters: *schema



prompts:
  - "You are a deterministic outputs writer. Emit the final result by calling the `complete` tool. {{user_message}}"

tests:
  - description: ArrayReviewResult from two batches
    vars:
      user_message: "Two EmailBatches: batch A has 2 messages (ids a-001, a-002), batch B has 3 messages (ids b-001, b-002, b-003). Emit an ArrayReviewResult: marker=`CONSUMED_INPUTFROM_ARRAY`, totalCount=5, firstIds=[`a-001`, `b-001`] (one per batch in input order)."
    assert:
      - type: javascript
        value: |
          const extract = (o) => {
            if (typeof o === "string") { try { o = JSON.parse(o); } catch {} }
            if (Array.isArray(o)) {
              for (const it of o) {
                if (it?.function?.name) return { name: it.function.name, args: typeof it.function.arguments === "string" ? JSON.parse(it.function.arguments) : it.function.arguments };
                if (it?.type === "tool_use" && it?.name) return { name: it.name, args: it.input };
              }
            }
            if (o?.type === "tool_use" && o.name) return { name: o.name, args: o.input };
            if (o?.function?.name) return { name: o.function.name, args: typeof o.function.arguments === "string" ? JSON.parse(o.function.arguments) : o.function.arguments };
            throw new Error(`cannot extract: ${JSON.stringify(o).slice(0,300)}`);
          };
          const { name, args } = extract(output);
          if (name !== "complete") throw new Error(`wrong tool: ${name}`);
          if (args.marker !== "CONSUMED_INPUTFROM_ARRAY") throw new Error(`marker=${args.marker}`);
          if (args.totalCount !== 5) throw new Error(`totalCount=${args.totalCount}`);
          if (!Array.isArray(args.firstIds)) throw new Error(`firstIds not array: ${typeof args.firstIds}`);
          if (args.firstIds.length !== 2) throw new Error(`firstIds.length=${args.firstIds.length}`);
          if (args.firstIds[0] !== "a-001") throw new Error(`firstIds[0]=${args.firstIds[0]}`);
          if (args.firstIds[1] !== "b-001") throw new Error(`firstIds[1]=${args.firstIds[1]}`);
          return true;
