# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

# Six variants exercise the wiring-external-webhooks skill across the
# 2026-05-15 chat-dump failure modes. Positive variants must pass every
# check; the without-skill control must fail at least one (proves the
# skill is the carrier).
#
# Negative-polarity checks across the variants cover:
#   - wrong env vars (BITBUCKET_/JIRA_/GITHUB_WEBHOOK_SECRET)
#   - bogus mappings shape (extract: instead of mapping:, missing providers: root)
#   - deprecated /hook/bitbucket/ URL recommendation
#   - atlasd direct path /api/workspaces/.../signals/...
#   - Python/Node sidecar recommendation (Marc's chat ended up here)
#   - hand-rolled cloudflared/ngrok/tunnel install
#   - blame-the-restart misdiagnosis
#   - sleep/rate-limit as a loop-fix (they don't break the cycle)
#   - "just unsubscribe" as the only loop-fix
#   - "just delete the spam comments" as the loop-fix
#   - "restart the daemon" as the FIRST debug step (real first step is /status)
#   - curl-localhost-bypass tests
#   - hallucinated Bitbucket event names (pullrequest:merged etc.)

- description: workspace-chat gives correct Bitbucket setup guidance WITH wiring-external-webhooks skill loaded
  vars:
    scenarioId: with-skill

- description: control — bare prompt without the skill must fail at least one setup-guidance check
  vars:
    scenarioId: without-skill

- description: user mentions BITBUCKET_WEBHOOK_SECRET — agent corrects without doubling down on wrong var or blaming the restart
  vars:
    scenarioId: corrects-wrong-env-var

- description: user describes comment reply-loop — agent diagnoses + prescribes guard (NOT sleep, NOT just-delete, NOT just-unsubscribe)
  vars:
    scenarioId: diagnoses-loop-trap

- description: webhook isn't firing — agent surfaces /status as first step (NOT restart, NOT localhost bypass)
  vars:
    scenarioId: points-at-status-first

- description: user wants to test the webhook — agent offers real test (curl through tunnel, Bitbucket Test connectivity, atlas signal trigger) without recommending sidecar/bypass/hallucinated event names
  vars:
    scenarioId: test-webhook-no-bypass

- description: user wants to fire a signal without waiting — agent recommends ?nowait=true + 202/correlationId pattern (NOT raise timeout, NOT long poll, NOT sidecar)
  vars:
    scenarioId: recommends-nowait-pattern

- description: user's CLI tool needs the cascade output — agent recommends the default sync mode (200 + completed), NOT nowait, NOT polling
  vars:
    scenarioId: recommends-sync-for-output

- description: user is building a UI that watches cascade progress live — agent recommends SSE (Accept: text/event-stream OR /signals/stream/{correlationId}), NOT polling, NOT parsing the sync output
  vars:
    scenarioId: recommends-sse-for-progress

- description: user asks which webhook providers Friday's tunnel supports — agent names github + raw, does NOT list bitbucket/jira as built-ins, does NOT cite removal dates, does NOT recommend WEBHOOK_MAPPINGS_PATH as a way to register bitbucket/jira
  vars:
    scenarioId: lists-current-providers

- description: user wants HMAC verification for a Bitbucket webhook — agent explains raw provider doesn't verify, recommends agent-side HMAC with a custom (non-colliding) env var name, does NOT push WEBHOOK_SECRET for bitbucket, does NOT recommend the deprecated /hook/bitbucket/ URL
  vars:
    scenarioId: bitbucket-hmac-in-agent

- description: user reports /status is unreachable from run_code and asks for the webhook URL — agent must NOT synthesize /api/workspaces/.../signals/ as the public URL; instead emit /hook/raw/ pattern with a tunnel-host placeholder OR ask the user to fetch the tunnel URL via /status themselves
  vars:
    scenarioId: no-atlasd-url-fallback

- description: user asks for the workspace.yml signal block for a raw webhook — agent must include `additionalProperties: true` (or use the bare top-level schema) so Zod doesn't silently strip nested webhook fields; must NOT declare nested `actor`/`comment`/`pullrequest`/`repository` as `type: object` without additionalProperties
  vars:
    scenarioId: webhook-signal-schema-passes-body
