# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

description: Supervisor connect_service eval — calls connect_service when an enabled MCP server's credential is missing, and does NOT call it on the happy path

prompts:
  - file://prompts/connect-service-with-directive.txt

providers:
  - id: file://connect-service-on-auth-error-provider.cjs
    label: friday-connect-service-on-auth-error

defaultTest:
  assert:
    - type: is-json
    - type: javascript
      value: |
        const result = JSON.parse(output);
        if (result.pass !== true) {
          throw new Error(`${result.id} failed: ${(result.notes || []).join('; ')}`);
        }
        return true;

tests: file://connect-service-on-auth-error-tests.yaml
