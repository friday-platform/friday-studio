# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

description: Supervisor connect_service eval — calls connect_service when an enabled MCP server's credential is missing, and does NOT call it on the happy path

# The prompt under test is the <service_connection> block in
# packages/system/agents/workspace-chat/prompt.txt — the eval scenario
# reads that file at runtime and assembles the system prompt from it, so
# there is no duplicated copy to drift. The full assembled prompt the
# model saw is carried per-scenario in `metrics.systemPrompt` and is
# rendered in the scenario details by `npx promptfoo view`.
prompts:
  - "{{scenarioId}}"

providers:
  - id: file://connect-service-on-auth-error-provider.cjs
    label: friday-connect-service-on-auth-error

defaultTest:
  assert:
    - type: is-json
    - type: javascript
      value: |
        const result = JSON.parse(output);
        if (result.pass !== true) {
          throw new Error(`${result.id} failed: ${(result.notes || []).join('; ')}`);
        }
        return true;

tests: file://connect-service-on-auth-error-tests.yaml
