# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

description: Friday delegate sub-agent scope discipline + MCP error contract evals

# The directives under test (`buildDelegateScopeDirective` +
# `DELEGATE_MCP_ERROR_CONTRACT`) live in
# `packages/core/src/delegate/system-prompt.ts` and are imported live
# by the scenario script — there is no duplicated copy. The full
# assembled prompt the model saw is carried per-scenario in
# `metrics.systemPrompt` and is rendered in the scenario details by
# `npx promptfoo view`.
prompts:
  - "{{scenarioId}}"

providers:
  - id: file://delegate-error-contract-provider.cjs
    label: friday-delegate-error-contract

defaultTest:
  assert:
    - type: is-json
    - type: javascript
      value: |
        const result = JSON.parse(output);
        if (result.pass !== true) {
          throw new Error(`${result.id} failed: ${(result.notes || []).join('; ')}`);
        }
        return true;

tests: file://delegate-error-contract-tests.yaml
