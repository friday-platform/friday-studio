# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

description: Friday delegate sub-agent scope discipline + MCP error contract evals

# Load the system prompt under test from disk. promptfoo expands the
# file:// reference to the file's contents and renders it as the
# "Prompt" column in `npx promptfoo view`. All five scenarios test the
# same with-directives prompt (the file is the artifact under test);
# `scenarioId` in each test's `vars` routes the provider to the right
# slot in the eval report.
prompts:
  - file://prompts/with-directives.txt

providers:
  - id: file://delegate-error-contract-provider.cjs
    label: friday-delegate-error-contract

defaultTest:
  assert:
    - type: is-json
    - type: javascript
      value: |
        const result = JSON.parse(output);
        if (result.pass !== true) {
          throw new Error(`${result.id} failed: ${(result.notes || []).join('; ')}`);
        }
        return true;

tests: file://delegate-error-contract-tests.yaml
