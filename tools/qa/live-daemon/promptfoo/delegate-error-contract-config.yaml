# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

description: Friday delegate sub-agent scope discipline + MCP error contract evals

# Render the actual system prompt under test in the promptfoo view's
# "Prompt" column. Each test sets `vars.systemPrompt` to a file:// ref
# of the matching prompt file under `prompts/` — promptfoo loads the
# file content and interpolates it into the prompt template below.
# The `scenarioId` var is still threaded so the provider knows which
# scenario's result to surface.
prompts:
  - "{{systemPrompt}}\n\n[scenario: {{scenarioId}}]"

providers:
  - id: file://delegate-error-contract-provider.cjs
    label: friday-delegate-error-contract

defaultTest:
  assert:
    - type: is-json
    - type: javascript
      value: |
        const result = JSON.parse(output);
        if (result.pass !== true) {
          throw new Error(`${result.id} failed: ${(result.notes || []).join('; ')}`);
        }
        return true;

tests: file://delegate-error-contract-tests.yaml
