# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

description: |
  Friday workspace-chat webhook-setup eval — locks the contract that
  workspace-chat produces correct Bitbucket wiring instructions when the
  wiring-external-webhooks skill is loaded. Two variants:

    - with-skill: skill content in system prompt; must pass all 8 checks
      (URL pattern, env var, signature header, event allowlist, /status
      shortcut, no BITBUCKET_WEBHOOK_SECRET, no malformed mappings.json,
      no deprecated /hook/bitbucket/ URL).
    - without-skill: control. Must fail at least one check; proves the
      skill is the knowledge carrier, not the base model.

  Direct-Anthropic-call shape (no daemon), same as secret-input-guard.ts
  and connect-service-on-auth-error.ts. ~15s per run.

  Negative case observed in 2026-05-15 chat dump vVf "Webhook URL Format"
  (50 msgs): the chat agent invented BITBUCKET_WEBHOOK_SECRET (correct
  var is WEBHOOK_SECRET), wrote a webhook-mappings.json with the wrong
  schema, then suggested /hook/raw/ as a bypass — sidestepping both
  signature verification and event mapping. ~3 hours of user pain that
  the wiring-external-webhooks skill prevents.

prompts:
  - '{{scenarioId}}'

providers:
  - id: file://webhook-setup-bitbucket-provider.cjs
    label: friday-webhook-setup-bitbucket

defaultTest:
  assert:
    - type: is-json
    - type: javascript
      value: |
        const result = JSON.parse(output);
        if (result.pass !== true) {
          throw new Error(`${result.id} failed: ${(result.notes || []).join('; ')}`);
        }
        return true;

tests: file://webhook-setup-bitbucket-tests.yaml
