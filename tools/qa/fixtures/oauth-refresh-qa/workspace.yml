version: "1.0"

workspace:
  id: oauth-refresh-qa
  name: "OAuth Refresh QA"
  description: "Fixture exercising interactive (chat) and non-interactive (cron, webhook) Google-MCP paths against the mock OAuth Cloud Function. Drives all P1/P2/P3 scenarios in 2026-05-11-oauth-refresh-resilience-qa.md."

tools:
  mcp:
    servers:
      google-calendar:
        transport:
          type: http
          url: http://localhost:8001/mcp
        auth:
          type: bearer
          token_env: GOOGLE_CALENDAR_ACCESS_TOKEN
        env:
          GOOGLE_CALENDAR_ACCESS_TOKEN:
            from: link
            provider: google-calendar
            key: access_token
      google-gmail:
        transport:
          type: http
          url: http://localhost:8002/mcp
        auth:
          type: bearer
          token_env: GOOGLE_GMAIL_ACCESS_TOKEN
        env:
          GOOGLE_GMAIL_ACCESS_TOKEN:
            from: link
            provider: google-gmail
            key: access_token

agents:
  workspace-chat:
    type: system
    agent: workspace-chat
    description: "Direct chat agent scoped to Google Calendar and Gmail so chat-driven tool calls exercise the interactive refresh path."
    config:
      tools:
        - google-calendar/list_calendars
        - google-calendar/search_events
        - google-gmail/search_gmail_messages
        - google-gmail/get_gmail_message_content

signals:
  every-minute:
    provider: schedule
    description: "Cron tick (every minute) for the non-interactive refresh path."
    config:
      schedule: "* * * * *"
      timezone: UTC
      onMissed: skip
  refresh-webhook:
    provider: http
    description: "HTTP webhook for the non-interactive Gmail refresh path."
    config:
      path: /oauth-refresh-qa/webhook

jobs:
  calendar-cron-check:
    description: "Cron-triggered job: read calendars via google-calendar and print the result. Exercises the non-interactive (sessionInteractive=false) refresh path."
    triggers:
      - signal: every-minute
    config:
      timeout: "2m"
      max_steps: 4
    validation:
      default: skip
    fsm:
      initial: idle
      states:
        idle:
          on:
            every-minute: { target: run }
        run:
          entry:
            - type: llm
              provider: anthropic
              model: claude-sonnet-4-6
              summary: "List calendars and print a one-line summary."
              outputTo: calendar-result
              validate: skip
              tools:
                - google-calendar/list_calendars
              prompt: |
                Call google-calendar/list_calendars exactly once with no
                arguments. Then return ONLY a JSON object containing:
                - marker: "OAUTH_QA_CALENDAR_CRON_OK"
                - calendarCount: number of calendars returned
                - firstCalendarId: id of the first calendar, or "" if none
          type: final

  gmail-webhook-check:
    description: "Webhook-triggered job: read Gmail via google-gmail and print the result. Exercises the non-interactive HTTP refresh path."
    triggers:
      - signal: refresh-webhook
    config:
      timeout: "2m"
      max_steps: 4
    validation:
      default: skip
    fsm:
      initial: idle
      states:
        idle:
          on:
            refresh-webhook: { target: run }
        run:
          entry:
            - type: llm
              provider: anthropic
              model: claude-sonnet-4-6
              summary: "Search Gmail and print a one-line summary."
              outputTo: gmail-result
              validate: skip
              tools:
                - google-gmail/search_gmail_messages
              prompt: |
                Call google-gmail/search_gmail_messages exactly once with
                query "is:unread" and limit 4. Then return ONLY a JSON
                object containing:
                - marker: "OAUTH_QA_GMAIL_WEBHOOK_OK"
                - messageCount: number of messages returned
                - firstMessageId: id of the first message, or "" if none
          type: final
