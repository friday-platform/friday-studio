# Phase 1 fixture — narrow allowlist (only fs_glob).
# The auto-triage prompt instructs the LLM to call fs_read_file as well,
# which should fail. Tools-list resolution should NOT include fs_read_file.

version: "1.0"

workspace:
  name: "Inbox Corpus QA — Narrow Allowlist"
  description: "Phase 1 scenario fixture: action allows only fs_glob; deny fs_read_file."

permissions:
  dangerouslySkipAllowlist: false

signals:
  inbox-event:
    provider: http
    description: "Triggers the narrow auto-triage."
    config:
      path: "/inbox-event-narrow"
    schema:
      type: object
      properties:
        inboxPath:
          type: string
        limit:
          type: number
      required: ["inboxPath"]

jobs:
  auto-triage-narrow:
    description: "Phase 1 — narrow tool allowlist scenario."
    triggers:
      - signal: inbox-event
    config:
      timeout: "5m"
      max_steps: 10
    fsm:
      initial: idle
      states:
        idle:
          on:
            inbox-event: { target: triage }
        triage:
          entry:
            - type: llm
              provider: anthropic
              model: claude-sonnet-4-6
              summary: "Try to triage with only fs_glob; fs_read_file should be denied."
              outputTo: triage-summary-narrow
              tools:
                - fs_glob
              prompt: |
                List the inbox emails using fs_glob with `pattern: "email-*.md"`
                and `path` set to the inboxPath from the signal payload.

                Then return a one-line markdown summary of how many files
                you found. Do NOT attempt to read individual files — your
                allowlist intentionally excludes fs_read_file.
          type: final
