# Phase 9 fixture — retrieval-gated artifact injection.
#
# Two-state FSM:
#   1. `seed` — non-terminal LLM action whose `outputTo: seed-doc` becomes
#      a session-bound ephemeral artifact (seed for retrieval). Emits DONE
#      to transition to consume.
#   2. `consume` — terminal LLM action that should observe a
#      `<retrieved_content>` block injected from the session's ephemeral
#      artifact set. Verified via the
#      "Injected artifact blocks into LLM action prompt" debug log line
#      with a non-zero blockCount.
#
# Both actions share the same FSM session id, so the second action's
# `composeArtifactBlocks({ workspaceId, sessionId })` returns ≥1 block
# built from the first action's output.

version: "1.0"

workspace:
  name: "Inbox Corpus QA — Injection"
  description: "Phase 9 scenario fixture: retrieval-gated artifact injection."

permissions:
  dangerouslySkipAllowlist: false

signals:
  injection-event:
    provider: http
    description: "Triggers the injection scenario."
    config:
      path: "/injection-event"
    schema:
      type: object
      properties:
        topic:
          type: string
      required: ["topic"]

jobs:
  retrieval-test:
    description: "Phase 9 — seed an artifact then consume it via injection."
    triggers:
      - signal: injection-event
    config:
      timeout: "3m"
      max_steps: 8
    fsm:
      initial: idle
      states:
        idle:
          on:
            injection-event: { target: seed }
        seed:
          entry:
            - type: llm
              provider: anthropic
              model: claude-sonnet-4-6
              summary: "Emit a seed marker doc that will be auto-injected on the next action."
              outputTo: seed-doc
              tools: []
              prompt: |
                Reply with a single short markdown line that includes the
                `topic` value from the signal payload prefixed with
                "SEED:". Then call `complete`. Do NOT call any other tools.
            - type: emit
              event: DONE
          on:
            DONE: { target: consume }
        consume:
          entry:
            - type: llm
              provider: anthropic
              model: claude-sonnet-4-6
              summary: "Consume action — its prompt should see retrieved_content from the seed artifact."
              outputTo: consume-doc
              tools: []
              prompt: |
                Reply with a single short markdown line acknowledging that
                you can see prior session context. Then call `complete`.
                Do NOT call any other tools.
          type: final
