version: "1.0"

workspace:
  name: "First Principles Refs"
  description: "No-auth first-principles fixture for action-output refs over data."

permissions:
  dangerouslySkipAllowlist: false

tools:
  mcp:
    servers:
      fake_inbox:
        transport:
          type: stdio
          command: deno
          args:
            - run
            - --allow-all
            - "__FAKE_INBOX_MCP_PATH__"
        skipResolverCheck: true
        validation: "read-only"

signals:
  refs-event:
    provider: http
    description: "Trigger refs-over-data action-output scenario."
    config:
      path: "/refs-event"
    schema:
      type: object
      properties:
        query:
          type: string
      required: []
  refs-array-event:
    provider: http
    description: "Trigger inputFrom array artifact-ref resolution scenario."
    config:
      path: "/refs-array-event"
    schema:
      type: object
      properties:
        query:
          type: string
      required: []
  validation-contract-event:
    provider: http
    description: "Trigger structured-output validation contract scenario."
    config:
      path: "/validation-contract-event"
    schema:
      type: object
      properties:
        query:
          type: string
      required: []

jobs:
  refs-check:
    description: "Fetch fake inbox messages, persist output, then consume it via inputFrom."
    triggers:
      - signal: refs-event
    config:
      timeout: "5m"
      max_steps: 12
    validation:
      default: "skip"
    fsm:
      initial: idle
      documentTypes:
        EmailBatch:
          type: object
          properties:
            marker: { type: string }
            messages:
              type: array
              items:
                type: object
                properties:
                  id: { type: string }
                  subject: { type: string }
                  body: { type: string }
                required: ["id", "subject", "body"]
          required: ["marker", "messages"]
        ReviewResult:
          type: object
          properties:
            marker: { type: string }
            count: { type: number }
            firstId: { type: string }
          required: ["marker", "count", "firstId"]
      states:
        idle:
          on:
            refs-event: { target: seed }
        seed:
          entry:
            - type: llm
              provider: anthropic
              model: claude-sonnet-4-6
              summary: "Fetch fake inbox messages into an EmailBatch document."
              outputTo: emails-result
              outputType: EmailBatch
              validate: skip
              tools: []
              prompt: |
                Emit an EmailBatch object directly. Do not call tools.

                The object MUST contain:
                - marker: "FIRST_PRINCIPLES_EMAIL_BATCH"
                - messages: exactly 12 synthetic messages.

                Message ids must be fake-001 through fake-012. The first
                message subject must be "Synthetic digest 1". Every message
                body must include the sentinel text
                "FIRST_PRINCIPLES_EMAIL_BODY" plus the message id.

                This intentionally creates a bulky structured action output.
                The eval asserts that the runtime stores that output as an
                artifact ref instead of carrying the full messages array
                inline in the FSM document store.
            - type: emit
              event: DONE
          on:
            DONE: { target: consume }
        consume:
          entry:
            - type: llm
              provider: anthropic
              model: claude-sonnet-4-6
              summary: "Consume EmailBatch via inputFrom and report count."
              inputFrom: emails-result
              outputTo: review-result
              outputType: ReviewResult
              validate: skip
              tools: []
              prompt: |
                Read the EmailBatch document from Input.

                Important: the previous document may be represented as a
                compact artifact reference plus an `artifactContent` map. If
                you see `artifactRefs`, use the matching entry in
                `artifactContent` as the EmailBatch payload. The artifact body
                is JSON for the original emails-result document; its
                `messages` array is the source of truth.

                Emit a ReviewResult object with:
                - marker: "CONSUMED_EMAIL_BATCH"
                - count: number of messages in the EmailBatch
                - firstId: id of the first message.
          type: final

  refs-array-check:
    description: "Produce two artifact-backed documents, then consume both via inputFrom array."
    triggers:
      - signal: refs-array-event
    config:
      timeout: "5m"
      max_steps: 16
    validation:
      default: "skip"
    fsm:
      initial: idle
      documentTypes:
        EmailBatch:
          type: object
          properties:
            marker: { type: string }
            messages:
              type: array
              items:
                type: object
                properties:
                  id: { type: string }
                  subject: { type: string }
                  body: { type: string }
                required: ["id", "subject", "body"]
          required: ["marker", "messages"]
        ArrayReviewResult:
          type: object
          properties:
            marker: { type: string }
            totalCount: { type: number }
            firstIds:
              type: array
              items: { type: string }
          required: ["marker", "totalCount", "firstIds"]
      states:
        idle:
          on:
            refs-array-event: { target: seed-a }
        seed-a:
          entry:
            - type: llm
              provider: anthropic
              model: claude-sonnet-4-6
              summary: "Produce first EmailBatch for inputFrom array."
              outputTo: batch-a
              outputType: EmailBatch
              validate: skip
              tools: []
              prompt: |
                Emit an EmailBatch object directly. Do not call tools.
                The object MUST contain marker "ARRAY_BATCH_A" and exactly
                2 messages with ids a-001 and a-002. Every body must include
                "FIRST_PRINCIPLES_EMAIL_BODY" plus its id.
            - type: emit
              event: NEXT
          on:
            NEXT: { target: seed-b }
        seed-b:
          entry:
            - type: llm
              provider: anthropic
              model: claude-sonnet-4-6
              summary: "Produce second EmailBatch for inputFrom array."
              outputTo: batch-b
              outputType: EmailBatch
              validate: skip
              tools: []
              prompt: |
                Emit an EmailBatch object directly. Do not call tools.
                The object MUST contain marker "ARRAY_BATCH_B" and exactly
                3 messages with ids b-001, b-002, and b-003. Every body must
                include "FIRST_PRINCIPLES_EMAIL_BODY" plus its id.
            - type: emit
              event: NEXT
          on:
            NEXT: { target: consume-array }
        consume-array:
          entry:
            - type: llm
              provider: anthropic
              model: claude-sonnet-4-6
              summary: "Consume both batches via inputFrom array."
              inputFrom: [batch-a, batch-b]
              outputTo: array-review-result
              outputType: ArrayReviewResult
              validate: skip
              tools: []
              prompt: |
                Read both EmailBatch documents from Input.

                Important: each previous document may be represented as a
                compact artifact reference plus an `artifactContent` map. For
                each input item, if its data has `artifactRefs`, use the
                matching entry in `artifactContent` as the EmailBatch payload.

                Emit an ArrayReviewResult object with:
                - marker: "CONSUMED_INPUTFROM_ARRAY"
                - totalCount: total messages across both batches
                - firstIds: first message id from each batch, in input order.
          type: final

  validation-contract-check:
    description: "Ensure structured validate:self emits output, not a validation stub."
    triggers:
      - signal: validation-contract-event
    config:
      timeout: "5m"
      max_steps: 8
    validation:
      default: "self"
    fsm:
      initial: idle
      documentTypes:
        ValidationContractResult:
          type: object
          properties:
            marker: { type: string }
            value: { type: number }
            explanation: { type: string }
          required: ["marker", "value", "explanation"]
      states:
        idle:
          on:
            validation-contract-event: { target: validated }
        validated:
          entry:
            - type: llm
              provider: anthropic
              model: claude-sonnet-4-6
              summary: "Emit structured validation contract output."
              outputTo: validation-result
              outputType: ValidationContractResult
              validate: self
              tools: []
              prompt: |
                Emit a ValidationContractResult object directly.
                The object MUST contain:
                - marker: "VALIDATION_CONTRACT_OK"
                - value: 7
                - explanation: "structured output survived validation"
          type: final
