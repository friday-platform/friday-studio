# Phase 6 fixture — ephemeral artifact lifecycle.
#
# Two-state FSM whose first action emits an outputTo doc that becomes a
# session-bound ephemeral artifact (non-terminal state). The job sets
# `artifacts.ephemeral: true` to force ephemeral on the terminal output too,
# and `artifacts.default_grace: "1s"` so the sweeper can claim them within
# the harness's wait budget. The scenario asserts:
#   - immediately post-completion, ≥1 artifact present
#   - after grace + sweeper interval, the ephemeral artifacts are gone
#
# The harness sets `FRIDAY_SWEEPER_INTERVAL_MS=1000` on the daemon spawn so
# the sweeper actually fires within the wait window.

version: "1.0"

workspace:
  name: "Inbox Corpus QA — Ephemeral"
  description: "Phase 6 scenario fixture: ephemeral lifecycle + sweeper."

permissions:
  dangerouslySkipAllowlist: false

artifacts:
  default_grace: "1s"

signals:
  ephemeral-event:
    provider: http
    description: "Triggers the ephemeral lifecycle scenario."
    config:
      path: "/ephemeral-event"
    schema:
      type: object
      properties:
        marker:
          type: string
      required: ["marker"]

jobs:
  ephemeral-job:
    description: "Phase 6 — emit an ephemeral artifact; expect sweeper to delete after grace."
    triggers:
      - signal: ephemeral-event
    config:
      timeout: "2m"
      max_steps: 5
    artifacts:
      ephemeral: true
      default_grace: "1s"
    fsm:
      initial: idle
      states:
        idle:
          on:
            ephemeral-event: { target: emit }
        emit:
          entry:
            - type: llm
              provider: anthropic
              model: claude-sonnet-4-6
              summary: "Emit a short marker document."
              outputTo: marker-doc
              tools: []
              prompt: |
                Reply with a single short markdown line that includes the
                `marker` value from the signal payload. Then call `complete`.
                Do NOT call any other tools.
          type: final
