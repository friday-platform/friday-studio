# Phase 8 fixture — delegate budget exhaustion.
#
# Workspace sets an aggressively-low `delegation.max_wall_time_ms: 100`.
# Even a single LLM round-trip in the delegate child blows past 100 ms,
# so the budget guard fires and the delegate tool returns
# `{ ok: false, reason: "budget_exhausted: max_wall_time_ms" }`.
#
# The scenario asserts the parent's `step:complete.toolCalls` includes a
# delegate call whose result carries that exact reason string.

version: "1.0"

workspace:
  name: "Inbox Corpus QA — Budget"
  description: "Phase 8 scenario fixture: delegate budget enforcement."

permissions:
  dangerouslySkipAllowlist: false

delegation:
  max_depth: 1
  max_wall_time_ms: 100

signals:
  budget-event:
    provider: http
    description: "Triggers the budget-exhaustion scenario."
    config:
      path: "/budget-event"
    schema:
      type: object
      properties:
        topic:
          type: string
      required: ["topic"]

jobs:
  budget-test:
    description: "Phase 8 — invoke delegate under a 100ms wall-time budget."
    triggers:
      - signal: budget-event
    config:
      timeout: "3m"
      max_steps: 6
    fsm:
      initial: idle
      states:
        idle:
          on:
            budget-event: { target: run }
        run:
          entry:
            - type: llm
              provider: anthropic
              model: claude-sonnet-4-6
              summary: "Invoke delegate under a 100ms wall-time budget; expect budget_exhausted."
              outputTo: budget-result
              tools:
                - delegate
              prompt: |
                Use the `delegate` tool exactly once. Pass:
                  - goal: "Write a multi-paragraph essay about the topic"
                  - handoff: "topic = <topic from signal payload>"

                The delegate is expected to return
                `{ ok: false, reason: "budget_exhausted: max_wall_time_ms" }`
                because the workspace caps the wall-time budget at 100ms.

                After the delegate returns, reply with a one-line summary
                noting whether the budget was exhausted. Then call
                `complete`.
          type: final
