version: "1.0"

# Eval fixture for the wiring-external-webhooks skill.
#
# Models Marc's real-world setup: an HTTP signal named
# `bitbucket-pipeline-failed` that's meant to be triggered by a Bitbucket
# Cloud webhook (repo:commit_status_updated event on a failed pipeline).
#
# The fixture intentionally contains ONLY workspace.yml — no per-workspace
# webhook config or .env hints. The eval asks workspace-chat "how do I
# configure Bitbucket to fire this signal?" and locks the response contract:
# correct URL pattern, correct env var (WEBHOOK_SECRET, not
# BITBUCKET_WEBHOOK_SECRET), correct signature header (x-hub-signature),
# the embedded event allowlist, and the /status debugging shortcut.

workspace:
  name: "Webhook Setup — Bitbucket"
  description: >-
    Workspace with a Bitbucket pipeline-failure HTTP signal. The chat agent
    is asked to explain how to wire Bitbucket to call this signal.

permissions:
  dangerouslySkipAllowlist: false

signals:
  bitbucket-pipeline-failed:
    provider: http
    title: "Bitbucket Pipeline Failed"
    description: "Bitbucket webhook for failed pipeline build status updates."
    config:
      path: "/bitbucket-pipeline-failed"
    schema:
      type: object
      properties:
        repository:
          type: object
        commit_status:
          type: object
        actor:
          type: object
      required: []

jobs:
  handle-pipeline-failed:
    title: "Handle Pipeline Failed"
    description: "Receives the Bitbucket webhook payload."
    triggers:
      - signal: bitbucket-pipeline-failed
    config:
      timeout: "1m"
    fsm:
      initial: done
      states:
        done:
          type: final
