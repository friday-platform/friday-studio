# Phase 4.A fixture — read-only fetcher with structured outputType.
# Action declares only read-only tools (fs_glob) and an outputType bound to
# a defined documentTypes schema. The validate-classifier resolves this to
# `skip` with reason `read-only-fetcher` (B1 of melodic-strolling-seal-pt2)
# and the runtime emits `step:complete.validation = { strategy: "skip",
# skipReason: "read-only-fetcher" }` on the action's step (B6).

version: "1.0"

workspace:
  name: "Inbox Corpus QA — Read-Only Fetcher"
  description: "Phase 4.A scenario fixture: read-only fetcher → validation skip."

permissions:
  dangerouslySkipAllowlist: false

signals:
  list-event:
    provider: http
    description: "Triggers the read-only listing job."
    config:
      path: "/list-event"
    schema:
      type: object
      properties:
        inboxPath:
          type: string
      required: ["inboxPath"]

jobs:
  list-only:
    description: "Phase 4.A — read-only fs_glob with structured outputType."
    triggers:
      - signal: list-event
    config:
      timeout: "2m"
      max_steps: 5
    fsm:
      initial: idle
      documentTypes:
        fileListResult:
          type: object
          properties:
            count:
              type: number
              description: "Number of email-NNN.md files found."
            firstFile:
              type: string
              description: "Filename of the first match (or empty string if none)."
          required: ["count", "firstFile"]
          additionalProperties: false
      states:
        idle:
          on:
            list-event: { target: list }
        list:
          entry:
            - type: llm
              provider: anthropic
              model: claude-sonnet-4-6
              summary: "List inbox files via fs_glob and emit a structured count."
              outputTo: file-list
              outputType: fileListResult
              tools:
                - fs_glob
              prompt: |
                Call `fs_glob` with `pattern: "email-*.md"` and `path` set
                to the `inboxPath` from the signal payload. Then call the
                `complete` tool with:
                  - `count`: the number of matched files
                  - `firstFile`: the basename of the first match (or "" if none)
          type: final
