version: "2"
linters:
  enable:
    - asciicheck
    - depguard
    - errorlint
    - gocritic
    - godot
    - gosec
    - misspell
    - nolintlint
    - predeclared
    - revive
    - spancheck
    - unconvert
    - unparam
    - whitespace
  settings:
    depguard:
      rules:
        main:
          deny:
            - pkg: io/ioutil
              desc: Use corresponding 'os' or 'io' functions instead.
    revive:
      rules:
        - name: unused-parameter
          severity: warning
          disabled: true
  exclusions:
    rules:
      # Test files routinely use variable paths, exec stub binaries, write
      # fixtures with permissive perms, and call test HTTP servers. These
      # gosec rules fire constantly on intentional test setup; the
      # corresponding non-test code paths are still checked.
      - path: _test\.go$
        linters: [gosec]
        text: "G(107|110|115|204|301|302|304|306|702|703):"
issues:
  max-same-issues: 0
formatters:
  enable:
    - gofumpt
  settings:
    gofumpt:
      extra-rules: true
