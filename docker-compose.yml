services:
  platform:
    image: friday-platform:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${FRIDAY_DAEMON_PORT:-18080}:8080"  # Friday daemon API
      - "${FRIDAY_LINK_PORT:-13100}:3100"    # Link (credential/auth service)
      - "${FRIDAY_LEDGER_PORT:-13200}:3200"  # Ledger (resources + activity)
      - "${FRIDAY_STUDIO_PORT:-15200}:5200"  # Friday Studio (web UI)
      - "${FRIDAY_PTY_PORT:-17681}:7681"     # PTY server (WebSocket terminal)
      - "${FRIDAY_TUNNEL_PORT:-19090}:9090"  # Webhook tunnel
    env_file:
      - path: .env
        required: false
    environment:
      FRIDAY_LOG_LEVEL: ${FRIDAY_LOG_LEVEL:-info}
      FRIDAY_CONFIG_PATH: /app/user-config
      FRIDAY_DAEMON_PORT: ${FRIDAY_DAEMON_PORT:-18080}
      FRIDAY_LINK_PORT: ${FRIDAY_LINK_PORT:-13100}
      FRIDAY_LEDGER_PORT: ${FRIDAY_LEDGER_PORT:-13200}
      FRIDAY_STUDIO_PORT: ${FRIDAY_STUDIO_PORT:-15200}
      FRIDAY_PTY_PORT: ${FRIDAY_PTY_PORT:-17681}
      FRIDAY_TUNNEL_PORT: ${FRIDAY_TUNNEL_PORT:-19090}
      KNOWLEDGE_DATA_DIR: ${KNOWLEDGE_DATA_DIR:-}
    volumes:
      - atlas-data:/data/atlas
      - link-data:/data/link
      - ${KNOWLEDGE_DATA_DIR:-/tmp/knowledge}:${KNOWLEDGE_DATA_DIR:-/tmp/knowledge}:ro
      - ${AGENTS_DIR:-./agents}:/home/atlas/agent-src:ro
      # Platform configuration - mounts project root so friday.yml can live next to docker-compose.yml
      - ./:/app/user-config:ro
      # Uncomment to override default webhook mappings:
      # - ./webhook-mappings.yml:/app/config/webhook-mappings.yml:ro
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - sh
        - -c
        - >
          curl -sf http://localhost:8080/health &&
          curl -sf http://localhost:3100/health &&
          curl -sf http://localhost:3200/health &&
          curl -sf http://localhost:7681/health &&
          curl -sf http://localhost:9090/health
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 3

volumes:
  atlas-data:
  link-data:
