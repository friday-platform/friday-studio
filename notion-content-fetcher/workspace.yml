version: '1.0'
workspace:
  name: Notion Content Fetcher
  description: 'Fetches all pages, databases, and content from your Notion account on demand and produces a structured summary report.'
tools:
  mcp:
    client_config:
      timeout:
        progressTimeout: 2m
        maxTotalTimeout: 30m
    servers:
      notion:
        transport:
          type: http
          url: 'https://mcp.notion.com/mcp'
        auth:
          type: bearer
          token_env: NOTION_ACCESS_TOKEN
        env:
          NOTION_ACCESS_TOKEN:
            from: link
            id: Kdk35VU18PIqrs4Cj7X9I
            provider: notion
            key: access_token
signals:
  manual-fetch-trigger:
    description: HTTP endpoint that triggers a full Notion content fetch on demand. Call this whenever you want a fresh snapshot of your Notion workspace.
    provider: http
    config:
      path: /webhook/notion-fetch
    title: Receives manual fetch request
agents:
  notion-content-fetcher:
    type: llm
    description: 'Retrieves all pages, databases, and their content from your Notion account and produces a structured summary report artifact.'
    config:
      provider: anthropic
      model: claude-sonnet-4-6
      prompt: 'You are Notion Content Fetcher. Retrieves all pages, databases, and their content from your Notion account and produces a structured summary report artifact.'
      temperature: 0.3
      tools:
        - notion
jobs:
  notion-full-content-fetch:
    description: 'Fetch Notion Content: Notion Full Content Fetch'
    title: Fetch Notion Content
    triggers:
      - signal: manual-fetch-trigger
    fsm:
      id: notion-full-content-fetch
      initial: idle
      states:
        idle:
          entry:
            - type: code
              function: cleanup
          'on':
            manual-fetch-trigger:
              target: step_fetch_all_notion_content
        step_fetch_all_notion_content:
          entry:
            - type: agent
              agentId: notion-content-fetcher
              outputTo: fetch-all-notion-content-output
              outputType: fetch-all-notion-content-result
              prompt: 'Retrieve all pages, databases, and their content from the connected Notion account (david@tempest.team) and produce a structured summary report artifact of everything found in the workspace.'
            - type: emit
              event: ADVANCE
          'on':
            ADVANCE:
              target: completed
              guards:
                - guard_fetch_all_notion_content_done
        completed:
          type: final
      functions:
        cleanup:
          type: action
          code: |-
            export default function cleanup(context, event) {
              // Delete known documents from previous run
            }
        guard_fetch_all_notion_content_done:
          type: guard
          code: |-
            export default function guard_fetch_all_notion_content_done(context, event) {
              return context.results['fetch-all-notion-content-output'] !== undefined;
            }
      documentTypes:
        fetch-all-notion-content-result:
          type: object
          properties:
            workspace_summary:
              type: string
              description: 'A narrative summary of the Notion workspace contents, including an overview of pages, databases, and notable content found'
            items:
              type: array
              items:
                type: object
                properties:
                  title:
                    type: string
                    description: Title of the page or database
                  type:
                    type: string
                    description: Whether this item is a 'page' or 'database'
                  url:
                    type: string
                    description: Notion URL of the item
                  content_preview:
                    type: string
                    description: A short preview or description of the item's content
                required:
                  - title
                additionalProperties: true
              description: List of all pages and databases discovered in the workspace
            total_items_found:
              type: number
              description: Total count of pages and databases retrieved from the workspace
          required:
            - workspace_summary
          additionalProperties: true
      tools: {}
