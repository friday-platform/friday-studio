version: 2
sql:
  - engine: postgresql
    queries: query.sql
    schema:
      - ../../../supabase/migrations/20251114020000_create_bounce_tables.sql
      - ../../../supabase/migrations/20251230223546_add_stripe_customer_id.sql
    gen:
      go:
        package: repo
        out: .
        sql_package: pgx/v5
        emit_json_tags: true
        emit_db_tags: true
        emit_all_enum_values: true
        json_tags_case_style: camel
        initialisms: ["id"]
        omit_unused_structs: false
        emit_result_struct_pointers: true
        emit_params_struct_pointers: true
        emit_sql_as_comment: true
        emit_empty_slices: true
