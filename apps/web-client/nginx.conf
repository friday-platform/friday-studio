server {
    listen 3000;
    listen [::]:3000;
    server_name _;

    # Hide nginx version
    server_tokens off;

    # Exclude kube-probe health checks from access logs
    access_log /var/log/nginx/access.log main if=$loggable;

    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss image/svg+xml;

    # Restrict HTTP methods to GET, HEAD, POST
    if ($request_method !~ ^(GET|HEAD|POST)$) {
        return 405;
    }

    # SPA fallback - serve index.html for all non-asset requests
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Block access to sensitive file types
    location ~* \.(bak|config|log|sql|tar|gz|zip|env)$ {
        deny all;
        return 403;
    }

    # Block hidden files (dotfiles)
    location ~ /\. {
        deny all;
        return 403;
    }

    # Security headers
    # Note: Most security headers (HSTS, X-Frame-Options, X-Content-Type-Options,
    # Referrer-Policy, Permissions-Policy, COOP, COEP) are set by Traefik middleware.
    # Only CSP is set here since it's specific to the web client.

    # Reporting API endpoint for CSP violations
    add_header Report-To '{"group":"csp-endpoint","max_age":10886400,"endpoints":[{"url":"https://dm35suqd.uriports.com/reports"}]}' always;
    add_header Reporting-Endpoints 'csp-endpoint="https://dm35suqd.uriports.com/reports"' always;

    # Content-Security-Policy (report-only mode for initial rollout)
    # Once verified, remove -Report-Only suffix to enforce
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://*.clarity.ms https://c.bing.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; connect-src 'self' wss: https:; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; report-uri https://dm35suqd.uriports.com/reports/report; report-to csp-endpoint" always;
}
