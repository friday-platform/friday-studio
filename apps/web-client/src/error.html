    <!-- small reset/styling for this page -->

    <style>
      body, h1, p {
        margin: 0;
      }
      *, ::after, ::before {
        box-sizing: border-box;
        border-width: 0;
        border-style: solid;
        border-color: currentColor;
      }
      :host, html {
        line-height: 1.5;
        -webkit-text-size-adjust: 100%;
        -moz-tab-size: 4;
        tab-size: 4;
        font-family:
          ui-sans-serif, system-ui, sans-serif, "Apple Color Emoji", "Segoe UI Emoji",
          "Segoe UI Symbol", "Noto Color Emoji";
        font-feature-settings: normal;
        font-variation-settings: normal;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        line-height: inherit;
      }
      h1 {
        font-size: inherit;
        font-weight: inherit;
      }
      svg {
        display: block;
      }
      ::selection {
        background-color: color-mix(in srgb, var(--accent-1), transparent 80%);
      }
      :root {
        /* Scale */
        --size-scale: var(--system-scale, 1);
        --text-scale: var(--system-text-scale, 1);
        --size-4: calc(1rem * var(--size-scale));
        --size-6: calc(1.5rem * var(--size-scale));
        --size-9: calc(2.25rem * var(--size-scale));
        --font-family-sans:
          ui-sans-serif, system-ui, sans-serif, "Apple Color Emoji", "Segoe UI Emoji",
          "Segoe UI Symbol", "Noto Color Emoji";
        --font-size-5: calc(1.5rem * var(--text-scale)); /* Font weight */
        --font-weight-5: 500;
        --font-weight-7: 700; /* Line height */
        --background-1: rgb(254 254 255);
        --text-1: rgb(16 19 26);
        --text-3: rgb(21 41 82 / 0.7);
      }
      html {
        color-scheme: light dark;
      }
      body {
        background-color: var(--background-1);
        color: var(--text-1);
        cursor: default;
        block-size: 100dvh;
        font-family: var(--font-family-sans);
        font-size: var(--font-size-1);
        -webkit-font-smoothing: antialiased;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          /* Background */
          --background-1: rgb(20 21 25);
          --text-1: rgb(237 234 223);
          --text-3: rgb(223 227 237 / 0.6);
        }
      }
      .container {
        align-items: center;
        block-size: 100dvh;
        display: flex;
        flex-direction: column;
        inline-size: 100dvw;
        justify-content: center;
        text-align: center;
      }
      .wordmark {
        inline-size: var(--size-9);
      }
      h1 {
        font-size: var(--font-size-5);
        font-weight: var(--font-weight-7);
        margin-block-start: var(--size-6);
      }
      p {
        color: var(--text-3);
        font-size: var(--font-size-5);
        margin-block-end: var(--size-4);
      }
    </style>
  </head>
