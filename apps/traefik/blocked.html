<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Not Available in Your Region | Atlas</title>
    <meta name="robots" content="noindex, nofollow" />
    <style>
      *,
      ::after,
      ::before {
        box-sizing: border-box;
      }

      html {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background-color: #fefeff;
        color: #10131a;
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 0.875rem;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background-color: #141519;
          color: #edebdf;
        }
      }

      main {
        text-align: center;
        padding: 2rem;
      }

      h1 {
        font-size: 1.625rem;
        font-weight: 700;
        margin: 0 0 0.5rem;
        text-wrap: balance;
      }

      p {
        color: rgba(21, 41, 82, 0.7);
        margin: 0;
        max-width: 24rem;
        text-wrap: balance;
      }

      @media (prefers-color-scheme: dark) {
        p {
          color: rgba(223, 227, 237, 0.6);
        }
      }

      footer {
        margin-top: 2rem;
        font-size: 0.75rem;
      }

      a {
        color: oklch(0.5 0.2 264);
        text-decoration: underline;
        text-underline-offset: 2px;
      }

      @media (prefers-color-scheme: dark) {
        a {
          color: oklch(0.7 0.2 264);
        }
      }

      a:hover {
        text-underline-offset: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Not Available in Your Region</h1>
      <p>
        Atlas is currently in beta and not yet available in your country. We're
        working to expand access. Check back soon!
      </p>
      <footer>
        Questions? <a href="mailto:support@hellofriday.ai">Contact support</a>
      </footer>
    </main>
  </body>
</html>
