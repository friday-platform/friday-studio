displayName: GeoBlock Plugin
summary: Country-based access control using GeoLite2
type: middleware
import: github.com/tempestteam/traefik/geoblock

testData:
  GeoBlock:
    databasePath: "/var/lib/geoip/GeoLite2-Country.mmdb"
    allowedCountries:
      - US
      - GB
    unknownCountryAction: "allow"
    blockedPagePath: "/var/lib/geoip/blocked.html"
