name: Auto-Update Homebrew Tap

on:
  release:
    types: [published, prereleased]

permissions:
  contents: read

jobs:
  update-homebrew-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Homebrew tap auto-update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: tempestteam/homebrew-tap
          event-type: atlas-release
          client-payload: |
            {
              "tag": "${{ github.event.release.tag_name }}"
            }