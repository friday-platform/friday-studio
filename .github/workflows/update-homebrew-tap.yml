name: Auto-Update Homebrew Tap

on:
  release:
    types: [published, prereleased]

permissions:
  contents: read

jobs:
  update-homebrew-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Determine channel from release tag
        id: channel
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [[ "$TAG" == nightly-* ]]; then
            echo "channel=nightly" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == edge-* ]]; then
            echo "channel=edge" >> "$GITHUB_OUTPUT"
          else
            echo "channel=stable" >> "$GITHUB_OUTPUT"
          fi
          echo "Detected channel: $(grep channel "$GITHUB_OUTPUT" | cut -d= -f2)"

      - name: Trigger Homebrew tap auto-update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: tempestteam/homebrew-tap
          event-type: atlas-release
          client-payload: |
            {
              "tag": "${{ github.event.release.tag_name }}",
              "channel": "${{ steps.channel.outputs.channel }}"
            }
