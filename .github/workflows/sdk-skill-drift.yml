name: SDK skill drift

# Fails if the vendored writing-friday-python-agents skill drifts from
# upstream at the FRIDAY_AGENT_SDK_VERSION pinned in
# tools/friday-launcher/paths.go. Forces a deliberate re-vendor on
# every SDK version bump rather than silently shipping stale skill
# content. Re-running scripts/sync-sdk-skill.ts (no flag) updates.
#
# TEMPORARY: this check is expected to fail against pinned version
# 0.1.1 because the vendored SKILL.md description is tightened relative
# to upstream's loose "load if context suggests" version. Once 0.1.2
# ships with the corrected description (staged in the agent-sdk repo)
# and `bundledAgentSDKVersion` is bumped, drift will resolve. Until
# then, this workflow is non-blocking via continue-on-error.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "tools/friday-launcher/paths.go"
      - "packages/system/skills/writing-friday-python-agents/**"
      - "scripts/sync-sdk-skill.ts"
      - ".github/workflows/sdk-skill-drift.yml"
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  drift-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # TEMPORARY: transient drift expected until friday-agent-sdk 0.1.2
    # ships with the corrected description. Remove once the pin bumps.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.4

      - name: Verify vendored skill matches upstream pinned tag
        run: deno run -A scripts/sync-sdk-skill.ts --check
