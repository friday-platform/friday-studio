name: Type check

on:
  pull_request:
    branches: [main]
  merge_group:

permissions:
  contents: read

jobs:
  type-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.5.6

      - name: Install dependencies
        run: deno install --frozen

      - name: Run type check
        run: deno check
