name: Knip Check

on:
  pull_request:
    branches: [main]
  merge_group:

permissions:
  contents: read

jobs:
  knip-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.1

      - name: Install dependencies
        run: deno install --frozen

      - name: Generate build info
        run: deno run --allow-read --allow-write --allow-env apps/web-client/scripts/generate-build-info.ts

      - name: Generate SvelteKit types
        run: deno task --recursive sync

      - name: Run knip
        run: npx knip
