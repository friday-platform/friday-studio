name: Rust Check

on:
  workflow_dispatch: # Paused - not building standalone clients right now
  # push:
  #   branches: [main]
  #   paths:
  #     - "apps/atlas-installer/src-tauri/**"
  #     - "apps/web-client/src-tauri/**"
  #     - ".github/workflows/rust-check.yml"
  # pull_request:
  #   branches: [main]
  #   paths:
  #     - "apps/atlas-installer/src-tauri/**"
  #     - "apps/web-client/src-tauri/**"
  #     - ".github/workflows/rust-check.yml"
  # merge_group:

permissions:
  contents: read

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # atlas-installer only on Windows and macOS
          - os: windows-latest
            project: apps/atlas-installer/src-tauri
          - os: macos-latest
            project: apps/atlas-installer/src-tauri
          # web-client on all platforms
          - os: ubuntu-latest
            project: apps/web-client/src-tauri
          - os: windows-latest
            project: apps/web-client/src-tauri
          - os: macos-latest
            project: apps/web-client/src-tauri

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.project }} -> target
          cache-on-failure: true

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-4-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Run cargo check
        working-directory: ${{ matrix.project }}
        run: cargo check --all-targets --all-features

      - name: Run cargo clippy
        working-directory: ${{ matrix.project }}
        run: cargo clippy --all-targets --all-features -- -D warnings
