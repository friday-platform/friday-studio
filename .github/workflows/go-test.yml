name: go-test

on:
  pull_request:
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
  merge_group:

permissions:
  contents: read

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Run tests with race detector
        run: go test -race -v ./...
