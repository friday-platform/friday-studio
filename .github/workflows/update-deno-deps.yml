name: Update Deno Dependencies

on:
  schedule:
    # Run daily at 09:00 UTC
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      update_mode:
        description: "Update mode"
        required: false
        default: "latest" # Default to latest for all updates
        type: choice
        options:
          - latest # Update to latest versions (recommended)
          - compatible # Update to latest semver compatible versions only

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: "2.x" # Use latest Deno 2.x

      - name: Check for outdated dependencies
        id: check
        run: |
          echo "## Checking for outdated dependencies..."

          # Capture outdated dependencies
          OUTDATED=$(deno outdated 2>&1 || true)
          echo "$OUTDATED"

          # Check if there are any updates available
          if echo "$OUTDATED" | grep -q "No outdated dependencies found"; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            echo "No updates available"
          else
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
            echo "Updates available"

            # Save the outdated list for PR body
            {
              echo 'outdated_list<<EOF'
              echo "$OUTDATED"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Update dependencies
        if: steps.check.outputs.has_updates == 'true'
        run: |
          echo "## Updating dependencies..."

          if [ "${{ github.event.inputs.update_mode || 'latest' }}" == "latest" ]; then
            echo "Updating packages to latest versions (excluding zod)..."
            # Get list of all packages except zod-related ones as an array
            mapfile -t PACKAGE_ARRAY < <(deno outdated --json | jq -r '.packages[] | select(.name | test("zod") | not) | .name' || true)
            if [ ${#PACKAGE_ARRAY[@]} -gt 0 ]; then
              echo "Updating: ${PACKAGE_ARRAY[*]}"
              deno update --latest "${PACKAGE_ARRAY[@]}"
            else
              echo "No non-zod packages to update"
            fi
          else
            echo "Updating to latest semver compatible versions (excluding zod)..."
            # Get list of all packages except zod-related ones as an array
            mapfile -t PACKAGE_ARRAY < <(deno outdated --json | jq -r '.packages[] | select(.name | test("zod") | not) | .name' || true)
            if [ ${#PACKAGE_ARRAY[@]} -gt 0 ]; then
              echo "Updating: ${PACKAGE_ARRAY[*]}"
              deno update "${PACKAGE_ARRAY[@]}"
            else
              echo "No non-zod packages to update"
            fi
          fi

          echo "Update complete!"

      - name: Verify updates
        id: verify
        if: steps.check.outputs.has_updates == 'true'
        run: |
          echo "## Verifying updates..."

          # Type check
          echo "Running type check..."
          deno check src/cli.tsx || echo "::warning::Type check failed - review required"

          # Run basic tests
          echo "Running unit tests..."
          deno task test:unit || echo "::warning::Tests failed - review required"

      - name: Create Pull Request
        id: cpr
        if: steps.check.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            deps: update Deno dependencies

            Update mode: ${{ github.event.inputs.update_mode || 'compatible' }}
            Automated by GitHub Actions
          title: "deps: update all Deno dependencies"
          body: |
            ## 🤖 Automated Dependency Updates

            This PR updates ALL Deno dependencies using the native `deno outdated` command.

            ### Update Details
            - **Update mode**: ${{ github.event.inputs.update_mode || 'latest' }}
            - **Triggered by**: ${{ github.event_name == 'schedule' && '⏰ Daily schedule' || '👤 Manual trigger' }}
            - **Deno version**: 2.x

            ### Dependencies Updated
            ```
            ${{ steps.check.outputs.outdated_list }}
            ```

            ### Important Updates
            - **AI SDK packages** (`ai`, `@ai-sdk/*`): Check for breaking changes
            - **Deno std library** (`@std/*`): Core functionality updates
            - **npm packages**: Updated to latest versions
            - **Excluded from updates**: `zod` and related packages (staying on 3.x)

            ### Review Checklist
            - [ ] Review dependency changes in `deno.json`
            - [ ] Check `deno.lock` updates
            - [ ] Verify no breaking changes in AI SDK packages
            - [ ] Ensure tests are passing
            - [ ] Test critical agent functionality if AI SDK was updated

            ### Notes
            ⚠️ This updates dependencies to their latest versions daily, excluding:
            - `zod` and related packages (zod-openapi, zod-to-json-schema) - staying on 3.x

            Updates include:
            - npm packages (including AI SDK)
            - jsr packages (Deno standard library)
            - All other dependencies in deno.json (except zod)

            The retry fix (maxRetries = 3) for 529 errors is preserved in the codebase.

            ---
            *This PR was automatically created by the daily Deno dependency update workflow.*
          branch: deps/deno-updates-${{ github.run_number }}
          delete-branch: true
          labels: |
            dependencies
            deno
            automated
          assignees: ljagiello
          reviewers: ljagiello

      - name: Add PR comment with test results
        if: steps.check.outputs.has_updates == 'true'
        uses: peter-evans/create-or-update-comment@v4
        env:
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        with:
          issue-number: ${{ env.PR_NUMBER }}
          body: |
            ## 🧪 Automated Test Results

            | Check | Status |
            |-------|--------|
            | Type Check | ${{ steps.verify.outcome == 'success' && '✅ Passed' || '⚠️ Review Required' }} |
            | Unit Tests | ${{ steps.verify.outcome == 'success' && '✅ Passed' || '⚠️ Review Required' }} |

            If any checks failed, please review the changes carefully before merging.
