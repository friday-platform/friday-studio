name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.4.1

      - name: Install dependencies
        run: deno install --frozen

      - name: Run unit tests
        run: deno task test:unit

      - name: Run installer tests
        run: deno test --allow-read tools/atlas-installer/test-installer.ts

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            *.log
            *.txt
          retention-days: 1
