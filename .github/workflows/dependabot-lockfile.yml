name: Update Deno lockfile for Dependabot PRs

on:
  pull_request:
    paths:
      - "**/package.json"

jobs:
  update-lockfile:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.DEPENDABOT_PAT }}
          fetch-depth: 0

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.6.8

      - name: Update lockfile
        run: deno install

      - name: Commit lockfile changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update deno.lock [dependabot skip]"
          file_pattern: "deno.lock"
          commit_user_name: "Lukasz Jagiello"
          commit_user_email: "lukasz@tempest.team"
          push_options: '--force-with-lease'
