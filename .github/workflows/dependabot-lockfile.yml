name: Sync Deno lockfile + deno.json for Dependabot PRs

# Runs after Dependabot updates package.json. Does two things:
#   1. `deno install` so deno.lock matches the new package.json.
#   2. Syncs `npm:<pkg>@<ver>` pins in every deno.json to whatever the
#      workspace package.json files now declare — without this a group bump
#      like `hono` lands in package.json but deno.json stays on the old
#      version, producing dual-package-hazard typecheck failures.
#
# Triggered as pull_request_target so the workflow runs with secrets, then
# checks out and pushes via DEPENDABOT_PAT (a classic PAT with `repo` scope,
# stored in 1Password as "GitHub PAT — dependabot-lockfile-sync").
#
# Why a PAT and not GITHUB_TOKEN: pushes made with GITHUB_TOKEN are
# deliberately suppressed by GitHub from triggering downstream workflow
# events (anti-recursion). That meant Test/Lint/Typecheck never re-ran on
# the PR after the lockfile sync. A PAT push counts as a real user push and
# triggers the full CI matrix on the PR.
#
# The `github.actor == 'dependabot[bot]'` gate is what makes this safe —
# we never run untrusted PR code, only checkout + `deno install` + commit.
on:
  pull_request_target:
    paths:
      - "**/package.json"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions: {}

jobs:
  update-lockfile:
    # Defense in depth:
    #   1. Only run on the canonical repo — forks never see DEPENDABOT_PAT.
    #   2. Only run when the PR's head repo matches base — blocks fork PRs
    #      even if they somehow trip github.actor (they can't, but belt+braces).
    #   3. Only run when github.actor is dependabot[bot] — github.actor is set
    #      by GitHub from the triggering identity and cannot be spoofed by PR
    #      contents.
    if: >-
      github.repository == 'friday-platform/friday-studio'
      && github.event.pull_request.head.repo.full_name == github.repository
      && github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.DEPENDABOT_PAT }}
          fetch-depth: 0

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.4

      - name: Update lockfile
        run: deno install

      # Sync npm version pins in deno.json files to match package.json. Without
      # this, a group bump like `hono` lands in every package.json but leaves
      # deno.json on the old version — typecheck then fails with dual-package
      # hazards (two copies of the same lib). See scripts/sync-deno-json-npm-versions.ts.
      - name: Sync deno.json npm versions
        run: deno run --allow-read --allow-write scripts/sync-deno-json-npm-versions.ts

      - name: Re-install after deno.json sync
        run: deno install

      - name: Commit lockfile changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: sync deno.lock + deno.json [dependabot skip]"
          file_pattern: "deno.lock deno.json deno.jsonc **/deno.json **/deno.jsonc"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          push_options: "--force-with-lease"
