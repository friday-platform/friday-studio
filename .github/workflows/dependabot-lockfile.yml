name: Update Deno lockfile for Dependabot PRs

# Use pull_request_target so the workflow runs with the default token's
# write permissions (the regular `pull_request` event from Dependabot only
# gets a read-only token). The `github.actor == 'dependabot[bot]'` gate
# below is what makes this safe — we never run untrusted PR code, only
# checkout + `deno install` + commit the lockfile.
on:
  pull_request_target:
    paths:
      - "**/package.json"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions: {}

jobs:
  update-lockfile:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.4

      - name: Update lockfile
        run: deno install

      - name: Commit lockfile changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update deno.lock [dependabot skip]"
          file_pattern: "deno.lock"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          push_options: "--force-with-lease"
