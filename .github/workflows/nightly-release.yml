name: Nightly Release

on:
  schedule:
    # Run at 2 AM PT every day (10 AM UTC to account for daylight saving time)
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      force_release:
        description: "Force release even if no changes"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for changes since last nightly
        id: check
        run: |
          # Get the latest nightly tag
          latest_nightly=$(git tag -l "nightly-*" | sort -V | tail -n1)

          if [ -z "$latest_nightly" ]; then
            echo "No previous nightly found, creating first nightly"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            # Check if there are commits since the last nightly tag
            commits_since=$(git rev-list "${latest_nightly}"..HEAD --count)
            if [ "$commits_since" -gt 0 ] || [ "${{ inputs.force_release }}" == "true" ]; then
              echo "Found $commits_since commits since last nightly, creating new release"
              echo "should_release=true" >> "$GITHUB_OUTPUT"
            else
              echo "No changes since last nightly, skipping release"
              echo "should_release=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Generate version
        id: version
        run: |
          # Generate nightly version: nightly-YYYYMMDD-gitsha
          date_part=$(date -u +%Y%m%d)
          git_sha=$(git rev-parse --short HEAD)
          version="nightly-${date_part}-${git_sha}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Generated version: $version"

  build:
    needs: check-changes
    if: needs.check-changes.outputs.should_release == 'true'
    timeout-minutes: 60
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest-8-cores
            os: linux
            arch: amd64
            target: x86_64-unknown-linux-gnu
          - runner: macos-latest
            os: darwin
            arch: amd64
            target: x86_64-apple-darwin
          - runner: macos-15-xlarge
            os: darwin
            arch: arm64
            target: aarch64-apple-darwin
          - runner: windows-latest-8-cores
            os: windows
            arch: amd64
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.4.5

      - name: Install dependencies
        run: deno install

      - name: Setup cross-compilation for ARM64 (Linux only)
        if: matrix.os == 'linux' && matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CC=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build binary
        id: build
        uses: ./.github/actions/build-component
        with:
          component: binary
          version: ${{ needs.check-changes.outputs.version }}
          platform: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          target: ${{ matrix.target }}

      - name: Build diagnostics binary
        id: build-diagnostics
        uses: ./.github/actions/build-component
        with:
          component: diagnostics
          version: ${{ needs.check-changes.outputs.version }}
          platform: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          target: ${{ matrix.target }}

      - name: Build web app
        id: build-web-app
        uses: ./.github/actions/build-web-app
        with:
          version: ${{ needs.check-changes.outputs.version }}
          platform: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          target: ${{ matrix.target }}

      - name: Sign macOS binary
        if: matrix.os == 'darwin'
        uses: ./.github/actions/macos-sign
        with:
          binary-path: ${{ steps.build.outputs.binary-path }}
          macos-sign-p12: ${{ secrets.MACOS_SIGN_P12 }}
          macos-sign-password: ${{ secrets.MACOS_SIGN_PASSWORD }}
          macos-sign-identity: ${{ secrets.MACOS_SIGN_IDENTITY }}
          macos-notary-issuer-id: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          macos-notary-key-id: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          macos-notary-key: ${{ secrets.MACOS_NOTARY_KEY }}

      # NEW: Sign diagnostics binary on macOS
      - name: Sign macOS diagnostics binary
        if: matrix.os == 'darwin'
        uses: ./.github/actions/macos-sign
        with:
          binary-path: ${{ steps.build-diagnostics.outputs.binary-path }}
          macos-sign-p12: ${{ secrets.MACOS_SIGN_P12 }}
          macos-sign-password: ${{ secrets.MACOS_SIGN_PASSWORD }}
          macos-sign-identity: ${{ secrets.MACOS_SIGN_IDENTITY }}
          macos-notary-issuer-id: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          macos-notary-key-id: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          macos-notary-key: ${{ secrets.MACOS_NOTARY_KEY }}

      # NEW: Sign the .app bundle (will be included directly in installer)
      - name: Sign macOS app bundle
        if: matrix.os == 'darwin'
        uses: ./.github/actions/macos-sign
        with:
          binary-path: "./dist/Atlas Web Client.app"
          macos-sign-p12: ${{ secrets.MACOS_SIGN_P12 }}
          macos-sign-password: ${{ secrets.MACOS_SIGN_PASSWORD }}
          macos-sign-identity: ${{ secrets.MACOS_SIGN_IDENTITY }}
          # Skip notarization - the app will be notarized as part of the installer
          # macos-notary-issuer-id: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          # macos-notary-key-id: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          # macos-notary-key: ${{ secrets.MACOS_NOTARY_KEY }}

      - name: Create installers
        if: matrix.os != 'linux'
        id: installers
        uses: ./.github/actions/create-installers
        with:
          version: ${{ needs.check-changes.outputs.version }}
          platform: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          channel: nightly
          binary-path: ${{ steps.build.outputs.binary-path }}
          binary-name: ${{ steps.build.outputs.binary-name }}
          diagnostics-binary-path: ${{ steps.build-diagnostics.outputs.binary-path }}
          diagnostics-binary-name: ${{ steps.build-diagnostics.outputs.binary-name }}
          web-app-binary-path: ${{ matrix.os == 'darwin' && './dist/Atlas Web Client.app' || steps.build-web-app.outputs.bundle-path }}
          web-app-binary-name: ${{ matrix.os == 'darwin' && 'Atlas Web Client.app' || steps.build-web-app.outputs.bundle-name }}
          macos-installer-p12: ${{ secrets.MACOS_INSTALLER_P12 }}
          macos-installer-password: ${{ secrets.MACOS_INSTALLER_PASSWORD }}
          macos-notary-issuer-id: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          macos-notary-key-id: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          macos-notary-key: ${{ secrets.MACOS_NOTARY_KEY }}

      - name: Build Linux packages
        if: matrix.os == 'linux'
        run: |
          # Install build dependencies
          sudo apt-get update
          sudo apt-get install -y rpm debhelper devscripts

          # Create build directory and copy BOTH binaries
          mkdir -p build
          cp "${{ steps.build.outputs.binary-path }}" build/atlas
          cp "${{ steps.build-diagnostics.outputs.binary-path }}" build/atlas-diagnostics
          chmod +x build/atlas
          chmod +x build/atlas-diagnostics

          # Build DEB package
          ARCH="${{ matrix.arch }}" VERSION="${{ needs.check-changes.outputs.version }}" ./scripts/build-deb.sh

          # Build RPM package (skip ARM64 on x86_64 runners)
          ARCH="${{ matrix.arch }}" VERSION="${{ needs.check-changes.outputs.version }}" ./scripts/build-rpm.sh
        shell: bash

      - name: Create platform bundle
        run: ./scripts/create-platform-bundle.sh "${{ needs.check-changes.outputs.version }}" "${{ matrix.os }}" "${{ matrix.arch }}"

      - name: Create archive
        run: |
          binary_name="${{ steps.build.outputs.binary-name }}"
          diagnostics_name="${{ steps.build-diagnostics.outputs.binary-name }}"  # NEW
          if [ "${{ matrix.os }}" == "windows" ]; then
            archive_ext=".zip"
          else
            archive_ext=".tar.gz"
          fi

          archive_name="atlas_${{ needs.check-changes.outputs.version }}_${{ matrix.os }}_${{ matrix.arch }}${archive_ext}"

          if [ "${{ matrix.os }}" == "windows" ]; then
            # Include CLI binaries, Tauri .exe/.msi, and README
            7z a "./dist/${archive_name}" "./dist/${binary_name}" "./dist/${diagnostics_name}" "./dist"/*.exe "./dist"/*.msi README.md 2>/dev/null || true
            # Fallback if no Tauri artifacts exist
            7z a "./dist/${archive_name}" "./dist/${binary_name}" "./dist/${diagnostics_name}" README.md
          elif [ "${{ matrix.os }}" == "darwin" ]; then
            # Use pax format to preserve extended attributes (including code signatures)
            # Include CLI binaries, Tauri .app, and README
            tar --format=pax -czf "./dist/${archive_name}" -C ./dist "${binary_name}" "${diagnostics_name}" ./*.app -C .. README.md 2>/dev/null || \
            tar --format=pax -czf "./dist/${archive_name}" -C ./dist "${binary_name}" "${diagnostics_name}" -C .. README.md
          else
            # Include CLI binaries, Tauri .deb, and README
            tar -czf "./dist/${archive_name}" -C ./dist "${binary_name}" "${diagnostics_name}" ./*.deb -C .. README.md 2>/dev/null || \
            tar -czf "./dist/${archive_name}" -C ./dist "${binary_name}" "${diagnostics_name}" -C .. README.md
          fi

          # Generate checksum
          if [ "${{ matrix.os }}" == "darwin" ]; then
            shasum -a 256 "./dist/${archive_name}" > "./dist/${archive_name}.sha256"
          else
            sha256sum "./dist/${archive_name}" > "./dist/${archive_name}.sha256"
          fi
        shell: bash

      - name: Upload binary archives
        uses: actions/upload-artifact@v4
        with:
          name: atlas-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            ./dist/atlas-bundle-*.tar.gz     # NEW: Include platform bundles
            ./dist/atlas-bundle-*.zip        # NEW: Include platform bundles
            ./dist/atlas_*.tar.gz
            ./dist/atlas_*.zip
            ./dist/atlas_*.deb
            ./dist/atlas-*.rpm
            ./dist/atlas_*.sha256
            ./dist/atlas-diagnostics*        # NEW: Include diagnostics binaries
            ./dist/Atlas\ Web\ Client.app   # NEW: Include Tauri macOS app (specific)
            ./dist/Atlas_*.exe               # NEW: Include Tauri Windows installer
            ./dist/Atlas*.msi                # NEW: Include Tauri Windows msi
          retention-days: 1

      - name: Upload installers
        if: matrix.os != 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: atlas-installer-${{ needs.check-changes.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            ./dist/atlas_*.zip
            ./dist/atlas_*.exe
            ./dist/atlas_*.sha256
          retention-days: 1

  release:
    needs: [check-changes, build]
    if: needs.check-changes.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download binary artifacts
        uses: actions/download-artifact@v5
        with:
          path: ./dist/
          pattern: atlas-*
          merge-multiple: true

      - name: Download installer artifacts
        uses: actions/download-artifact@v5
        with:
          path: ./dist/
          pattern: atlas-installer-*
          merge-multiple: true


      - name: Create ZIP files for release distribution
        run: |
          cd ./dist
          # Create ZIP files for macOS .app bundles for release
          for app in *.app; do
            if [ -d "$app" ]; then
              zip_name="${app%.app}.zip"
              echo "Creating release ZIP: $zip_name"
              zip -r "$zip_name" "$app"

              # Generate checksum for the ZIP
              if command -v shasum >/dev/null 2>&1; then
                shasum -a 256 "$zip_name" > "$zip_name.sha256"
              else
                sha256sum "$zip_name" > "$zip_name.sha256"
              fi
            fi
          done

      - name: Generate changelog
        run: |
          {
            echo "## Nightly Build ${{ needs.check-changes.outputs.version }}"
            echo ""
            echo "This is an automated nightly build with the latest stable changes."
            echo ""
            echo "### Recent Changes"
          } > changelog.md

          # Get the previous nightly for changelog
          previous_nightly=$(git tag -l "nightly-*" | sort -V | tail -n2 | head -n1)
          if [ -n "$previous_nightly" ]; then
            git log --oneline --no-merges "${previous_nightly}"..HEAD --pretty=format:"- %s" >> changelog.md || echo "- No changes since last nightly" >> changelog.md
          else
            git log --oneline --no-merges -10 --pretty=format:"- %s" >> changelog.md
          fi

          {
            echo ""
            echo ""
            echo "**Note:** Nightly builds are more stable than edge builds but may still contain experimental features."
          } >> changelog.md

      - name: List downloaded files
        run: |
          echo "Binary files:"
          find ./dist -type f -name "atlas_*" | grep -v "\.exe$\|\.zip$" || echo "No binary files found"
          echo "Package files:"
          find ./dist -type f -name "atlas*" | grep -E "\.(deb|rpm)$" || echo "No package files found"
          echo "Installer files:"
          find ./dist -type f -name "atlas_*" | grep -E "\.(exe|zip)$" || echo "No installer files found"
          echo "Combined bundle files:"
          find ./dist -type f -name "atlas-complete-*" | grep -E "\.(tar\.gz|zip)$" || echo "No combined bundles found"
          echo "All files:"
          find ./dist/ -type f

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-changes.outputs.version }}
          name: "Atlas Nightly (${{ needs.check-changes.outputs.version }})"
          body_path: changelog.md
          draft: false
          prerelease: true
          make_latest: false
          files: |
            ./dist/atlas-bundle-*.tar.gz      # NEW: Platform bundles from build jobs
            ./dist/atlas-bundle-*.zip         # NEW: Platform bundles from build jobs
            ./dist/atlas_*.tar.gz
            ./dist/atlas_*.zip
            ./dist/atlas_*.exe
            ./dist/atlas_*.deb
            ./dist/atlas-*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-sandbox:
    needs: [check-changes, build]
    if: needs.check-changes.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Upload to sandbox GCS bucket
        uses: ./.github/actions/gcs-upload-sandbox
        with:
          bucket-prefix: "nightly/"
          version: ${{ needs.check-changes.outputs.version }}

  upload-production:
    needs: [check-changes, build]
    if: needs.check-changes.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Upload to production GCS bucket
        uses: ./.github/actions/gcs-upload-production
        with:
          bucket-prefix: "nightly/"
          version: ${{ needs.check-changes.outputs.version }}
