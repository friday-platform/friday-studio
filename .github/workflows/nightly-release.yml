name: Nightly Release

on:
  schedule:
    # Run at 2 AM PT every day (10 AM UTC to account for daylight saving time)
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      force_release:
        description: "Force release even if no changes"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes since last nightly
        id: check
        run: |
          # Get the latest nightly tag
          latest_nightly=$(git tag -l "nightly-*" | sort -V | tail -n1)

          if [ -z "$latest_nightly" ]; then
            echo "No previous nightly found, creating first nightly"
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            # Check if there are commits since the last nightly tag
            commits_since=$(git rev-list ${latest_nightly}..HEAD --count)
            if [ "$commits_since" -gt 0 ] || [ "${{ inputs.force_release }}" == "true" ]; then
              echo "Found $commits_since commits since last nightly, creating new release"
              echo "should_release=true" >> $GITHUB_OUTPUT
            else
              echo "No changes since last nightly, skipping release"
              echo "should_release=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Generate version
        id: version
        run: |
          # Generate nightly version: nightly-YYYYMMDD-{git_sha} (date + git sha for unique releases)
          date_part=$(date -u +%Y%m%d)
          git_sha=$(git rev-parse --short HEAD)
          version="nightly-${date_part}-${git_sha}"
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "Generated version: $version"

  build:
    needs: check-changes
    if: needs.check-changes.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux
            arch: amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            platform: linux
            arch: arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: darwin
            arch: amd64
          - os: macos-15-xlarge
            target: aarch64-apple-darwin
            platform: darwin
            arch: arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows
            arch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.3.3

      - name: Install dependencies
        run: deno install

      - name: Prepare version information
        shell: bash
        run: |
          # Get version and git information
          VERSION="${{ needs.check-changes.outputs.version }}"
          GIT_SHA=$(git rev-parse --short HEAD)

          echo "Building version: $VERSION"
          echo "Git SHA: $GIT_SHA"

          # Replace version placeholders with cross-platform sed syntax
          if [[ "$OSTYPE" == "darwin"* ]]; then
            # macOS sed requires backup extension (empty string for no backup)
            sed -i "" "s|__ATLAS_VERSION__|$VERSION|g" src/utils/version.ts
            sed -i "" "s|__ATLAS_GIT_SHA__|$GIT_SHA|g" src/utils/version.ts
          else
            # Linux/Windows with bash sed syntax
            sed -i "s|__ATLAS_VERSION__|$VERSION|g" src/utils/version.ts
            sed -i "s|__ATLAS_GIT_SHA__|$GIT_SHA|g" src/utils/version.ts
          fi

          echo "Version information embedded in source"
          echo "Verification:"
          head -10 src/utils/version.ts

      - name: Build binary
        run: |
          mkdir -p ./dist

          # Set binary name based on platform
          if [ "${{ matrix.platform }}" == "windows" ]; then
            binary_name="atlas.exe"
          else
            binary_name="atlas"
          fi

          # Compile with Deno - let's try without target flag for macOS ARM64 to test native compilation
          echo "Target: ${{ matrix.target }}"
          echo "Platform: ${{ matrix.platform }}"
          echo "Arch: ${{ matrix.arch }}"
          echo "System arch: $(uname -m)"

          # Native compilation for ARM64 macOS (using macos-15-xlarge), cross-compilation for others
          if [ "${{ matrix.platform }}" == "darwin" ] && [ "${{ matrix.arch }}" == "arm64" ]; then
            echo "ARM64 macOS compilation on macOS 15 - removing restrictive V8 flags"

            # Set memory limits for large compilation only (not embedded in binary)
            export DENO_V8_FLAGS="--max-old-space-size=8192"

            # Compile WITHOUT embedded V8 flags that restrict runtime memory
            deno compile \
              --no-check \
              --allow-read \
              --allow-write \
              --allow-net \
              --allow-env \
              --allow-run \
              --allow-sys \
              --allow-ffi \
              --unstable-broadcast-channel \
              --unstable-worker-options \
              --unstable-otel \
              --include=src \
              --include=examples \
              --output "./dist/${binary_name}" \
              ./src/cli.tsx
          else
            echo "Cross-compiling for target: ${{ matrix.target }}"

            # Set memory limits for large compilation
            export DENO_V8_FLAGS="--max-old-space-size=8192"

            deno compile \
              --no-check \
              --allow-read \
              --allow-write \
              --allow-net \
              --allow-env \
              --allow-run \
              --allow-sys \
              --allow-ffi \
              --unstable-broadcast-channel \
              --unstable-worker-options \
              --unstable-otel \
              --include=src \
              --include=examples \
              --target ${{ matrix.target }} \
              --v8-flags="--max-old-space-size=4096,--max-semi-space-size=128" \
              --output "./dist/${binary_name}" \
              ./src/cli.tsx
          fi
        shell: bash

      - name: Test binary immediately after compilation
        run: |
          binary_name="atlas"
          if [ "${{ matrix.platform }}" == "windows" ]; then
            binary_name="atlas.exe"
          fi

          echo "=== TESTING BINARY AFTER COMPILATION ==="
          ls -la "./dist/${binary_name}"
          file "./dist/${binary_name}"

          # Only test execution if we're not cross-compiling
          echo "Target: ${{ matrix.target }}"
          echo "System arch: $(uname -m)"

          # Check if this is cross-compilation
          SYSTEM_ARCH=$(uname -m)
          if ([ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ] && [ "$SYSTEM_ARCH" != "aarch64" ]) || \
             ([ "${{ matrix.target }}" == "x86_64-unknown-linux-gnu" ] && [ "$SYSTEM_ARCH" != "x86_64" ]) || \
             ([ "${{ matrix.target }}" == "aarch64-apple-darwin" ] && [ "$SYSTEM_ARCH" != "arm64" ]) || \
             ([ "${{ matrix.target }}" == "x86_64-apple-darwin" ] && [ "$SYSTEM_ARCH" != "x86_64" ]) || \
             [ "${{ matrix.platform }}" == "windows" ]; then
            echo "🔄 Skipping execution test (cross-compilation or Windows)"
            echo "✅ Binary compiled successfully"
          else
            # Test basic execution for native compilation
            echo "🧪 Testing binary execution (native compilation)..."
            if "./dist/${binary_name}" --help >/dev/null 2>&1; then
              echo "✅ Binary works after compilation"
            else
              echo "❌ Binary FAILS after compilation"
              exit 1
            fi
          fi
        shell: bash

      - name: Sign macOS binary (if certificates available)
        if: matrix.platform == 'darwin' && env.MACOS_SIGN_P12 != ''
        env:
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          # Import certificate
          echo "$MACOS_SIGN_P12" | base64 --decode > certificate.p12
          security create-keychain -p mypassword build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p mypassword build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_SIGN_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k mypassword build.keychain

          # Auto-detect signing identity if not provided
          if [ -z "$MACOS_SIGN_IDENTITY" ]; then
            SIGN_IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1 | grep -o '"[^"]*"' | tr -d '"')
            if [ -z "$SIGN_IDENTITY" ]; then
              echo "No Developer ID Application certificate found, trying any valid identity"
              SIGN_IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep "1)" | head -1 | grep -o '"[^"]*"' | tr -d '"')
            fi
            echo "Auto-detected signing identity: $SIGN_IDENTITY"
          else
            SIGN_IDENTITY="$MACOS_SIGN_IDENTITY"
            echo "Using provided signing identity: $SIGN_IDENTITY"
          fi

          # Create entitlements for hardened runtime to allow V8 memory allocation
          echo '<?xml version="1.0" encoding="UTF-8"?>' > entitlements.plist
          echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' >> entitlements.plist
          echo '<plist version="1.0">' >> entitlements.plist
          echo '<dict>' >> entitlements.plist
          echo '  <key>com.apple.security.cs.allow-jit</key>' >> entitlements.plist
          echo '  <true/>' >> entitlements.plist
          echo '  <key>com.apple.security.cs.allow-unsigned-executable-memory</key>' >> entitlements.plist
          echo '  <true/>' >> entitlements.plist
          echo '  <key>com.apple.security.cs.disable-executable-page-protection</key>' >> entitlements.plist
          echo '  <true/>' >> entitlements.plist
          echo '</dict>' >> entitlements.plist
          echo '</plist>' >> entitlements.plist

          # Sign binary with entitlements for V8 memory allocation
          codesign --force --options runtime --entitlements entitlements.plist --deep --sign "$SIGN_IDENTITY" ./dist/atlas

          # Notarize if credentials available
          if [ -n "${{ secrets.MACOS_NOTARY_ISSUER_ID }}" ]; then
            # Create private key file from base64 encoded secret
            echo "${{ secrets.MACOS_NOTARY_KEY }}" | base64 --decode > notary_key.p8

            # Debug: check key file format
            echo "Private key file size: $(wc -c < notary_key.p8)"
            echo "Private key starts with: $(head -c 50 notary_key.p8)"

            # Create a zip file for notarization (required by Apple)
            zip atlas-binary.zip ./dist/atlas

            # Try notarization with better error handling
            if xcrun notarytool submit atlas-binary.zip \
              --issuer "${{ secrets.MACOS_NOTARY_ISSUER_ID }}" \
              --key-id "${{ secrets.MACOS_NOTARY_KEY_ID }}" \
              --key notary_key.p8 \
              --wait; then
              echo "Notarization successful"
            else
              echo "Notarization failed, but continuing build"
              # Don't fail the build for notarization issues
            fi

            # Clean up files
            rm -f notary_key.p8 atlas-binary.zip
          fi

      - name: Test binary after signing (macOS only)
        if: matrix.platform == 'darwin'
        run: |
          echo "=== TESTING BINARY AFTER SIGNING ==="
          ls -la "./dist/atlas"
          file "./dist/atlas"

          # Check if signed
          codesign -dv "./dist/atlas" || echo "Binary not signed"

          # Test basic execution
          echo "Testing binary execution after signing..."
          if "./dist/atlas" --help >/dev/null 2>&1; then
            echo "✅ Binary works after signing"
          else
            echo "❌ Binary FAILS after signing"
            exit 1
          fi
        shell: bash

      - name: Create archive
        run: |
          mkdir -p ./dist

          # Set file extensions
          if [ "${{ matrix.platform }}" == "windows" ]; then
            binary_name="atlas.exe"
            archive_ext=".zip"
          else
            binary_name="atlas"
            archive_ext=".tar.gz"
          fi

          # Create archive name
          archive_name="atlas_${{ needs.check-changes.outputs.version }}_${{ matrix.platform }}_${{ matrix.arch }}${archive_ext}"

          # Create archive
          if [ "${{ matrix.platform }}" == "windows" ]; then
            7z a "./dist/${archive_name}" "./dist/${binary_name}" README.md
          else
            tar -czf "./dist/${archive_name}" -C ./dist "${binary_name}" -C .. README.md
          fi

          # Generate checksum
          if [ "${{ matrix.platform }}" == "darwin" ]; then
            shasum -a 256 "./dist/${archive_name}" > "./dist/${archive_name}.sha256"
          else
            sha256sum "./dist/${archive_name}" > "./dist/${archive_name}.sha256"
          fi
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: atlas-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            ./dist/atlas_*.tar.gz
            ./dist/atlas_*.zip
            ./dist/atlas_*.sha256
          retention-days: 1

  release:
    needs: [check-changes, build]
    if: needs.check-changes.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist/
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          # Get the latest nightly tag for changelog generation
          latest_nightly=$(git tag -l "nightly-*" | sort -V | tail -n1)

          if [ -z "$latest_nightly" ]; then
            # First nightly release
            echo "## Changes" > changelog.md
            echo "" >> changelog.md
            echo "This is the first nightly release of Atlas." >> changelog.md
            echo "" >> changelog.md
            git log --oneline --no-merges -10 >> changelog.md
          else
            # Generate changelog since last nightly
            echo "## Changes since $latest_nightly" > changelog.md
            echo "" >> changelog.md
            git log --oneline --no-merges ${latest_nightly}..HEAD >> changelog.md
          fi

          echo "Generated changelog:"
          cat changelog.md

      - name: Create checksums file
        run: |
          cd ./dist
          cat *.sha256 > checksums.txt
          echo "Generated checksums:"
          cat checksums.txt

      - name: Create nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-changes.outputs.version }}
          name: Atlas Nightly ${{ needs.check-changes.outputs.version }}
          body_path: changelog.md
          draft: false
          prerelease: true
          make_latest: false
          files: |
            ./dist/atlas_*.tar.gz
            ./dist/atlas_*.zip
            ./dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update nightly tag
        run: |
          # Create/update a 'nightly' tag that always points to the latest nightly commit
          git tag -f nightly HEAD
          git push origin nightly --force


      - name: Update Homebrew tap for nightly
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ needs.check-changes.outputs.version }}"

          # Trigger homebrew tap update for nightly channel
          curl -X POST \
            -H "Authorization: token $HOMEBREW_TAP_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/tempestteam/homebrew-tap/dispatches" \
            -d "{\"event_type\":\"atlas-release\",\"client_payload\":{\"tag\":\"$VERSION\",\"channel\":\"nightly\"}}"

  upload-sandbox:
    needs: [check-changes, build]
    if: needs.check-changes.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist/
          merge-multiple: true

      - name: Create checksums file
        run: |
          cd ./dist
          cat *.sha256 > checksums.txt
          echo "Generated checksums:"
          cat checksums.txt

      - name: Authenticate to Google Cloud (Sandbox)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/415092695556/locations/global/workloadIdentityPools/github/providers/atlas-github'
          service_account: 'atlas-github-ci@tempest-sandbox.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload artifacts to sandbox GCS
        run: |
          VERSION="${{ needs.check-changes.outputs.version }}"
          
          # Change to dist directory where artifacts are
          cd ./dist
          
          # Upload all artifacts to sandbox bucket with nightly/ prefix
          if ls atlas_*.tar.gz 1> /dev/null 2>&1; then
            gsutil -m cp atlas_*.tar.gz gs://tempest-sandbox-atlas-binaries/nightly/
          fi
          if ls atlas_*.zip 1> /dev/null 2>&1; then
            gsutil -m cp atlas_*.zip gs://tempest-sandbox-atlas-binaries/nightly/
          fi
          gsutil -m cp checksums.txt gs://tempest-sandbox-atlas-binaries/nightly/checksums-${VERSION}.txt
          
          # Also upload to versioned paths
          for file in atlas_*.tar.gz atlas_*.zip; do
            if [ -f "$file" ]; then
              gsutil cp "$file" "gs://tempest-sandbox-atlas-binaries/nightly/${VERSION}/$file"
            fi
          done
          
          echo "Uploaded nightly artifacts to sandbox GCS bucket"

  upload-production:
    needs: [check-changes, build]
    if: needs.check-changes.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist/
          merge-multiple: true

      - name: Create checksums file
        run: |
          cd ./dist
          cat *.sha256 > checksums.txt
          echo "Generated checksums:"
          cat checksums.txt

      - name: Authenticate to Google Cloud (Production)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/180211378242/locations/global/workloadIdentityPools/github-actions/providers/atlas-github'
          service_account: 'atlas-github-ci@tempest-production.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload artifacts to production GCS
        run: |
          VERSION="${{ needs.check-changes.outputs.version }}"
          
          # Change to dist directory where artifacts are
          cd ./dist
          
          # Upload all artifacts to production bucket with nightly/ prefix
          if ls atlas_*.tar.gz 1> /dev/null 2>&1; then
            gsutil -m cp atlas_*.tar.gz gs://tempest-production-atlas-binaries/nightly/
          fi
          if ls atlas_*.zip 1> /dev/null 2>&1; then
            gsutil -m cp atlas_*.zip gs://tempest-production-atlas-binaries/nightly/
          fi
          gsutil -m cp checksums.txt gs://tempest-production-atlas-binaries/nightly/checksums-${VERSION}.txt
          
          # Also upload to versioned paths
          for file in atlas_*.tar.gz atlas_*.zip; do
            if [ -f "$file" ]; then
              gsutil cp "$file" "gs://tempest-production-atlas-binaries/nightly/${VERSION}/$file"
            fi
          done
          
          echo "Uploaded nightly artifacts to production GCS bucket"

  cleanup:
    needs: [check-changes, release]
    if: always() && needs.check-changes.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clean up old nightly releases
        run: |
          # Keep only the last 7 nightly releases
          echo "Cleaning up old nightly releases..."

          # Get all nightly tags sorted by creation date (newest first)
          nightly_tags=$(git tag -l "nightly-*" --sort=-version:refname)

          # Convert to array and skip first 7 (keep them)
          count=0
          for tag in $nightly_tags; do
            count=$((count + 1))
            if [ $count -gt 7 ]; then
              echo "Deleting old nightly release: $tag"
              # Delete the GitHub release
              gh release delete "$tag" --yes --cleanup-tag || echo "Failed to delete release $tag"
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
