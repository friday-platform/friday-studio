name: Nightly Release

on:
  schedule:
    # Run at 2 AM PT every day (10 AM UTC to account for daylight saving time)
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      force_release:
        description: "Force release even if no changes"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for changes since last nightly
        id: check
        run: |
          # Get the latest nightly tag
          latest_nightly=$(git tag -l "nightly-*" | sort -V | tail -n1)

          if [ -z "$latest_nightly" ]; then
            echo "No previous nightly found, creating first nightly"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            # Check if there are commits since the last nightly tag
            commits_since=$(git rev-list "${latest_nightly}"..HEAD --count)
            if [ "$commits_since" -gt 0 ] || [ "${{ inputs.force_release }}" == "true" ]; then
              echo "Found $commits_since commits since last nightly, creating new release"
              echo "should_release=true" >> "$GITHUB_OUTPUT"
            else
              echo "No changes since last nightly, skipping release"
              echo "should_release=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Generate version
        id: version
        run: |
          # Generate nightly version: nightly-YYYYMMDD-gitsha
          date_part=$(date -u +%Y%m%d)
          git_sha=$(git rev-parse --short HEAD)
          version="nightly-${date_part}-${git_sha}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Generated version: $version"

  # ==================== BUILD JOBS ====================
  build-binary-linux:
    needs: check-changes
    if: needs.check-changes.outputs.should_release == 'true'
    uses: ./.github/workflows/build-component.yml
    with:
      component: binary
      version: ${{ needs.check-changes.outputs.version }}
      platform: linux
      arch: amd64
      runner: ubuntu-latest-8-cores
    secrets: inherit

  build-binary-darwin-amd64:
    needs: check-changes
    if: needs.check-changes.outputs.should_release == 'true'
    uses: ./.github/workflows/build-component.yml
    with:
      component: binary
      version: ${{ needs.check-changes.outputs.version }}
      platform: darwin
      arch: amd64
      runner: macos-latest
    secrets: inherit

  build-binary-darwin-arm64:
    needs: check-changes
    if: needs.check-changes.outputs.should_release == 'true'
    uses: ./.github/workflows/build-component.yml
    with:
      component: binary
      version: ${{ needs.check-changes.outputs.version }}
      platform: darwin
      arch: arm64
      runner: macos-15-xlarge
    secrets: inherit

  build-binary-windows:
    needs: check-changes
    if: needs.check-changes.outputs.should_release == 'true'
    uses: ./.github/workflows/build-component.yml
    with:
      component: binary
      version: ${{ needs.check-changes.outputs.version }}
      platform: windows
      arch: amd64
      runner: windows-latest-8-cores
    secrets: inherit

  build-diagnostics-linux:
    needs: check-changes
    if: needs.check-changes.outputs.should_release == 'true'
    uses: ./.github/workflows/build-component.yml
    with:
      component: diagnostics
      version: ${{ needs.check-changes.outputs.version }}
      platform: linux
      arch: amd64
      runner: ubuntu-latest-8-cores
    secrets: inherit

  build-diagnostics-darwin-amd64:
    needs: check-changes
    if: needs.check-changes.outputs.should_release == 'true'
    uses: ./.github/workflows/build-component.yml
    with:
      component: diagnostics
      version: ${{ needs.check-changes.outputs.version }}
      platform: darwin
      arch: amd64
      runner: macos-latest
    secrets: inherit

  build-diagnostics-darwin-arm64:
    needs: check-changes
    if: needs.check-changes.outputs.should_release == 'true'
    uses: ./.github/workflows/build-component.yml
    with:
      component: diagnostics
      version: ${{ needs.check-changes.outputs.version }}
      platform: darwin
      arch: arm64
      runner: macos-15-xlarge
    secrets: inherit

  build-diagnostics-windows:
    needs: check-changes
    if: needs.check-changes.outputs.should_release == 'true'
    uses: ./.github/workflows/build-component.yml
    with:
      component: diagnostics
      version: ${{ needs.check-changes.outputs.version }}
      platform: windows
      arch: amd64
      runner: windows-latest-8-cores
    secrets: inherit

  build-web-app-darwin-amd64:
    needs: check-changes
    if: needs.check-changes.outputs.should_release == 'true'
    uses: ./.github/workflows/build-component.yml
    with:
      component: web-app
      version: ${{ needs.check-changes.outputs.version }}
      platform: darwin
      arch: amd64
      runner: macos-latest
    secrets: inherit

  build-web-app-darwin-arm64:
    needs: check-changes
    if: needs.check-changes.outputs.should_release == 'true'
    uses: ./.github/workflows/build-component.yml
    with:
      component: web-app
      version: ${{ needs.check-changes.outputs.version }}
      platform: darwin
      arch: arm64
      runner: macos-15-xlarge
    secrets: inherit

  # ==================== PACKAGING JOBS ====================
  package-linux:
    needs: [check-changes, build-binary-linux, build-diagnostics-linux]
    if: needs.check-changes.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: ./artifacts/

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: rpm debhelper devscripts
          version: 1.0

      - name: Build Linux packages
        run: |

          # Build AMD64 packages
          mkdir -p build
          cp artifacts/binary-linux-amd64/atlas build/atlas
          cp artifacts/diagnostics-linux-amd64/atlas-diagnostics build/atlas-diagnostics
          chmod +x build/atlas
          chmod +x build/atlas-diagnostics

          ARCH="amd64" VERSION="${{ needs.check-changes.outputs.version }}" ./scripts/build-deb.sh
          ARCH="amd64" VERSION="${{ needs.check-changes.outputs.version }}" ./scripts/build-rpm.sh
        shell: bash

      - name: Create platform bundle
        run: |
          mkdir -p dist
          cp artifacts/binary-linux-amd64/atlas dist/atlas
          cp artifacts/diagnostics-linux-amd64/atlas-diagnostics dist/atlas-diagnostics
          ./scripts/create-platform-bundle.sh "${{ needs.check-changes.outputs.version }}" "linux" "amd64"
        shell: bash

      - name: Upload final artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            ./dist/atlas_*.deb
            ./dist/atlas-*.rpm
            ./dist/atlas-bundle-*.tar.gz
            ./artifacts/binary-linux-amd64/atlas_*.tar.gz
            ./artifacts/binary-linux-amd64/atlas_*.sha256
          retention-days: 5

  package-darwin-amd64:
    needs: [check-changes, build-binary-darwin-amd64, build-diagnostics-darwin-amd64, build-web-app-darwin-amd64]
    if: needs.check-changes.outputs.should_release == 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: ./artifacts/

      - name: Prepare macOS AMD64 files
        run: |
          mkdir -p dist
          cp artifacts/binary-darwin-amd64/atlas dist/atlas
          cp artifacts/diagnostics-darwin-amd64/atlas-diagnostics dist/atlas-diagnostics
          # Find and copy the actual .app directory
          if ls artifacts/web-app-darwin-amd64/*.app 1>/dev/null 2>&1; then
            cp -r artifacts/web-app-darwin-amd64/*.app "dist/Atlas Web Client.app"
            # Fix executable permissions on Tauri binary inside the app
            chmod +x "dist/Atlas Web Client.app/Contents/MacOS/tauri-app"
          fi
        shell: bash

      - name: Sign atlas binary
        uses: ./.github/actions/macos-sign
        with:
          binary-path: ./dist/atlas
          macos-sign-p12: ${{ secrets.MACOS_SIGN_P12 }}
          macos-sign-password: ${{ secrets.MACOS_SIGN_PASSWORD }}
          macos-sign-identity: ${{ secrets.MACOS_SIGN_IDENTITY }}
          macos-notary-issuer-id: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          macos-notary-key-id: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          macos-notary-key: ${{ secrets.MACOS_NOTARY_KEY }}

      - name: Sign atlas-diagnostics binary
        uses: ./.github/actions/macos-sign
        with:
          binary-path: ./dist/atlas-diagnostics
          macos-sign-p12: ${{ secrets.MACOS_SIGN_P12 }}
          macos-sign-password: ${{ secrets.MACOS_SIGN_PASSWORD }}
          macos-sign-identity: ${{ secrets.MACOS_SIGN_IDENTITY }}
          macos-notary-issuer-id: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          macos-notary-key-id: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          macos-notary-key: ${{ secrets.MACOS_NOTARY_KEY }}

      - name: Create macOS AMD64 installer
        uses: ./.github/actions/create-installers
        with:
          version: ${{ needs.check-changes.outputs.version }}
          platform: darwin
          arch: amd64
          channel: nightly
          binary-path: dist/atlas
          binary-name: atlas
          diagnostics-binary-path: dist/atlas-diagnostics
          diagnostics-binary-name: atlas-diagnostics
          web-app-binary-path: dist/Atlas Web Client.app
          web-app-binary-name: Atlas Web Client.app
          macos-sign-p12: ${{ secrets.MACOS_SIGN_P12 }}
          macos-sign-password: ${{ secrets.MACOS_SIGN_PASSWORD }}
          macos-installer-p12: ${{ secrets.MACOS_INSTALLER_P12 }}
          macos-installer-password: ${{ secrets.MACOS_INSTALLER_PASSWORD }}
          macos-notary-issuer-id: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          macos-notary-key-id: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          macos-notary-key: ${{ secrets.MACOS_NOTARY_KEY }}

      - name: Create platform bundle
        run: |
          ./scripts/create-platform-bundle.sh "${{ needs.check-changes.outputs.version }}" "darwin" "amd64"
        shell: bash

      - name: Upload final artifacts
        uses: actions/upload-artifact@v4
        with:
          name: darwin-amd64-packages
          path: |
            ./dist/atlas-bundle-*.tar.gz
            ./dist/atlas_*.zip
            ./dist/atlas_*.sha256
            ./artifacts/binary-darwin-amd64/atlas_*.tar.gz
            ./artifacts/binary-darwin-amd64/atlas_*.sha256
          retention-days: 5

  package-darwin-arm64:
    needs: [check-changes, build-binary-darwin-arm64, build-diagnostics-darwin-arm64, build-web-app-darwin-arm64]
    if: needs.check-changes.outputs.should_release == 'true'
    runs-on: macos-15-xlarge
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: ./artifacts/

      - name: Prepare macOS ARM64 files
        run: |
          mkdir -p dist
          cp artifacts/binary-darwin-arm64/atlas dist/atlas
          cp artifacts/diagnostics-darwin-arm64/atlas-diagnostics dist/atlas-diagnostics
          # Find and copy the actual .app directory
          if ls artifacts/web-app-darwin-arm64/*.app 1>/dev/null 2>&1; then
            cp -r artifacts/web-app-darwin-arm64/*.app "dist/Atlas Web Client.app"
            # Fix executable permissions on Tauri binary inside the app
            chmod +x "dist/Atlas Web Client.app/Contents/MacOS/tauri-app"
          fi
        shell: bash

      - name: Sign atlas binary
        uses: ./.github/actions/macos-sign
        with:
          binary-path: ./dist/atlas
          macos-sign-p12: ${{ secrets.MACOS_SIGN_P12 }}
          macos-sign-password: ${{ secrets.MACOS_SIGN_PASSWORD }}
          macos-sign-identity: ${{ secrets.MACOS_SIGN_IDENTITY }}
          macos-notary-issuer-id: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          macos-notary-key-id: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          macos-notary-key: ${{ secrets.MACOS_NOTARY_KEY }}

      - name: Sign atlas-diagnostics binary
        uses: ./.github/actions/macos-sign
        with:
          binary-path: ./dist/atlas-diagnostics
          macos-sign-p12: ${{ secrets.MACOS_SIGN_P12 }}
          macos-sign-password: ${{ secrets.MACOS_SIGN_PASSWORD }}
          macos-sign-identity: ${{ secrets.MACOS_SIGN_IDENTITY }}
          macos-notary-issuer-id: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          macos-notary-key-id: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          macos-notary-key: ${{ secrets.MACOS_NOTARY_KEY }}

      - name: Create macOS ARM64 installer
        uses: ./.github/actions/create-installers
        with:
          version: ${{ needs.check-changes.outputs.version }}
          platform: darwin
          arch: arm64
          channel: nightly
          binary-path: dist/atlas
          binary-name: atlas
          diagnostics-binary-path: dist/atlas-diagnostics
          diagnostics-binary-name: atlas-diagnostics
          web-app-binary-path: dist/Atlas Web Client.app
          web-app-binary-name: Atlas Web Client.app
          macos-sign-p12: ${{ secrets.MACOS_SIGN_P12 }}
          macos-sign-password: ${{ secrets.MACOS_SIGN_PASSWORD }}
          macos-installer-p12: ${{ secrets.MACOS_INSTALLER_P12 }}
          macos-installer-password: ${{ secrets.MACOS_INSTALLER_PASSWORD }}
          macos-notary-issuer-id: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          macos-notary-key-id: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          macos-notary-key: ${{ secrets.MACOS_NOTARY_KEY }}

      - name: Create platform bundle
        run: |
          ./scripts/create-platform-bundle.sh "${{ needs.check-changes.outputs.version }}" "darwin" "arm64"
        shell: bash

      - name: Upload final artifacts
        uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64-packages
          path: |
            ./dist/atlas-bundle-*.tar.gz
            ./dist/atlas_*.zip
            ./dist/atlas_*.sha256
            ./artifacts/binary-darwin-arm64/atlas_*.tar.gz
            ./artifacts/binary-darwin-arm64/atlas_*.sha256
          retention-days: 5

  package-windows:
    needs: [check-changes, build-binary-windows, build-diagnostics-windows]
    if: needs.check-changes.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: ./artifacts/

      - name: Create Windows installer
        uses: ./.github/actions/create-installers
        with:
          version: ${{ needs.check-changes.outputs.version }}
          platform: windows
          arch: amd64
          channel: nightly
          binary-path: artifacts/binary-windows-amd64/atlas.exe
          binary-name: atlas.exe
          diagnostics-binary-path: artifacts/diagnostics-windows-amd64/atlas-diagnostics.exe
          diagnostics-binary-name: atlas-diagnostics.exe

      - name: Create platform bundle
        run: |
          # Copy Windows files for bundle
          mkdir -p dist
          cp artifacts/binary-windows-amd64/atlas.exe dist/atlas.exe
          cp artifacts/diagnostics-windows-amd64/atlas-diagnostics.exe dist/atlas-diagnostics.exe
          ./scripts/create-platform-bundle.sh "${{ needs.check-changes.outputs.version }}" "windows" "amd64"
        shell: bash

      - name: Upload final artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            ./dist/atlas-bundle-*.zip
            ./dist/atlas_*.exe
            ./dist/atlas_*.sha256
            ./dist/Atlas*.msi
            ./artifacts/binary-windows-amd64/atlas_*.zip
            ./artifacts/binary-windows-amd64/atlas_*.sha256
          retention-days: 5

  # ==================== RELEASE & UPLOAD JOBS ====================
  release:
    needs: [check-changes, package-linux, package-darwin-amd64, package-darwin-arm64, package-windows]
    if: needs.check-changes.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: ./dist/

      - name: Prepare release artifacts
        run: |
          # Move all artifacts to a flat structure for release
          find ./dist -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.deb" -o -name "*.rpm" -o -name "*.exe" -o -name "*.msi" \) -exec mv {} ./dist/ \; 2>/dev/null || true
          ls -la ./dist/
        shell: bash

      - name: Generate changelog
        run: |
          {
            echo "## Nightly Build ${{ needs.check-changes.outputs.version }}"
            echo ""
            echo "This is an automated nightly build with the latest stable changes."
            echo ""
            echo "### Recent Changes"
          } > changelog.md

          # Get the previous nightly for changelog
          previous_nightly=$(git tag -l "nightly-*" | sort -V | tail -n2 | head -n1)
          if [ -n "$previous_nightly" ]; then
            git log --oneline --no-merges "${previous_nightly}"..HEAD --pretty=format:"- %s" >> changelog.md || echo "- No changes since last nightly" >> changelog.md
          else
            git log --oneline --no-merges -10 --pretty=format:"- %s" >> changelog.md
          fi

          {
            echo ""
            echo ""
            echo "**Note:** Nightly builds are more stable than edge builds but may still contain experimental features."
          } >> changelog.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-changes.outputs.version }}
          name: "Atlas Nightly (${{ needs.check-changes.outputs.version }})"
          body_path: changelog.md
          draft: false
          prerelease: true
          make_latest: false
          files: |
            ./dist/atlas-bundle-*.tar.gz
            ./dist/atlas-bundle-*.zip
            ./dist/atlas_*.tar.gz
            ./dist/atlas_*.zip
            ./dist/atlas_*.exe
            ./dist/atlas_*.deb
            ./dist/atlas-*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-sandbox:
    needs: [check-changes, package-linux, package-darwin-amd64, package-darwin-arm64, package-windows]
    if: needs.check-changes.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Upload to sandbox GCS bucket
        uses: ./.github/actions/gcs-upload-sandbox
        with:
          bucket-prefix: "nightly/"
          version: ${{ needs.check-changes.outputs.version }}

  upload-production:
    needs: [check-changes, package-linux, package-darwin-amd64, package-darwin-arm64, package-windows]
    if: needs.check-changes.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Upload to production GCS bucket
        uses: ./.github/actions/gcs-upload-production
        with:
          bucket-prefix: "nightly/"
          version: ${{ needs.check-changes.outputs.version }}