name: Format Check

on:
  pull_request:
    branches: [main]
  merge_group:

permissions:
  contents: read

jobs:
  fmt-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.5.2

      - name: Install dependencies
        run: deno install --frozen

      - name: Run format check
        run: deno task fmt:check
