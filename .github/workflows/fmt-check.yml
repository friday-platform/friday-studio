name: Format Check

on:
  pull_request:
    branches: [main]
  merge_group:

permissions:
  contents: read

jobs:
  fmt-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.5.4

      - name: Install dependencies
        run: deno install --frozen

      - name: Run format check
        run: deno task fmt:check

      - name: Check for trailing whitespace
        run: |
          # Find files with trailing whitespace (excluding binary files and certain paths)
          if git grep -I -n '[[:space:]]$' -- \
            ':!*.lock' \
            ':!*.svg' \
            ':!*.ico' \
            ':!*.png' \
            ':!*.jpg' \
            ':!*.woff*' \
            ':!*.ttf' \
            ':!*.snap' \
            ':!node_modules' \
            ':!dist' \
            ':!.git'; then
            echo "Error: Found trailing whitespace in the files above"
            exit 1
          fi
