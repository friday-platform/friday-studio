name: "atlas-operator: Test Docker Build"

on:
  pull_request:
    paths:
      - "apps/atlas-operator/**"
      - "go.mod"
      - "go.sum"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  REPOSITORY: atlas-operator

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        run: |
          docker build \
            --tag "$REPOSITORY:test" \
            -f apps/atlas-operator/Dockerfile \
            .

      - name: Test Docker image
        run: |
          # Just verify the binary exists and is executable
          docker run --rm --entrypoint=/bin/sh "$REPOSITORY:test" -c "test -x /atlas-manager && echo 'Binary is executable'"
