name: probe-windows-sha
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: windows-latest
    steps:
      - name: Probe sha256 tooling
        shell: bash
        run: |
          set -uo pipefail
          echo "## which"
          for c in shasum sha256sum openssl certutil; do
            if command -v "$c" >/dev/null; then
              echo "FOUND: $c -> $(command -v "$c")"
            else
              echo "MISSING: $c"
            fi
          done
          echo
          echo "## openssl version"
          openssl version || true
          echo
          echo "## hash a sample file with openssl dgst -sha256 -r"
          printf 'hello world' > sample.txt
          openssl dgst -sha256 -r sample.txt
          echo "expected first field: b94d27b9934d3e08a52e52d7da7dabfac484efe37a5380ee9088f7ace2efcde9"
          echo
          echo "## end-to-end: pipe through awk like the workflow does"
          SHA=$(openssl dgst -sha256 -r sample.txt | awk '{print $1}')
          echo "SHA=$SHA"
          test "$SHA" = "b94d27b9934d3e08a52e52d7da7dabfac484efe37a5380ee9088f7ace2efcde9" && echo OK || { echo MISMATCH; exit 1; }
