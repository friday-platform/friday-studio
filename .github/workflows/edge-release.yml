name: Edge Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate edge version
        id: version
        run: |
          git_sha=$(git rev-parse --short HEAD)
          version="edge-${git_sha}"
          echo "version=${version}" >> $GITHUB_OUTPUT
          echo "Edge version: ${version}"

  build:
    needs: check-changes
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            arch: amd64
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-latest
            os: linux
            arch: arm64
            target: aarch64-unknown-linux-gnu
          - runner: macos-latest
            os: darwin
            arch: amd64
            target: x86_64-apple-darwin
          - runner: macos-15-xlarge
            os: darwin
            arch: arm64
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.3.3

      - name: Install dependencies
        run: deno install

      - name: Setup cross-compilation for ARM64 (Linux only)
        if: matrix.os == 'linux' && matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CC=aarch64-linux-gnu-gcc" >> $GITHUB_ENV


      - name: Prepare version information
        shell: bash
        run: |
          # Get version and git information
          VERSION="${{ needs.check-changes.outputs.version }}"
          GIT_SHA=$(git rev-parse --short HEAD)
          
          echo "Building version: $VERSION"
          echo "Git SHA: $GIT_SHA"
          
          # Replace version placeholders with cross-platform sed syntax
          if [[ "$OSTYPE" == "darwin"* ]]; then
            # macOS sed requires backup extension (empty string for no backup)
            sed -i "" "s|__ATLAS_VERSION__|$VERSION|g" src/utils/version.ts
            sed -i "" "s|__ATLAS_GIT_SHA__|$GIT_SHA|g" src/utils/version.ts
          else
            # Linux/Windows with bash sed syntax
            sed -i "s|__ATLAS_VERSION__|$VERSION|g" src/utils/version.ts
            sed -i "s|__ATLAS_GIT_SHA__|$GIT_SHA|g" src/utils/version.ts
          fi
          
          echo "Version information embedded in source"
          echo "Verification:"
          head -10 src/utils/version.ts

      - name: Build binary
        run: |
          mkdir -p ./dist
          
          # Set binary name based on platform
          if [ "${{ matrix.os }}" == "windows" ]; then
            binary_name="atlas.exe"
          else
            binary_name="atlas"
          fi
          
          # Compile with Deno - use nightly workflow pattern
          echo "Target: ${{ matrix.target }}"
          echo "Platform: ${{ matrix.os }}"
          echo "Arch: ${{ matrix.arch }}"
          echo "System arch: $(uname -m)"
          
          # Native compilation for ARM64 macOS (using macos-15-xlarge), cross-compilation for others
          if [ "${{ matrix.os }}" == "darwin" ] && [ "${{ matrix.arch }}" == "arm64" ]; then
            echo "ARM64 macOS compilation on macOS 15"
            
            # Set memory limits for large compilation only (not embedded in binary)
            export DENO_V8_FLAGS="--max-old-space-size=8192"
            
            # Compile WITHOUT embedded V8 flags that restrict runtime memory
            deno compile \
              --no-check \
              --allow-read \
              --allow-write \
              --allow-net \
              --allow-env \
              --allow-run \
              --allow-sys \
              --allow-ffi \
              --unstable-broadcast-channel \
              --unstable-worker-options \
              --unstable-otel \
              --include=src \
              --include=examples \
              --output "./dist/${binary_name}" \
              ./src/cli.tsx
          else
            echo "Cross-compiling for target: ${{ matrix.target }}"
            
            # Set memory limits for large compilation
            export DENO_V8_FLAGS="--max-old-space-size=8192"
            
            deno compile \
              --no-check \
              --allow-read \
              --allow-write \
              --allow-net \
              --allow-env \
              --allow-run \
              --allow-sys \
              --allow-ffi \
              --unstable-broadcast-channel \
              --unstable-worker-options \
              --unstable-otel \
              --include=src \
              --include=examples \
              --target ${{ matrix.target }} \
              --v8-flags="--max-old-space-size=4096,--max-semi-space-size=128" \
              --output "./dist/${binary_name}" \
              ./src/cli.tsx
          fi
        shell: bash

      - name: Sign and notarize macOS binary
        if: matrix.os == 'darwin'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          # Create keychain
          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" build.keychain
          
          # Import certificate
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_KEYCHAIN_PASSWORD" build.keychain
          
          # Create entitlements
          cat > entitlements.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.cs.allow-jit</key>
            <true/>
            <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
            <true/>
            <key>com.apple.security.cs.disable-executable-page-protection</key>
            <true/>
          </dict>
          </plist>
          EOF
          
          binary_name="atlas"
          
          # Sign binary
          codesign --force --options runtime --entitlements entitlements.plist --sign "$APPLE_DEVELOPER_ID" --timestamp "dist/${binary_name}"
          
          # Create zip for notarization
          zip atlas-temp.zip "dist/${binary_name}"
          
          # Notarize
          xcrun notarytool submit atlas-temp.zip \
            --apple-id "$APPLE_DEVELOPER_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          
          # Staple notarization
          xcrun stapler staple "dist/${binary_name}"
          
          # Verify
          codesign --verify --verbose "dist/${binary_name}"
          spctl --assess --verbose "dist/${binary_name}"

      - name: Test binary immediately after compilation
        run: |
          binary_name="atlas"
          if [ "${{ matrix.os }}" == "windows" ]; then
            binary_name="atlas.exe"
          fi
          
          echo "=== TESTING BINARY AFTER COMPILATION ==="
          ls -la "./dist/${binary_name}"
          file "./dist/${binary_name}"
          
          # Only test execution if we're not cross-compiling
          echo "Target: ${{ matrix.target }}"
          echo "System arch: $(uname -m)"
          
          # Check if this is cross-compilation
          SYSTEM_ARCH=$(uname -m)
          if ([ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ] && [ "$SYSTEM_ARCH" != "aarch64" ]) || \
             ([ "${{ matrix.target }}" == "x86_64-unknown-linux-gnu" ] && [ "$SYSTEM_ARCH" != "x86_64" ]) || \
             ([ "${{ matrix.target }}" == "aarch64-apple-darwin" ] && [ "$SYSTEM_ARCH" != "arm64" ]) || \
             ([ "${{ matrix.target }}" == "x86_64-apple-darwin" ] && [ "$SYSTEM_ARCH" != "x86_64" ]) || \
             [ "${{ matrix.os }}" == "windows" ]; then
            echo "🔄 Skipping execution test (cross-compilation or Windows)"
            echo "✅ Binary compiled successfully"
          else
            # Test basic execution for native compilation
            echo "🧪 Testing binary execution (native compilation)..."
            if "./dist/${binary_name}" --help >/dev/null 2>&1; then
              echo "✅ Binary works after compilation"
            else
              echo "❌ Binary FAILS after compilation"
              exit 1
            fi
          fi
        shell: bash

      - name: Create archive
        run: |
          mkdir -p ./dist
          
          # Set file extensions
          if [ "${{ matrix.os }}" == "windows" ]; then
            binary_name="atlas.exe"
            archive_ext=".zip"
          else
            binary_name="atlas"
            archive_ext=".tar.gz"
          fi
          
          # Create archive name
          archive_name="atlas_${{ needs.check-changes.outputs.version }}_${{ matrix.os }}_${{ matrix.arch }}${archive_ext}"
          
          # Create archive
          if [ "${{ matrix.os }}" == "windows" ]; then
            7z a "./dist/${archive_name}" "./dist/${binary_name}" README.md
          else
            tar -czf "./dist/${archive_name}" -C ./dist "${binary_name}" -C .. README.md
          fi
          
          # Generate checksum
          if [ "${{ matrix.os }}" == "darwin" ]; then
            shasum -a 256 "./dist/${archive_name}" > "./dist/${archive_name}.sha256"
          else
            sha256sum "./dist/${archive_name}" > "./dist/${archive_name}.sha256"
          fi
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: atlas-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            ./dist/atlas_*.tar.gz
            ./dist/atlas_*.zip
            ./dist/atlas_*.sha256
          retention-days: 1

  release:
    needs: [check-changes, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-changes.outputs.version }}"
          
          # Create release with only existing files
          release_files=""
          if ls atlas_*.tar.gz 1> /dev/null 2>&1; then
            release_files="$release_files atlas_*.tar.gz"
          fi
          if ls atlas_*.zip 1> /dev/null 2>&1; then
            release_files="$release_files atlas_*.zip"
          fi
          
          gh release create "$VERSION" \
            --title "Atlas Edge $VERSION" \
            --notes "Edge release - bleeding edge build from commit $(git rev-parse --short HEAD)

          ⚠️ **Warning**: This is an edge release built from the latest commit. Use with caution.
          
          **Installation via Homebrew:**
          \`\`\`bash
          HOMEBREW_GITHUB_API_TOKEN=\$(gh auth token) brew install tempest-atlas-edge
          \`\`\`
          
          **Direct download:** Download the appropriate binary for your platform below.
          
          **Changes:** See commit history for latest changes.
          " \
            --prerelease \
            $release_files

      - name: Update Homebrew tap
        env:
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ needs.check-changes.outputs.version }}"
          
          # Trigger homebrew tap update for edge channel via repository dispatch
          curl -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/tempestteam/homebrew-tap/dispatches" \
            -d "{\"event_type\":\"atlas-release\",\"client_payload\":{\"tag\":\"$VERSION\",\"channel\":\"edge\"}}"