          fi
          if ls atlas_*.zip 1> /dev/null 2>&1; then
            gsutil -m cp atlas_*.zip gs://tempest-production-atlas-binaries/edge/
          fi
          if ls atlas_*.pkg 1> /dev/null 2>&1; then
            gsutil -m cp atlas_*.pkg gs://tempest-production-atlas-binaries/edge/
          fi
          if ls atlas_*.msi 1> /dev/null 2>&1; then
            gsutil -m cp atlas_*.msi gs://tempest-production-atlas-binaries/edge/
          fi
          gsutil -m cp checksums.txt gs://tempest-production-atlas-binaries/edge/checksums-${VERSION}.txt

