                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
                      line-height: 1.6;
                      margin: 30px;
                      background: #ffffff;
                      color: #1d1d1f;
                  }
                  h1 { 
                      color: #1d1d1f; 
                      border-bottom: 3px solid #007AFF; 
                      padding-bottom: 15px; 
                      font-size: 28px;
                      font-weight: 600;
                  }
                  h2 { 
                      color: #1d1d1f; 
                      margin-top: 40px; 
                      font-size: 20px;
                      font-weight: 600;
                  }
                  h3 {
                      color: #424245;
                      margin-top: 25px;
                      font-size: 16px;
                      font-weight: 600;
                  }
                  p { 
                      margin: 20px 0; 
                      text-align: justify;
                  }
                  ul { 
                      margin: 20px 0; 
                      padding-left: 40px; 
                  }
                  li { 
                      margin: 12px 0; 
                  }
                  .important { 
                      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
                      padding: 25px; 
                      border-left: 6px solid #007AFF; 
                      margin: 30px 0;
                      border-radius: 8px;
                      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
                  }
                  .section { 
                      margin: 40px 0; 
                      padding: 20px 0;
                  }
                  .highlight {
                      background-color: #fff3cd;
                      padding: 15px;
                      border-radius: 6px;
                      margin: 20px 0;
                      border-left: 4px solid #ffc107;
                  }
                  .legal-notice {
                      background-color: #f8d7da;
                      padding: 20px;
                      border-radius: 6px;
                      margin: 25px 0;
                      border-left: 4px solid #dc3545;
                  }
                  table {
                      width: 100%;
                      border-collapse: collapse;
                      margin: 20px 0;
                  }
                  th, td {
                      border: 1px solid #dee2e6;
                      padding: 12px;
                      text-align: left;
                  }
                  th {
                      background-color: #f8f9fa;
                      font-weight: 600;
