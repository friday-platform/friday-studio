          # Also cleanup old checksums
          gsutil ls gs://tempest-production-atlas-binaries/edge/checksums-edge-*.txt | \
            sort -r | \
            tail -n +8 | \
            head -10 | \
            xargs -r gsutil -m rm || echo "No old edge checksums to clean"

          echo "Production edge cleanup completed"
