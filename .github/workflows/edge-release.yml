name: Edge Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate edge version
        id: version
        run: |
          # Generate edge version: edge-YYYYMMDD-HHMMSS-gitsha for proper version sorting
          date_part=$(date -u +%Y%m%d)
          time_part=$(date -u +%H%M%S)
          git_sha=$(git rev-parse --short HEAD)
          version="edge-${date_part}-${time_part}-${git_sha}"
          echo "version=${version}" >> $GITHUB_OUTPUT
          echo "Edge version: ${version}"

  build:
    needs: check-changes
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            arch: amd64
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-latest
            os: linux
            arch: arm64
            target: aarch64-unknown-linux-gnu
          - runner: macos-latest
            os: darwin
            arch: amd64
            target: x86_64-apple-darwin
          - runner: macos-14-xlarge
            os: darwin
            arch: arm64
            target: aarch64-apple-darwin
          - runner: windows-latest
            os: windows
            arch: amd64
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.3.3

      - name: Install dependencies
        run: deno install

      - name: Setup cross-compilation for ARM64 (Linux only)
        if: matrix.os == 'linux' && matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CC=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Prepare version information
        shell: bash
        run: |
          # Get version and git information
          VERSION="${{ needs.check-changes.outputs.version }}"
          GIT_SHA=$(git rev-parse --short HEAD)

          echo "Building version: $VERSION"
          echo "Git SHA: $GIT_SHA"

          # Replace version placeholders with cross-platform sed syntax
          if [[ "$OSTYPE" == "darwin"* ]]; then
            # macOS sed requires backup extension (empty string for no backup)
            sed -i "" "s|__ATLAS_VERSION__|$VERSION|g" src/utils/version.ts
            sed -i "" "s|__ATLAS_GIT_SHA__|$GIT_SHA|g" src/utils/version.ts
          else
            # Linux/Windows with bash sed syntax
            sed -i "s|__ATLAS_VERSION__|$VERSION|g" src/utils/version.ts
            sed -i "s|__ATLAS_GIT_SHA__|$GIT_SHA|g" src/utils/version.ts
          fi

          echo "Version information embedded in source"
          echo "Verification:"
          head -10 src/utils/version.ts

      - name: Build binary
        run: |
          mkdir -p ./dist

          # Set binary name based on platform
          if [ "${{ matrix.os }}" == "windows" ]; then
            binary_name="atlas.exe"
          else
            binary_name="atlas"
          fi

          # Compile with Deno - use nightly workflow pattern
          echo "Target: ${{ matrix.target }}"
          echo "Platform: ${{ matrix.os }}"
          echo "Arch: ${{ matrix.arch }}"
          echo "System arch: $(uname -m)"

          # Native compilation for ARM64 macOS (using macos-15-xlarge), cross-compilation for others
          if [ "${{ matrix.os }}" == "darwin" ] && [ "${{ matrix.arch }}" == "arm64" ]; then
            echo "ARM64 macOS compilation on macOS 15"

            # Set memory limits for large compilation only (not embedded in binary)
            export DENO_V8_FLAGS="--max-old-space-size=8192"

            # Compile WITHOUT embedded V8 flags that restrict runtime memory
            deno compile \
              --no-check \
              --allow-read \
              --allow-write \
              --allow-net \
              --allow-env \
              --allow-run \
              --allow-sys \
              --allow-ffi \
              --unstable-broadcast-channel \
              --unstable-worker-options \
              --unstable-otel \
              --include=src \
              --include=examples \
              --output "./dist/${binary_name}" \
              ./src/cli.tsx
          else
            echo "Cross-compiling for target: ${{ matrix.target }}"

            # Set memory limits for large compilation
            export DENO_V8_FLAGS="--max-old-space-size=8192"

            deno compile \
              --no-check \
              --allow-read \
              --allow-write \
              --allow-net \
              --allow-env \
              --allow-run \
              --allow-sys \
              --allow-ffi \
              --unstable-broadcast-channel \
              --unstable-worker-options \
              --unstable-otel \
              --include=src \
              --include=examples \
              --target ${{ matrix.target }} \
              --v8-flags="--max-old-space-size=4096,--max-semi-space-size=128" \
              --output "./dist/${binary_name}" \
              ./src/cli.tsx
          fi
        shell: bash

      - name: Sign macOS binary (if certificates available)
        if: matrix.os == 'darwin' && env.MACOS_SIGN_P12 != ''
        env:
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          # Import certificate
          echo "$MACOS_SIGN_P12" | base64 --decode > certificate.p12
          security create-keychain -p mypassword build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p mypassword build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_SIGN_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k mypassword build.keychain

          # Auto-detect signing identity if not provided
          if [ -z "$MACOS_SIGN_IDENTITY" ]; then
            SIGN_IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1 | grep -o '"[^"]*"' | tr -d '"')
            if [ -z "$SIGN_IDENTITY" ]; then
              echo "No Developer ID Application certificate found, trying any valid identity"
              SIGN_IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep "1)" | head -1 | grep -o '"[^"]*"' | tr -d '"')
            fi
            echo "Auto-detected signing identity: $SIGN_IDENTITY"
          else
            SIGN_IDENTITY="$MACOS_SIGN_IDENTITY"
            echo "Using provided signing identity: $SIGN_IDENTITY"
          fi

          # Create entitlements for hardened runtime to allow V8 memory allocation
          echo '<?xml version="1.0" encoding="UTF-8"?>' > entitlements.plist
          echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' >> entitlements.plist
          echo '<plist version="1.0">' >> entitlements.plist
          echo '<dict>' >> entitlements.plist
          echo '  <key>com.apple.security.cs.allow-jit</key>' >> entitlements.plist
          echo '  <true/>' >> entitlements.plist
          echo '  <key>com.apple.security.cs.allow-unsigned-executable-memory</key>' >> entitlements.plist
          echo '  <true/>' >> entitlements.plist
          echo '  <key>com.apple.security.cs.disable-executable-page-protection</key>' >> entitlements.plist
          echo '  <true/>' >> entitlements.plist
          echo '</dict>' >> entitlements.plist
          echo '</plist>' >> entitlements.plist

          # Sign binary with entitlements for V8 memory allocation
          codesign --force --options runtime --entitlements entitlements.plist --deep --sign "$SIGN_IDENTITY" ./dist/atlas

          # Notarize if credentials available
          if [ -n "${{ secrets.MACOS_NOTARY_ISSUER_ID }}" ]; then
            # Create private key file from base64 encoded secret
            echo "${{ secrets.MACOS_NOTARY_KEY }}" | base64 --decode > notary_key.p8

            # Debug: check key file format
            echo "Private key file size: $(wc -c < notary_key.p8)"
            echo "Private key starts with: $(head -c 50 notary_key.p8)"

            # Create a zip file for notarization (required by Apple)
            zip atlas-binary.zip ./dist/atlas

            # Try notarization with better error handling
            if xcrun notarytool submit atlas-binary.zip \
              --issuer "${{ secrets.MACOS_NOTARY_ISSUER_ID }}" \
              --key-id "${{ secrets.MACOS_NOTARY_KEY_ID }}" \
              --key notary_key.p8 \
              --wait; then
              echo "Notarization successful"
            else
              echo "Notarization failed, but continuing build"
              # Don't fail the build for notarization issues
            fi

            # Clean up files
            rm -f notary_key.p8 atlas-binary.zip
          fi

      - name: Test binary after signing (macOS only)
        if: matrix.os == 'darwin'
        run: |
          echo "=== TESTING BINARY AFTER SIGNING ==="
          ls -la "./dist/atlas"
          file "./dist/atlas"

          # Check if signed
          codesign -dv "./dist/atlas" || echo "Binary not signed"

          # Test basic execution
          echo "Testing binary execution after signing..."
          if "./dist/atlas" --help >/dev/null 2>&1; then
            echo "✅ Binary works after signing"
          else
            echo "❌ Binary FAILS after signing"
            exit 1
          fi
        shell: bash

      - name: Test binary immediately after compilation
        run: |
          binary_name="atlas"
          if [ "${{ matrix.os }}" == "windows" ]; then
            binary_name="atlas.exe"
          fi

          echo "=== TESTING BINARY AFTER COMPILATION ==="
          ls -la "./dist/${binary_name}"
          file "./dist/${binary_name}"

          # Only test execution if we're not cross-compiling
          echo "Target: ${{ matrix.target }}"
          echo "System arch: $(uname -m)"

          # Check if this is cross-compilation
          SYSTEM_ARCH=$(uname -m)
          if ([ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ] && [ "$SYSTEM_ARCH" != "aarch64" ]) || \
             ([ "${{ matrix.target }}" == "x86_64-unknown-linux-gnu" ] && [ "$SYSTEM_ARCH" != "x86_64" ]) || \
             ([ "${{ matrix.target }}" == "aarch64-apple-darwin" ] && [ "$SYSTEM_ARCH" != "arm64" ]) || \
             ([ "${{ matrix.target }}" == "x86_64-apple-darwin" ] && [ "$SYSTEM_ARCH" != "x86_64" ]) || \
             [ "${{ matrix.os }}" == "windows" ]; then
            echo "🔄 Skipping execution test (cross-compilation or Windows)"
            echo "✅ Binary compiled successfully"
          else
            # Test basic execution for native compilation
            echo "🧪 Testing binary execution (native compilation)..."
            if "./dist/${binary_name}" --help >/dev/null 2>&1; then
              echo "✅ Binary works after compilation"
            else
              echo "❌ Binary FAILS after compilation"
              exit 1
            fi
          fi
        shell: bash

      - name: Create archive
        run: |
          mkdir -p ./dist

          # Set file extensions
          if [ "${{ matrix.os }}" == "windows" ]; then
            binary_name="atlas.exe"
            archive_ext=".zip"
          else
            binary_name="atlas"
            archive_ext=".tar.gz"
          fi

          # Create archive name
          archive_name="atlas_${{ needs.check-changes.outputs.version }}_${{ matrix.os }}_${{ matrix.arch }}${archive_ext}"

          # Create archive
          if [ "${{ matrix.os }}" == "windows" ]; then
            7z a "./dist/${archive_name}" "./dist/${binary_name}" README.md
          else
            tar -czf "./dist/${archive_name}" -C ./dist "${binary_name}" -C .. README.md
          fi

          # Generate checksum
          if [ "${{ matrix.os }}" == "darwin" ]; then
            shasum -a 256 "./dist/${archive_name}" > "./dist/${archive_name}.sha256"
          else
            sha256sum "./dist/${archive_name}" > "./dist/${archive_name}.sha256"
          fi
        shell: bash

      - name: Create macOS pkg installer
        if: matrix.os == 'darwin'
        run: |
          pkg_name="atlas_${{ needs.check-changes.outputs.version }}_${{ matrix.os }}_${{ matrix.arch }}.pkg"

          # Create package directory structure
          mkdir -p ./pkg/payload/usr/local/bin
          mkdir -p ./pkg/scripts

          # Copy binary to package payload
          cp "./dist/atlas" "./pkg/payload/usr/local/bin/atlas"
          chmod +x "./pkg/payload/usr/local/bin/atlas"

          # Create preinstall script to handle cross-channel upgrades
          cat > ./pkg/scripts/preinstall << 'EOF'
          #!/bin/bash
          # Remove any existing atlas binary to ensure clean installation
          # This allows cross-channel upgrades (edge -> nightly -> regular, etc.)
          if [ -f "/usr/local/bin/atlas" ]; then
            echo "Removing existing Atlas installation for upgrade..."
            rm -f "/usr/local/bin/atlas"
          fi

          # Also clean up any previous package receipts to allow downgrades/cross-channel installs
          if pkgutil --pkgs | grep -q "com.tempestdx.atlas"; then
            echo "Cleaning up previous Atlas package receipts..."
            pkgutil --forget "com.tempestdx.atlas" 2>/dev/null || true
          fi

          exit 0
          EOF

          # Create postinstall script to add to PATH and verify installation
          cat > ./pkg/scripts/postinstall << 'EOF'
          #!/bin/bash
          # Verify installation
          if [ ! -f "/usr/local/bin/atlas" ]; then
            echo "ERROR: Atlas binary not found after installation"
            exit 1
          fi

          # Make sure binary is executable
          chmod +x "/usr/local/bin/atlas"

          # Add /usr/local/bin to PATH if not already present
          # We check all common shell config files for all users
          for user_home in /Users/*; do
            if [ -d "$user_home" ] && [ "$user_home" != "/Users/Shared" ]; then
              user_name=$(basename "$user_home")

              # Skip system users
              if [[ "$user_name" =~ ^[._] ]]; then
                continue
              fi

              # For bash users
              for bash_config in "$user_home/.bash_profile" "$user_home/.bashrc"; do
                if [ -f "$bash_config" ] && ! grep -q "/usr/local/bin" "$bash_config" 2>/dev/null; then
                  echo 'export PATH="/usr/local/bin:$PATH"' >> "$bash_config"
                  chown "$user_name" "$bash_config" 2>/dev/null || true
                fi
              done

              # For zsh users
              if [ -f "$user_home/.zshrc" ] && ! grep -q "/usr/local/bin" "$user_home/.zshrc" 2>/dev/null; then
                echo 'export PATH="/usr/local/bin:$PATH"' >> "$user_home/.zshrc"
                chown "$user_name" "$user_home/.zshrc" 2>/dev/null || true
              fi

              # For fish users
              if [ -d "$user_home/.config/fish" ]; then
                fish_config_dir="$user_home/.config/fish/conf.d"
                mkdir -p "$fish_config_dir"
                if [ ! -f "$fish_config_dir/atlas.fish" ]; then
                  echo 'set -gx PATH /usr/local/bin $PATH' > "$fish_config_dir/atlas.fish"
                  chown -R "$user_name" "$user_home/.config/fish" 2>/dev/null || true
                fi
              fi
            fi
          done

          # Get the installed version for display
          version_output=$(/usr/local/bin/atlas --version 2>/dev/null || echo "unknown")

          echo "✅ Atlas has been successfully installed to /usr/local/bin/atlas"
          echo "📍 Version: $version_output"
          echo "🔄 You may need to restart your terminal to use the 'atlas' command"
          echo "🧪 Test installation: Open Terminal and run 'atlas --help'"

          exit 0
          EOF

          chmod +x ./pkg/scripts/preinstall
          chmod +x ./pkg/scripts/postinstall

          # Generate a timestamp-based version for macOS installer
          # This ensures newer packages can always upgrade older ones regardless of channel
          timestamp=$(date +%Y%m%d%H%M%S)
          installer_version="1.${timestamp}"

          # Build the package with timestamp-based version for proper upgrade handling
          # First create main component package
          pkgbuild \
            --root ./pkg/payload \
            --scripts ./pkg/scripts \
            --identifier "com.tempestdx.atlas" \
            --version "$installer_version" \
            --install-location "/" \
            "./dist/atlas-component.pkg"

          # Create empty docs package (optional choice to force customization screen)
          mkdir -p ./pkg/docs-payload
          pkgbuild \
            --root ./pkg/docs-payload \
            --identifier "com.tempestdx.atlas.docs" \
            --version "$installer_version" \
            --install-location "/" \
            "./dist/atlas-docs.pkg"

          # Create distribution definition file (following Apple's official documentation)
          # Set version for XML template
          echo "=== DEBUG: Setting version variables ==="
          EDGE_VERSION="${{ needs.check-changes.outputs.version }}"
          echo "EDGE_VERSION: $EDGE_VERSION"
          # Strip 'edge-' prefix for clean title display
          EDGE_VERSION_CLEAN="${EDGE_VERSION#edge-}"
          echo "EDGE_VERSION_CLEAN: $EDGE_VERSION_CLEAN"
          echo "installer_version: $installer_version"
          echo "=== DEBUG: Creating distribution.dist file ==="
          cat > ./dist/distribution.dist << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <installer-gui-script minSpecVersion="1">
              <title>Tempest ATLAS (edge: ${EDGE_VERSION_CLEAN})</title>
              <welcome file="welcome.html"/>
              <license file="license.html"/>
              <options customize="allow" require-scripts="false" rootVolumeOnly="true" hostArchitectures="arm64,x86_64"/>
              <domains enable_anywhere="false" enable_currentUserHome="false" enable_localSystem="true"/>
              <installation-check script="pm_install_check();"/>
              <script>
          function pm_install_check() {
              if(!(system.compareVersions(system.version.ProductVersion, '10.9') >= 0)) {
                  my.result.title = 'Failure';
                  my.result.message = 'This software requires macOS 10.9 or later.';
                  my.result.type = 'Fatal';
                  return false;
              }
              return true;
          }
              </script>
              <choices-outline>
                  <line choice="com.tempestdx.atlas"/>
                  <line choice="com.tempestdx.atlas.docs"/>
              </choices-outline>
              <choice id="com.tempestdx.atlas" title="Tempest ATLAS CLI" description="Core Atlas command-line tool (Required)" start_selected="true" start_enabled="true" start_visible="true">
                  <pkg-ref id="com.tempestdx.atlas"/>
              </choice>
              <choice id="com.tempestdx.atlas.docs" title="Documentation" description="Install example configurations and documentation (Optional)" start_selected="false" start_enabled="true" start_visible="true">
                  <pkg-ref id="com.tempestdx.atlas.docs"/>
              </choice>
              <pkg-ref id="com.tempestdx.atlas" version="$installer_version" onConclusion="none">atlas-component.pkg</pkg-ref>
              <pkg-ref id="com.tempestdx.atlas.docs" version="$installer_version" onConclusion="none">atlas-docs.pkg</pkg-ref>
          </installer-gui-script>
          EOF

          echo "=== DEBUG: Distribution file created successfully ==="
          echo "Contents of distribution.dist:"
          cat ./dist/distribution.dist
          echo "=== DEBUG: Creating welcome and license files ==="

          # Create welcome HTML file (as required by Apple docs)
          echo "=== DEBUG: Creating welcome.html file ==="
          cat > ./dist/welcome.html << 'WELCOME_EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="utf-8">
              <title>Welcome</title>
          </head>
          <body>
              <h1>Welcome to Tempest ATLAS Installation</h1>
              <p>This installer will install the Tempest ATLAS CLI tool on your system.</p>
              <p>Before proceeding, please read and accept the license agreement.</p>
          </body>
          </html>
          WELCOME_EOF
          echo "=== DEBUG: Welcome file created successfully ==="

          # Create license HTML file (as required by Apple docs)
          echo "=== DEBUG: Creating license.html file ==="
          cat > ./dist/license.html << 'LICENSE_EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="utf-8">
              <title>Tempest ATLAS Software License Agreement</title>
              <style>
