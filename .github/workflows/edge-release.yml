name: Edge Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate version
        id: version
        run: |
          # Generate edge version: edge-YYYYMMDD-HHMMSS-gitsha
          date_part=$(date -u +%Y%m%d)
          time_part=$(date -u +%H%M%S)
          git_sha=$(git rev-parse --short HEAD)
          version="edge-${date_part}-${time_part}-${git_sha}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Version: ${version}"

  # ==================== BUILD JOBS ====================
  build-binary-linux:
    needs: version
    uses: ./.github/workflows/build-component.yml
    with:
      component: binary
      version: ${{ needs.version.outputs.version }}
      platform: linux
      arch: amd64
      runner: ubuntu-latest-8-cores
      retention-days: 1
    secrets: inherit

  build-binary-darwin-amd64:
    needs: version
    uses: ./.github/workflows/build-component.yml
    with:
      component: binary
      version: ${{ needs.version.outputs.version }}
      platform: darwin
      arch: amd64
      runner: macos-latest
      retention-days: 1
    secrets: inherit

  build-binary-darwin-arm64:
    needs: version
    uses: ./.github/workflows/build-component.yml
    with:
      component: binary
      version: ${{ needs.version.outputs.version }}
      platform: darwin
      arch: arm64
      runner: macos-15-xlarge
      retention-days: 1
    secrets: inherit

  build-binary-windows:
    needs: version
    uses: ./.github/workflows/build-component.yml
    with:
      component: binary
      version: ${{ needs.version.outputs.version }}
      platform: windows
      arch: amd64
      runner: windows-latest-8-cores
      retention-days: 1
    secrets: inherit

  build-diagnostics-linux:
    needs: version
    uses: ./.github/workflows/build-component.yml
    with:
      component: diagnostics
      version: ${{ needs.version.outputs.version }}
      platform: linux
      arch: amd64
      runner: ubuntu-latest-8-cores
      retention-days: 1
    secrets: inherit

  build-diagnostics-darwin-amd64:
    needs: version
    uses: ./.github/workflows/build-component.yml
    with:
      component: diagnostics
      version: ${{ needs.version.outputs.version }}
      platform: darwin
      arch: amd64
      runner: macos-latest
      retention-days: 1
    secrets: inherit

  build-diagnostics-darwin-arm64:
    needs: version
    uses: ./.github/workflows/build-component.yml
    with:
      component: diagnostics
      version: ${{ needs.version.outputs.version }}
      platform: darwin
      arch: arm64
      runner: macos-15-xlarge
      retention-days: 1
    secrets: inherit

  build-diagnostics-windows:
    needs: version
    uses: ./.github/workflows/build-component.yml
    with:
      component: diagnostics
      version: ${{ needs.version.outputs.version }}
      platform: windows
      arch: amd64
      runner: windows-latest-8-cores
      retention-days: 1
    secrets: inherit

  build-web-app-darwin-amd64:
    needs: version
    uses: ./.github/workflows/build-component.yml
    with:
      component: web-app
      version: ${{ needs.version.outputs.version }}
      platform: darwin
      arch: amd64
      runner: macos-latest
      retention-days: 1
    secrets: inherit

  build-web-app-darwin-arm64:
    needs: version
    uses: ./.github/workflows/build-component.yml
    with:
      component: web-app
      version: ${{ needs.version.outputs.version }}
      platform: darwin
      arch: arm64
      runner: macos-15-xlarge
      retention-days: 1
    secrets: inherit

  build-web-app-windows:
    needs: version
    uses: ./.github/workflows/build-component.yml
    with:
      component: web-app
      version: ${{ needs.version.outputs.version }}
      platform: windows
      arch: amd64
      runner: windows-latest-8-cores
      retention-days: 1
    secrets: inherit

  # ==================== PACKAGING JOBS ====================
  package-linux:
    needs: [version, build-binary-linux, build-diagnostics-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: ./artifacts/

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: rpm debhelper devscripts
          version: 1.0

      - name: Build Linux packages
        run: |

          # Build AMD64 packages
          mkdir -p build
          cp ./artifacts/binary-linux-amd64/atlas build/atlas
          cp ./artifacts/diagnostics-linux-amd64/atlas-diagnostics build/atlas-diagnostics
          chmod +x build/atlas
          chmod +x build/atlas-diagnostics

          ARCH="amd64" VERSION="${{ needs.version.outputs.version }}" ./scripts/build-deb.sh
          ARCH="amd64" VERSION="${{ needs.version.outputs.version }}" ./scripts/build-rpm.sh
        shell: bash

      - name: Create platform bundle
        run: |
          mkdir -p dist
          cp ./artifacts/binary-linux-amd64/atlas dist/atlas
          cp ./artifacts/diagnostics-linux-amd64/atlas-diagnostics dist/atlas-diagnostics
          ./scripts/create-platform-bundle.sh "${{ needs.version.outputs.version }}" "linux" "amd64"
        shell: bash

      - name: Upload final artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            ./dist/atlas_*.deb
            ./dist/atlas-*.rpm
            ./dist/atlas-bundle-*.tar.gz
            ./artifacts/binary-linux-amd64/atlas_*.tar.gz
            ./artifacts/binary-linux-amd64/atlas_*.sha256
          retention-days: 1

  package-darwin-amd64:
    needs: [version, build-binary-darwin-amd64, build-diagnostics-darwin-amd64, build-web-app-darwin-amd64]
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: ./artifacts/

      - name: Prepare macOS AMD64 files
        run: |
          mkdir -p dist
          cp ./artifacts/binary-darwin-amd64/atlas dist/atlas
          cp ./artifacts/diagnostics-darwin-amd64/atlas-diagnostics dist/atlas-diagnostics
          # Find and copy the actual .app directory
          if ls ./artifacts/web-app-darwin-amd64/*.app 1>/dev/null 2>&1; then
            cp -r ./artifacts/web-app-darwin-amd64/*.app "dist/Atlas Web Client.app"
            # Fix executable permissions on Tauri binary inside the app
            chmod +x "dist/Atlas Web Client.app/Contents/MacOS/tauri-app"
          fi
        shell: bash

      - name: Sign atlas binary
        uses: ./.github/actions/macos-sign
        with:
          binary-path: ./dist/atlas
          macos-sign-p12: ${{ secrets.MACOS_SIGN_P12 }}
          macos-sign-password: ${{ secrets.MACOS_SIGN_PASSWORD }}
          macos-sign-identity: ${{ secrets.MACOS_SIGN_IDENTITY }}
          macos-notary-issuer-id: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          macos-notary-key-id: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          macos-notary-key: ${{ secrets.MACOS_NOTARY_KEY }}

      - name: Sign atlas-diagnostics binary
        uses: ./.github/actions/macos-sign
        with:
          binary-path: ./dist/atlas-diagnostics
          macos-sign-p12: ${{ secrets.MACOS_SIGN_P12 }}
          macos-sign-password: ${{ secrets.MACOS_SIGN_PASSWORD }}
          macos-sign-identity: ${{ secrets.MACOS_SIGN_IDENTITY }}
          macos-notary-issuer-id: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          macos-notary-key-id: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          macos-notary-key: ${{ secrets.MACOS_NOTARY_KEY }}

      - name: Create macOS AMD64 installer
        uses: ./.github/actions/create-installers
        with:
          version: ${{ needs.version.outputs.version }}
          platform: darwin
          arch: amd64
          channel: edge
          binary-path: dist/atlas
          binary-name: atlas
          diagnostics-binary-path: dist/atlas-diagnostics
          diagnostics-binary-name: atlas-diagnostics
          web-app-binary-path: dist/Atlas Web Client.app
          web-app-binary-name: Atlas Web Client.app
          macos-sign-p12: ${{ secrets.MACOS_SIGN_P12 }}
          macos-sign-password: ${{ secrets.MACOS_SIGN_PASSWORD }}
          macos-installer-p12: ${{ secrets.MACOS_INSTALLER_P12 }}
          macos-installer-password: ${{ secrets.MACOS_INSTALLER_PASSWORD }}
          macos-notary-issuer-id: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          macos-notary-key-id: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          macos-notary-key: ${{ secrets.MACOS_NOTARY_KEY }}

      - name: Create platform bundle
        run: |
          ./scripts/create-platform-bundle.sh "${{ needs.version.outputs.version }}" "darwin" "amd64"
        shell: bash

      - name: Upload final artifacts
        uses: actions/upload-artifact@v4
        with:
          name: darwin-amd64-packages
          path: |
            ./dist/atlas-bundle-*.tar.gz
            ./dist/atlas_*.zip
            ./dist/atlas_*.sha256
            ./artifacts/binary-darwin-amd64/atlas_*.tar.gz
            ./artifacts/binary-darwin-amd64/atlas_*.sha256
          retention-days: 1

  package-darwin-arm64:
    needs: [version, build-binary-darwin-arm64, build-diagnostics-darwin-arm64, build-web-app-darwin-arm64]
    runs-on: macos-15-xlarge
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: ./artifacts/

      - name: Prepare macOS ARM64 files
        run: |
          mkdir -p dist
          cp ./artifacts/binary-darwin-arm64/atlas dist/atlas
          cp ./artifacts/diagnostics-darwin-arm64/atlas-diagnostics dist/atlas-diagnostics
          # Find and copy the actual .app directory
          if ls ./artifacts/web-app-darwin-arm64/*.app 1>/dev/null 2>&1; then
            cp -r ./artifacts/web-app-darwin-arm64/*.app "dist/Atlas Web Client.app"
            # Fix executable permissions on Tauri binary inside the app
            chmod +x "dist/Atlas Web Client.app/Contents/MacOS/tauri-app"
          fi
        shell: bash

      - name: Sign atlas binary
        uses: ./.github/actions/macos-sign
        with:
          binary-path: ./dist/atlas
          macos-sign-p12: ${{ secrets.MACOS_SIGN_P12 }}
          macos-sign-password: ${{ secrets.MACOS_SIGN_PASSWORD }}
          macos-sign-identity: ${{ secrets.MACOS_SIGN_IDENTITY }}
          macos-notary-issuer-id: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          macos-notary-key-id: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          macos-notary-key: ${{ secrets.MACOS_NOTARY_KEY }}

      - name: Sign atlas-diagnostics binary
        uses: ./.github/actions/macos-sign
        with:
          binary-path: ./dist/atlas-diagnostics
          macos-sign-p12: ${{ secrets.MACOS_SIGN_P12 }}
          macos-sign-password: ${{ secrets.MACOS_SIGN_PASSWORD }}
          macos-sign-identity: ${{ secrets.MACOS_SIGN_IDENTITY }}
          macos-notary-issuer-id: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          macos-notary-key-id: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          macos-notary-key: ${{ secrets.MACOS_NOTARY_KEY }}

      - name: Create macOS ARM64 installer
        uses: ./.github/actions/create-installers
        with:
          version: ${{ needs.version.outputs.version }}
          platform: darwin
          arch: arm64
          channel: edge
          binary-path: dist/atlas
          binary-name: atlas
          diagnostics-binary-path: dist/atlas-diagnostics
          diagnostics-binary-name: atlas-diagnostics
          web-app-binary-path: dist/Atlas Web Client.app
          web-app-binary-name: Atlas Web Client.app
          macos-sign-p12: ${{ secrets.MACOS_SIGN_P12 }}
          macos-sign-password: ${{ secrets.MACOS_SIGN_PASSWORD }}
          macos-installer-p12: ${{ secrets.MACOS_INSTALLER_P12 }}
          macos-installer-password: ${{ secrets.MACOS_INSTALLER_PASSWORD }}
          macos-notary-issuer-id: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          macos-notary-key-id: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          macos-notary-key: ${{ secrets.MACOS_NOTARY_KEY }}

      - name: Create platform bundle
        run: |
          ./scripts/create-platform-bundle.sh "${{ needs.version.outputs.version }}" "darwin" "arm64"
        shell: bash

      - name: Upload final artifacts
        uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64-packages
          path: |
            ./dist/atlas-bundle-*.tar.gz
            ./dist/atlas_*.zip
            ./dist/atlas_*.sha256
            ./artifacts/binary-darwin-arm64/atlas_*.tar.gz
            ./artifacts/binary-darwin-arm64/atlas_*.sha256
          retention-days: 1

  package-windows:
    needs: [version, build-binary-windows, build-diagnostics-windows, build-web-app-windows]
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: ./artifacts/

      - name: Prepare Windows files
        run: |
          mkdir -p dist
          cp ./artifacts/binary-windows-amd64/atlas.exe dist/atlas.exe
          cp ./artifacts/diagnostics-windows-amd64/atlas-diagnostics.exe dist/atlas-diagnostics.exe
          # Find and copy the web app installer
          if (Test-Path ./artifacts/web-app-windows-amd64/*.exe) {
            Copy-Item ./artifacts/web-app-windows-amd64/*.exe dist/
          }
        shell: pwsh

      - name: Create Windows installer
        uses: ./.github/actions/create-installers
        with:
          version: ${{ needs.version.outputs.version }}
          platform: windows
          arch: amd64
          channel: edge
          binary-path: dist/atlas.exe
          binary-name: atlas.exe
          diagnostics-binary-path: dist/atlas-diagnostics.exe
          diagnostics-binary-name: atlas-diagnostics.exe
          web-app-binary-path: dist/Atlas*.exe
          web-app-binary-name: Atlas Web Client.exe

      - name: Create platform bundle
        run: |
          ./scripts/create-platform-bundle.sh "${{ needs.version.outputs.version }}" "windows" "amd64"
        shell: bash

      - name: Upload final artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            ./dist/atlas-bundle-*.zip
            ./dist/atlas_*.exe
            ./dist/atlas_*.sha256
            ./artifacts/binary-windows-amd64/atlas_*.zip
            ./artifacts/binary-windows-amd64/atlas_*.sha256
          retention-days: 1

  # ==================== RELEASE & UPLOAD JOBS ====================
  release:
    needs: [version, package-linux, package-darwin-amd64, package-darwin-arm64, package-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: ./dist/

      - name: Prepare release artifacts
        run: |
          # Move all artifacts to a flat structure for release
          find ./dist -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.deb" -o -name "*.rpm" -o -name "*.exe" -o -name "*.msi" \) -exec mv {} ./dist/ \; 2>/dev/null || true
          ls -la ./dist/
        shell: bash

      - name: Generate changelog
        run: |
          {
            echo "## Edge Build ${{ needs.version.outputs.version }}"
            echo ""
            echo "This is an automated edge build from the latest changes on the main branch."
            echo ""
            echo "### Recent Changes"
          } > changelog.md
          git log --oneline --no-merges -10 --pretty=format:"- %s" >> changelog.md
          {
            echo ""
            echo ""
            echo "**Warning:** Edge builds are experimental and may contain unstable features."
          } >> changelog.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.version }}
          name: "Atlas Edge (${{ needs.version.outputs.version }})"
          body_path: changelog.md
          draft: false
          prerelease: true
          make_latest: false
          files: |
            ./dist/atlas-bundle-*.tar.gz
            ./dist/atlas-bundle-*.zip
            ./dist/atlas_*.tar.gz
            ./dist/atlas_*.zip
            ./dist/atlas_*.exe
            ./dist/atlas_*.deb
            ./dist/atlas-*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-sandbox:
    needs: [version, package-linux, package-darwin-amd64, package-darwin-arm64, package-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Upload to sandbox GCS bucket
        uses: ./.github/actions/gcs-upload-sandbox
        with:
          bucket-prefix: "edge/"
          version: ${{ needs.version.outputs.version }}

  upload-production:
    needs: [version, package-linux, package-darwin-amd64, package-darwin-arm64, package-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Upload to production GCS bucket
        uses: ./.github/actions/gcs-upload-production
        with:
          bucket-prefix: "edge/"
          version: ${{ needs.version.outputs.version }}