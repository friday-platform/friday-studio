name: "atlas-operator: Go"

on:
  pull_request:
    paths:
      - "apps/atlas-operator/**"
  merge_group:

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/atlas-operator
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "apps/atlas-operator/go.mod"
      - name: Test
        run: go test -v -race ./...
