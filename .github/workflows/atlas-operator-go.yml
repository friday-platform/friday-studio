name: "atlas-operator: Go"

on:
  pull_request:
    paths:
      - "apps/atlas-operator/**"
      - "go.mod"
      - "go.sum"
  merge_group:

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - name: Test
        run: go test -v -race ./apps/atlas-operator/...
