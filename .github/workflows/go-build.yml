name: go-build

on:
  pull_request:
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
  merge_group:

permissions:
  contents: read

jobs:
  build:
    name: Go build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Build bounce service
        run: go build -v ./apps/bounce

      - name: Build cypher service
        run: go build -v ./apps/cypher

      - name: Build signal-gateway service
        run: go build -v ./apps/signal-gateway

      - name: Build gateway service
        run: go build -v ./apps/gateway
