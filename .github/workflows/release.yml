name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v1.0.0)"
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build:
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux
            arch: amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            platform: linux
            arch: arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: darwin
            arch: amd64
          - os: macos-15-xlarge
            target: aarch64-apple-darwin
            platform: darwin
            arch: arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows
            arch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.4.1

      - name: Install dependencies
        run: deno install

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            version="${{ inputs.tag }}"
          else
            version="${{ github.ref_name }}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Version: $version"
        shell: bash

      - name: Setup cross-compilation for ARM64 (Linux only)
        if: matrix.platform == 'linux' && matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CC=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build binary
        id: build
        uses: ./.github/actions/build-binary
        with:
          version: ${{ steps.version.outputs.version }}
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}
          target: ${{ matrix.target }}

      - name: Sign macOS binary
        if: matrix.platform == 'darwin'
        uses: ./.github/actions/macos-sign
        with:
          binary-path: ${{ steps.build.outputs.binary-path }}
          macos-sign-p12: ${{ secrets.MACOS_SIGN_P12 }}
          macos-sign-password: ${{ secrets.MACOS_SIGN_PASSWORD }}
          macos-sign-identity: ${{ secrets.MACOS_SIGN_IDENTITY }}
          macos-notary-issuer-id: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          macos-notary-key-id: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          macos-notary-key: ${{ secrets.MACOS_NOTARY_KEY }}

      - name: Create archive
        run: |
          binary_name="${{ steps.build.outputs.binary-name }}"
          if [ "${{ matrix.platform }}" == "windows" ]; then
            archive_ext=".zip"
          else
            archive_ext=".tar.gz"
          fi

          archive_name="atlas_${{ steps.version.outputs.version }}_${{ matrix.platform }}_${{ matrix.arch }}${archive_ext}"

          if [ "${{ matrix.platform }}" == "windows" ]; then
            7z a "./dist/${archive_name}" "./dist/${binary_name}" README.md
          elif [ "${{ matrix.platform }}" == "darwin" ]; then
            # Use pax format to preserve extended attributes (including code signatures)
            tar --format=pax -czf "./dist/${archive_name}" -C ./dist "${binary_name}" -C .. README.md
          else
            tar -czf "./dist/${archive_name}" -C ./dist "${binary_name}" -C .. README.md
          fi

          # Generate checksum
          if [ "${{ matrix.platform }}" == "darwin" ]; then
            shasum -a 256 "./dist/${archive_name}" > "./dist/${archive_name}.sha256"
          else
            sha256sum "./dist/${archive_name}" > "./dist/${archive_name}.sha256"
          fi
        shell: bash

      - name: Create installers
        if: matrix.platform != 'linux'
        id: installers
        uses: ./.github/actions/create-installers
        with:
          version: ${{ steps.version.outputs.version }}
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}
          channel: release
          binary-path: ${{ steps.build.outputs.binary-path }}
          binary-name: ${{ steps.build.outputs.binary-name }}
          macos-installer-p12: ${{ secrets.MACOS_INSTALLER_P12 }}
          macos-installer-password: ${{ secrets.MACOS_INSTALLER_PASSWORD }}
          macos-notary-issuer-id: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          macos-notary-key-id: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          macos-notary-key: ${{ secrets.MACOS_NOTARY_KEY }}

      - name: Build Linux packages
        if: matrix.platform == 'linux'
        run: |
          # Install build dependencies
          sudo apt-get update
          sudo apt-get install -y rpm debhelper devscripts

          # Create build directory and copy binary
          mkdir -p build
          cp "${{ steps.build.outputs.binary-path }}" build/atlas
          chmod +x build/atlas

          # Build DEB package
          ARCH="${{ matrix.arch }}" VERSION="${{ steps.version.outputs.version }}" ./scripts/build-deb.sh

          # Build RPM package (skip ARM64 on x86_64 runners)
          ARCH="${{ matrix.arch }}" VERSION="${{ steps.version.outputs.version }}" ./scripts/build-rpm.sh
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: atlas-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            ./dist/atlas_*.tar.gz
            ./dist/atlas_*.zip
            ./dist/atlas_*.exe
            ./dist/atlas_*.deb
            ./dist/atlas-*.rpm
            ./dist/atlas_*.sha256
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            version="${{ inputs.tag }}"
          else
            version="${{ github.ref_name }}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Version: $version"

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: ./dist/
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag for changelog generation
          previous_tag=$(git tag --sort=-version:refname | grep -v "${{ steps.version.outputs.version }}" | head -n1)

          if [ -z "$previous_tag" ]; then
            # First release
            {
              echo "## What's New"
              echo ""
              echo "This is the first release of Atlas."
              echo ""
              echo "### Features"
            } > changelog.md
            git log --oneline --no-merges -20 --pretty=format:"- %s" >> changelog.md
          else
            # Generate changelog since previous tag
            echo "## What's New in ${{ steps.version.outputs.version }}" > changelog.md
            echo "" >> changelog.md

            # Categorize commits
            echo "###  Features" >> changelog.md
            git log --oneline --no-merges "${previous_tag}..${{ steps.version.outputs.version }}" --grep="feat" --pretty=format:"- %s" >> changelog.md || echo "- No new features" >> changelog.md
            echo "" >> changelog.md

            echo "###  Bug Fixes" >> changelog.md
            git log --oneline --no-merges "${previous_tag}..${{ steps.version.outputs.version }}" --grep="fix" --pretty=format:"- %s" >> changelog.md || echo "- No bug fixes" >> changelog.md
            echo "" >> changelog.md

            echo "###  Documentation" >> changelog.md
            git log --oneline --no-merges "${previous_tag}..${{ steps.version.outputs.version }}" --grep="docs" --pretty=format:"- %s" >> changelog.md || echo "- No documentation changes" >> changelog.md
            echo "" >> changelog.md

            echo "###  Other Changes" >> changelog.md
            git log --oneline --no-merges "${previous_tag}..${{ steps.version.outputs.version }}" --invert-grep --grep="feat" --grep="fix" --grep="docs" --pretty=format:"- %s" >> changelog.md || echo "- No other changes" >> changelog.md
          fi

          {
            echo ""
            echo "## Installation"
            echo ""
            echo "Download the appropriate binary for your platform from the assets below."
            echo ""
            echo "### macOS"
            echo ""
            echo "**Option 1: Electron Installer (Recommended)**"
            echo "Double-click the Atlas*.dmg file and run the Atlas Installer app. The installer provides:"
            echo "- Professional installation experience with license agreement"
            echo "- Optional API key collection and secure storage"
            echo "- Automatic PATH configuration"
            echo "- Real-time installation progress"
            echo ""
            echo "**Option 2: Manual Installation**"
            echo '```bash'
            echo 'tar -xzf atlas_*_darwin_*.tar.gz'
            echo 'sudo mv atlas /usr/local/bin/'
            echo '```'
            echo ""
            echo "### Linux"
            echo ""
            echo "**Option 1: Native Package Manager (Recommended)**"
            echo ""
            echo "For Debian/Ubuntu-based distributions:"
            echo '```bash'
            echo 'sudo dpkg -i atlas_*_amd64.deb  # For AMD64'
            echo '# or'
            echo 'sudo dpkg -i atlas_*_arm64.deb  # For ARM64'
            echo '```'
            echo ""
            echo "For RedHat/Fedora-based distributions:"
            echo '```bash'
            echo 'sudo rpm -i atlas-*.x86_64.rpm  # For AMD64'
            echo '# or'
            echo 'sudo rpm -i atlas-*.aarch64.rpm  # For ARM64'
            echo '```'
            echo ""
            echo "Native packages include:"
            echo "- Automatic systemd service configuration"
            echo "- Interactive EULA acceptance and API key setup"
            echo "- Proper system integration with dedicated atlas user"
            echo ""
            echo "**Option 2: Manual Installation**"
            echo '```bash'
            echo 'tar -xzf atlas_*_linux_*.tar.gz'
            echo 'sudo mv atlas /usr/local/bin/'
            echo '```'
            echo ""
            echo "### Windows"
            echo ""
            echo "**Option 1: Electron Installer (Recommended)**"
            echo "Run the Atlas*.exe installer for a complete installation experience:"
            echo "- License agreement and professional UI"
            echo "- API key collection and secure storage in ~/.atlas/.env"
            echo "- Automatic PATH configuration"
            echo "- System integration"
            echo ""
            echo "**Option 2: Manual Installation**"
            echo "Extract the ZIP file and add the atlas.exe to your PATH."
            echo ""
          } >> changelog.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "Atlas (${{ steps.version.outputs.version }})"
          body_path: changelog.md
          draft: true
          prerelease: false
          make_latest: true
          files: |
            ./dist/atlas_*.tar.gz
            ./dist/atlas_*.zip
            ./dist/atlas_*.exe
            ./dist/atlas_*.deb
            ./dist/atlas-*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-sandbox:
    needs: [build, release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Upload to sandbox GCS bucket
        uses: ./.github/actions/gcs-upload-sandbox
        with:
          bucket-prefix: ""
          version: ${{ needs.release.outputs.version }}

  upload-production:
    needs: [build, release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Upload to production GCS bucket
        uses: ./.github/actions/gcs-upload-production
        with:
          bucket-prefix: ""
          version: ${{ needs.release.outputs.version }}
