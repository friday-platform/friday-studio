name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v1.0.0)"
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux
            arch: amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            platform: linux
            arch: arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: darwin
            arch: amd64
          - os: macos-14-xlarge
            target: aarch64-apple-darwin
            platform: darwin
            arch: arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows
            arch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.3.3

      - name: Install dependencies
        run: deno install

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            version="${{ inputs.tag }}"
          else
            version="${{ github.ref_name }}"
          fi
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "Version: $version"
        shell: bash

      - name: Build binary
        run: |
          mkdir -p ./dist

          # Set binary name based on platform
          if [ "${{ matrix.platform }}" == "windows" ]; then
            binary_name="atlas.exe"
          else
            binary_name="atlas"
          fi

          # Native compilation for ARM64 macOS (using macos-14-xlarge), cross-compilation for others
          if [ "${{ matrix.platform }}" == "darwin" ] && [ "${{ matrix.arch }}" == "arm64" ]; then
            echo "Native compilation for ARM64 macOS (no --target flag)"
            deno compile \
              --no-check \
              --allow-read \
              --allow-write \
              --allow-net \
              --allow-env \
              --allow-run \
              --allow-sys \
              --allow-ffi \
              --unstable-broadcast-channel \
              --unstable-worker-options \
              --unstable-otel \
              --include=src \
              --include=examples \
              --output "./dist/${binary_name}" \
              ./src/cli.tsx
          else
            echo "Cross-compiling for target: ${{ matrix.target }}"
            deno compile \
              --no-check \
              --allow-read \
              --allow-write \
              --allow-net \
              --allow-env \
              --allow-run \
              --allow-sys \
              --allow-ffi \
              --unstable-broadcast-channel \
              --unstable-worker-options \
              --unstable-otel \
              --include=src \
              --include=examples \
              --target ${{ matrix.target }} \
              --output "./dist/${binary_name}" \
              ./src/cli.tsx
          fi
        shell: bash

      - name: Sign macOS binary (if certificates available)
        if: matrix.platform == 'darwin' && env.MACOS_SIGN_P12 != ''
        env:
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          # Import certificate
          echo "$MACOS_SIGN_P12" | base64 --decode > certificate.p12
          security create-keychain -p mypassword build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p mypassword build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_SIGN_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k mypassword build.keychain

          # Auto-detect signing identity if not provided
          if [ -z "$MACOS_SIGN_IDENTITY" ]; then
            SIGN_IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1 | grep -o '"[^"]*"' | tr -d '"')
            if [ -z "$SIGN_IDENTITY" ]; then
              echo "No Developer ID Application certificate found, trying any valid identity"
              SIGN_IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep "1)" | head -1 | grep -o '"[^"]*"' | tr -d '"')
            fi
            echo "Auto-detected signing identity: $SIGN_IDENTITY"
          else
            SIGN_IDENTITY="$MACOS_SIGN_IDENTITY"
            echo "Using provided signing identity: $SIGN_IDENTITY"
          fi

          # Sign binary
          codesign --force --options runtime --deep --sign "$SIGN_IDENTITY" ./dist/atlas

          # Notarize if credentials available
          if [ -n "${{ secrets.MACOS_NOTARY_ISSUER_ID }}" ]; then
            # Create private key file from base64 encoded secret
            echo "${{ secrets.MACOS_NOTARY_KEY }}" | base64 --decode > notary_key.p8

            # Create a zip file for notarization (required by Apple)
            zip atlas-binary.zip ./dist/atlas

            # Try notarization with better error handling
            if xcrun notarytool submit atlas-binary.zip \
              --issuer "${{ secrets.MACOS_NOTARY_ISSUER_ID }}" \
              --key-id "${{ secrets.MACOS_NOTARY_KEY_ID }}" \
              --key notary_key.p8 \
              --wait; then
              echo "Notarization successful"
            else
              echo "Notarization failed, but continuing build"
              # Don't fail the build for notarization issues
            fi

            # Clean up files
            rm -f notary_key.p8 atlas-binary.zip
          fi

      - name: Create archive
        run: |
          # Set file extensions
          if [ "${{ matrix.platform }}" == "windows" ]; then
            binary_name="atlas.exe"
            archive_ext=".zip"
          else
            binary_name="atlas"
            archive_ext=".tar.gz"
          fi

          # Create archive name
          archive_name="atlas_${{ steps.version.outputs.version }}_${{ matrix.platform }}_${{ matrix.arch }}${archive_ext}"

          # Create archive
          if [ "${{ matrix.platform }}" == "windows" ]; then
            7z a "./dist/${archive_name}" "./dist/${binary_name}" README.md
          else
            tar -czf "./dist/${archive_name}" -C ./dist "${binary_name}" -C .. README.md
          fi

          # Generate checksum
          if [ "${{ matrix.platform }}" == "darwin" ]; then
            shasum -a 256 "./dist/${archive_name}" > "./dist/${archive_name}.sha256"
          else
            sha256sum "./dist/${archive_name}" > "./dist/${archive_name}.sha256"
          fi
        shell: bash

      - name: Create macOS pkg installer
        if: matrix.platform == 'darwin'
        run: |
          pkg_name="atlas_${{ steps.version.outputs.version }}_${{ matrix.platform }}_${{ matrix.arch }}.pkg"
          
          # Create package directory structure
          mkdir -p ./pkg/payload/usr/local/bin
          mkdir -p ./pkg/scripts
          
          # Copy binary to package payload
          cp "./dist/atlas" "./pkg/payload/usr/local/bin/atlas"
          chmod +x "./pkg/payload/usr/local/bin/atlas"
          
          # Create postinstall script to add to PATH
          cat > ./pkg/scripts/postinstall << 'EOF'
          #!/bin/bash
          # Add /usr/local/bin to PATH if not already present
          if ! echo "$PATH" | grep -q "/usr/local/bin"; then
            # For bash users
            if [ -f ~/.bash_profile ]; then
              echo 'export PATH="/usr/local/bin:$PATH"' >> ~/.bash_profile
            fi
            if [ -f ~/.bashrc ]; then
              echo 'export PATH="/usr/local/bin:$PATH"' >> ~/.bashrc
            fi
            
            # For zsh users
            if [ -f ~/.zshrc ]; then
              echo 'export PATH="/usr/local/bin:$PATH"' >> ~/.zshrc
            fi
            
            # For fish users
            if [ -d ~/.config/fish ]; then
              mkdir -p ~/.config/fish/conf.d
              echo 'set -gx PATH /usr/local/bin $PATH' > ~/.config/fish/conf.d/atlas.fish
            fi
          fi
          
          echo "Atlas has been installed to /usr/local/bin/atlas"
          echo "You may need to restart your terminal or run 'source ~/.bash_profile' (or equivalent) to use the 'atlas' command."
          exit 0
          EOF
          
          chmod +x ./pkg/scripts/postinstall
          
          # Build the package
          pkgbuild \
            --root ./pkg/payload \
            --scripts ./pkg/scripts \
            --identifier "com.tempestteam.atlas" \
            --version "${{ steps.version.outputs.version }}" \
            --install-location "/" \
            "./dist/${pkg_name}"
          
          # Generate checksum for pkg
          shasum -a 256 "./dist/${pkg_name}" > "./dist/${pkg_name}.sha256"
          
          echo "Created macOS pkg: ${pkg_name}"
        shell: bash

      - name: Create Windows MSI installer
        if: matrix.platform == 'windows'
        run: |
          $msi_name = "atlas_${{ steps.version.outputs.version }}_${{ matrix.platform }}_${{ matrix.arch }}.msi"
          
          # Create WiX source file
          @"
          <?xml version="1.0" encoding="UTF-8"?>
          <Wix xmlns="http://wixtoolset.org/schemas/v4/wxs">
            <Product Id="*" Name="Atlas" Language="1033" Version="1.0.0" 
                     Manufacturer="Tempest Team" UpgradeCode="{12345678-1234-1234-1234-123456789012}">
              <Package InstallerVersion="200" Compressed="yes" InstallScope="perMachine" />
              
              <MajorUpgrade DowngradeErrorMessage="A newer version of [ProductName] is already installed." />
              <MediaTemplate EmbedCab="yes" />
              
              <Feature Id="ProductFeature" Title="Atlas" Level="1">
                <ComponentGroupRef Id="ProductComponents" />
              </Feature>
              
              <Directory Id="TARGETDIR" Name="SourceDir">
                <Directory Id="ProgramFilesFolder">
                  <Directory Id="INSTALLFOLDER" Name="Atlas" />
                </Directory>
                <Directory Id="ProgramMenuFolder">
                  <Directory Id="ApplicationProgramsFolder" Name="Atlas"/>
                </Directory>
              </Directory>
              
              <ComponentGroup Id="ProductComponents" Directory="INSTALLFOLDER">
                <Component Id="AtlasExecutable" Guid="{87654321-4321-4321-4321-210987654321}">
                  <File Id="AtlasEXE" Source=".\dist\atlas.exe" KeyPath="yes" />
                  <Environment Id="PATH" Name="PATH" Value="[INSTALLFOLDER]" Permanent="yes" Part="suffix" Action="set" System="yes" />
                </Component>
              </ComponentGroup>
            </Product>
          </Wix>
          "@ | Out-File -FilePath "atlas.wxs" -Encoding UTF8
          
          # Install WiX Toolset
          Write-Host "Installing WiX Toolset..."
          dotnet tool install --global wix --version 4.0.5
          
          # Build MSI
          Write-Host "Building MSI installer..."
          wix build atlas.wxs -out ".\dist\$msi_name"
          
          # Generate checksum for MSI
          $hash = Get-FileHash ".\dist\$msi_name" -Algorithm SHA256
          "$($hash.Hash.ToLower())  $msi_name" | Out-File -FilePath ".\dist\$msi_name.sha256" -Encoding ASCII
          
          Write-Host "Created Windows MSI: $msi_name"
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: atlas-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            ./dist/atlas_*.tar.gz
            ./dist/atlas_*.zip
            ./dist/atlas_*.pkg
            ./dist/atlas_*.msi
            ./dist/atlas_*.sha256
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            version="${{ inputs.tag }}"
          else
            version="${{ github.ref_name }}"
          fi
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "Version: $version"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist/
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag for changelog generation
          previous_tag=$(git tag --sort=-version:refname | grep -v "${{ steps.version.outputs.version }}" | head -n1)

          if [ -z "$previous_tag" ]; then
            # First release
            echo "## What's New" > changelog.md
            echo "" >> changelog.md
            echo "This is the first release of Atlas." >> changelog.md
            echo "" >> changelog.md
            echo "### Features" >> changelog.md
            git log --oneline --no-merges -20 --pretty=format:"- %s" >> changelog.md
          else
            # Generate changelog since previous tag
            echo "## What's New in ${{ steps.version.outputs.version }}" > changelog.md
            echo "" >> changelog.md

            # Categorize commits
            echo "### ✨ Features" >> changelog.md
            git log --oneline --no-merges ${previous_tag}..${{ steps.version.outputs.version }} --grep="feat" --pretty=format:"- %s" >> changelog.md || echo "- No new features" >> changelog.md
            echo "" >> changelog.md

            echo "### 🐛 Bug Fixes" >> changelog.md
            git log --oneline --no-merges ${previous_tag}..${{ steps.version.outputs.version }} --grep="fix" --pretty=format:"- %s" >> changelog.md || echo "- No bug fixes" >> changelog.md
            echo "" >> changelog.md

            echo "### 📚 Documentation" >> changelog.md
            git log --oneline --no-merges ${previous_tag}..${{ steps.version.outputs.version }} --grep="docs" --pretty=format:"- %s" >> changelog.md || echo "- No documentation changes" >> changelog.md
            echo "" >> changelog.md

            echo "### 🔧 Other Changes" >> changelog.md
            git log --oneline --no-merges ${previous_tag}..${{ steps.version.outputs.version }} --invert-grep --grep="feat" --grep="fix" --grep="docs" --pretty=format:"- %s" >> changelog.md || echo "- No other changes" >> changelog.md
          fi

          echo "" >> changelog.md
          echo "## Installation" >> changelog.md
          echo "" >> changelog.md
          echo "Download the appropriate binary for your platform from the assets below." >> changelog.md
          echo "" >> changelog.md
          echo "### macOS" >> changelog.md
          echo "" >> changelog.md
          echo "**Option 1: Package Installer (Recommended)**" >> changelog.md
          echo '```bash' >> changelog.md
          echo 'sudo installer -pkg atlas_*_darwin_*.pkg -target /' >> changelog.md
          echo '```' >> changelog.md
          echo "" >> changelog.md
          echo "**Option 2: Manual Installation**" >> changelog.md
          echo '```bash' >> changelog.md
          echo 'tar -xzf atlas_*_darwin_*.tar.gz' >> changelog.md
          echo 'sudo mv atlas /usr/local/bin/' >> changelog.md
          echo '```' >> changelog.md
          echo "" >> changelog.md
          echo "### Linux" >> changelog.md
          echo '```bash' >> changelog.md
          echo 'tar -xzf atlas_*_linux_*.tar.gz' >> changelog.md
          echo 'sudo mv atlas /usr/local/bin/' >> changelog.md
          echo '```' >> changelog.md
          echo "" >> changelog.md
          echo "### Windows" >> changelog.md
          echo "" >> changelog.md
          echo "**Option 1: MSI Installer (Recommended)**" >> changelog.md
          echo '```powershell' >> changelog.md
          echo 'msiexec /i atlas_*_windows_*.msi /quiet' >> changelog.md
          echo '```' >> changelog.md
          echo "Or double-click the .msi file to install with the GUI." >> changelog.md
          echo "" >> changelog.md
          echo "**Option 2: Manual Installation**" >> changelog.md
          echo "Extract the ZIP file and add the atlas.exe to your PATH." >> changelog.md

          echo "Generated changelog:"
          cat changelog.md

      - name: Create checksums file
        run: |
          cd ./dist
          cat *.sha256 > checksums.txt
          echo "Generated checksums:"
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Atlas ${{ steps.version.outputs.version }}
          body_path: changelog.md
          draft: true
          prerelease: false
          make_latest: true
          files: |
            ./dist/atlas_*.tar.gz
            ./dist/atlas_*.zip
            ./dist/atlas_*.pkg
            ./dist/atlas_*.msi
            ./dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
