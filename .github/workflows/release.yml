name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v1.0.0)"
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  # Get version once for all jobs
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            version="${{ inputs.tag }}"
          else
            version="${{ github.ref_name }}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Version: $version"

  # ==================== BUILD JOBS ====================
  build-binary-linux-amd64:
    needs: version
    uses: ./.github/workflows/build-component.yml
    with:
      component: binary
      version: ${{ needs.version.outputs.version }}
      platform: linux
      arch: amd64
      runner: ubuntu-latest-8-cores
    secrets: inherit

  build-binary-linux-arm64:
    needs: version
    uses: ./.github/workflows/build-component.yml
    with:
      component: binary
      version: ${{ needs.version.outputs.version }}
      platform: linux
      arch: arm64
      runner: ubuntu-latest-8-cores
    secrets: inherit

  build-binary-darwin-amd64:
    needs: version
    uses: ./.github/workflows/build-component.yml
    with:
      component: binary
      version: ${{ needs.version.outputs.version }}
      platform: darwin
      arch: amd64
      runner: macos-latest
    secrets: inherit

  build-binary-darwin-arm64:
    needs: version
    uses: ./.github/workflows/build-component.yml
    with:
      component: binary
      version: ${{ needs.version.outputs.version }}
      platform: darwin
      arch: arm64
      runner: macos-15-xlarge
    secrets: inherit

  build-binary-windows:
    needs: version
    uses: ./.github/workflows/build-component.yml
    with:
      component: binary
      version: ${{ needs.version.outputs.version }}
      platform: windows
      arch: amd64
      runner: windows-latest-8-cores
    secrets: inherit

  build-web-app-darwin-amd64:
    needs: version
    uses: ./.github/workflows/build-component.yml
    with:
      component: web-app
      version: ${{ needs.version.outputs.version }}
      platform: darwin
      arch: amd64
      runner: macos-latest
    secrets: inherit

  build-web-app-darwin-arm64:
    needs: version
    uses: ./.github/workflows/build-component.yml
    with:
      component: web-app
      version: ${{ needs.version.outputs.version }}
      platform: darwin
      arch: arm64
      runner: macos-15-xlarge
    secrets: inherit

  build-web-app-windows:
    needs: version
    uses: ./.github/workflows/build-component.yml
    with:
      component: web-app
      version: ${{ needs.version.outputs.version }}
      platform: windows
      arch: amd64
      runner: windows-latest-8-cores
    secrets: inherit

  build-web-app-linux-amd64:
    needs: version
    uses: ./.github/workflows/build-component.yml
    with:
      component: web-app
      version: ${{ needs.version.outputs.version }}
      platform: linux
      arch: amd64
      runner: ubuntu-latest-8-cores
    secrets: inherit

  build-web-app-linux-arm64:
    needs: version
    uses: ./.github/workflows/build-component.yml
    with:
      component: web-app
      version: ${{ needs.version.outputs.version }}
      platform: linux
      arch: arm64
      runner: ubuntu-latest-8-cores
    secrets: inherit

  # ==================== PACKAGING JOBS ====================
  package-linux-amd64:
    needs: [version, build-binary-linux-amd64, build-web-app-linux-amd64]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          path: ./artifacts/

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: rpm debhelper devscripts
          version: 1.0

      - name: Build Linux packages
        run: |
          # Prepare build directory
          mkdir -p build

          # Copy CLI binary
          cp ./artifacts/binary-linux-amd64/atlas build/atlas
          chmod +x build/atlas

          # Extract web-app from Tauri .deb
          TAURI_DEB=$(find ./artifacts/web-app-linux-amd64 -name "*.deb" -type f | head -n1)
          if [ -n "$TAURI_DEB" ]; then
            echo "=== Extracting web-app from Tauri .deb ==="
            echo "Found: $TAURI_DEB"
            mkdir -p build/web-app-extract
            dpkg-deb -x "${TAURI_DEB}" build/web-app-extract

            echo "Extracted web-app contents:"
            find build/web-app-extract -type f
            echo "=================================="
          else
            echo "WARNING: No web-app .deb found in artifacts"
            find ./artifacts/web-app-linux-amd64 -type f || true
          fi

          # Build combined packages (CLI + web-app)
          ARCH="amd64" VERSION="${{ needs.version.outputs.version }}" ./scripts/build-deb.sh
          ARCH="amd64" VERSION="${{ needs.version.outputs.version }}" ./scripts/build-rpm.sh
        shell: bash

      - name: Create platform bundle
        run: |
          mkdir -p dist
          cp ./artifacts/binary-linux-amd64/atlas dist/atlas
          ./scripts/create-platform-bundle.sh "${{ needs.version.outputs.version }}" "linux" "amd64"
        shell: bash

      - name: Upload final artifacts
        uses: actions/upload-artifact@v5
        with:
          name: linux-amd64-packages
          path: |
            ./dist/atlas_*.deb
            ./dist/atlas-*.rpm
            ./dist/atlas-bundle-*.tar.gz
            ./artifacts/binary-linux-amd64/atlas_*.tar.gz
            ./artifacts/binary-linux-amd64/atlas_*.sha256

  package-linux-arm64:
    needs: [version, build-binary-linux-arm64, build-web-app-linux-arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          path: ./artifacts/

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: rpm debhelper devscripts
          version: 1.0

      - name: Build Linux packages
        run: |
          # Prepare build directory
          mkdir -p build

          # Copy CLI binary
          cp ./artifacts/binary-linux-arm64/atlas build/atlas
          chmod +x build/atlas

          # Extract web-app from Tauri .deb
          TAURI_DEB=$(find ./artifacts/web-app-linux-arm64 -name "*.deb" -type f | head -n1)
          if [ -n "$TAURI_DEB" ]; then
            echo "=== Extracting web-app from Tauri .deb ==="
            echo "Found: $TAURI_DEB"
            mkdir -p build/web-app-extract
            dpkg-deb -x "${TAURI_DEB}" build/web-app-extract

            echo "Extracted web-app contents:"
            find build/web-app-extract -type f
            echo "=================================="
          else
            echo "WARNING: No web-app .deb found in artifacts"
            find ./artifacts/web-app-linux-arm64 -type f || true
          fi

          # Build combined packages (CLI + web-app)
          ARCH="arm64" VERSION="${{ needs.version.outputs.version }}" ./scripts/build-deb.sh
          ARCH="arm64" VERSION="${{ needs.version.outputs.version }}" ./scripts/build-rpm.sh
        shell: bash

      - name: Create platform bundle
        run: |
          mkdir -p dist
          cp ./artifacts/binary-linux-arm64/atlas dist/atlas
          ./scripts/create-platform-bundle.sh "${{ needs.version.outputs.version }}" "linux" "arm64"
        shell: bash

      - name: Upload final artifacts
        uses: actions/upload-artifact@v5
        with:
          name: linux-arm64-packages
          path: |
            ./dist/atlas_*.deb
            ./dist/atlas-*.rpm
            ./dist/atlas-bundle-*.tar.gz
            ./artifacts/binary-linux-arm64/atlas_*.tar.gz
            ./artifacts/binary-linux-arm64/atlas_*.sha256

  package-darwin-amd64:
    needs: [version, build-binary-darwin-amd64, build-web-app-darwin-amd64]
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          path: ./artifacts/

      - name: Prepare macOS AMD64 files
        run: |
          mkdir -p dist
          cp ./artifacts/binary-darwin-amd64/atlas dist/atlas
          # Find and copy the actual .app directory
          if ls ./artifacts/web-app-darwin-amd64/*.app 1>/dev/null 2>&1; then
            cp -r ./artifacts/web-app-darwin-amd64/*.app "dist/Atlas Web Client.app"
            # Fix executable permissions on Tauri binary inside the app
            chmod +x "dist/Atlas Web Client.app/Contents/MacOS/atlas-web-client"
          fi
        shell: bash


      - name: Create macOS AMD64 installer
        uses: ./.github/actions/create-installers
        with:
          version: ${{ needs.version.outputs.version }}
          platform: darwin
          arch: amd64
          channel: release
          binary-path: dist/atlas
          binary-name: atlas
          web-app-binary-path: dist/Atlas Web Client.app
          web-app-binary-name: Atlas Web Client.app
          macos-sign-p12: ${{ secrets.MACOS_SIGN_P12 }}
          macos-sign-password: ${{ secrets.MACOS_SIGN_PASSWORD }}
          macos-installer-p12: ${{ secrets.MACOS_INSTALLER_P12 }}
          macos-installer-password: ${{ secrets.MACOS_INSTALLER_PASSWORD }}
          macos-notary-issuer-id: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          macos-notary-key-id: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          macos-notary-key: ${{ secrets.MACOS_NOTARY_KEY }}

      - name: Create platform bundle
        run: |
          ./scripts/create-platform-bundle.sh "${{ needs.version.outputs.version }}" "darwin" "amd64"
        shell: bash

      - name: Upload final artifacts
        uses: actions/upload-artifact@v5
        with:
          name: darwin-amd64-packages
          path: |
            ./dist/atlas-bundle-*.tar.gz
            ./dist/atlas_*.zip
            ./dist/atlas_*.sha256
            ./artifacts/binary-darwin-amd64/atlas_*.tar.gz
            ./artifacts/binary-darwin-amd64/atlas_*.sha256

  package-darwin-arm64:
    needs: [version, build-binary-darwin-arm64, build-web-app-darwin-arm64]
    runs-on: macos-15-xlarge
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          path: ./artifacts/

      - name: Prepare macOS ARM64 files
        run: |
          mkdir -p dist
          cp ./artifacts/binary-darwin-arm64/atlas dist/atlas
          # Find and copy the actual .app directory
          if ls ./artifacts/web-app-darwin-arm64/*.app 1>/dev/null 2>&1; then
            cp -r ./artifacts/web-app-darwin-arm64/*.app "dist/Atlas Web Client.app"
            # Fix executable permissions on Tauri binary inside the app
            chmod +x "dist/Atlas Web Client.app/Contents/MacOS/atlas-web-client"
          fi
        shell: bash


      - name: Create macOS ARM64 installer
        uses: ./.github/actions/create-installers
        with:
          version: ${{ needs.version.outputs.version }}
          platform: darwin
          arch: arm64
          channel: release
          binary-path: dist/atlas
          binary-name: atlas
          web-app-binary-path: dist/Atlas Web Client.app
          web-app-binary-name: Atlas Web Client.app
          macos-sign-p12: ${{ secrets.MACOS_SIGN_P12 }}
          macos-sign-password: ${{ secrets.MACOS_SIGN_PASSWORD }}
          macos-installer-p12: ${{ secrets.MACOS_INSTALLER_P12 }}
          macos-installer-password: ${{ secrets.MACOS_INSTALLER_PASSWORD }}
          macos-notary-issuer-id: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          macos-notary-key-id: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          macos-notary-key: ${{ secrets.MACOS_NOTARY_KEY }}

      - name: Create platform bundle
        run: |
          ./scripts/create-platform-bundle.sh "${{ needs.version.outputs.version }}" "darwin" "arm64"
        shell: bash

      - name: Upload final artifacts
        uses: actions/upload-artifact@v5
        with:
          name: darwin-arm64-packages
          path: |
            ./dist/atlas-bundle-*.tar.gz
            ./dist/atlas_*.zip
            ./dist/atlas_*.sha256
            ./artifacts/binary-darwin-arm64/atlas_*.tar.gz
            ./artifacts/binary-darwin-arm64/atlas_*.sha256

  package-windows:
    needs: [version, build-binary-windows, build-web-app-windows]
    runs-on: windows-latest-8-cores
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          path: ./artifacts/

      - name: Prepare Windows files
        run: |
          mkdir -p dist
          cp ./artifacts/binary-windows-amd64/atlas.exe dist/atlas.exe
          # Find and copy the web app installer
          if (Test-Path ./artifacts/web-app-windows-amd64/*.exe) {
            Copy-Item ./artifacts/web-app-windows-amd64/*.exe dist/
          }
        shell: pwsh

      - name: Create Windows installer
        uses: ./.github/actions/create-installers
        with:
          version: ${{ needs.version.outputs.version }}
          platform: windows
          arch: amd64
          channel: release
          binary-path: dist/atlas.exe
          binary-name: atlas.exe
          web-app-binary-path: dist/Atlas*.exe
          web-app-binary-name: Atlas Web Client.exe

      - name: Create platform bundle
        run: |
          ./scripts/create-platform-bundle.sh "${{ needs.version.outputs.version }}" "windows" "amd64"
        shell: bash

      - name: Upload final artifacts
        uses: actions/upload-artifact@v5
        with:
          name: windows-packages
          path: |
            ./dist/atlas-bundle-*.zip
            ./dist/atlas_*.exe
            ./dist/atlas_*.sha256
            ./artifacts/binary-windows-amd64/atlas_*.zip
            ./artifacts/binary-windows-amd64/atlas_*.sha256

  # ==================== RELEASE & UPLOAD JOBS ====================
  release:
    needs: [version, package-linux-amd64, package-linux-arm64, package-darwin-amd64, package-darwin-arm64, package-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: ./dist/

      - name: Prepare release artifacts
        run: |
          # Move all artifacts to a flat structure for release
          find ./dist -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.deb" -o -name "*.rpm" -o -name "*.exe" -o -name "*.msi" \) -exec mv {} ./dist/ \; 2>/dev/null || true
          ls -la ./dist/
        shell: bash

      - name: Generate changelog
        run: |
          # Get the previous tag for changelog generation
          previous_tag=$(git tag --sort=-version:refname | grep -v "${{ needs.version.outputs.version }}" | head -n1)

          if [ -z "$previous_tag" ]; then
            # First release
            {
              echo "## What's New"
              echo ""
              echo "This is the first release of Atlas."
              echo ""
              echo "### Features"
            } > changelog.md
            git log --oneline --no-merges -20 --pretty=format:"- %s" >> changelog.md
          else
            # Generate changelog since previous tag
            echo "## What's New in ${{ needs.version.outputs.version }}" > changelog.md
            echo "" >> changelog.md

            # Categorize commits
            echo "###  Features" >> changelog.md
            git log --oneline --no-merges "${previous_tag}..${{ needs.version.outputs.version }}" --grep="feat" --pretty=format:"- %s" >> changelog.md || echo "- No new features" >> changelog.md
            echo "" >> changelog.md

            echo "###  Bug Fixes" >> changelog.md
            git log --oneline --no-merges "${previous_tag}..${{ needs.version.outputs.version }}" --grep="fix" --pretty=format:"- %s" >> changelog.md || echo "- No bug fixes" >> changelog.md
            echo "" >> changelog.md

            echo "###  Documentation" >> changelog.md
            git log --oneline --no-merges "${previous_tag}..${{ needs.version.outputs.version }}" --grep="docs" --pretty=format:"- %s" >> changelog.md || echo "- No documentation changes" >> changelog.md
            echo "" >> changelog.md

            echo "###  Other Changes" >> changelog.md
            git log --oneline --no-merges "${previous_tag}..${{ needs.version.outputs.version }}" --invert-grep --grep="feat" --grep="fix" --grep="docs" --pretty=format:"- %s" >> changelog.md || echo "- No other changes" >> changelog.md
          fi

          {
            echo ""
            echo "## Installation"
            echo ""
            echo "Download the appropriate binary for your platform from the assets below."
            echo ""
            echo "### macOS"
            echo ""
            echo "**Option 1: ZIP Installer (Recommended)**"
            echo "Extract and run the atlas_*.zip installer. The installer provides:"
            echo "- Professional installation experience with license agreement"
            echo "- Optional API key collection and secure storage"
            echo "- Automatic PATH configuration"
            echo "- Real-time installation progress"
            echo ""
            echo "**Option 2: Manual Installation**"
            echo '```bash'
            echo 'tar -xzf atlas_*_darwin_*.tar.gz'
            echo 'sudo mv atlas /usr/local/bin/'
            echo '```'
            echo ""
            echo "### Linux"
            echo ""
            echo "**Option 1: Native Package Manager (Recommended)**"
            echo ""
            echo "For Debian/Ubuntu-based distributions:"
            echo '```bash'
            echo 'sudo dpkg -i atlas_*_amd64.deb  # For AMD64'
            echo '# or'
            echo 'sudo dpkg -i atlas_*_arm64.deb  # For ARM64'
            echo '```'
            echo ""
            echo "For RedHat/Fedora-based distributions:"
            echo '```bash'
            echo 'sudo rpm -i atlas-*.x86_64.rpm  # For AMD64'
            echo '# or'
            echo 'sudo rpm -i atlas-*.aarch64.rpm  # For ARM64'
            echo '```'
            echo ""
            echo "Native packages include:"
            echo "- Automatic systemd service configuration"
            echo "- Interactive EULA acceptance and API key setup"
            echo "- Proper system integration with dedicated atlas user"
            echo ""
            echo "**Option 2: Manual Installation**"
            echo '```bash'
            echo 'tar -xzf atlas_*_linux_*.tar.gz'
            echo 'sudo mv atlas /usr/local/bin/'
            echo '```'
            echo ""
            echo "### Windows"
            echo ""
            echo "**Option 1: Electron Installer (Recommended)**"
            echo "Run the Atlas*.exe installer for a complete installation experience:"
            echo "- License agreement and professional UI"
            echo "- API key collection and secure storage in ~/.atlas/.env"
            echo "- Automatic PATH configuration"
            echo "- System integration"
            echo ""
            echo "**Option 2: Manual Installation**"
            echo "Extract the ZIP file and add the atlas.exe to your PATH."
            echo ""
          } >> changelog.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.version }}
          name: "Atlas (${{ needs.version.outputs.version }})"
          body_path: changelog.md
          draft: true
          prerelease: false
          make_latest: true
          files: |
            ./dist/atlas-bundle-*.tar.gz
            ./dist/atlas-bundle-*.zip
            ./dist/atlas_*.tar.gz
            ./dist/atlas_*.zip
            ./dist/atlas_*.exe
            ./dist/atlas_*.deb
            ./dist/atlas-*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-sandbox:
    needs: [version, package-linux-amd64, package-linux-arm64, package-darwin-amd64, package-darwin-arm64, package-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Upload to sandbox GCS bucket
        uses: ./.github/actions/gcs-upload-sandbox
        with:
          bucket-prefix: ""
          version: ${{ needs.version.outputs.version }}

  upload-production:
    needs: [version, package-linux-amd64, package-linux-arm64, package-darwin-amd64, package-darwin-arm64, package-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Upload to production GCS bucket
        uses: ./.github/actions/gcs-upload-production
        with:
          bucket-prefix: ""
          version: ${{ needs.version.outputs.version }}
