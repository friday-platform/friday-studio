name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v1.0.0)"
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux
            arch: amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            platform: linux
            arch: arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: darwin
            arch: amd64
          - os: macos-15-xlarge
            target: aarch64-apple-darwin
            platform: darwin
            arch: arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows
            arch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.4.0

      - name: Install dependencies
        run: deno install

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            version="${{ inputs.tag }}"
          else
            version="${{ github.ref_name }}"
          fi
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "Version: $version"
        shell: bash

      - name: Setup cross-compilation for ARM64 (Linux only)
        if: matrix.platform == 'linux' && matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CC=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build binary
        id: build
        uses: ./.github/actions/build-binary
        with:
          version: ${{ steps.version.outputs.version }}
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}
          target: ${{ matrix.target }}

      - name: Sign macOS binary
        if: matrix.platform == 'darwin'
        uses: ./.github/actions/macos-sign
        with:
          binary-path: ${{ steps.build.outputs.binary-path }}
          macos-sign-p12: ${{ secrets.MACOS_SIGN_P12 }}
          macos-sign-password: ${{ secrets.MACOS_SIGN_PASSWORD }}
          macos-sign-identity: ${{ secrets.MACOS_SIGN_IDENTITY }}
          macos-notary-issuer-id: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          macos-notary-key-id: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          macos-notary-key: ${{ secrets.MACOS_NOTARY_KEY }}

      - name: Create archive
        run: |
          binary_name="${{ steps.build.outputs.binary-name }}"
          if [ "${{ matrix.platform }}" == "windows" ]; then
            archive_ext=".zip"
          else
            archive_ext=".tar.gz"
          fi

          archive_name="atlas_${{ steps.version.outputs.version }}_${{ matrix.platform }}_${{ matrix.arch }}${archive_ext}"

          if [ "${{ matrix.platform }}" == "windows" ]; then
            7z a "./dist/${archive_name}" "./dist/${binary_name}" README.md
          else
            tar -czf "./dist/${archive_name}" -C ./dist "${binary_name}" -C .. README.md
          fi

          # Generate checksum
          if [ "${{ matrix.platform }}" == "darwin" ]; then
            shasum -a 256 "./dist/${archive_name}" > "./dist/${archive_name}.sha256"
          else
            sha256sum "./dist/${archive_name}" > "./dist/${archive_name}.sha256"
          fi
        shell: bash

      - name: Create installers
        uses: ./.github/actions/create-installers
        with:
          version: ${{ steps.version.outputs.version }}
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}
          channel: release
          binary-path: ${{ steps.build.outputs.binary-path }}
          macos-installer-p12: ${{ secrets.MACOS_INSTALLER_P12 }}
          macos-installer-password: ${{ secrets.MACOS_INSTALLER_PASSWORD }}
          macos-notary-issuer-id: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          macos-notary-key-id: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          macos-notary-key: ${{ secrets.MACOS_NOTARY_KEY }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: atlas-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            ./dist/atlas_*.tar.gz
            ./dist/atlas_*.zip
            ./dist/atlas_*.pkg
            ./dist/atlas_*.msi
            ./dist/atlas_*.sha256
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            version="${{ inputs.tag }}"
          else
            version="${{ github.ref_name }}"
          fi
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "Version: $version"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist/
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag for changelog generation
          previous_tag=$(git tag --sort=-version:refname | grep -v "${{ steps.version.outputs.version }}" | head -n1)

          if [ -z "$previous_tag" ]; then
            # First release
            echo "## What's New" > changelog.md
            echo "" >> changelog.md
            echo "This is the first release of Atlas." >> changelog.md
            echo "" >> changelog.md
            echo "### Features" >> changelog.md
            git log --oneline --no-merges -20 --pretty=format:"- %s" >> changelog.md
          else
            # Generate changelog since previous tag
            echo "## What's New in ${{ steps.version.outputs.version }}" > changelog.md
            echo "" >> changelog.md

            # Categorize commits
            echo "### ✨ Features" >> changelog.md
            git log --oneline --no-merges ${previous_tag}..${{ steps.version.outputs.version }} --grep="feat" --pretty=format:"- %s" >> changelog.md || echo "- No new features" >> changelog.md
            echo "" >> changelog.md

            echo "### 🐛 Bug Fixes" >> changelog.md
            git log --oneline --no-merges ${previous_tag}..${{ steps.version.outputs.version }} --grep="fix" --pretty=format:"- %s" >> changelog.md || echo "- No bug fixes" >> changelog.md
            echo "" >> changelog.md

            echo "### 📚 Documentation" >> changelog.md
            git log --oneline --no-merges ${previous_tag}..${{ steps.version.outputs.version }} --grep="docs" --pretty=format:"- %s" >> changelog.md || echo "- No documentation changes" >> changelog.md
            echo "" >> changelog.md

            echo "### 🔧 Other Changes" >> changelog.md
            git log --oneline --no-merges ${previous_tag}..${{ steps.version.outputs.version }} --invert-grep --grep="feat" --grep="fix" --grep="docs" --pretty=format:"- %s" >> changelog.md || echo "- No other changes" >> changelog.md
          fi

          echo "" >> changelog.md
          echo "## Installation" >> changelog.md
          echo "" >> changelog.md
          echo "Download the appropriate binary for your platform from the assets below." >> changelog.md
          echo "" >> changelog.md
          echo "### macOS" >> changelog.md
          echo "" >> changelog.md
          echo "**Option 1: Package Installer (Recommended)**" >> changelog.md
          echo "Simply double-click the .pkg file to install. If macOS shows a security warning:" >> changelog.md
          echo "1. Right-click the .pkg file → Open" >> changelog.md
          echo "2. Or go to System Preferences → Security & Privacy → Allow" >> changelog.md
          echo "" >> changelog.md
          echo "**Option 2: Command Line Installation**" >> changelog.md
          echo '```bash' >> changelog.md
          echo 'sudo installer -pkg atlas_*_darwin_*.pkg -target /' >> changelog.md
          echo '```' >> changelog.md
          echo "" >> changelog.md
          echo "**Option 3: Manual Installation**" >> changelog.md
          echo '```bash' >> changelog.md
          echo 'tar -xzf atlas_*_darwin_*.tar.gz' >> changelog.md
          echo 'sudo mv atlas /usr/local/bin/' >> changelog.md
          echo '```' >> changelog.md
          echo "" >> changelog.md
          echo "### Linux" >> changelog.md
          echo '```bash' >> changelog.md
          echo 'tar -xzf atlas_*_linux_*.tar.gz' >> changelog.md
          echo 'sudo mv atlas /usr/local/bin/' >> changelog.md
          echo '```' >> changelog.md
          echo "" >> changelog.md
          echo "### Windows" >> changelog.md
          echo "" >> changelog.md
          echo "**Option 1: MSI Installer (Recommended)**" >> changelog.md
          echo '```powershell' >> changelog.md
          echo 'msiexec /i atlas_*_windows_*.msi /quiet' >> changelog.md
          echo '```' >> changelog.md
          echo "Or double-click the .msi file to install with the GUI." >> changelog.md
          echo "" >> changelog.md
          echo "**Option 2: Manual Installation**" >> changelog.md
          echo "Extract the ZIP file and add the atlas.exe to your PATH." >> changelog.md

      - name: Create checksums file
        run: |
          cd ./dist
          cat *.sha256 > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "Atlas (${{ steps.version.outputs.version }})"
          body_path: changelog.md
          draft: true
          prerelease: false
          make_latest: true
          files: |
            ./dist/atlas_*.tar.gz
            ./dist/atlas_*.zip
            ./dist/atlas_*.pkg
            ./dist/atlas_*.msi
            ./dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-gcs:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Upload to GCS buckets
        uses: ./.github/actions/gcs-upload
        with:
          bucket-prefix: ""
          project-id-sandbox: ${{ secrets.GCP_PROJECT_ID_SANDBOX }}
          project-id-production: ${{ secrets.GCP_PROJECT_ID_PRODUCTION }}
          service-account-sandbox: ${{ secrets.GCP_SERVICE_ACCOUNT_SANDBOX }}
          service-account-production: ${{ secrets.GCP_SERVICE_ACCOUNT_PRODUCTION }}