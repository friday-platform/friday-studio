name: Validate Imports

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

permissions:
  contents: read

jobs:
  validate-imports:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.4.5

      - name: Install dependencies
        run: deno install

      - name: Validate imports
        run: deno run --allow-read --allow-write scripts/validate-imports.ts

      - name: Upload validation results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: import-validation-results
          path: |
            *.log
            *.txt
          retention-days: 1
