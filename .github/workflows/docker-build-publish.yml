name: atlas-cd

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches:
      - main

env:
  GAR_LOCATION: us-west2
  PROJECT_NAME: ${{ secrets.GCP_PROJECT }}
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REPOSITORY: atlas

jobs:
  build-publish:
    name: Build and Publish
    runs-on: ubuntu-latest

    permissions:
      contents: "read"
      id-token: "write"

    steps:
      - uses: actions/checkout@v6

      - name: Build Docker Images
        id: build-image
        run: |-
          docker build \
            --target daemon \
            --tag "$GAR_LOCATION-docker.pkg.dev/$PROJECT_NAME/$REPOSITORY/$REPOSITORY:$GITHUB_SHA" \
            --tag "$GAR_LOCATION-docker.pkg.dev/$PROJECT_NAME/$REPOSITORY/$REPOSITORY:latest" \
            --build-arg GITHUB_SHA="$GITHUB_SHA" \
            --build-arg GITHUB_REF="$GITHUB_REF" \
          .
          docker build \
            --target web-client \
            --tag "$GAR_LOCATION-docker.pkg.dev/$PROJECT_NAME/$REPOSITORY/$REPOSITORY-web-client:$GITHUB_SHA" \
            --tag "$GAR_LOCATION-docker.pkg.dev/$PROJECT_NAME/$REPOSITORY/$REPOSITORY-web-client:latest" \
            --build-arg GITHUB_SHA="$GITHUB_SHA" \
            --build-arg GITHUB_REF="$GITHUB_REF" \
          .
          echo "image=$GAR_LOCATION-docker.pkg.dev/$PROJECT_NAME/$REPOSITORY/$REPOSITORY:$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          echo "web_client_image=$GAR_LOCATION-docker.pkg.dev/$PROJECT_NAME/$REPOSITORY/$REPOSITORY-web-client:$GITHUB_SHA" >> "$GITHUB_OUTPUT"

      - id: "auth"
        name: "Authenticate to Google Cloud"
        uses: "google-github-actions/auth@v3"
        with:
          project_id: ${{ secrets.GCP_PROJECT }}
          workload_identity_provider: "projects/${{ env.PROJECT_ID }}/locations/global/workloadIdentityPools/github/providers/atlas-github"

      - name: Docker configuration
        run: |-
          echo ${{ steps.auth.outputs.auth_token }} | docker login -u oauth2accesstoken --password-stdin https://${{ env.GAR_LOCATION }}-docker.pkg.dev

      - name: Push images
        run: |-
          docker push -a "$GAR_LOCATION-docker.pkg.dev/$PROJECT_NAME/$REPOSITORY/$REPOSITORY"
          docker push -a "$GAR_LOCATION-docker.pkg.dev/$PROJECT_NAME/$REPOSITORY/$REPOSITORY-web-client"

      - name: Fetch tempest-kustomize repository
        uses: actions/checkout@v6
        with:
          repository: tempestteam/tempest-kustomize
          token: ${{ secrets.PAT }}
          path: tempest-kustomize-repository
          fetch-depth: 1

      - name: Update manifest file image tags for atlas sandbox
        uses: mikefarah/yq@master
        with:
          cmd: yq e -i '.spec.template.spec.containers[0].image |= "${{ steps.build-image.outputs.image }}"' 'tempest-kustomize-repository/atlas/overlays/sandbox/deployment.yaml'

      - name: Update manifest file image tags for atlas production
        uses: mikefarah/yq@master
        with:
          cmd: yq e -i '.spec.template.spec.containers[0].image |= "${{ steps.build-image.outputs.image }}"' 'tempest-kustomize-repository/atlas/overlays/production/deployment.yaml'

      - name: Update manifest file image tag for shared atlas-web-client sandbox
        uses: mikefarah/yq@master
        with:
          cmd: yq e -i '.spec.template.spec.containers[0].image |= "${{ steps.build-image.outputs.web_client_image }}"' 'tempest-kustomize-repository/atlas-web-client/overlays/sandbox/deployment.yaml'

      - name: Update manifest file image tag for shared atlas-web-client production
        uses: mikefarah/yq@master
        with:
          cmd: yq e -i '.spec.template.spec.containers[0].image |= "${{ steps.build-image.outputs.web_client_image }}"' 'tempest-kustomize-repository/atlas-web-client/overlays/production/deployment.yaml'

      - name: Setup tempest-kustomize Repository
        working-directory: tempest-kustomize-repository
        run: |
          git fetch origin main
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url --push origin https://github.com/tempestteam/tempest-kustomize.git
          git checkout -b release-atlas-${{ github.sha }}

      - name: Commit
        working-directory: tempest-kustomize-repository
        run: |
          git add .
          git commit -m "Release atlas-${{ github.sha }}"
          git push origin HEAD

      - name: Create PR && merge
        working-directory: tempest-kustomize-repository
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        run: |
          PR_BRANCH="release-atlas-${{ github.sha }}"
          gh pr create -B main -H "$PR_BRANCH" -t "deploy-atlas-${{ github.sha }}" -b ""
          for _ in {1..30}; do gh pr merge "$PR_BRANCH" --squash --admin --delete-branch && exit 0; sleep 2; done
          exit 1
