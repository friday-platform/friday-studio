name: atlas-cd

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches:
      - main

env:
  GAR_LOCATION: us-west2
  PROJECT_NAME: ${{ secrets.GCP_PROJECT }}
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REPOSITORY: atlas

jobs:
  build-publish:
    name: Build and Publish
    runs-on: ubuntu-latest

    permissions:
      contents: "read"
      id-token: "write"
      packages: "read"

    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Images
        id: build-image
        run: |-
          docker build \
            --target daemon \
            --tag "$GAR_LOCATION-docker.pkg.dev/$PROJECT_NAME/$REPOSITORY/$REPOSITORY:$GITHUB_SHA" \
            --tag "$GAR_LOCATION-docker.pkg.dev/$PROJECT_NAME/$REPOSITORY/$REPOSITORY:latest" \
            --build-arg GITHUB_SHA="$GITHUB_SHA" \
            --build-arg GITHUB_REF="$GITHUB_REF" \
          .
          docker build \
            --target web-client \
            --tag "$GAR_LOCATION-docker.pkg.dev/$PROJECT_NAME/$REPOSITORY/$REPOSITORY-web-client:$GITHUB_SHA" \
            --tag "$GAR_LOCATION-docker.pkg.dev/$PROJECT_NAME/$REPOSITORY/$REPOSITORY-web-client:latest" \
            --build-arg GITHUB_SHA="$GITHUB_SHA" \
            --build-arg GITHUB_REF="$GITHUB_REF" \
          .
          echo "image=$GAR_LOCATION-docker.pkg.dev/$PROJECT_NAME/$REPOSITORY/$REPOSITORY:$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          echo "web_client_image=$GAR_LOCATION-docker.pkg.dev/$PROJECT_NAME/$REPOSITORY/$REPOSITORY-web-client:$GITHUB_SHA" >> "$GITHUB_OUTPUT"

      - id: "auth"
        name: "Authenticate to Google Cloud"
        uses: "google-github-actions/auth@v3"
        with:
          project_id: ${{ secrets.GCP_PROJECT }}
          workload_identity_provider: "projects/${{ env.PROJECT_ID }}/locations/global/workloadIdentityPools/github/providers/atlas-github"

      - name: Docker configuration
        run: |-
          echo ${{ steps.auth.outputs.auth_token }} | docker login -u oauth2accesstoken --password-stdin https://${{ env.GAR_LOCATION }}-docker.pkg.dev

      - name: Push images to sandbox
        run: |-
          docker push -a "$GAR_LOCATION-docker.pkg.dev/$PROJECT_NAME/$REPOSITORY/$REPOSITORY"
          docker push -a "$GAR_LOCATION-docker.pkg.dev/$PROJECT_NAME/$REPOSITORY/$REPOSITORY-web-client"

      - name: Push images to production
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        run: |-
          docker tag "$GAR_LOCATION-docker.pkg.dev/$PROJECT_NAME/$REPOSITORY/$REPOSITORY:$GITHUB_SHA" "$GAR_LOCATION-docker.pkg.dev/tempest-production/$REPOSITORY/$REPOSITORY:$GITHUB_SHA"
          docker tag "$GAR_LOCATION-docker.pkg.dev/$PROJECT_NAME/$REPOSITORY/$REPOSITORY-web-client:$GITHUB_SHA" "$GAR_LOCATION-docker.pkg.dev/tempest-production/$REPOSITORY/$REPOSITORY-web-client:$GITHUB_SHA"
          docker push "$GAR_LOCATION-docker.pkg.dev/tempest-production/$REPOSITORY/$REPOSITORY:$GITHUB_SHA"
          docker push "$GAR_LOCATION-docker.pkg.dev/tempest-production/$REPOSITORY/$REPOSITORY-web-client:$GITHUB_SHA"
