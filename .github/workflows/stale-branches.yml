name: "Stale Branch Cleanup"

on:
  schedule:
    # Run daily at 10:00 AM PST (18:00 UTC during standard time, 17:00 UTC during daylight saving)
    # Using UTC time that corresponds to 10 AM PST/PDT
    - cron: '0 18 * * *'

  # Allow manual trigger for testing and immediate cleanup
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run in dry-run mode (no actual deletions)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      max-deletions:
        description: 'Maximum number of branches to delete in a single run'
        required: false
        default: '20'
        type: string

permissions:
  contents: write
  issues: write

jobs:
  stale-branches:
    name: Clean up stale branches
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Clean up stale branches
        uses: crs-k/stale-branches@v8.2.2
        with:
          # Mark branches as stale after 90 days of inactivity
          days-before-stale: 90

          # Delete branches 120 days after last commit (30 days after marking as stale)
          days-before-delete: 120

          # Safety: Don't delete branches that have diverged from main
          # This protects branches with unique work even if they're old
          compare-branches: "save"

          # Check for open pull requests and don't delete branches with active PRs
          pr-check: true

          # Create issues for stale branches (provides visibility before deletion)
          stale-branch-message: |
            This branch has been automatically marked as stale because it has not had any commits for 90 days.

            **Last commit**: 90+ days ago
            **Scheduled for deletion**: In 30 days (120 days total since last commit)

            To keep this branch:
            - Push a new commit to the branch
            - Add branch protection rules
            - Convert to a long-lived feature branch with regular activity

            This is an automated process to keep our repository clean. If this branch contains important work, please take action to preserve it.

          # Issue title format
          issue-title: "Stale branch: "

          # Labels for stale branch issues
          stale-branch-label: "stale-branch"

          # Maximum number of issues to create per run (prevents spam)
          operations-per-run: ${{ github.event.inputs.max-deletions || '20' }}

          # Dry run mode for testing (set via workflow_dispatch or for initial rollout)
          dry-run: ${{ github.event.inputs.dry-run || 'false' }}

          # Comment on issues when branches are deleted
          delete-branch-comment: |
            This branch has been deleted after being stale for 120 days.

            If you need to recover this branch, you can use:
            ```bash
            git reflog
            git checkout -b branch-name <commit-hash>
            ```

            Deleted branches can typically be recovered for ~30 days after deletion.

          # Close stale branch issues automatically when branch is deleted
          close-issues: true

          # Exclude specific branches from cleanup (regex patterns)
          # Protects main and any branch with protection rules
          exempt-branches: "^main$"

          # Don't process branches with these labels (if using issue tracking)
          exempt-issue-labels: "keep-branch,long-term,pinned"

          # Rate limiting - pause between operations (milliseconds)
          # Helps avoid hitting GitHub API rate limits
          rate-limit: 1000

          # GitHub token with appropriate permissions
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary Report
        if: always()
        run: |
          {
            echo "## Stale Branch Cleanup Summary"
            echo ""
            echo "**Run Configuration:**"
            echo "- Stale after: 90 days"
            echo "- Delete after: 120 days"
            echo "- Dry run: ${{ github.event.inputs.dry-run || 'false' }}"
            echo "- Max deletions: ${{ github.event.inputs.max-deletions || '20' }}"
            echo ""
            echo "Check the action logs above for detailed information about processed branches."
          } >> "$GITHUB_STEP_SUMMARY"