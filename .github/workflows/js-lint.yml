name: Lint JS

on:
  pull_request:
    branches: [main]
  merge_group:

permissions:
  contents: read

jobs:
  biome-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.6.1

      - name: Install dependencies
        run: deno install --frozen

      - name: Run Biome check
        run: deno task lint
