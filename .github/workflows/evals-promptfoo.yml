name: Promptfoo Evals

on:
  # Manual-only until LiteLLM proxy hosting is wired into CI. To re-enable
  # automatic runs on PRs, add back:
  #   pull_request:
  #     branches: [main]
  #     paths:
  #       - 'tools/evals/promptfoo/**'
  #       - '.github/workflows/evals-promptfoo.yml'
  # and ensure LITELLM_API_KEY + LITELLM_MASTER_KEY secrets point at a running
  # proxy that routes friday-sm/md/lg → real providers.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  promptfoo-evals:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.4

      - name: Cache Deno dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/deno
          key: deno-${{ hashFiles('deno.lock') }}
          restore-keys: deno-

      - name: Install dependencies
        run: deno install --frozen

      - name: Run promptfoo evals
        env:
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          LITELLM_MASTER_KEY: ${{ secrets.LITELLM_MASTER_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          EVAL_TIER: 'medium'
          PROMPTFOO_SUITE_FLOOR: '70'
          PROMPTFOO_AGGREGATE_CEILING: '85'
        run: deno task evals:promptfoo
