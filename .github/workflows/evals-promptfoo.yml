name: Promptfoo Evals

on:
  pull_request:
    branches: [main]
    paths:
      - 'tools/evals/promptfoo/**'
      - '.github/workflows/evals-promptfoo.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  promptfoo-evals:
    # Gated until LiteLLM proxy hosting is wired into CI. The wrapper script
    # requires LITELLM_API_KEY + LITELLM_MASTER_KEY pointed at a running proxy
    # that routes friday-sm/md/lg → real providers; standing that up inside
    # GitHub Actions (sidecar service, container image, backend keys) is
    # out-of-scope for the gate-logic change. Flip `if:` to `true` (or
    # remove the guard) once the proxy is reachable from the runner.
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.4

      - name: Cache Deno dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/deno
          key: deno-${{ hashFiles('deno.lock') }}
          restore-keys: deno-

      - name: Install dependencies
        run: deno install --frozen

      - name: Run promptfoo evals
        env:
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          LITELLM_MASTER_KEY: ${{ secrets.LITELLM_MASTER_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          EVAL_TIER: 'medium'
          PROMPTFOO_SUITE_FLOOR: '70'
          PROMPTFOO_AGGREGATE_CEILING: '85'
        run: deno task evals:promptfoo
