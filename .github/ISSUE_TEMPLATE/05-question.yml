name: "Question / How do I…?"
description: Ask how to do something — workspace authoring, signal wiring, MCP setup, agent patterns
title: "[Q] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Stuck on how to do something with Friday? Ask here. If you've found an actual bug, please use one of the bug forms instead — they capture more useful context.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I checked [docs.hellofriday.ai](https://docs.hellofriday.ai)
          required: true
        - label: I searched [existing issues](https://github.com/friday-platform/friday-studio/issues?q=is%3Aissue) and didn't find an answer
          required: true

  - type: textarea
    id: question
    attributes:
      label: Your question
      description: What are you trying to do, and where are you stuck?
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What have you tried?
      description: Configs, commands, docs you've followed — and what happened.
    validations:
      required: false

  - type: dropdown
    id: topic
    attributes:
      label: Topic area
      options:
        - "Getting started / installation"
        - "Authoring a workspace.yml"
        - "Signals (HTTP / cron)"
        - "Writing a Python user agent"
        - "Skills"
        - "MCP servers / tools"
        - "Memory"
        - "Desktop app (Studio)"
        - "Examples"
        - "Other / not sure"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: workspace.yml snippet, screenshots, anything that helps.
    validations:
      required: false
