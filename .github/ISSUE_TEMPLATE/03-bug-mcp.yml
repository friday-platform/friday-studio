name: "Bug — MCP integration"
description: Issue with an MCP server — connect, listTools handshake, callTool invocation, or credential resolution
title: "[BUG/mcp] "
labels: ["bug", "area/mcp"]
type: Bug
body:
  - type: markdown
    attributes:
      value: |
        For issues with a **Model Context Protocol (MCP) server** wired into a workspace.

        Friday currently supports two transports: **stdio** (local subprocess) and **http** (remote endpoint). MCP failures are isolated per server — one stuck server should never block others. If it does, that's a daemon bug; use the **Daemon / CLI** form.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched [existing issues](https://github.com/friday-platform/friday-studio/issues?q=is%3Aissue) and didn't find a duplicate
          required: true
        - label: I'm on 0.1.1 or later — the MCP timeout/isolation rewrite landed in 0.1.1 (#116)
          required: true

  - type: input
    id: server_id
    attributes:
      label: Server ID
      description: The key under `tools.mcp.servers` in your `workspace.yml`.
      placeholder: "github-integration"
    validations:
      required: true

  - type: dropdown
    id: transport
    attributes:
      label: Transport
      options:
        - stdio (local subprocess)
        - http (remote endpoint)
    validations:
      required: true

  - type: dropdown
    id: phase
    attributes:
      label: Where does it fail?
      description: Match the lifecycle phase from the daemon logs.
      options:
        - "Credential resolution (before connection — Link service, missing token)"
        - "Reachability probe (HTTP only, 4s timeout)"
        - "List-tools handshake (`createMCPClient` + `listTools`, 20s timeout)"
        - "Tool invocation (`callTool`, 15-minute ceiling)"
        - "Tool name collision (server connected but a tool is shadowed)"
        - "Other / not sure"
    validations:
      required: true

  - type: dropdown
    id: auth
    attributes:
      label: Auth method
      options:
        - "None"
        - "Bearer token from process env"
        - "Bearer token from Link credential (provider default)"
        - "Bearer token from Link credential (explicit credential ID)"
        - "Other"
    validations:
      required: true

  - type: dropdown
    id: history
    attributes:
      label: Has this server worked before in this workspace?
      options:
        - "Yes — it broke after some change"
        - "No — first time setting it up"
        - "Intermittently"
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error message / log line
      description: Exact text from daemon logs or CLI output. Include the `operation: "mcp_timeout"` log if you see one (it has `phase`, `serverId`, `durationMs`).
      render: shell
    validations:
      required: true

  - type: textarea
    id: server_config
    attributes:
      label: workspace.yml — `tools.mcp.servers[<id>]` stanza
      description: Paste just the failing server's config. Redact tokens.
      render: yaml
    validations:
      required: true

  - type: input
    id: studio_version
    attributes:
      label: friday-studio version
      placeholder: "0.1.1"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else useful — e.g. the MCP server's own logs, network conditions, whether it works against another MCP client.
    validations:
      required: false
