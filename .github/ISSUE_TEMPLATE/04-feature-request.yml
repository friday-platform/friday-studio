name: "Feature request"
description: Suggest a new capability or improvement
title: "[FEAT] "
labels: ["enhancement"]
type: Feature
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! The clearer the problem, the better the solution we can land.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched [existing issues](https://github.com/friday-platform/friday-studio/issues?q=is%3Aissue) and didn't find a duplicate
          required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user pain or limitation. Concrete scenarios help us prioritize.
      placeholder: "I'm always frustrated when …"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen? Sketch the API, UX, or config if you have one in mind.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds, related tools, or other approaches you've thought about — and why they fall short.
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - "Daemon / atlasd"
        - "CLI / atlas-cli"
        - "Desktop app (Studio installer / tray)"
        - "Web playground"
        - "workspace.yml schema"
        - "Python user agents / friday-agent-sdk"
        - "Skills system"
        - "MCP integration"
        - "Memory"
        - "Examples / docs"
        - "Cross-cutting / not sure"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, prior art, or anything else useful.
    validations:
      required: false
