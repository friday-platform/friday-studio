name: Bug report
description: Report something that's broken or behaving unexpectedly
title: "[BUG] "
labels: ["bug"]
type: Bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The more concrete the repro, the faster we can fix it.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched [existing issues](https://github.com/friday-platform/friday-studio/issues?q=is%3Aissue) and didn't find a duplicate
          required: true
        - label: I'm on a recent release (or `main`) — see [Releases](https://github.com/friday-platform/friday-studio/releases)
          required: true

  - type: textarea
    id: description
    attributes:
      label: What's broken?
      description: A clear, concise description of the bug — what you saw vs. what you expected.
      placeholder: "When I run X, the daemon Y instead of Z."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Minimal, ordered steps that reliably trigger the bug. Include exact commands, prompts, or workspace YAML when relevant.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "I expected the daemon to ..."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Paste relevant daemon logs, stack traces, or CLI output. Use a fenced block.
      render: shell
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Where does the bug live?
      options:
        - Daemon (atlasd / HTTP API)
        - CLI (atlas-cli / `deno task atlas`)
        - Studio installer (macOS tray / Tauri launcher)
        - Web playground (SvelteKit UI)
        - Python user agents (`friday-agent-sdk`)
        - Skills system
        - MCP tools / integration
        - Examples / docs
        - Other / not sure
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple silicon)
        - macOS (Intel)
        - Linux
        - Windows
        - Docker (any host)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: friday-studio version
      description: Output of `deno task atlas --version`, the release tag (e.g. `0.1.1`), or commit SHA if running `main`.
      placeholder: "0.1.1"
    validations:
      required: true

  - type: input
    id: runtimes
    attributes:
      label: Runtime versions
      description: Relevant runtime versions — `deno --version`, `go version`, `node --version`, `uv --version`. Skip any that don't apply.
      placeholder: "deno 2.7.0 / go 1.26 / node 24.0.0"
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, config snippets, related issues, or anything else useful.
    validations:
      required: false
