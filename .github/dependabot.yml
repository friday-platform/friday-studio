      - "ljagiello"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
      - "claude-code"
    rebase-strategy: "auto"

  # Keep Docker dependencies up to date (for atlas-operator)
  - package-ecosystem: "docker"
