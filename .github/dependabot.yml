version: 2
updates:
  # Keep GitHub Actions up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:00"
    open-pull-requests-limit: 10
    assignees:
      - "ljagiello"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    rebase-strategy: "auto"

  # Deno/JSR dependencies in deno.json are handled by .github/workflows/update-deno-deps.yml
  # using Deno's native `deno outdated` command (available in Deno 2.x+)
  # GitHub Dependabot doesn't have native support for Deno's deno.json yet

  # Keep npm dependencies up to date (root workspace)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:00"
    versioning-strategy: "increase"
    open-pull-requests-limit: 10
    assignees:
      - "ljagiello"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
    rebase-strategy: "auto"
    groups:
      std-packages:
        patterns:
          - "@jsr/std__*"
      atlas-workspace:
        patterns:
          - "@atlas/*"
    # Block major version upgrades for AI SDK - requires coordinated migration
    # See: https://ai-sdk.dev/docs/migration-guides/migration-guide-6-0
    ignore:
      - dependency-name: "ai"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@ai-sdk/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "ai-sdk-provider-claude-code"
        update-types: ["version-update:semver-major"]

  # Keep Docker dependencies up to date
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:00"
    open-pull-requests-limit: 5
    assignees:
      - "ljagiello"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
    rebase-strategy: "auto"
    ignore:
      - dependency-name: "denoland/deno"

  # Keep Rust dependencies up to date (for web-client/src-tauri)
  - package-ecosystem: "cargo"
    directory: "/apps/web-client/src-tauri"
    schedule:
      interval: "daily"
      time: "09:00"
    open-pull-requests-limit: 5
    assignees:
      - "ljagiello"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "rust"
      - "tauri"
    rebase-strategy: "auto"
    groups:
      tauri-plugins:
        patterns:
          - "tauri-plugin-*"
    # Known transitive dependency issue - glib vulnerability in webkit2gtk (Linux only)
    # Waiting for upstream fix in https://github.com/tauri-apps/webkit2gtk-rs
    ignore:
      - dependency-name: "glib"
        # Will be resolved when webkit2gtk updates to use glib 0.20.0+

  # Keep Rust dependencies up to date (for atlas-installer/src-tauri)
  - package-ecosystem: "cargo"
    directory: "/apps/atlas-installer/src-tauri"
    schedule:
      interval: "daily"
      time: "09:00"
    open-pull-requests-limit: 5
    assignees:
      - "ljagiello"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "rust"
      - "tauri"
    rebase-strategy: "auto"
    groups:
      tauri-plugins:
        patterns:
          - "tauri-plugin-*"
    # Known transitive dependency issue - glib vulnerability in webkit2gtk (Linux only)
    # Waiting for upstream fix in https://github.com/tauri-apps/webkit2gtk-rs
    ignore:
      - dependency-name: "glib"
        # Will be resolved when webkit2gtk updates to use glib 0.20.0+

  # Keep Docker image npm dependencies up to date (Claude Code CLI)
  - package-ecosystem: "npm"
    directory: "/docker"
    schedule:
      interval: "daily"
      time: "09:00"
    open-pull-requests-limit: 5
