  # Keep google-workspace-mcp Python dependencies up to date
  # Uses pip-compile: requirements.in (constraints) → requirements.txt (lockfile)
  - package-ecosystem: "pip"
    directory: "/apps/google-workspace-mcp"
    schedule:
      interval: "daily"
      time: "09:00"
    open-pull-requests-limit: 5
    assignees:
      - "ljagiello"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "python"
      - "mcp"
    rebase-strategy: "auto"
    # fastmcp 3.0 made Context.get_state() async — breaks workspace-mcp's
    # synchronous usage, causing unawaited coroutines in Google API tool calls
    ignore:
      - dependency-name: "fastmcp"
        update-types: ["version-update:semver-major"]

  # Keep google-workspace-mcp Docker dependencies up to date
