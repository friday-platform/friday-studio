version: 2
updates:
  # Keep GitHub Actions up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:00"
    open-pull-requests-limit: 10
    assignees:
      - "ljagiello"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    rebase-strategy: "auto"

  # Deno/JSR dependencies in deno.json are handled by .github/workflows/update-deno-deps.yml
  # using Deno's native `deno outdated` command (available in Deno 2.x+)
  # GitHub Dependabot doesn't have native support for Deno's deno.json yet

  # Keep npm dependencies up to date (root workspace)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:00"
    versioning-strategy: "increase"
    open-pull-requests-limit: 10
    assignees:
      - "ljagiello"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
    rebase-strategy: "auto"
    groups:
      std-packages:
        patterns:
          - "@jsr/std__*"
      atlas-workspace:
        patterns:
          - "@atlas/*"
      opentelemetry:
        patterns:
          - "@opentelemetry/*"
    # Block major version upgrades for AI SDK - requires coordinated migration
    # See: https://ai-sdk.dev/docs/migration-guides/migration-guide-6-0
    ignore:
      - dependency-name: "ai"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@ai-sdk/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "ai-sdk-provider-claude-code"
        update-types: ["version-update:semver-major"]
      # postgres 3.4.8 has broken TransactionSql types (Omit strips call signatures)
      # See: https://github.com/porsager/postgres/issues/1143
      - dependency-name: "postgres"
        versions: [">= 3.4.8"]
      # vite-plugin-svelte v7 requires Vite 8 (Rolldown) — hard API deps on
      # optimizeDeps.rolldownOptions and transformWithOxc. Pinned to ~6.2.4 until
      # Vite 8 reaches stable. See PR #2164 for context.
      - dependency-name: "@sveltejs/vite-plugin-svelte"
        update-types: ["version-update:semver-major"]
      # hono >= 4.12.4 breaks type inference: ApplyGlobalResponse refactoring
      # collapses hc<T> client types to unknown, and Deno resolves validator
      # peer deps to a different hono version causing branded type mismatches.
      # Pinned to 4.12.3 until upstream fix lands.
      # See: TEM-3792, https://github.com/honojs/hono/pull/4777
      - dependency-name: "hono"
        versions: [">= 4.12.4"]

  # Keep Docker dependencies up to date
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:00"
    open-pull-requests-limit: 5
    assignees:
      - "ljagiello"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
    rebase-strategy: "auto"
    # Block denoland/deno 2.6.8 - ships glibc libs that break apk
    # See: https://github.com/denoland/deno/issues/32037
    # Block golang >= 1.26 (still RC). Docker `versions` uses Bundler syntax
    # on the extracted numeric version, not the full tag.
    # See: https://github.com/dependabot/dependabot-core/issues/9007
    ignore:
      - dependency-name: "denoland/deno"
        versions: ["2.6.8"]
      - dependency-name: "golang"
        versions: [">= 1.26.a"]

  # Keep Docker image npm dependencies up to date (Claude Code CLI)
  - package-ecosystem: "npm"
    directory: "/docker"
    schedule:
      interval: "daily"
      time: "09:00"
