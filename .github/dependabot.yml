version: 2
updates:
  # Keep GitHub Actions up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      time: "04:17"
    open-pull-requests-limit: 10
    assignees:
      - "ljagiello"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    rebase-strategy: "auto"

  # Deno/JSR dependencies in deno.json are handled by .github/workflows/update-deno-deps.yml
  # using Deno's native `deno outdated` command (available in Deno 2.x+)
  # GitHub Dependabot doesn't have native support for Deno's deno.json yet

  # Keep npm dependencies up to date (root workspace)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      time: "04:17"
    versioning-strategy: "increase"
    open-pull-requests-limit: 10
    assignees:
      - "ljagiello"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
    rebase-strategy: "auto"
    groups:
      std-packages:
        patterns:
          - "@jsr/std__*"
      atlas-workspace:
        patterns:
          - "@atlas/*"
      opentelemetry:
        patterns:
          - "@opentelemetry/*"
    ignore:
      # postgres 3.4.8 has broken TransactionSql types (Omit strips call signatures)
      # See: https://github.com/porsager/postgres/issues/1143
      - dependency-name: "postgres"
        versions: [">= 3.4.8"]
      # Vite 8 uses Rolldown (Rust native bindings) which fails on Alpine/musl
      # Docker images — rolldown-binding.linux-x64-musl.node not found.
      # Also requires vite-plugin-svelte v7 migration. Block until resolved.
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      # vite-plugin-svelte v7 requires Vite 8 (Rolldown) — hard API deps on
      # optimizeDeps.rolldownOptions and transformWithOxc. Pinned to ~6.2.4 until
      # Vite 8 reaches stable. See PR #2164 for context.
      - dependency-name: "@sveltejs/vite-plugin-svelte"
        update-types: ["version-update:semver-major"]

  # Keep Docker dependencies up to date
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      time: "04:17"
    open-pull-requests-limit: 5
    assignees:
      - "ljagiello"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
    rebase-strategy: "auto"
    # Block denoland/deno >= 2.7.5 - OTEL regression deadlocks compiled binaries
    # when OTEL_DENO=true is baked in at compile time. Affects 2.7.5 and 2.7.6.
    # See: https://github.com/denoland/deno/pull/32501, #32557
    ignore:
      - dependency-name: "denoland/deno"
        versions: [">= 2.7.5, < 2.8.0"]

  # Keep Docker image npm dependencies up to date (Claude Code CLI)
  - package-ecosystem: "npm"
    directory: "/docker"
    schedule:
      interval: "weekly"
      time: "04:17"
    open-pull-requests-limit: 5
    assignees:
      - "ljagiello"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
      - "claude-code"
    rebase-strategy: "auto"

  # Keep Go dependencies up to date (root go.mod)
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      time: "04:17"
    open-pull-requests-limit: 10
    assignees:
      - "ljagiello"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "go"
    rebase-strategy: "auto"
    groups:
      k8s:
        patterns:
          - "k8s.io/*"
      opentelemetry:
        patterns:
          - "go.opentelemetry.io/*"
          - "github.com/open-telemetry/*"

  # Keep Docker dependencies up to date (for link service)
  - package-ecosystem: "docker"
    directory: "/apps/link"
    schedule:
      interval: "weekly"
      time: "04:17"
    open-pull-requests-limit: 5
    assignees:
      - "ljagiello"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
    rebase-strategy: "auto"
    # Block denoland/deno >= 2.7.5 - OTEL regression deadlocks compiled binaries
    # See: https://github.com/denoland/deno/pull/32501, #32557
    ignore:
      - dependency-name: "denoland/deno"
        versions: [">= 2.7.5, < 2.8.0"]

  # Keep npm dependencies up to date (for link service)
  - package-ecosystem: "npm"
    directory: "/apps/link"
    schedule:
      interval: "weekly"
      time: "04:17"
    versioning-strategy: "increase"
    open-pull-requests-limit: 5
    assignees:
      - "ljagiello"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
      - "link"
    rebase-strategy: "auto"
    ignore:
      # postgres 3.4.8 has broken TransactionSql types (Omit strips call signatures)
      # See: https://github.com/porsager/postgres/issues/1143
      - dependency-name: "postgres"
        versions: [">= 3.4.8"]

