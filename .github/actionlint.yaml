# Configuration for actionlint
# Defines custom runner labels used by this repository

self-hosted-runner:
  # GitHub-hosted larger runners
  labels:
    - ubuntu-latest-4-cores
    - ubuntu-latest-8-cores
    - ubuntu-latest-16-cores
    - ubuntu-latest-32-cores
    - ubuntu-latest-64-cores
    - windows-latest-4-cores
    - windows-latest-8-cores
    - windows-latest-16-cores
    - windows-latest-32-cores
    - windows-latest-64-cores
    - macos-latest-xlarge
    - macos-latest-large
    - macos-13-xlarge
    - macos-13-large
    - macos-14-xlarge
    - macos-14-large
    - macos-15-xlarge
    - macos-15-large
    # Org-level self-hosted runner used by studio-build.yml's Windows job
    # (see github.com/friday-platform/friday-studio/settings/actions/runners).
    - windows-2025-8-cores