name: "Upload to Google Cloud Storage (Production)"
description: "Uploads artifacts to production GCS bucket"

inputs:
  bucket-prefix:
    description: "Prefix for the bucket path (e.g., edge/, nightly/, or empty for release)"
    required: false
    default: ""
  version:
    description: "Version string for the artifacts"
    required: true

runs:
  using: "composite"
  steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts/
        merge-multiple: true

    - name: Authenticate to Google Cloud (Production)
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: projects/180211378242/locations/global/workloadIdentityPools/github-actions/providers/atlas-github
        service_account: atlas-github-ci@tempest-production.iam.gserviceaccount.com
        create_credentials_file: true
        export_environment_variables: true

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Upload artifacts to production GCS
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        cd ./artifacts

        # Upload all artifacts to production bucket with version prefix (flat structure)
        if ls atlas_*.tar.gz 1> /dev/null 2>&1; then
          gsutil -m cp atlas_*.tar.gz gs://tempest-production-atlas-binaries/${{ inputs.bucket-prefix }}
        fi
        if ls atlas_*.zip 1> /dev/null 2>&1; then
          gsutil -m cp atlas_*.zip gs://tempest-production-atlas-binaries/${{ inputs.bucket-prefix }}
        fi
        if ls atlas_*.pkg 1> /dev/null 2>&1; then
          gsutil -m cp atlas_*.pkg gs://tempest-production-atlas-binaries/${{ inputs.bucket-prefix }}
        fi
        if ls atlas_*.msi 1> /dev/null 2>&1; then
          gsutil -m cp atlas_*.msi gs://tempest-production-atlas-binaries/${{ inputs.bucket-prefix }}
        fi
        # Upload Electron installers (new naming convention)
        if ls atlas_*.exe 1> /dev/null 2>&1; then
          gsutil -m cp atlas_*.exe gs://tempest-production-atlas-binaries/${{ inputs.bucket-prefix }}
        fi
        if ls atlas_*.AppImage 1> /dev/null 2>&1; then
          gsutil -m cp atlas_*.AppImage gs://tempest-production-atlas-binaries/${{ inputs.bucket-prefix }}
        fi
        # Upload Linux packages
        if ls atlas_*.deb 1> /dev/null 2>&1; then
          gsutil -m cp atlas_*.deb gs://tempest-production-atlas-binaries/${{ inputs.bucket-prefix }}
        fi
        if ls atlas-*.rpm 1> /dev/null 2>&1; then
          gsutil -m cp atlas-*.rpm gs://tempest-production-atlas-binaries/${{ inputs.bucket-prefix }}
        fi

        echo "Uploaded ${{ inputs.bucket-prefix }} artifacts to production GCS bucket"

    - name: Cleanup old artifacts (production)
      shell: bash
      run: |
        cd ./artifacts

        # Only cleanup for edge and nightly channels to prevent removing stable releases
        if [ "${{ inputs.bucket-prefix }}" == "edge/" ] || [ "${{ inputs.bucket-prefix }}" == "nightly/" ]; then
          echo "Cleaning up old ${{ inputs.bucket-prefix }} versions in production (keeping last 7)..."

          # Extract channel prefix for file matching (e.g., "edge" or "nightly")
          CHANNEL=$(echo "${{ inputs.bucket-prefix }}" | sed 's/\///g')

          # Cleanup artifacts: Remove artifacts older than 7 days
          echo "Removing ${CHANNEL} artifacts older than 7 days..."

          # Calculate the date 7 days ago
          if [[ "$OSTYPE" == "darwin"* ]]; then
            # macOS date command
            CUTOFF_DATE=$(date -u -v-7d +%Y-%m-%d)
          else
            # Linux date command
            CUTOFF_DATE=$(date -u -d '7 days ago' +%Y-%m-%d)
          fi

          # Function to check if a file is older than cutoff date
          # GCS URLs contain timestamp in format: atlas_edge-YYYYMMDD-HHMMSS-hash_platform.ext
          cleanup_old_files() {
            local pattern="$1"
            local bucket_path="gs://tempest-production-atlas-binaries/${{ inputs.bucket-prefix }}"

            gsutil ls -l "${bucket_path}${pattern}" 2>/dev/null | \
            while read -r size date time url; do
              # Skip the TOTAL line
              if [[ "$size" == "TOTAL:" ]]; then
                continue
              fi

              # Extract date from filename (format: atlas_edge-YYYYMMDD-HHMMSS-hash_platform.ext)
              if [[ "$url" =~ atlas_${CHANNEL}-([0-9]{8})-[0-9]{6}- ]]; then
                file_date="${BASH_REMATCH[1]}"
                # Convert YYYYMMDD to YYYY-MM-DD for comparison
                file_date_formatted="${file_date:0:4}-${file_date:4:2}-${file_date:6:2}"

                # Compare dates
                if [[ "$file_date_formatted" < "$CUTOFF_DATE" ]]; then
                  echo "Removing old artifact: $url (from $file_date_formatted)"
                  gsutil rm "$url" || echo "Failed to remove $url"
                fi
              fi
            done
          }

          # Cleanup all old artifacts
          cleanup_old_files "atlas_${CHANNEL}-*"


          echo "Production ${{ inputs.bucket-prefix }} cleanup completed"
        else
          echo "Skipping cleanup for release channel (stable releases preserved)"
        fi
