name: "Build Atlas Binary"
description: "Builds Atlas binary with version information and cross-platform support"

inputs:
  version:
    description: "Version string to embed in the binary"
    required: true
  platform:
    description: "Target platform (darwin, windows, linux)"
    required: true
  arch:
    description: "Target architecture (amd64, arm64)"
    required: true
  target:
    description: "Deno compilation target (e.g., x86_64-unknown-linux-gnu)"
    required: true

outputs:
  binary-path:
    description: "Path to the built binary"
    value: ${{ steps.build.outputs.binary-path }}
  binary-name:
    description: "Name of the built binary"
    value: ${{ steps.build.outputs.binary-name }}

runs:
  using: "composite"
  steps:
    - name: Prepare version information
      shell: bash
      run: |
        # Get version and git information
        VERSION="${{ inputs.version }}"
        GIT_SHA=$(git rev-parse --short HEAD)

        echo "Building version: $VERSION"
        echo "Git SHA: $GIT_SHA"

        # Replace version placeholders with cross-platform sed syntax
        if [[ "$OSTYPE" == "darwin"* ]]; then
          # macOS sed requires backup extension (empty string for no backup)
          sed -i "" "s|__ATLAS_VERSION__|$VERSION|g" src/utils/version.ts
          sed -i "" "s|__ATLAS_GIT_SHA__|$GIT_SHA|g" src/utils/version.ts
        else
          # Linux/Windows with bash sed syntax
          sed -i "s|__ATLAS_VERSION__|$VERSION|g" src/utils/version.ts
          sed -i "s|__ATLAS_GIT_SHA__|$GIT_SHA|g" src/utils/version.ts
        fi

    - name: Build binary
      id: build
      shell: bash
      run: |
        mkdir -p ./dist

        # Set binary name based on platform
        if [ "${{ inputs.platform }}" == "windows" ]; then
          binary_name="atlas.exe"
        else
          binary_name="atlas"
        fi

        echo "binary-name=$binary_name" >> $GITHUB_OUTPUT
        echo "binary-path=./dist/$binary_name" >> $GITHUB_OUTPUT

        # Native compilation for ARM64 macOS (using macos-15-xlarge), cross-compilation for others
        if [ "${{ inputs.platform }}" == "darwin" ] && [ "${{ inputs.arch }}" == "arm64" ]; then
          echo "Native compilation for ARM64 macOS (no --target flag)"
          deno compile \
            --no-check \
            --allow-read \
            --allow-write \
            --allow-net \
            --allow-env \
            --allow-run \
            --allow-sys \
            --allow-ffi \
            --unstable-broadcast-channel \
            --unstable-worker-options \
            --include=src \
            --include=examples \
            --include=packages/bundled-agents \
            --output "./dist/${binary_name}" \
            ./src/cli.tsx
        else
          echo "Cross-compiling for target: ${{ inputs.target }}"
          deno compile \
            --no-check \
            --allow-read \
            --allow-write \
            --allow-net \
            --allow-env \
            --allow-run \
            --allow-sys \
            --allow-ffi \
            --unstable-broadcast-channel \
            --unstable-worker-options \
            --include=src \
            --include=examples \
            --include=packages/bundled-agents \
            --target ${{ inputs.target }} \
            --output "./dist/${binary_name}" \
            ./src/cli.tsx
        fi

        # Test the built binary (skip only for incompatible architecture combinations)
        echo "Testing built binary..."
        if [ "${{ inputs.platform }}" == "windows" ]; then
          echo "Skipping binary test on Windows (signal handling in CI)"
          echo "Binary built successfully"
        elif [ "${{ inputs.platform }}" == "linux" ] && [ "${{ inputs.arch }}" == "arm64" ]; then
          echo "Skipping binary test for cross-compiled ARM64 Linux (cannot run on x86_64 runner)"
          echo "Binary built successfully"
        else
          if "./dist/${binary_name}" --version; then
            echo "Binary built and tested successfully"
          else
            echo "Binary test failed"
            exit 1
          fi
        fi
