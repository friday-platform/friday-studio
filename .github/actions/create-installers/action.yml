name: "Create Platform Installers"
description: "Creates cross-platform Electron installers for macOS, Windows, and Linux"

inputs:
  version:
    description: "Version string for the installer"
    required: true
  platform:
    description: "Target platform (darwin, windows, linux)"
    required: true
  arch:
    description: "Target architecture (amd64, arm64)"
    required: true
  channel:
    description: "Release channel (release, edge, nightly)"
    required: true
  binary-path:
    description: "Path to the binary to package"
    required: true
  binary-name:
    description: "Name of the binary file"
    required: true
  diagnostics-binary-path:
    description: "Path to the diagnostics binary to package"
    required: false
  diagnostics-binary-name:
    description: "Name of the diagnostics binary file"
    required: false
  web-app-binary-path:
    description: "Path to the web app binary to package"
    required: false
  web-app-binary-name:
    description: "Name of the web app binary file"
    required: false
  macos-installer-p12:
    description: "Base64 encoded P12 certificate for installer signing"
    required: false
  macos-installer-password:
    description: "Password for the installer P12 certificate"
    required: false
  macos-notary-issuer-id:
    description: "Apple Notary API issuer ID"
    required: false
  macos-notary-key-id:
    description: "Apple Notary API key ID"
    required: false
  macos-notary-key:
    description: "Base64 encoded Apple Notary API private key"
    required: false

outputs:
  installer-path:
    description: "Path to the created installer"
    value: ${{ steps.create.outputs.installer-path }}
  checksum-path:
    description: "Path to the installer checksum file"
    value: ${{ steps.create.outputs.checksum-path }}

runs:
  using: "composite"
  steps:
    - name: Setup build environment
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: "npm"
        cache-dependency-path: "tools/atlas-installer/package-lock.json"

    - name: Prepare installer
      shell: bash
      run: |
        set -e
        cd tools/atlas-installer

        # Install dependencies
        rm -rf node_modules
        npm install

        # Create binary directory
        mkdir -p atlas-binary

        # Copy binaries using a loop
        binaries=(
          "${{ inputs.binary-path }}:${{ inputs.binary-name }}:required"
          "${{ inputs.diagnostics-binary-path }}:${{ inputs.diagnostics-binary-name }}:optional"
          "${{ inputs.web-app-binary-path }}:${{ inputs.web-app-binary-name }}:optional"
        )

        for entry in "${binaries[@]}"; do
          IFS=':' read -r path name type <<< "$entry"

          # Skip if path is empty
          [ -z "$path" ] && continue

          # Check if file exists (fail for required, skip for optional)
          if [ ! -e "../../$path" ]; then
            [ "$type" = "required" ] && { echo "ERROR: Required binary not found: $path"; exit 1; }
            continue
          fi

          # Copy based on type (.app directories need -R)
          if [[ "$path" == *.app ]]; then
            cp -R "../../$path" "atlas-binary/$name"
          else
            cp "../../$path" "atlas-binary/$name"
          fi

          # Make executable (ignore errors)
          chmod +x "atlas-binary/$name" 2>/dev/null || true
        done

    - name: Build installer
      shell: bash
      id: build
      run: |
        set -e
        cd tools/atlas-installer

        # Convert version to semver using shared script
        semver=$(../../scripts/convert-version-to-semver.sh "${{ inputs.version }}")

        npm version "$semver" --no-git-tag-version

        # Setup macOS notarization if needed
        if [ "${{ inputs.platform }}" == "darwin" ] && [ -n "${{ inputs.macos-notary-issuer-id }}" ]; then
          export APPLE_API_ISSUER="${{ inputs.macos-notary-issuer-id }}"
          export APPLE_API_KEY_ID="${{ inputs.macos-notary-key-id }}"
          echo "${{ inputs.macos-notary-key }}" | base64 --decode > "AuthKey_${{ inputs.macos-notary-key-id }}.p8"
          export APPLE_API_KEY="$(pwd)/AuthKey_${{ inputs.macos-notary-key-id }}.p8"
        fi

        # Build installer using platform mapping
        platform="${{ inputs.platform }}"
        npm_arch="${{ inputs.arch == 'arm64' && 'arm64' || 'x64' }}"

        # Map platform to npm build target
        case "$platform" in
          darwin) platform_target="mac" ;;
          windows) platform_target="win" ;;
          linux) platform_target="linux" ;;
        esac

        npm_cmd="build:${platform_target}:${npm_arch}"
        npm run "$npm_cmd"

        # Cleanup sensitive files
        rm -f AuthKey_*.p8

    - name: Process installer output
      shell: bash
      id: create
      run: |
        set -e
        cd tools/atlas-installer

        # Find installer by platform
        platform="${{ inputs.platform }}"
        arch="${{ inputs.arch }}"
        version="${{ inputs.version }}"

        # Find installer based on platform
        case "$platform" in
          darwin)
            installer=$(find build/ -type f -name "*.zip" | head -1)
            ;;
          windows)
            installer=$(find build/ -type f -name "*.exe" | head -1)
            ;;
          linux)
            installer=$(find build/ -type f \( -name "*.AppImage" -o -name "*.tar.gz" \) | head -1)
            ;;
        esac

        [ -z "$installer" ] && { echo "ERROR: No installer found"; ls -la build/; exit 1; }

        # Determine target filename
        ext="${installer##*.}"
        [ "$ext" = "gz" ] && ext="tar.gz"
        target="atlas_${version}_${platform}_${arch}.${ext}"

        # Move and process installer
        mv "$installer" "build/$target"
        installer_path="$(pwd)/build/$target"

        # Generate checksum (prefer sha256sum, fallback to shasum)
        hash_cmd="sha256sum"
        command -v sha256sum >/dev/null || hash_cmd="shasum -a 256"
        $hash_cmd "build/$target" | cut -d' ' -f1 > "build/${target}.sha256"
        checksum_path="$(pwd)/build/${target}.sha256"

        # Copy to dist for workflow compatibility
        cp "build/$target" "build/${target}.sha256" ../../dist/

        # Set outputs and report
        echo "installer-path=$installer_path" >> "$GITHUB_OUTPUT"
        echo "checksum-path=$checksum_path" >> "$GITHUB_OUTPUT"
        echo "Installer: $target ($(du -h build/$target | cut -f1))"