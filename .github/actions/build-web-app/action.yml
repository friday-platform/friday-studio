name: "Build Atlas Web App"
description: "Builds Atlas Web App using Tauri with cross-platform support"

inputs:
  version:
    description: "Version string to embed in the web app"
    required: true
  platform:
    description: "Target platform (darwin, windows, linux)"
    required: true
  arch:
    description: "Target architecture (amd64, arm64)"
    required: true
  target:
    description: "Tauri target (e.g., x86_64-unknown-linux-gnu)"
    required: true

outputs:
  bundle-path:
    description: "Path to the built Tauri bundle (.app for macOS, installers for others)"
    value: ${{ steps.select-bundle.outputs.bundle-path }}
  bundle-name:
    description: "Name of the built bundle"
    value: ${{ steps.build-info.outputs.bundle-name }}

runs:
  using: "composite"
  steps:
    - name: Add Rust target
      shell: bash
      run: |
        # Use GitHub's pre-installed Rust
        rustc --version
        rustup target add ${{ inputs.target }}
        # Verify the target is installed
        rustup target list --installed

    - name: Setup Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: "./apps/web-client/src-tauri -> target"
        key: ${{ inputs.target }}
        cache-on-failure: true
        cache-all-crates: true

    - name: Install Linux system dependencies
      if: inputs.platform == 'linux'
      shell: bash
      run: |
        # Install Tauri dependencies (patchelf is already pre-installed)
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          libgtk-3-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev

    - name: Update version in Tauri config
      shell: bash
      working-directory: ./apps/web-client
      run: |
        # Use jq for proper JSON manipulation
        if ! command -v jq &> /dev/null; then
          echo "Installing jq..."
          if [ "${{ inputs.platform }}" == "linux" ]; then
            sudo apt-get update && sudo apt-get install -y jq
          elif [ "${{ inputs.platform }}" == "darwin" ]; then
            brew install jq
          elif [ "${{ inputs.platform }}" == "windows" ]; then
            choco install jq
          fi
        fi

        # Transform version to valid semver for Tauri
        # Edge versions like edge-20250901-210021-e3a51f71 need to be converted to semver
        # Tauri only accepts major.minor.patch or major.minor.patch-prerelease
        # Prerelease can only have alphanumeric characters and hyphens (no dots)
        version="${{ inputs.version }}"
        if [[ "$version" == edge-* ]]; then
          # Convert edge-YYYYMMDD-HHMMSS-gitsha to 0.0.0-edge-YYYYMMDD-HHMMSS-gitsha
          # Replace all hyphens after 'edge' with the version parts
          tauri_version="0.0.0-${version}"
        elif [[ "$version" == nightly-* ]]; then
          # Convert nightly-YYYYMMDD-gitsha to 0.0.0-nightly-YYYYMMDD-gitsha
          tauri_version="0.0.0-${version}"
        elif [[ "$version" == v* ]]; then
          # Remove 'v' prefix for releases: v1.2.3 -> 1.2.3
          tauri_version="${version#v}"
        else
          # Regular versions pass through unchanged
          tauri_version="$version"
        fi

        # Windows MSI requires numeric-only prerelease (<= 65535). Normalize when targeting Windows.
        if [ "${{ inputs.platform }}" == "windows" ]; then
          base_version=$(echo "$tauri_version" | cut -d'-' -f1)
          # Build a numeric, bounded prerelease from day-of-year and minute (max ~36659)
          doy=$(date -u +%j)
          minute=$(date -u +%M)
          build_num=$((10#$doy * 100 + 10#$minute))
          if [ $build_num -gt 65535 ]; then build_num=65535; fi
          tauri_version="${base_version}-${build_num}"
        fi

        # Update version in tauri.conf.json
        jq --arg version "$tauri_version" '.version = $version' \
          src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp
        mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json

        echo "Updated Tauri version to: $tauri_version (from $version)"
        jq '.version' src-tauri/tauri.conf.json

    - name: Set build info
      id: build-info
      shell: bash
      run: |
        # Set bundle name based on platform
        if [ "${{ inputs.platform }}" == "windows" ]; then
          bundle_name="atlas-web-app.exe"
        elif [ "${{ inputs.platform }}" == "darwin" ]; then
          bundle_name="Atlas Web Client.app"
        else
          bundle_name="atlas-web-app"
        fi
        echo "bundle-name=$bundle_name" >> $GITHUB_OUTPUT

    - name: Generate build info
      shell: bash
      working-directory: ./apps/web-client
      run: |
        # Determine build type from version
        version="${{ inputs.version }}"
        if [[ "$version" == edge-* ]]; then
          build_type="edge"
        elif [[ "$version" == nightly-* ]]; then
          build_type="nightly"
        else
          build_type="release"
        fi

        # Generate build info with commit hash and build type
        GIT_COMMIT_HASH="${GITHUB_SHA:0:8}" BUILD_TYPE="$build_type" npm run generate-build-info
        echo "Generated build info with commit=${GITHUB_SHA:0:8} and type=$build_type"

    - name: Build Tauri app
      # Always use tauri-action for all platforms
      id: tauri-build
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ github.token }}
      with:
        projectPath: "./apps/web-client"
        args: "--target ${{ inputs.target }}"

    - name: Select bundle path
      id: select-bundle
      shell: bash
      run: |
        # Always use tauri-build outputs
        artifacts='${{ steps.tauri-build.outputs.artifactPaths }}'
        platform='${{ inputs.platform }}'

        if ! command -v jq >/dev/null 2>&1; then
          echo "jq not found; installing..."
          if [ "$platform" = "linux" ]; then
            sudo apt-get update && sudo apt-get install -y jq
          elif [ "$platform" = "darwin" ]; then
            brew install jq
          else
            choco install jq
          fi
        fi

        selected=""
        if [ "$platform" = "windows" ]; then
          # Prefer NSIS/EXE installer on Windows
          selected=$(echo "$artifacts" | jq -r 'try (map(select(type=="string")) | (map(select(test("\\.exe$"))) | first)) catch ""')
        elif [ "$platform" = "darwin" ]; then
          # Prefer .app bundle on macOS
          selected=$(echo "$artifacts" | jq -r 'try (map(select(type=="string")) | (map(select(test("\\.app$"))) | first)) catch ""')
        else
          # Prefer .deb on Linux
          selected=$(echo "$artifacts" | jq -r 'try (map(select(type=="string")) | (map(select(test("\\.deb$"))) | first)) catch ""')
        fi

        if [ -z "$selected" ] || [ "$selected" = "null" ]; then
          echo "bundle-path=" >> "$GITHUB_OUTPUT"
        else
          echo "bundle-path=$selected" >> "$GITHUB_OUTPUT"
          echo "Selected bundle path: $selected"
        fi

    - name: Copy artifacts to dist
      shell: bash
      run: |
        mkdir -p ./dist

        # Copy built artifacts to dist directory
        if [ "${{ inputs.platform }}" == "darwin" ]; then
          # For macOS, the .app bundle should be in the standard location
          # Tauri builds it at: src-tauri/target/{target}/release/bundle/macos/*.app
          app_source="./apps/web-client/src-tauri/target/${{ inputs.target }}/release/bundle/macos"
          
          if [ -d "$app_source" ]; then
            echo "Looking for .app bundle in: $app_source"
            # Copy the .app bundle (there should only be one)
            for app in "$app_source"/*.app; do
              if [ -d "$app" ]; then
                echo "Found .app bundle: $(basename "$app")"
                cp -r "$app" ./dist/
                break
              fi
            done
          else
            echo "macOS bundle directory not found at $app_source, searching..."
            # Fallback to searching
            find ./apps/web-client/src-tauri/target -name "*.app" -type d -exec cp -r {} ./dist/ \; 2>/dev/null || true
          fi
        elif [ "${{ inputs.platform }}" == "windows" ]; then
          # For Windows, copy the NSIS installer from bundle/nsis
          nsis_dir="./apps/web-client/src-tauri/target/${{ inputs.target }}/release/bundle/nsis"

          if [ -d "$nsis_dir" ]; then
            echo "Looking for NSIS installer in: $nsis_dir"
            for exe in "$nsis_dir"/*.exe; do
              if [ -f "$exe" ]; then
                echo "Found NSIS installer: $(basename "$exe")"
                # Rename to standard name for consistency
                cp "$exe" "./dist/Atlas Web Client.exe"
                break
              fi
            done
          else
            echo "NSIS directory not found at $nsis_dir, checking for MSI installer..."
            # Fallback to MSI if NSIS not found
            msi_dir="./apps/web-client/src-tauri/target/${{ inputs.target }}/release/bundle/msi"
            if [ -d "$msi_dir" ]; then
              for msi in "$msi_dir"/*.msi; do
                if [ -f "$msi" ]; then
                  echo "Found MSI installer: $(basename "$msi")"
                  cp "$msi" "./dist/Atlas Web Client.msi"
                  break
                fi
              done
            fi
          fi
        else
          # For Linux, copy the executable and .deb
          find ./apps/web-client/src-tauri/target/${{ inputs.target }}/release/bundle -name "atlas" -exec cp {} ./dist/ \;
          find ./apps/web-client/src-tauri/target/${{ inputs.target }}/release/bundle -name "*.deb" -exec cp {} ./dist/ \;
        fi

        echo "Built artifacts copied to ./dist/"
        ls -la ./dist/
