name: "Build Atlas Component"
description: "Build any Atlas component (binary, web-app)"

inputs:
  component:
    description: "Component to build (binary, web-app)"
    required: true
  version:
    description: "Version string for the build"
    required: true
  platform:
    description: "Target platform (linux, darwin, windows)"
    required: true
  arch:
    description: "Target architecture (amd64, arm64)"
    required: true
  target:
    description: "Rust target triple"
    required: true
  macos-app-p12:
    description: "Base64 encoded P12 certificate for app signing (macOS only)"
    required: false
  macos-app-password:
    description: "Password for the app P12 certificate"
    required: false

outputs:
  binary-path:
    description: "Path to the built component"
    value: ${{ steps.build.outputs.binary-path }}
  binary-name:
    description: "Name of the built component"
    value: ${{ steps.build.outputs.binary-name }}
  bundle-name:
    description: "Name of the bundle (web-app only)"
    value: ${{ steps.build.outputs.bundle-name }}

runs:
  using: "composite"
  steps:
    - name: Build component
      id: build
      shell: bash
      run: |
        set -e

        component="${{ inputs.component }}"
        version="${{ inputs.version }}"
        platform="${{ inputs.platform }}"
        arch="${{ inputs.arch }}"
        target="${{ inputs.target }}"

        # Set component-specific variables
        case "$component" in
          binary)
            entry_point="src/cli.tsx"
            output_name="atlas"
            compile_args="--include=src --include=examples"
            ;;
          web-app)
            # Web app uses different build process
            if [ "$platform" = "darwin" ]; then
              cd apps/web-client
              npm install
              npm run bundle
              cd ../..
              echo "binary-path=apps/web-client/dist" >> "$GITHUB_OUTPUT"
              echo "bundle-name=Atlas Web Client.app" >> "$GITHUB_OUTPUT"
              exit 0
            else
              echo "Web app only builds on macOS"
              exit 0
            fi
            ;;
          *)
            echo "ERROR: Unknown component: $component"
            exit 1
            ;;
        esac

        # Add platform-specific extensions
        [ "$platform" = "windows" ] && output_name="${output_name}.exe"

        # Replace version placeholders in source before compilation
        VERSION_FILE="src/utils/version.ts"
        BACKUP_FILE="${VERSION_FILE}.bak"

        # Backup original file
        cp "$VERSION_FILE" "$BACKUP_FILE"

        # Get git SHA for version info
        GIT_SHA=$(git rev-parse --short HEAD || echo "unknown")

        # Replace placeholders
        echo "Embedding version: $version (git: $GIT_SHA)"
        if [ "$platform" = "darwin" ]; then
          # macOS sed syntax
          sed -i "" "s|__ATLAS_VERSION__|$version|g" "$VERSION_FILE"
          sed -i "" "s|__ATLAS_GIT_SHA__|$GIT_SHA|g" "$VERSION_FILE"
        else
          # GNU sed syntax
          sed -i "s|__ATLAS_VERSION__|$version|g" "$VERSION_FILE"
          sed -i "s|__ATLAS_GIT_SHA__|$GIT_SHA|g" "$VERSION_FILE"
        fi

        # Build the component
        echo "Building $component for $platform-$arch..."
        deno compile \
          --no-check \
          --allow-all \
          --unstable-broadcast-channel \
          --unstable-worker-options \
          --unstable-kv \
          --unstable-raw-imports \
          $compile_args \
          --target "$target" \
          --output "dist/${output_name}" \
          "$entry_point"

        # Restore original version file
        mv "$BACKUP_FILE" "$VERSION_FILE"

        # Set outputs
        echo "binary-path=dist/${output_name}" >> "$GITHUB_OUTPUT"
        echo "binary-name=${output_name}" >> "$GITHUB_OUTPUT"