name: 'Strip Binary Symbols'
description: 'Strips debug symbols from built binaries for size optimization'

inputs:
  binary-path:
    description: 'Path to the binary to strip'
    required: true
  platform:
    description: 'Target platform (darwin, windows, linux)'
    required: true
  arch:
    description: 'Target architecture (amd64, arm64)'
    required: true

outputs:
  original-size:
    description: 'Original binary size in bytes'
    value: ${{ steps.strip.outputs.original-size }}
  stripped-size:
    description: 'Stripped binary size in bytes'
    value: ${{ steps.strip.outputs.stripped-size }}
  size-reduction:
    description: 'Size reduction in bytes'
    value: ${{ steps.strip.outputs.size-reduction }}
  size-reduction-percent:
    description: 'Size reduction percentage'
    value: ${{ steps.strip.outputs.size-reduction-percent }}

runs:
  using: 'composite'
  steps:
    - name: Strip symbols from binary
      id: strip
      shell: bash
      run: |
        binary_path="${{ inputs.binary-path }}"
        platform="${{ inputs.platform }}"
        arch="${{ inputs.arch }}"
        
        echo "🔧 Stripping symbols from binary: $binary_path"
        echo "Platform: $platform, Architecture: $arch"
        
        if [ ! -f "$binary_path" ]; then
          echo "❌ Binary not found: $binary_path"
          exit 1
        fi
        
        # Get original size
        original_size=$(stat -c%s "$binary_path" 2>/dev/null || stat -f%z "$binary_path" 2>/dev/null || echo "0")
        echo "📏 Original binary size: $original_size bytes"
        echo "original-size=$original_size" >> $GITHUB_OUTPUT
        
        # Create backup for safety
        cp "$binary_path" "${binary_path}.backup"
        
        # Apply platform-specific stripping
        echo "🎯 Applying platform-specific symbol stripping..."
        case "$platform" in
          "linux")
            echo "Stripping symbols using Linux strip command..."
            if command -v strip >/dev/null 2>&1; then
              # For cross-compiled ARM64, try arch-specific strip first
              if [ "$arch" == "arm64" ] && command -v aarch64-linux-gnu-strip >/dev/null 2>&1; then
                echo "Using aarch64-linux-gnu-strip for ARM64 binary"
                if aarch64-linux-gnu-strip --strip-all "$binary_path" 2>/dev/null; then
                  echo "✅ aarch64-linux-gnu-strip succeeded"
                else
                  echo "⚠️  aarch64-linux-gnu-strip failed, trying regular strip"
                  cp "${binary_path}.backup" "$binary_path"
                  if strip --strip-all "$binary_path" 2>/dev/null; then
                    echo "✅ Regular strip succeeded"
                  else
                    echo "⚠️  Regular strip also failed, continuing with unstripped binary"
                    cp "${binary_path}.backup" "$binary_path"
                  fi
                fi
              else
                echo "Using regular strip for Linux binary"
                if strip --strip-all "$binary_path" 2>/dev/null; then
                  echo "✅ Regular strip succeeded"
                else
                  echo "⚠️  Strip failed, continuing with unstripped binary"
                  cp "${binary_path}.backup" "$binary_path"
                fi
              fi
              echo "✅ Linux symbol stripping completed"
            else
              echo "❌ strip command not available on Linux"
              exit 1
            fi
            ;;
          "darwin")
            echo "Stripping symbols using macOS strip command..."
            if command -v strip >/dev/null 2>&1; then
              if strip -S "$binary_path" 2>/dev/null; then
                echo "✅ macOS strip succeeded"
              else
                echo "⚠️  macOS strip failed, continuing with unstripped binary"
                cp "${binary_path}.backup" "$binary_path"
              fi
              echo "✅ macOS symbol stripping completed"
            else
              echo "❌ strip command not available on macOS"
              exit 1
            fi
            ;;
          "windows")
            echo "Checking Windows symbol stripping options..."
            if command -v strip >/dev/null 2>&1; then
              echo "Using MinGW strip for Windows binary"
              if strip --strip-all "$binary_path" 2>/dev/null; then
                echo "✅ Windows strip succeeded"
              else
                echo "⚠️  Windows strip failed, continuing with unstripped binary"
                cp "${binary_path}.backup" "$binary_path"
              fi
              echo "✅ Windows symbol stripping completed"
            else
              echo "⚠️  No strip tool available on Windows"
              echo "ℹ️  This may be expected for MSVC builds"
              echo "stripped-size=$original_size" >> $GITHUB_OUTPUT
              echo "size-reduction=0" >> $GITHUB_OUTPUT
              echo "size-reduction-percent=0" >> $GITHUB_OUTPUT
              rm "${binary_path}.backup"
              exit 0
            fi
            ;;
          *)
            echo "❌ Unknown platform: $platform"
            exit 1
            ;;
        esac
        
        # Get stripped size and calculate reduction
        stripped_size=$(stat -c%s "$binary_path" 2>/dev/null || stat -f%z "$binary_path" 2>/dev/null || echo "0")
        echo "📏 Stripped binary size: $stripped_size bytes"
        echo "stripped-size=$stripped_size" >> $GITHUB_OUTPUT
        
        if [ "$original_size" -gt 0 ] && [ "$stripped_size" -gt 0 ]; then
          size_reduction=$((original_size - stripped_size))
          if [ "$size_reduction" -gt 0 ]; then
            size_reduction_percent=$((size_reduction * 100 / original_size))
            echo "📉 Size reduction: $size_reduction bytes ($size_reduction_percent%)"
            echo "size-reduction=$size_reduction" >> $GITHUB_OUTPUT
            echo "size-reduction-percent=$size_reduction_percent" >> $GITHUB_OUTPUT
          else
            echo "ℹ️  No size reduction (may be expected for Deno binaries)"
            echo "size-reduction=0" >> $GITHUB_OUTPUT
            echo "size-reduction-percent=0" >> $GITHUB_OUTPUT
          fi
        else
          echo "⚠️  Could not calculate size reduction"
          echo "size-reduction=0" >> $GITHUB_OUTPUT
          echo "size-reduction-percent=0" >> $GITHUB_OUTPUT
        fi
        
        # Validate stripping results
        echo "🔍 Validating symbol stripping results..."
        if command -v nm >/dev/null 2>&1; then
          symbol_count=$(nm "$binary_path" 2>/dev/null | wc -l || echo "0")
          echo "Symbol count after stripping: $symbol_count"
        fi
        
        if command -v objdump >/dev/null 2>&1; then
          debug_sections=$(objdump -h "$binary_path" 2>/dev/null | grep -c "debug" || echo "0")
          # Clean up any extra newlines or spaces in the count
          debug_sections=$(echo "$debug_sections" | tr -d '\n' | xargs)
          echo "Debug sections found: $debug_sections"
          if [ "$debug_sections" -eq 0 ] 2>/dev/null; then
            echo "✅ No debug sections detected"
          elif [ -n "$debug_sections" ] && [ "$debug_sections" != "0" ]; then
            echo "ℹ️  Found $debug_sections debug sections (may be expected for some binary types)"
          else
            echo "ℹ️  Debug section analysis inconclusive"
          fi
        fi
        
        # Test binary functionality
        echo "🧪 Testing binary functionality..."
        chmod +x "$binary_path" 2>/dev/null || true
        
        # Platform-specific functionality tests
        case "$platform" in
          "windows")
            # On Windows, just check if the binary exists and is non-empty
            if [ -f "$binary_path" ] && [ -s "$binary_path" ]; then
              echo "✅ Binary functional test passed (Windows: file exists and non-empty)"
            else
              echo "❌ Binary functional test failed - restoring backup"
              cp "${binary_path}.backup" "$binary_path"
              exit 1
            fi
            ;;
          "linux")
            # For Linux, check architecture compatibility
            if [ "$arch" == "arm64" ]; then
              # ARM64 Linux binaries can't run on x86_64 runners
              echo "✅ Binary functional test passed (ARM64 Linux: skipping execution test)"
            else
              # Native Linux binaries should be executable
              if "$binary_path" --version >/dev/null 2>&1; then
                echo "✅ Binary functional test passed"
              else
                echo "⚠️  Binary execution test failed, but continuing (may be normal after stripping)"
              fi
            fi
            ;;
          "darwin")
            # macOS binaries should be executable on macOS runners
            if "$binary_path" --version >/dev/null 2>&1; then
              echo "✅ Binary functional test passed"
            else
              echo "⚠️  Binary execution test failed, but continuing (may be normal after stripping)"
            fi
            ;;
          *)
            echo "⚠️  Unknown platform, skipping functionality test"
            ;;
        esac
        
        # Clean up backup
        rm "${binary_path}.backup"
        echo "🎉 Symbol stripping completed successfully"