# Invalid workspace configuration for error testing
name: Invalid Test Workspace
version: 1.0.0
description: Invalid configuration for testing error handling

tools:
  mcp:
    servers:
      broken-transport:
        transport:
          type: invalid-type  # Invalid transport type
          command: nonexistent-command
      
      missing-command:
        transport:
          type: stdio
          # Missing required 'command' field
          args:
            - --flag
      
      invalid-filter:
        transport:
          type: stdio
          command: deno
          args:
            - run
            - test.ts
        tools:
          # Both allow and deny (should be one or the other)
          allow:
            - tool1
          deny:
            - tool2