name: Multi-Server Test Workspace
version: 1.0.0
description: Workspace with multiple MCP servers for testing

agents:
  - coordinator-agent
  - processor-agent

tools:
  mcp:
    servers:
      echo:
        transport:
          type: stdio
          command: deno
          args:
            - run
            - --allow-all
            - ./integration-tests/mocks/echo-mcp-server.ts
      
      math:
        transport:
          type: stdio
          command: deno
          args:
            - run
            - --allow-all
            - ./integration-tests/mocks/math-mcp-server.ts
      
      api:
        transport:
          type: stdio
          command: deno
          args:
            - run
            - --allow-all
            - ./integration-tests/mocks/mock-api-server.ts
      
      filesystem:
        transport:
          type: stdio
          command: deno
          args:
            - run
            - --allow-all
            - ./integration-tests/mocks/file-tools-mcp-server.ts