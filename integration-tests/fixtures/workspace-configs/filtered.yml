name: Filtered Test Workspace
version: 1.0.0
description: Workspace with tool filtering for security testing

agents:
  - restricted-agent

tools:
  mcp:
    servers:
      echo:
        transport:
          type: stdio
          command: deno
          args:
            - run
            - --allow-all
            - ./integration-tests/mocks/echo-mcp-server.ts
        tools:
          # Only allow specific tools
          allow:
            - echo
            - reverse

      filesystem:
        transport:
          type: stdio
          command: deno
          args:
            - run
            - --allow-all
            - ./integration-tests/mocks/file-tools-mcp-server.ts
        tools:
          # Deny dangerous operations
          deny:
            - file_write
            - file_delete
            - file_move

      api:
        transport:
          type: stdio
          command: deno
          args:
            - run
            - --allow-all
            - ./integration-tests/mocks/mock-api-server.ts
        tools:
          # Allow read operations only
          allow:
            - fetch_user
            - list_items
