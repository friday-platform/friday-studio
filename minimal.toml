# Generated by `minimal init`

[upstream] # Source of software & tooling
repo = "https://github.com/gominimal/pkgs"
branch = "main"
locked_commit = "381eeba5b7114d667b891aea2afdf7f5d1458c65"

[harness]
use = "go"

[defaults]
state_key = "dev"

[tasks.shell]
interactive = true
packages = ["base"]
exec = "bash --noprofile -l"

[tasks.claude]
packages = ["base", "claude-code"]
exec = "claude --dangerously-skip-permissions"

[tasks.dev]
interactive = true
packages = ["claude-code", "base", "vim", "tmux", "ncurses", "fd", "fzf", "ripgrep", "git", "jq", "deno", "node-lts", "go", "uv", "curl"]
patches.dir."~/.claude" = "read-write"
patches.file."~/.gitconfig" = "read-only"
patches.file."~/.vimrc" = "read-write"
bash = "scripts/setup-dev.sh"

# One-shot install: deno install + uv pre-warm + .env scaffold.
# Run before `min run start`. Idempotent.
[tasks.setup]
packages = ["base", "deno", "node-lts", "go", "uv", "git", "curl"]
bash = "scripts/min-setup.sh"

# Run the daemon in the foreground (Ctrl+C to stop).
# After it's up: `curl http://localhost:8080/health`
[tasks.start]
packages = ["base", "deno", "node-lts", "go", "uv", "git", "curl"]
bash = "scripts/min-start.sh"
