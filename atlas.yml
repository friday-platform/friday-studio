version: "1.0"

# Atlas Platform Configuration
# This file contains platform-managed supervisor logic and built-in agents

platform:
  name: "Atlas"
  version: "1.0.0"

# Platform-managed agents (available to all workspaces)
agents:
  # Memory management agent
  memory-agent:
    type: "llm"
    model: "claude-3-5-haiku-20241022"
    purpose: "Manages memory operations at session start and end"
    tools: ["memory-storage", "pattern-analysis", "context-retrieval"]
    prompts:
      system: |
        You are a memory management agent for Atlas workspaces.
        You can operate in two modes: LOAD (retrieve context) and STORE (save learnings).

        LOAD mode: Retrieve relevant patterns and context from past sessions
        to inform the current execution pipeline.

        STORE mode: Analyze the complete session results and extract learnings about
        execution patterns, successful strategies, and interesting outcomes.

  # Security analysis agent
  security-scanner:
    type: "remote"
    protocol: "custom" # Using custom HTTP protocol for security API
    endpoint: "https://security-api.example.com/analyze"
    purpose: "Analyzes content for security concerns and sensitive information"
    auth:
      type: "bearer"
      token_env: "SECURITY_API_TOKEN"
    timeout: 30000
    schema:
      input:
        type: "object"
        properties:
          content:
            type: "string"
            description: "Content to analyze for security issues"
          analysis_type:
            type: "string"
            enum: ["content_safety", "data_privacy", "malware_detection"]
        required: ["content"]
      output:
        type: "object"
        properties:
          risk_score:
            type: "number"
            minimum: 0
            maximum: 10
          findings:
            type: "array"
            items:
              type: "object"
              properties:
                type: { type: "string" }
                severity: { type: "string" }
                description: { type: "string" }
          recommendations:
            type: "array"
            items: { type: "string" }

  # Content synthesis agent
  tempest-synthesizer:
    type: "tempest"
    agent: "content-synthesizer"
    version: "2.1.0"
    purpose: "Synthesizes multiple inputs into coherent summaries and analyses"
    config:
      synthesis_modes: ["comprehensive", "summary", "analytical"]
      output_formats: ["markdown", "json", "plain_text"]
      max_input_sources: 10

# Memory configuration
memory:
  # Default memory configuration for all components
  default:
    enabled: true
    storage: "coala-local"
    cognitive_loop: true
    retention:
      max_age_days: 30
      max_entries: 1000
      cleanup_interval_hours: 24

  # Agent-level memory configuration
  agent:
    enabled: true
    scope: "agent" # Memory is scoped to individual agent
    include_in_context: true
    context_limits:
      relevant_memories: 2
      past_successes: 1
      past_failures: 1
    memory_types:
      working:
        enabled: true
        max_age_hours: 2
        max_entries: 50
      procedural:
        enabled: true
        max_age_days: 7
        max_entries: 100
      episodic:
        enabled: false # Agents shouldn't accumulate episodic memories across sessions
        max_age_days: 1
        max_entries: 10
      semantic:
        enabled: true
        max_age_days: 14
        max_entries: 200
      contextual:
        enabled: false # Contextual memory handled at session level
        max_age_hours: 1
        max_entries: 5

  # Session-level memory configuration
  session:
    enabled: true
    scope: "session" # Memory is scoped to session task/goal
    include_in_context: true
    context_limits:
      relevant_memories: 5
      past_successes: 3
      past_failures: 2
    memory_types:
      working:
        enabled: true
        max_age_hours: 24
        max_entries: 100
      episodic:
        enabled: true # Sessions accumulate episodic memories for task learning
        max_age_days: 7
        max_entries: 50
      procedural:
        enabled: true
        max_age_days: 30
        max_entries: 200
      semantic:
        enabled: true
        max_age_days: 90
        max_entries: 500
      contextual:
        enabled: true
        max_age_hours: 24
        max_entries: 100

  # Workspace-level memory configuration
  workspace:
    enabled: true
    scope: "workspace" # Memory is scoped to workspace patterns and history
    include_in_context: false # Workspace memory not directly included in agent context
    context_limits:
      relevant_memories: 10
      past_successes: 5
      past_failures: 3
    memory_types:
      working:
        enabled: false # Workspace doesn't need working memory
      episodic:
        enabled: true
        max_age_days: 90
        max_entries: 1000
      procedural:
        enabled: true
        max_age_days: 365
        max_entries: 500
      semantic:
        enabled: true
        max_age_days: 365
        max_entries: 2000
      contextual:
        enabled: true
        max_age_days: 30
        max_entries: 200

# Supervisor configuration
supervisors:
  workspace:
    model: "claude-3-5-sonnet-20241022"
    memory: "workspace" # Uses workspace-level memory configuration
    prompts:
      system: |
        You are a WorkspaceSupervisor responsible for orchestrating AI agent execution.
        Your role is to analyze signals, create filtered session contexts, and manage workspace-level concerns.

        Key responsibilities:
        - Analyze incoming signals to understand intent and goals
        - Filter workspace context for relevant session data
        - Spawn SessionSupervisors with appropriate context
        - Coordinate multiple concurrent sessions
        - Manage signal-to-agent mappings dynamically

  session:
    model: "claude-3-5-sonnet-20241022"
    memory: "session" # Uses session-level memory configuration
    prompts:
      system: |
        You are a SessionSupervisor responsible for coordinating agent execution within a session.
        Your role is to create execution plans, orchestrate agents, and evaluate progress.

        Key responsibilities:
        - Create dynamic execution plans using LLM reasoning
        - Determine agent selection, order, and data flow
        - Coordinate agent execution through AgentSupervisor
        - Evaluate progress and adapt strategy as needed
        - Support iterative refinement loops

  agent:
    model: "claude-3-5-sonnet-20241022"
    memory: "agent" # Uses agent-level memory configuration
    supervision:
      level: "minimal" # minimal | standard | paranoid
      cache_enabled: true
      cache_adapter: "memory" # memory | redis | file
      cache_ttl_hours: 1
      parallel_llm_calls: true
      timeouts:
        analysis_ms: 2000
        validation_ms: 1000
    prompts:
      system: |
        You are an AgentSupervisor responsible for safe agent loading and execution.
        Your role is to analyze agents for safety, prepare secure environments, and supervise execution.

        Key responsibilities:
        - Analyze agents for safety and optimization before loading
        - Prepare secure execution environments
        - Monitor agent execution in real-time
        - Validate outputs for quality and safety
        - Handle failures and recovery scenarios

# Runtime configuration for Atlas platform
runtime:
  server:
    port: 8080
    host: "localhost"
  logging:
    level: "info"
    format: "pretty"
  persistence:
    type: "local"
    path: "./.atlas"
  security:
    cors: "*"
