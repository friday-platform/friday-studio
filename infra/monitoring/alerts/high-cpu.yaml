displayName: "Atlas High CPU Usage"
combiner: OR
conditions:
- displayName: "CPU > 80% of limit for 10 minutes"
  conditionThreshold:
    filter: >-
      resource.type="k8s_container"
      AND resource.labels.namespace_name="atlas-operator"
      AND metric.type="kubernetes.io/container/cpu/limit_utilization"
    comparison: COMPARISON_GT
    thresholdValue: 0.8
    duration: "600s"
    aggregations:
    - alignmentPeriod: "60s"
      perSeriesAligner: ALIGN_MEAN
      crossSeriesReducer: REDUCE_MAX
      groupByFields:
      - resource.labels.container_name
    trigger:
      count: 1
alertStrategy:
  autoClose: "3600s"
  notificationPrompts:
  - OPENED
  - CLOSED
severity: WARNING
documentation:
  content: |-
    ## High CPU Usage

    A container in atlas-operator namespace is using >80% of its CPU limit for 10+ minutes.

    ### Quick Diagnosis
    ```bash
    kubectl -n atlas-operator top pods
    kubectl -n atlas-operator describe pod <POD_NAME> | grep -A5 "Limits\|Requests"
    ```

    ### Resolution
    - Check for CPU-intensive operations in logs
    - Consider increasing CPU limits
    - Check for infinite loops or runaway processes
  mimeType: text/markdown
notificationChannels:
- projects/tempest-production/notificationChannels/3729882950865339162
