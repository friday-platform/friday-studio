displayName: "Atlas Operator Reconciliation Errors"
combiner: OR
conditions:
- displayName: "Reconciliation errors detected"
  conditionMonitoringQueryLanguage:
    query: >-
      fetch prometheus_target
      | metric 'prometheus.googleapis.com/atlas_operator_reconciliation_duration_seconds/histogram'
      | filter metric.status == 'error'
      | group_by 5m, [error_count: count(value)]
      | condition error_count > 0
    duration: "300s"
    trigger:
      count: 1
alertStrategy:
  autoClose: "3600s"
  notificationPrompts:
  - OPENED
  - CLOSED
severity: WARNING
documentation:
  content: |-
    ## Operator Reconciliation Errors

    The atlas-operator is experiencing a high rate of reconciliation errors.
    User workspace provisioning may be failing.

    ### Quick Diagnosis
    ```bash
    kubectl -n atlas-operator logs -l app=atlas-operator --tail=200 | grep -i error
    kubectl -n atlas-operator logs -l app=atlas-operator --tail=200 | grep -i reconcil
    ```

    ### Check Sentry
    https://sentry.io/organizations/tempest-labs-inc/issues/?project=atlas-operator

    ### Common Causes
    - ArgoCD connectivity issues
    - Database connection problems
    - Kubernetes API errors
    - Resource quota exceeded
  mimeType: text/markdown
notificationChannels:
- projects/tempest-production/notificationChannels/3729882950865339162
