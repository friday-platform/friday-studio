displayName: "User Atlas Pod Restart Loop"
combiner: OR
conditions:
- displayName: "User atlas pod restart count > 3 in 10 minutes"
  conditionThreshold:
    filter: >-
      resource.type="k8s_container"
      AND resource.labels.namespace_name="atlas"
      AND resource.labels.container_name="atlas"
      AND metric.type="kubernetes.io/container/restart_count"
    comparison: COMPARISON_GT
    thresholdValue: 3
    duration: "0s"
    aggregations:
    - alignmentPeriod: "600s"
      perSeriesAligner: ALIGN_DELTA
      crossSeriesReducer: REDUCE_SUM
      groupByFields:
      - resource.labels.pod_name
    trigger:
      count: 1
alertStrategy:
  autoClose: "604800s"
severity: WARNING
documentation:
  content: |-
    ## User Atlas Pod Restart Loop

    A user's Atlas daemon pod is restarting repeatedly.

    ### Quick Diagnosis
    ```bash
    kubectl -n atlas get pods --sort-by='.status.containerStatuses[0].restartCount'
    kubectl -n atlas logs <POD_NAME> --previous
    kubectl -n atlas describe pod <POD_NAME>
    ```

    ### Common Causes
    - Invalid workspace.yml configuration
    - MCP server startup failures
    - Memory limits too low
    - Missing secrets/credentials
  mimeType: text/markdown
notificationChannels:
- projects/tempest-production/notificationChannels/3729882950865339162
