displayName: "GKE Container - DeploymentReplicasNotUpdated"
combiner: OR
conditions:
- displayName: "DeploymentReplicasNotUpdated"
  conditionPrometheusQueryLanguage:
    # Increased from 600s to 1800s to allow autoscaler time to recover
    # from transient zone capacity issues (RESOURCE_POOL_EXHAUSTED)
    duration: "1800s"
    evaluationInterval: "60s"
    # Excludes atlas namespace - user workloads scale dynamically and
    # may temporarily have mismatched replicas during autoscaling
    query: >-
      ((kube_deployment_status_replicas_updated{namespace!="atlas"} != kube_deployment_spec_replicas{namespace!="atlas"})
      or (kube_deployment_status_replicas_available{namespace!="atlas"} != kube_deployment_spec_replicas{namespace!="atlas"}))
alertStrategy:
  autoClose: "86400s"
  notificationPrompts:
  - OPENED
  - CLOSED
severity: CRITICAL
documentation:
  content: |-
    ## Deployment Replicas Not Updated

    A deployment has replicas that don't match the desired count for 30+ minutes.

    ### Quick Diagnosis
    ```bash
    # Find deployments with mismatched replicas
    kubectl get deployments -A -o custom-columns='NAMESPACE:.metadata.namespace,NAME:.metadata.name,DESIRED:.spec.replicas,READY:.status.readyReplicas,UPDATED:.status.updatedReplicas' | grep -v "NAMESPACE"

    # Check for pending pods
    kubectl get pods -A --field-selector=status.phase=Pending

    # Check cluster autoscaler status
    kubectl -n kube-system describe configmap cluster-autoscaler-status
    ```

    ### Common Causes
    - Zone capacity exhaustion (RESOURCE_POOL_EXHAUSTED) - usually self-heals
    - Insufficient cluster resources
    - Pod scheduling constraints (nodeSelector, affinity)
    - Image pull failures
    - Resource quota exceeded
  mimeType: text/markdown
notificationChannels:
# PagerDuty (tempest-production)
- projects/tempest-production/notificationChannels/16532143224266859840
