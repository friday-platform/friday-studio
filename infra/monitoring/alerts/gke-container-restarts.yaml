displayName: "GKE Container - Restarts (tempest-production-us-west-2 cluster)"
combiner: OR
conditions:
- displayName: "GKE container in tempest-production-us-west-2 cluster has restarted"
  conditionThreshold:
    filter: >-
      resource.type="k8s_container"
      AND metric.type="kubernetes.io/container/restart_count"
      AND resource.labels.cluster_name="tempest-production-us-west-2"
      AND resource.labels.location="us-west2"
    comparison: COMPARISON_GT
    thresholdValue: 5
    duration: "0s"
    aggregations:
    - alignmentPeriod: "600s"
      perSeriesAligner: ALIGN_DELTA
    trigger:
      count: 1
alertStrategy:
  autoClose: "3600s"
  notificationPrompts:
  - OPENED
  - CLOSED
documentation:
  content: |-
    ## GKE Container Restart Alert

    A container in the tempest-production-us-west-2 cluster has restarted more than 5 times in 10 minutes.

    ### Quick Diagnosis
    ```bash
    # Find pods with high restart counts
    kubectl --context tempest-production get pods -A --sort-by='.status.containerStatuses[0].restartCount' | tail -20

    # Check specific pod
    kubectl --context tempest-production -n <NAMESPACE> describe pod <POD_NAME>
    kubectl --context tempest-production -n <NAMESPACE> logs <POD_NAME> --previous
    ```

    ### Common Causes
    - OOMKilled - increase memory limits
    - CrashLoopBackOff - check application logs
    - Liveness probe failures
    - Missing dependencies (DB, secrets, config)
  mimeType: text/markdown
notificationChannels:
# PagerDuty (tempest-production)
- projects/tempest-production/notificationChannels/16532143224266859840
