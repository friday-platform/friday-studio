displayName: "Atlas Session Failure Spike"
combiner: OR
conditions:
- displayName: "Session failure rate > 20%"
  conditionMonitoringQueryLanguage:
    query: >-
      fetch prometheus_target
      | metric 'prometheus.googleapis.com/atlasd_sessions_total/counter'
      | align delta(5m)
      | group_by [metric.status], [total: sum(value)]
      | { failed: filter metric.status == 'failed' ; all: ident }
      | join
      | value [failure_rate: val(0) / val(1)]
      | condition failure_rate > 0.2
    duration: "300s"
    trigger:
      count: 1
alertStrategy:
  autoClose: "3600s"
  notificationPrompts:
  - OPENED
  - CLOSED
severity: WARNING
documentation:
  content: |-
    ## Session Failure Spike

    More than 20% of agent sessions are failing over the last 5 minutes.

    ### Quick Diagnosis
    ```bash
    kubectl -n atlas logs -l app=atlas --tail=100 --all-containers | grep -i "session\|error\|fail"
    ```

    ### Check Sentry
    https://sentry.io/organizations/tempest-labs-inc/issues/?project=atlas

    ### Common Causes
    - LLM API errors (check LiteLLM logs)
    - MCP server failures
    - Memory pressure on atlas pods
    - Configuration issues in workspace.yml
  mimeType: text/markdown
notificationChannels:
- projects/tempest-production/notificationChannels/3729882950865339162
