displayName: "LLM Budget Critical (<$50 remaining)"
combiner: OR
conditions:
- displayName: "LLM remaining budget < $50"
  conditionPrometheusQueryLanguage:
    # Use remaining budget gauge metric (persists across pod restarts, syncs from DB)
    # Filter out +Inf values and take minimum across pods for each api_key_alias
    query: >-
      min by (api_key_alias) (
        litellm_remaining_api_key_budget_metric < +Inf
      ) < 50
    duration: 300s
    evaluationInterval: 60s
alertStrategy:
  autoClose: 604800s
  notificationPrompts:
  - OPENED
severity: CRITICAL
documentation:
  content: |-
    LLM Budget CRITICAL

    API Key: ${metric.labels.api_key_alias}

    Less than $50 remaining. At limit, LLM requests fail with budget_exceeded.

    Options: Notify user, increase budget, or reset spend.
  mimeType: text/markdown
notificationChannels:
- projects/tempest-production/notificationChannels/12225858896805377076
- projects/tempest-production/notificationChannels/5987427949135056090
userLabels:
  severity: critical
