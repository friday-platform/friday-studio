# Comprehensive Atlas Workspace Configuration Example V2
# This file demonstrates ALL available configuration options based on proposed schema improvements
# Updated based on feedback from v1

# Version is required - currently "1.0"
version: "1.0"

# ==============================================================================
# WORKSPACE IDENTITY
# ==============================================================================
# Basic workspace identification - name is required, description optional
workspace:
  # name: Required, min 1 character
  name: "comprehensive-example"

  # description: Optional, helpful for documentation
  description: "Demonstrates all Atlas workspace configuration options"

# ==============================================================================
# SERVER CONFIGURATION (Platform MCP)
# ==============================================================================
# How this workspace exposes its capabilities to external systems
# Note: Most server config belongs in atlas.yml, not workspace.yml
server:
  # MCP server configuration - Atlas exposes itself via Model Context Protocol
  mcp:
    # Enable this workspace to be accessed via MCP
    enabled: true

    # What capabilities/jobs to expose via MCP
    discoverable:
      # Capability patterns - use wildcards to expose groups
      # Note: Ensure all capabilities are consistently snake_cased
      capabilities:
        - "workspace_jobs_*" # All job-related capabilities
        - "workspace_sessions_*" # All session capabilities
        - "workspace_memory_*" # Memory access capabilities

      # Specific jobs to expose as MCP tools
      # These are what is returned from workspace_jobs_* queries
      jobs:
        - "analyze-data" # Expose specific job
        - "generate-*" # Wildcard pattern for jobs

# ==============================================================================
# TOOLS CONFIGURATION (Protocol MCP)
# ==============================================================================
# External MCP servers that agents in this workspace can call
tools:
  mcp:
    # Client configuration for calling MCP servers
    client_config:
      timeout: "30s" # Timeout in duration format

    # MCP servers available to agents
    servers:
      # GitHub MCP server for repository operations
      github:
        transport:
          type: "stdio"
          command: "npx"
          args: ["-y", "@modelcontextprotocol/server-github"]

        # Client configuration specific to this server
        client_config:
          timeout: "60s" # Override default timeout

        # Authentication for this server
        auth:
          type: "bearer"
          token_env: "GITHUB_TOKEN" # Read token from env var

        # Filter which tools to allow/deny from this server
        tools:
          allow: ["search_repositories", "get_file_contents", "create_issue"]
          # deny: ["delete_repository"]  # Optional deny list (mutually exclusive with allow)

        # Environment variables for the server process
        env:
          GITHUB_API_URL: "https://api.github.com"
          LOG_LEVEL: "info"

      # Slack MCP server for notifications
      slack:
        transport:
          type: "stdio"
          command: "npx"
          args: ["-y", "@modelcontextprotocol/server-slack"]
        auth:
          type: "bearer"
          token_env: "SLACK_TOKEN"
        tools:
          allow: ["send_message", "list_channels"]

      # Example of streamable HTTP transport (from telephone workspace)
      conversation-api:
        transport:
          type: "sse"
          url: "https://api.example.com/v1/conversation"
        auth:
          type: "bearer"
          token_env: "API_TOKEN"
        client_config:
          timeout: "120s"
        tools:
          allow: ["send_message", "receive_stream"]

      # Filesystem MCP server for file operations
      filesystem:
        transport:
          type: "stdio"
          command: "npx"
          args: ["-y", "@modelcontextprotocol/server-filesystem", "/workspace"]
        tools:
          # Use either allow or deny, not both
          deny: ["write_file", "delete_file"] # Read-only access

# ==============================================================================
# SIGNALS (Triggers)
# ==============================================================================
# Signal types with provider-specific configurations
# Note: CLI is not a provider type - all signals can be triggered via CLI
signals:
  # HTTP Signal - webhook/API endpoint
  webhook-github:
    provider: "http"
    description: "GitHub webhook receiver"

    # All provider-specific config goes in config section
    config:
      # Required for HTTP provider
      path: "/webhooks/github"
      # Note: HTTP signals are always POST

      # Timeout for signal processing
      timeout: "30s" # Duration format

    # Schema for signal payload validation (optional, enforced at runtime!)
    schema:
      type: "object"
      properties:
        repository:
          type: "object"
        ref:
          type: "string"
        commits:
          type: "array"
          items:
            type: "object"
      required: ["repository", "ref"]

  # Schedule Signal - cron-based triggers
  daily-report:
    provider: "schedule"
    description: "Generate daily reports"

    config:
      # Required for schedule provider - cron expression
      schedule: "0 9 * * *" # Daily at 9 AM

      # Optional timezone (defaults to UTC)
      timezone: "America/New_York"

  # System Signal - system workspaces only
  # Note: Special validation ensures these aren't in userland workspaces
  system-event:
    provider: "system" # Renamed from "internal"
    description: "Internal system event"

    # System signals are triggered by Atlas itself
    schema:
      type: "object"
      properties:
        event_type:
          type: "string"
        workspace_id:
          type: "string"
        session_id:
          type: "string"
      required: ["event_type"]

# ==============================================================================
# JOBS (Workflows)
# ==============================================================================
# Job definitions with all configuration options
jobs:
  # Comprehensive job example
  analyze-and-report:
    name: "analyze-and-report" # Optional, uses key if not provided

    description: "Comprehensive analysis and reporting workflow"

    # Triggers - which signals activate this job
    triggers:
      - signal: "webhook-github"
        # Condition can be either JSONLogic or natural language prompt
        condition:
          # JSONLogic format (cached and executed at runtime)
          jsonlogic:
            and:
              - "==": [{ "var": "ref" }, "refs/heads/main"]
              - ">": [{ "var": "commits.length" }, 0]

          # Alternative: Natural language (converted to JSONLogic and cached)
          # prompt: "Only trigger when push is to main branch with commits"

    # Context configuration for filesystem
    context:
      files: # Renamed from "filesystem"
        patterns:
          - "data/*.json"
          - "templates/*.md"
          - "!**/*.tmp" # Exclude patterns
        base_path: "/workspace"
        max_file_size: 1048576 # 1MB
        include_content: true

    # Single prompt string for supervisor guidance
    prompt: |
      Analyze the incoming data thoroughly:
      1. Identify key patterns and anomalies
      2. Generate insights based on historical context
      3. Format results according to requested format

      Ensure the analysis covers:
      - All requested data points
      - Proper formatting
      - Actionable recommendations

    # Execution configuration
    execution:
      strategy: "sequential" # Note: "parallel" requires parent promise implementation

      # Agent pipeline with various configurations
      agents:
        # Simple agent reference with context
        - id: "data-analyzer"
          nickname: "analyzer" # Optional nickname for reference
          # Context specifies what data from the job is passed to this agent
          context:
            signal: true # Include signal data
        # steps not specified means just this agent's input

        # Agent with specific configuration
        - id: "insight-generator"
          nickname: "insights"
          context:
            signal: false
            steps: "previous" # Include previous step output
            task: "Generate insights from the analysis" # Appended to prompt
          dependencies: ["data-analyzer"] # Explicit dependencies

          # Tools granted specifically for this job
          tools:
            allow: ["github", "workspace_memory_recall"]

        # Agent with multiple context sources
        - id: "report-writer"
          context:
            signal: true
            steps: "all" # Include results from all previous steps
            agents: ["data-analyzer", "insight-generator"] # Specific agents
            files: true # Include filesystem context (see below)

    # Success criteria - transitions state machine to complete
    success:
      condition:
        # Can be either JSONLogic or natural language prompt
        jsonlogic:
          and:
            - ">": [{ "var": "insights_count" }, 0]
            - "in": [{ "var": "report_format" }, ["json", "markdown"]]
        # Alternative: Natural language
        # prompt: "Success when insights are generated and format is valid"

      # Optional structured output schema
      schema:
        type: "object"
        properties:
          insights:
            type: "array"
            items:
              type: "object"
          summary:
            type: "string"
          recommendations:
            type: "array"
        required: ["insights", "summary"]

    # Error criteria and handling
    error:
      condition:
        # Can be either JSONLogic or natural language prompt
        jsonlogic:
          or:
            - "==": [{ "var": "status" }, "failed"]
            - ">": [{ "var": "error_count" }, 3]
        # Alternative: Natural language
        # prompt: "Error when status is failed or too many errors occur"

    # Configuration section for timeout, supervision, and memory
    config:
      timeout: "300s" # 5 minutes

      supervision:
        level: "standard" # Options: "minimal", "standard"
        skip_planning: false # Skip planning phase for simple jobs

      memory:
        enabled: true
        fact_extraction: true
        summary: true # Put summary in session receipt

  # Minimal job example
  simple-task:
    description: "Simple single-agent task"
    triggers:
      - signal: "daily-report"
    execution:
      strategy: "sequential"
      agents:
        - id: "report-generator"

# ==============================================================================
# AGENTS
# ==============================================================================
# All agent types with their specific configurations

agents:
  # LLM Agent - AI-powered agent
  data-analyzer:
    type: "llm"
    description: "Analyze data and identify patterns" # Moved to top

    # LLM-specific configuration under config (tagged union on type)
    config:
      provider: "anthropic" # Options: "anthropic", "openai", "google"
      model: "claude-3-7-sonnet-latest" # Required for LLM

      # Single prompt string
      prompt: |
        You are a data analysis expert. Your role is to:
        1. Analyze incoming data for patterns and anomalies
        2. Generate statistical insights
        3. Identify trends and correlations

        Output your analysis as structured JSON.

      # LLM parameters
      temperature: 0.3 # 0-1 range for Anthropic
      max_tokens: 4000
      max_steps: 5 # For multi-step tool calling

      # Tool choice configuration
      tool_choice: "auto" # Options: "auto", "required", "none", or specific tool
      # tool_choice:
      #   type: "tool"
      #   toolName: "github"

      # Tools available to this agent (simple array format)
      tools: ["github", "filesystem", "workspace_memory_recall"]

      # Success/error handlers (like job level)
      success:
        condition:
          # Can be either JSONLogic or natural language prompt
          jsonlogic:
            ">": [{ "var": "confidence_score" }, 0.8]
          # Alternative: Natural language
          # prompt: "Success when confidence score is above 80%"
        schema:
          type: "object"
          properties:
            analysis:
              type: "object"
            confidence:
              type: "number"

      error:
        condition:
          # Can be either JSONLogic or natural language prompt
          jsonlogic:
            "==": [{ "var": "status" }, "failed"]
          # Alternative: Natural language
          # prompt: "Error when status indicates failure"

      # Error handling configuration
      max_retries: 3
      timeout: "60s"

  # System Agent - Built-in Atlas functionality
  report-generator:
    type: "system"
    description: "Generate reports using built-in Atlas functionality"
    agent: "report-builder" # Required system agent identifier

    # Optional configuration that follows system agent schema
    config:
      model: "claude-3-7-sonnet-latest"
      temperature: 0.3
      max_tokens: 4000
      prompt: "You are a report generation agent that creates comprehensive reports from data analysis"

  # Remote Agent with ACP protocol only
  # Note: MCP remote agent adapter is not currently working

  # Remote Agent with ACP protocol
  kubernetes-operator:
    type: "remote"
    description: "Manage Kubernetes resources"

    config:
      protocol: "acp"
      endpoint: "http://k8s-operator:8080"

      # ACP configuration (hoisted up since protocol is already set)
      agent_name: "k8s-operator" # Required, lowercase with hyphens
      default_mode: "async" # Options: "sync", "async", "stream"
      timeout: "120s"
      max_retries: 2
      health_check_interval: "30s"

      # Success/error conditions
      success:
        condition:
          # Can be either JSONLogic or natural language prompt
          jsonlogic:
            "==": [{ "var": "status" }, "success"]
          # Alternative: Natural language
          # prompt: "Success when operation completes successfully"

      error:
        condition:
          # Can be either JSONLogic or natural language prompt
          jsonlogic:
            or:
              - "==": [{ "var": "status" }, "error"]
              - ">": [{ "var": "retry_count" }, 3]
          # Alternative: Natural language
          # prompt: "Error when operation fails or exceeds retry limit"

  # Insight generation agent
  insight-generator:
    type: "llm"
    description: "Generate insights from analyzed data"
    config:
      provider: "anthropic"
      model: "claude-3-7-sonnet-latest"
      prompt: |
        You are an insight generation specialist. Your role is to:
        1. Analyze data analysis results
        2. Extract meaningful insights and patterns
        3. Generate actionable recommendations

        Focus on practical, business-relevant insights.
      temperature: 0.5
      max_tokens: 3000
      tools: ["workspace_memory_recall"]

  # Report writer agent
  report-writer:
    type: "llm"
    description: "Write comprehensive reports"
    config:
      provider: "anthropic"
      model: "claude-3-7-sonnet-latest"
      prompt: |
        You are a professional report writer. Your role is to:
        1. Synthesize analysis and insights
        2. Create well-structured reports
        3. Format output according to requirements
      temperature: 0.3
      max_tokens: 4000

# ==============================================================================
# MEMORY CONFIGURATION (Optional)
# ==============================================================================
# Workspace-level memory settings
memory:
  enabled: true
  scope: "workspace" # Memory scoped to this workspace

  retention:
    max_age_days: 30
    max_entries: 1000
    cleanup_interval_hours: 24

  # Specific memory types to track
  include_types:
    - "analysis_patterns"
    - "error_resolutions"
    - "optimization_history"
    - "user_preferences"
# ==============================================================================
# Notes on Configuration
# ==============================================================================
# 1. Always define signal schemas - they're validated at runtime!
# 2. Use tagged unions properly - type determines required config fields
# 3. Temperature for LLM agents is 0-1 range
# 4. Job names must be MCP-compliant (letters, numbers, underscore, hyphen)
# 5. Use consistent allow/deny terminology throughout
# 6. Most server configuration belongs in atlas.yml, not workspace.yml
# 7. All signals are accessible via CLI regardless of provider
# 8. Use duration strings (e.g., "30s", "5m") for timeouts
