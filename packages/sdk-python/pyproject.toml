[project]
name = "friday-agent-sdk"
version = "0.1.0"
description = "Python SDK for authoring Friday agents"
requires-python = ">=3.12"
dependencies = ["nats-py>=2.9.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
target-version = "py312"
line-length = 88
exclude = ["wit_world", "componentize_py_async_support", "componentize_py_runtime.pyi", "componentize_py_types.py", "poll_loop.py"]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[dependency-groups]
dev = ["pytest>=9.0.3", "ruff>=0.8.0"]
