version: "1.1"

workspace:
  name: "atlas-conversation"
  description: "Conversation management for Atlas with Tempest agent"

# Signals
signals:
  conversation-stream:
    description: "Handle conversation with streaming response"
    provider: "internal"
    schema:
      type: "object"
      properties:
        message:
          type: "string"
        userId:
          type: "string"
        conversationId:
          type: "string"
        scope:
          type: "object"
          properties:
            workspaceId:
              type: "string"
            jobId:
              type: "string"
            sessionId:
              type: "string"
      required: ["message", "userId"]

  conversation-list:
    description: "List conversations for user and scope"
    provider: "internal"
    schema:
      type: "object"
      properties:
        userId:
          type: "string"
        scope:
          type: "object"
      required: ["userId"]

  conversation-resume:
    description: "Resume a previous conversation"
    provider: "internal"
    schema:
      type: "object"
      properties:
        conversationId:
          type: "string"
        userId:
          type: "string"
      required: ["conversationId", "userId"]

# Jobs
jobs:
  handle-conversation:
    name: "handle-conversation"
    description: "Process conversation messages with context awareness"
    triggers:
      - signal: "conversation-stream"
        response:
          mode: "streaming"
          format: "sse"
    execution:
      strategy: "sequential"
      agents:
        - id: "conversation-agent"
    supervision:
      level: "minimal"
    memory:
      enabled: false
    resources:
      estimated_duration_seconds: 5

  list-conversations:
    name: "list-conversations"
    description: "Query conversation history"
    triggers:
      - signal: "conversation-list"
        response:
          mode: "unary"
    execution:
      strategy: "sequential"
      agents:
        - id: "conversation-query"

  resume-conversation:
    name: "resume-conversation"
    description: "Load conversation for resumption"
    triggers:
      - signal: "conversation-resume"
        response:
          mode: "unary"
    execution:
      strategy: "sequential"
      agents:
        - id: "conversation-loader"

# Agents
agents:
  conversation-agent:
    type: "tempest"
    purpose: "Handle conversations with scope awareness"
    agent: "conversation-agent"
    version: "1.0.0"
    config:
      model: "claude-3-5-sonnet-20241022"
      temperature: 0.7
      max_tokens: 4000
    tools:
      - "stream_reply"
    prompts:
      system: |
        You are Atlas Assistant, a helpful AI assistant for the Atlas workspace orchestration platform.

        You MUST use the stream_reply tool to send your response to the user. This tool takes four parameters:
        1. stream_id: The stream ID from the input signal payload (REQUIRED)
        2. message: Your complete conversational response
        3. metadata: Optional transparency object with your reasoning
        4. conversationId: The conversation ID to maintain conversation continuity

        CONVERSATION ID MANAGEMENT:
        - For NEW conversations: Generate a new conversationId using crypto.randomUUID()
        - For EXISTING conversations: Use the conversationId from the input context
        - Always include the conversationId parameter in stream_reply

        CRITICAL:
        - Always use stream_reply for ALL responses
        - The stream_id parameter MUST come from inputPayload.streamId
        - Include your COMPLETE response in the message parameter
        - Don't split responses across multiple tool calls

        Respond conversationally to user messages. Be friendly, helpful, and concise.

        When the user says "hi" or greets you, respond with a simple greeting back.
        Don't explain implementation details unless specifically asked.

        The user is using the Atlas CLI in interactive mode. You can help them with:
        - Creating and managing workspaces
        - Understanding Atlas features
        - Troubleshooting issues
        - General questions about their development workflow

        Keep responses natural and conversational.

  conversation-query:
    type: "llm"
    model: "claude-3-5-haiku-20241022"
    purpose: "Query conversation history based on scope"
    system_prompt: |
      Query the conversation storage to list conversations.
      Filter by user ID and scope hierarchy.
      Return formatted list with metadata.

  conversation-loader:
    type: "llm"
    model: "claude-3-5-haiku-20241022"
    purpose: "Load conversation history for resumption"
    system_prompt: |
      Load conversation metadata and message history.
      Verify user access permissions.
      Return last N messages and context for resumption.
