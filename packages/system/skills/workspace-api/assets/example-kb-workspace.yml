# Complete working example — SQLite-backed personal knowledge base.
#
# Conversational agent with direct MCP tool access (no jobs / FSM needed).
# Submit the object below as `config` to workspace_create.
#
# Before submitting:
#   1. Replace {{DB_PATH}} with the absolute path the MCP server should use for
#      the SQLite file. A safe default is
#      "{ATLAS_HOME}/workspaces/{workspace-name}/kb.sqlite" — but write out the
#      literal absolute path; args are not env-expanded.
#   2. Replace {{USER_NAME}} in the agent prompt or remove the line.

version: "1.0"
workspace:
  name: knowledge-base
  description: >-
    Personal knowledge base — save URLs, notes, and freeform text to SQLite,
    then retrieve by asking plain-English questions.

tools:
  mcp:
    client_config:
      timeout:
        progressTimeout: "2m"
        maxTotalTimeout: "30m"
    servers:
      sqlite:
        transport:
          type: stdio
          command: uvx
          args:
            - mcp-server-sqlite
            - "--db-path"
            - "{{DB_PATH}}"

agents:
  kb-chat:
    description: Primary conversational interface for the knowledge base
    type: system
    agent: conversation-agent
    config:
      model: claude-sonnet-4-6
      temperature: 0.3
      tools:
        - read_query
        - write_query
        - create_table
        - list_tables
        - describe_table
      prompt: >-
        You are the conversational interface for {{USER_NAME}}'s personal
        knowledge base, stored locally in SQLite.


        ## What you can do

        - Save URLs, notes, and freeform text

        - Search and retrieve entries by topic, keyword, tag, type, or date

        - Browse all entries or filter by type

        - Delete or update entries by id


        ## SQLite schema

        Table: `entries`

        - id INTEGER PRIMARY KEY AUTOINCREMENT

        - type TEXT ('url', 'note', 'text') — default 'note'

        - title TEXT (optional short label)

        - content TEXT (the full URL, note body, or freeform text)

        - tags TEXT (comma-separated, optional)

        - created_at TEXT ISO datetime, auto-filled


        ## Bootstrap rule

        Before any first operation per session, call list_tables. If `entries`
        does not exist, create it:

        ```sql

        CREATE TABLE IF NOT EXISTS entries (
          id INTEGER PRIMARY KEY AUTOINCREMENT,
          type TEXT NOT NULL DEFAULT 'note',
          title TEXT,
          content TEXT NOT NULL,
          tags TEXT,
          created_at TEXT NOT NULL DEFAULT (datetime('now'))
        );

        ```


        ## Saving entries

        1. Infer type: starts with http:// or https:// → 'url', otherwise 'note'

        2. Extract title from context if obvious

        3. INSERT into entries, then SELECT the row back to confirm

        4. Confirm: "Saved — entry #<id>: <title or first 60 chars>"


        ## Searching entries

        1. Parse intent: keyword, tag, type filter, recency

        2. Build SQL with LIKE patterns, type filters, ORDER BY, LIMIT

        3. Show id, type, title, content (full for short, first 120 chars for long), tags, date

        4. If 0 results: say so and suggest broadening


        ## Behavior

        - Direct and efficient — no preamble

        - Never fabricate entries — always query SQLite

        - For ambiguous requests, pick the most likely interpretation and run it

        - Format dates human-readable

memory:
  own:
    - name: notes
      type: short_term
      strategy: narrative
    - name: long-term
      type: long_term
      strategy: narrative
  mounts: []
