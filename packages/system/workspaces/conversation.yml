version: "1.0"
workspace:
  name: "atlas-conversation"
  description: "Conversation management for Atlas"
memory:
  sessionBridge:
    enabled: true
    maxTurns: 10
    retentionHours: 48
    tokenAllocation: 0.10
    relevanceThreshold: 0.6
  worklog:
    enabled: true
    autoDetect: true
    confidenceThreshold: 0.7
    maxEntriesPerSession: 20
    retentionDays: 90
signals:
  slack-dm:
    provider: slack
    description: "Slack direct messages and mentions"
    config:
      events: [message, app_mention]
      channels: [dm, channel]
      ignoreBotMessages: true
  conversation-stream:
    description: "Handle conversation with streaming response"
    provider: "system"
    schema:
      type: "object"
      properties:
        message:
          type: "string"
        userId:
          type: "string"
        conversationId:
          type: "string"
        id:
          type: "string"
        streamId:
          type: "string"
        scope:
          type: "object"
          properties:
            workspaceId:
              type: "string"
            jobId:
              type: "string"
            sessionId:
              type: "string"
      required:
        - "message"
        - "userId"
  discord-natural:
    description: "Handle natural Discord messages (DMs and @mentions)"
    provider: "discord"
    config:
      events: [message_create]
      channels: [dm, mention]
  conversation-list:
    description: "List conversations for user and scope"
    provider: "system"
    schema:
      type: "object"
      properties:
        userId:
          type: "string"
        scope:
          type: "object"
      required:
        - "userId"
  conversation-resume:
    description: "Resume a previous conversation"
    provider: "system"
    schema:
      type: "object"
      properties:
        conversationId:
          type: "string"
        userId:
          type: "string"
      required:
        - "conversationId"
        - "userId"
jobs:
  handle-conversation:
    name: "handle-conversation"
    description: "Process conversation messages with context awareness"
    triggers:
      - signal: "conversation-stream"
      - signal: "discord-natural"
    execution:
      strategy: "sequential"
      agents:
        - id: "conversation"
  list-conversations:
    name: "list-conversations"
    description: "Query conversation history"
    triggers:
      - signal: "conversation-list"
    execution:
      strategy: "sequential"
      agents:
        - id: "conversation-query"
  resume-conversation:
    name: "resume-conversation"
    description: "Load conversation for resumption"
    triggers:
      - signal: "conversation-resume"
    execution:
      strategy: "sequential"
      agents:
        - id: "conversation-loader"
agents:
  conversation:
    type: "system"
    agent: "conversation"
    description: "Handle conversations with scope awareness and workspace creation"
    config:
      model: "claude-sonnet-4-20250514"
      tools:
        # advanced workspace creation
        - "atlas_update_workspace"
        - "atlas_workspace_set_persistence"
        # workspace
        - "atlas_workspace_describe"
        - "atlas_workspace_delete"
        # library
        - "library_list"
        - "library_get"
        - "library_get_stream"
        - "library_stats"
        # signal tools
        - "atlas_workspace_signals_list"
        - "atlas_workspace_signals_trigger"
        # todo memory tools
        - "atlas_todo_read"
        - "atlas_todo_write"
        # environment variable management
        - "atlas_save_env_var"
        # agents
        - "atlas_workspace_agents_list"
        - "atlas_workspace_agents_describe"
        # session tools
        - "atlas_session_describe"
        # job tools
        - "atlas_workspace_jobs_describe"
        # resources
        - "read_atlas_resource"
        # version
        - "system_version"
      prompt: ""
  conversation-query:
    type: "system"
    agent: "conversation-query"
    description: "Query conversation history based on scope"
    config:
      model: "claude-haiku-4-5"
      temperature: 0.3
      max_tokens: 2000
      prompt: |
        Query the conversation storage to list conversations.
        Filter by user ID and scope hierarchy.
        Return formatted list with metadata.
  conversation-loader:
    type: "system"
    agent: "conversation-loader"
    description: "Load conversation history for resumption"
    config:
      model: "claude-haiku-4-5"
      temperature: 0.3
      max_tokens: 2000
      prompt: |
        Load conversation metadata and message history.
        Verify user access permissions.
        Return last N messages and context for resumption.
