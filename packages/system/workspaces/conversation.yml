version: "1.0"
workspace:
  name: "atlas-conversation"
  description: "Conversation management for Friday"
signals:
  # Platform signals - triggered by gateway HTTP endpoints
  discord:
    provider: system
    description: "Discord messages routed from Signal Gateway"
    schema:
      type: "object"
      properties:
        text:
          type: "string"
        callback_url:
          type: "string"
        _discord:
          type: "object"
          properties:
            channel_id:
              type: "string"
            guild_id:
              type: "string"
            message_id:
              type: "string"
            user_id:
              type: "string"
            username:
              type: "string"
            timestamp:
              type: "string"
            is_dm:
              type: "boolean"
            is_mention:
              type: "boolean"
      required:
        - "text"
        - "_discord"

  slack:
    provider: system
    description: "Slack messages routed from Signal Gateway"
    schema:
      type: "object"
      properties:
        text:
          type: "string"
        callback_url:
          type: "string"
        _slack:
          type: "object"
          properties:
            channel_id:
              type: "string"
            team_id:
              type: "string"
            channel_type:
              type: "string"
            thread_ts:
              type: "string"
            event_id:
              type: "string"
            user_id:
              type: "string"
            timestamp:
              type: "string"
      required:
        - "text"
        - "_slack"

  # Keep existing conversation-stream for web UI
  conversation-stream:
    description: "Handle conversation with streaming response"
    provider: "system"
    schema:
      type: "object"
      properties:
        message:
          type: "string"
        userId:
          type: "string"
        conversationId:
          type: "string"
        id:
          type: "string"
        streamId:
          type: "string"
        datetime:
          type: "object"
          properties:
            timezone:
              type: "string"
            timestamp:
              type: "string"
            localDate:
              type: "string"
            localTime:
              type: "string"
            timezoneOffset:
              type: "string"
        scope:
          type: "object"
          properties:
            workspaceId:
              type: "string"
            jobId:
              type: "string"
            sessionId:
              type: "string"
      required:
        - "message"
        - "userId"

  conversation-list:
    description: "List conversations for user and scope"
    provider: "system"
    schema:
      type: "object"
      properties:
        userId:
          type: "string"
        scope:
          type: "object"
      required:
        - "userId"
  conversation-resume:
    description: "Resume a previous conversation"
    provider: "system"
    schema:
      type: "object"
      properties:
        conversationId:
          type: "string"
        userId:
          type: "string"
      required:
        - "conversationId"
        - "userId"
jobs:
  handle-conversation:
    name: "handle-conversation"
    description: "Process conversation messages with context awareness"
    triggers:
      - signal: "conversation-stream"  # Web UI
      - signal: "discord"              # Gateway → Discord
      - signal: "slack"                # Gateway → Slack
    execution:
      strategy: "sequential"
      agents:
        - id: "conversation"
  list-conversations:
    name: "list-conversations"
    description: "Query conversation history"
    triggers:
      - signal: "conversation-list"
    execution:
      strategy: "sequential"
      agents:
        - id: "conversation-query"
  resume-conversation:
    name: "resume-conversation"
    description: "Load conversation for resumption"
    triggers:
      - signal: "conversation-resume"
    execution:
      strategy: "sequential"
      agents:
        - id: "conversation-loader"
agents:
  conversation:
    type: "system"
    agent: "conversation"
    description: "Handle conversations with scope awareness and workspace creation"
    config:
      model: "claude-sonnet-4-5"
      tools:
        # advanced workspace creation
        - "update_workspace"
        - "workspace_set_persistence"
        # workspace
        - "workspace_describe"
        - "workspace_delete"
        # library
        - "library_list"
        - "library_get"
        - "library_get_stream"
        - "library_stats"
        # signal tools
        - "workspace_signals_list"
        - "workspace_signal_trigger"
        # todo memory tools
        - "todo_read"
        - "todo_write"
        # environment variable management
        - "save_env_var"
        # agents
        - "workspace_agents_list"
        - "workspace_agents_describe"
        # session tools
        - "session_describe"
        # job tools
        - "workspace_jobs_describe"
        # version
        - "system_version"
      prompt: ""
  conversation-query:
    type: "system"
    agent: "conversation-query"
    description: "Query conversation history based on scope"
    config:
      model: "claude-haiku-4-5"
      temperature: 0.3
      max_tokens: 2000
      prompt: |
        Query the conversation storage to list conversations.
        Filter by user ID and scope hierarchy.
        Return formatted list with metadata.
  conversation-loader:
    type: "system"
    agent: "conversation-loader"
    description: "Load conversation history for resumption"
    config:
      model: "claude-haiku-4-5"
      temperature: 0.3
      max_tokens: 2000
      prompt: |
        Load conversation metadata and message history.
        Verify user access permissions.
        Return last N messages and context for resumption.
