# =============================================================================
# COMPREHENSIVE ATLAS CONFIGURATION EXAMPLE
# =============================================================================
# This file demonstrates ALL available configuration options for atlas.yml.
# Atlas.yml is a superset of workspace.yml with additional platform features.
#
# To use: copy this file to your workspace directory and rename to atlas.yml
#
# Note: atlas.yml is loaded from workspace directories (${workspacePath}/atlas.yml).
# This file serves as documentation and reference for all available options.
# =============================================================================

# Version is required - currently "1.0"
version: "1.0"

# =============================================================================
# WORKSPACE IDENTITY (Same as workspace.yml)
# =============================================================================
# Atlas itself is a workspace - the platform workspace
workspace:
  # id: Optional for regular workspaces, recommended for platform workspace
  id: "atlas-platform"

  # name: Required, descriptive name
  name: "Atlas Platform"

  # version: Optional platform version
  version: "1.0.0"

  # description: Optional but recommended
  description: "Global Atlas platform workspace providing built-in agents and federation capabilities"

  # timeout: Optional timeout configuration for workspace operations
  timeout:
    # Time allowed between progress signals before cancelling for inactivity
    # Format: duration string like "30s", "2m", "1h"
    progressTimeout: "2m"

    # Hard upper limit for any operation
    maxTotalTimeout: "30m"

# =============================================================================
# SERVER CONFIGURATION (Extended for atlas.yml)
# =============================================================================
# How the Atlas platform exposes its capabilities via MCP
server:
  mcp:
    # Enable/disable MCP server
    enabled: true

    # Transport configuration (optional)
    # Supported types: "stdio", "http", "sse"
    # Note: stdio requires 'command' field, http/sse require 'url' field
    # transport:
    #   type: "sse"
    #   url: "https://platform.atlas.example.com/mcp"

    # Authentication configuration (atlas.yml only)
    auth:
      required: false
      # providers: ["bearer", "api_key"]  # Optional list of auth providers

    # Rate limiting (atlas.yml only)
    rate_limits:
      requests_per_hour: 1000
      concurrent_sessions: 10

    # What platform capabilities to expose via MCP
    discoverable:
      # Capability patterns to expose (e.g., 'workspace_*')
      capabilities:
        - "workspace_*"
        - "library_*"
      # Job patterns to expose as MCP tools
      jobs:
        - "analyze-content"

# =============================================================================
# TOOLS CONFIGURATION (Extended for atlas.yml)
# =============================================================================
# MCP servers that agents can call for tool access
tools:
  mcp:
    # Client configuration for calling MCP servers
    client_config:
      # Watchdog timeout configuration
      timeout:
        progressTimeout: "2m"
        maxTotalTimeout: "30m"

    # Platform-level MCP tool security policies (atlas.yml only)
    tool_policy:
      # Policy type: "allowlist" or "denylist"
      type: "allowlist"
      # Tools matching these patterns are allowed
      allow:
        - "memory-*"
        - "library_*"
        - "atlas_*"
      # deny: []  # Tools matching these patterns are denied (for denylist type)

    # MCP servers configuration
    # -------------------------------------------------------------------------
    # Link Credential Integration
    # -------------------------------------------------------------------------
    # MCP servers can retrieve credentials from Link service at startup.
    #
    # Environment setup:
    #   Development:  export LINK_DEV_MODE=true
    #   Production:   Generate RSA-2048 key pair and configure:
    #                 export ATLAS_JWT_PRIVATE_KEY_FILE=/path/to/private.pem
    #                 export LINK_JWT_PUBLIC_KEY_FILE=/path/to/public.pem (in Link)
    # -------------------------------------------------------------------------
    servers:
      # Example with Link credential integration
      slack:
        transport:
          type: "stdio"
          command: "npx"
          args: ["-y", "@anthropic/mcp-slack"]
        env:
          # Link credential reference - fetches token from Link service
          SLACK_BOT_TOKEN:
            from: link
            id: cred_abc123xyz      # Get this from Link UI
            key: token              # Key within credential.secret

          # Static value
          SLACK_WORKSPACE: my-workspace

          # From environment variable
          DEBUG: auto
        tools:
          allow: ["slack_send_message", "slack_list_channels"]

      # Example without Link credentials
      filesystem:
        transport:
          type: "stdio"
          command: "npx"
          args: ["-y", "@modelcontextprotocol/server-filesystem"]
        env:
          FILESYSTEM_ROOT: "/workspace"
        tools:
          allow: ["read_file", "list_directory"]

# =============================================================================
# AGENTS CONFIGURATION
# =============================================================================
# Platform-managed agents available to workspaces
# Three agent types are supported: "llm", "system", "atlas"
agents:
  # ---------------------------------------------------------------------------
  # LLM Agent Example
  # ---------------------------------------------------------------------------
  # LLM agents use language models directly with custom prompts
  memory-agent:
    # Agent type - must be "llm" for LLM-based agents
    type: "llm"

    # Description is REQUIRED for all agent types
    description: "Manages memory operations at session start and end"

    # Config block contains all LLM-specific settings
    config:
      # Provider is REQUIRED - e.g., "anthropic", "openai"
      provider: "anthropic"

      # Model is REQUIRED - the specific model to use
      model: "claude-haiku-4-5"

      # Prompt is REQUIRED - the system prompt for the agent
      prompt: |
        You are a memory management agent for Atlas workspaces.
        You can operate in two modes: LOAD (retrieve context) and STORE (save learnings).

        LOAD mode: Retrieve relevant patterns and context from past sessions
        to inform the current execution pipeline.

        STORE mode: Analyze the complete session results and extract learnings about
        execution patterns, successful strategies, and interesting outcomes.

      # Temperature: 0-0.7, controls randomness (optional, default: 0.3)
      temperature: 0.3

      # Max tokens for response (optional)
      max_tokens: 4000

      # Max steps/iterations for agentic behavior (optional)
      # max_steps: 10

      # Tool choice strategy (optional): "auto", "required", "none"
      # tool_choice: "auto"

      # Tools available to this agent (optional)
      # These reference MCP server tools defined in tools.mcp.servers
      tools:
        - "memory-storage"
        - "pattern-analysis"
        - "context-retrieval"

      # Provider-specific options (optional)
      # provider_options:
      #   thinking: { budget_tokens: 5000 }

      # Success condition for structured output (optional)
      # success:
      #   condition:
      #     prompt: "Output contains valid JSON with required fields"
      #   schema:
      #     type: "object"
      #     properties:
      #       result: { type: "string" }

      # Error condition (optional)
      # error:
      #   condition:
      #     prompt: "Output indicates a failure or error state"

      # Retry configuration (optional)
      # max_retries: 3

      # Timeout for agent execution (optional)
      # timeout: "30s"

  # ---------------------------------------------------------------------------
  # Atlas Agent Example
  # ---------------------------------------------------------------------------
  # Atlas agents reference registered agents from the Atlas Agent Registry
  # They run as separate processes with their own environment
  security-scanner:
    # Agent type - must be "atlas" for registry-based agents
    type: "atlas"

    # Agent ID from the Atlas Agent Registry - REQUIRED
    agent: "security-scanner"

    # Description is REQUIRED
    description: "Analyzes content for security concerns and sensitive information"

    # Prompt is REQUIRED for atlas agents - passed to the agent on invocation
    prompt: |
      Analyze the provided content for security issues including:
      - Content safety violations
      - Data privacy concerns
      - Potential malware patterns

      Return a risk score (0-10), findings, and recommendations.

    # Environment variables passed to the agent (optional)
    env:
      SECURITY_API_TOKEN: "${SECURITY_API_TOKEN}"

  # ---------------------------------------------------------------------------
  # System Agent Example
  # ---------------------------------------------------------------------------
  # System agents are built-in Atlas agents with predefined behavior
  tempest-synthesizer:
    # Agent type - must be "system" for built-in agents
    type: "system"

    # Agent identifier - REQUIRED, references a built-in system agent
    # Available system agents: "conversation", "content-synthesizer", etc.
    agent: "content-synthesizer"

    # Description is REQUIRED
    description: "Synthesizes multiple inputs into coherent summaries and analyses"

    # Config block for system agent customization (optional)
    config:
      # Override the default model
      model: "claude-sonnet-4-20250514"

      # Temperature for this agent
      temperature: 0.5

      # Max tokens
      max_tokens: 8000

      # Tools available to this system agent
      tools:
        - "library_list"
        - "library_get"

      # Enable reasoning mode (optional)
      # use_reasoning: true

      # Max reasoning steps when reasoning is enabled (optional, 1-20)
      # max_reasoning_steps: 5

      # Custom prompt override (optional)
      prompt: |
        Synthesize the provided inputs into a coherent output.
        Support multiple synthesis modes: comprehensive, summary, analytical.
        Support multiple output formats: markdown, json, plain_text.

# =============================================================================
# SIGNALS CONFIGURATION (Same as workspace.yml)
# =============================================================================
# Signals are triggers that can start sessions
# Supported providers: "http", "schedule", "system", "fs-watch", "slack", "discord"
signals:
  # ---------------------------------------------------------------------------
  # HTTP Signal - Webhook endpoint
  # ---------------------------------------------------------------------------
  analyze-request:
    # Description is REQUIRED
    description: "Request content analysis via HTTP webhook"

    # Provider type
    provider: "http"

    # HTTP-specific configuration
    config:
      # Path for the webhook (method is always POST)
      path: "/analyze"

      # Timeout for signal processing (optional)
      timeout: "30s"

    # JSON Schema for payload validation (optional)
    schema:
      type: "object"
      properties:
        content:
          type: "string"
        analysis_type:
          type: "string"
      required:
        - "content"

  # ---------------------------------------------------------------------------
  # Schedule Signal - Cron-based trigger
  # ---------------------------------------------------------------------------
  daily-maintenance:
    description: "Daily maintenance and cleanup tasks"

    provider: "schedule"

    config:
      # Cron expression (e.g., '0 9 * * *' for daily at 9 AM)
      schedule: "0 3 * * *"

      # Timezone for the schedule (optional, default: UTC)
      timezone: "UTC"

  # ---------------------------------------------------------------------------
  # File Watch Signal - Filesystem change trigger
  # ---------------------------------------------------------------------------
  # config-changes:
  #   description: "Watch for configuration file changes"
  #   provider: "fs-watch"
  #   config:
  #     path: "./config"
  #     recursive: true

  # ---------------------------------------------------------------------------
  # Slack Signal - Slack Socket Mode trigger
  # ---------------------------------------------------------------------------
  # slack-messages:
  #   description: "Handle Slack messages"
  #   provider: "slack"
  #   config:
  #     events: ["message", "app_mention"]
  #     channels: ["dm", "channel"]
  #     ignoreBotMessages: true

  # ---------------------------------------------------------------------------
  # Discord Signal - Discord message events
  # ---------------------------------------------------------------------------
  # discord-messages:
  #   description: "Handle Discord messages"
  #   provider: "discord"
  #   config:
  #     events: ["message_create"]
  #     channels: ["dm", "mention", "guild"]
  #     allowedGuilds: ["123456789"]  # Optional: restrict to specific servers

# =============================================================================
# JOBS CONFIGURATION (Same as workspace.yml)
# =============================================================================
# Jobs define execution patterns connecting signals to agents
jobs:
  analyze-content:
    # MCP-compliant job name (optional, defaults to key)
    name: "analyze-content"

    # Job description (optional)
    description: "Analyze content using the memory and synthesis agents"

    # Triggers - which signals start this job
    triggers:
      - signal: "analyze-request"
        # Optional condition for triggering
        # condition:
        #   prompt: "Signal payload contains 'urgent' flag"

    # File context for the job (optional)
    # context:
    #   files:
    #     patterns: ["src/**/*.ts", "!**/*.test.ts"]
    #     base_path: "."
    #     max_file_size: 100000
    #     include_content: true

    # Prompt for supervisor guidance (optional)
    # prompt: "Focus on security analysis and performance implications"

    # Execution configuration - REQUIRED
    execution:
      # Strategy: "sequential" or "parallel"
      strategy: "sequential"

      # Agent pipeline - at least one agent required
      agents:
        # Simple agent reference
        - "memory-agent"

        # Detailed agent configuration
        - id: "tempest-synthesizer"
          # nickname: "synthesizer"  # Optional reference name
          # context:  # Optional context override
          #   signal: true
          #   steps: "previous"
          # dependencies: ["memory-agent"]  # Explicit dependencies
          # tools:  # Tool access override
          #   allow: ["library_*"]

    # Success condition (optional)
    # success:
    #   condition:
    #     prompt: "All agents completed successfully with valid output"
    #   schema:
    #     type: "object"
    #     properties:
    #       summary: { type: "string" }

    # Error condition (optional)
    # error:
    #   condition:
    #     prompt: "Any agent failed or produced invalid output"

    # Job-level configuration (optional)
    config:
      # Job timeout
      timeout: "5m"

      # Supervision settings
      supervision:
        # Level: "minimal", "standard", "detailed"
        level: "standard"
        # Skip planning phase for simple jobs
        # skip_planning: true

      # Memory settings for this job
      memory:
        enabled: true
        # Extract facts from session
        fact_extraction: true
        # Include summary in session receipt
        summary: true

# =============================================================================
# MEMORY CONFIGURATION (Extended for atlas.yml)
# =============================================================================
# Atlas memory configuration is more complex than workspace memory
# It configures memory at multiple scopes: default, agent, session, workspace
memory:
  # Default memory configuration for all components
  default:
    enabled: true
    # Memory storage backend
    storage: "coala-local"
    # Enable cognitive processing loop
    cognitive_loop: true
    # Retention policy
    retention:
      max_age_days: 30
      max_entries: 1000
      cleanup_interval_hours: 24

  # Streaming memory configuration for performance (optional)
  streaming:
    enabled: true
    queue_max_size: 1000
    batch_size: 10
    # Duration format for flush interval
    flush_interval: "1s"
    background_processing: true
    persistence_enabled: true
    error_retry_attempts: 3
    priority_processing: true
    # Safe migration mode - write to both old and new systems
    dual_write_enabled: true
    # Legacy batch processing
    legacy_batch_enabled: false
    # Stream all memory operations
    stream_everything: true
    # Track performance metrics
    performance_tracking: true

  # Agent-level memory configuration
  agent:
    enabled: true
    # Scope: "agent", "session", or "workspace"
    scope: "agent"
    # Include memory in agent context
    include_in_context: true
    # Limits for context assembly
    context_limits:
      relevant_memories: 2
      past_successes: 1
      past_failures: 1
    # Memory type configurations
    memory_types:
      working:
        enabled: true
        max_age_hours: 2
        max_entries: 50
      procedural:
        enabled: true
        max_age_days: 7
        max_entries: 100
      episodic:
        enabled: false  # Agents shouldn't accumulate episodic memories
        max_age_days: 1
        max_entries: 10
      semantic:
        enabled: true
        max_age_days: 14
        max_entries: 200
      contextual:
        enabled: false  # Contextual memory handled at session level
        max_age_hours: 1
        max_entries: 5

  # Session-level memory configuration
  session:
    enabled: true
    scope: "session"
    include_in_context: true
    context_limits:
      relevant_memories: 5
      past_successes: 3
      past_failures: 2
    memory_types:
      working:
        enabled: true
        max_age_hours: 24
        max_entries: 100
      episodic:
        enabled: true  # Sessions accumulate episodic memories for task learning
        max_age_days: 7
        max_entries: 50
      procedural:
        enabled: true
        max_age_days: 30
        max_entries: 200
      semantic:
        enabled: true
        max_age_days: 90
        max_entries: 500
      contextual:
        enabled: true
        max_age_hours: 24
        max_entries: 100

  # Workspace-level memory configuration
  workspace:
    enabled: true
    scope: "workspace"
    # Workspace memory not directly included in agent context
    include_in_context: false
    context_limits:
      relevant_memories: 10
      past_successes: 5
      past_failures: 3
    memory_types:
      working:
        enabled: false  # Workspace doesn't need working memory
        max_entries: 0
      episodic:
        enabled: true
        max_age_days: 90
        max_entries: 1000
      procedural:
        enabled: true
        max_age_days: 365
        max_entries: 500
      semantic:
        enabled: true
        max_age_days: 365
        max_entries: 2000
      contextual:
        enabled: true
        max_age_days: 30
        max_entries: 200

# =============================================================================
# SUPERVISORS CONFIGURATION (atlas.yml only)
# =============================================================================
# Configure the three-level supervisor hierarchy
supervisors:
  # Workspace supervisor - orchestrates sessions
  workspace:
    # Model for workspace-level decisions
    model: "claude-sonnet-4-20250514"
    # Memory scope to use
    memory: "workspace"
    # Supervision configuration - REQUIRED
    supervision:
      # Level: "minimal", "standard", "detailed"
      level: "minimal"
      # Enable caching for supervision decisions
      cache_enabled: true
      # Cache adapter: "memory", "redis", "file"
      cache_adapter: "memory"
      # Cache TTL in hours
      cache_ttl_hours: 1
      # Allow parallel LLM calls
      parallel_llm_calls: true
      # Timeout configuration
      timeouts:
        # Analysis timeout - duration format
        analysis: "2s"
        # Validation timeout - duration format
        validation: "1s"
        # Execution timeout (optional)
        # execution: "30s"
    # Prompts for workspace supervisor
    prompts:
      system: |
        You are a WorkspaceSupervisor responsible for orchestrating AI agent execution.
        Your role is to analyze signals, create filtered session contexts, and manage workspace-level concerns.

        Key responsibilities:
        - Analyze incoming signals to understand intent and goals
        - Filter workspace context for relevant session data
        - Spawn SessionSupervisors with appropriate context
        - Coordinate multiple concurrent sessions
        - Manage signal-to-agent mappings dynamically
      # analysis: "..."  # Optional analysis prompt
      # planning: "..."  # Optional planning prompt

  # Session supervisor - coordinates agent execution
  session:
    model: "claude-sonnet-4-20250514"
    memory: "session"
    supervision:
      level: "standard"
      cache_enabled: true
      cache_adapter: "memory"
      cache_ttl_hours: 1
      parallel_llm_calls: true
      timeouts:
        analysis: "2s"
        validation: "1s"
    prompts:
      system: |
        You are a SessionSupervisor responsible for coordinating agent execution within a session.
        Your role is to create execution plans, orchestrate agents, and evaluate progress.

        Key responsibilities:
        - Create dynamic execution plans using LLM reasoning
        - Determine agent selection, order, and data flow
        - Coordinate agent execution through AgentSupervisor
        - Evaluate progress and adapt strategy as needed
        - Support iterative refinement loops

  # Agent supervisor - manages individual agent execution
  agent:
    model: "claude-sonnet-4-20250514"
    memory: "agent"
    supervision:
      level: "minimal"
      cache_enabled: true
      cache_adapter: "memory"
      cache_ttl_hours: 1
      parallel_llm_calls: true
      timeouts:
        analysis: "2s"
        validation: "1s"
    prompts:
      system: |
        You are an AgentSupervisor responsible for safe agent loading and execution.
        Your role is to analyze agents for safety, prepare secure environments, and supervise execution.

        Key responsibilities:
        - Analyze agents for safety and optimization before loading
        - Prepare secure execution environments
        - Monitor agent execution in real-time
        - Validate outputs for quality and safety
        - Handle failures and recovery scenarios

# =============================================================================
# PLANNING CONFIGURATION (atlas.yml only)
# =============================================================================
# A Priori planning configuration for execution and validation
planning:
  # Execution planning configuration
  execution:
    # Enable caching for execution plans
    cache_enabled: true
    # Cache TTL in hours
    cache_ttl_hours: 24
    # Invalidate cache when job definitions change
    invalidate_on_job_change: true

    # Strategy selection based on job characteristics
    strategy_selection:
      # Strategy for simple, straightforward jobs
      simple_jobs: "precomputed"
      # Strategy for jobs with conditional logic
      complex_jobs: "behavior-tree"
      # Strategy for optimization problems
      optimization_jobs: "mcts"
      # Strategy for hierarchical planning
      planning_jobs: "htn"

    # Thresholds for strategy selection (0.0 - 1.0)
    strategy_thresholds:
      # Above this complexity, use ExecutionEngine
      complexity: 0.6
      # Above this uncertainty, consider MCTS
      uncertainty: 0.5
      # Above this, prefer MCTS optimization
      optimization: 0.7

  # Validation configuration
  validation:
    # Enable custom functional validators
    functional_validators: true
    # Enable heuristic smoke tests
    smoke_tests: true
    # Enable content safety validation
    content_safety: true
    # Confidence threshold for LLM fallback (0.0 - 1.0)
    llm_threshold: 0.7
    # Enable expensive LLM validation fallback
    llm_fallback: true
    # Cache validation results
    cache_enabled: true
    cache_ttl_hours: 1
    # Continue validation even after failures
    fail_fast: false

    # External validation services (optional)
    external_services:
      # Enable OpenAI Moderation API
      openai_moderation: false
      # Enable Google Perspective API
      perspective_api: false
      # URL for Python DeepEval service (null to disable)
      deepeval_service: null

# =============================================================================
# RUNTIME CONFIGURATION (atlas.yml only)
# =============================================================================
# Runtime settings for the Atlas platform
runtime:
  # Server configuration
  server:
    port: 8080
    host: "localhost"

  # Logging configuration
  logging:
    # Level: "debug", "info", "warn", "error"
    level: "info"
    # Format: "json", "pretty"
    format: "pretty"

  # Persistence configuration
  persistence:
    # Type: "local", "memory", "s3", "gcs", "azure"
    type: "local"
    # Path for local persistence
    path: "./.atlas"

  # Security configuration
  security:
    # CORS setting
    cors: "*"

  # Session configuration
  sessions:
    # Maximum session execution time in milliseconds
    # Min: 60000 (1 minute), Max: 86400000 (24 hours)
    # Default: 3600000 (60 minutes)
    timeout: 3600000

