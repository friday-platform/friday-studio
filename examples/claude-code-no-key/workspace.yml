version: '1.0'
workspace:
  name: Claude Code No Key Test
  description: Tests error handling when ANTHROPIC_API_KEY is missing.

agents:
  claude-code:
    type: user
    agent: claude-code
    description: Agent without API key.
    prompt: Test
    env:
      GH_TOKEN: from_environment

signals:
  run-code:
    provider: http
    title: Run Code Agent
    description: Invoke the claude-code agent.
    config:
      path: /webhooks/run-code
    schema:
      type: object
      properties:
        prompt:
          type: string
      required:
        - prompt

jobs:
  code-job:
    title: Run Code Agent
    description: Directly invoke the Python claude-code agent.
    triggers:
      - signal: run-code
    fsm:
      id: no-key-pipeline
      initial: idle
      states:
        idle:
          on:
            run-code:
              target: run_agent
        run_agent:
          entry:
            - type: agent
              agentId: claude-code
            - type: emit
              event: DONE
          on:
            DONE:
              target: completed
        completed:
          type: final
