version: "1.0"

# Atlas Platform Workspace - "Everything is a workspace" model
workspace:
  id: "atlas-platform"
  name: "Atlas Platform"
  description: "Platform workspace with global management capabilities"

# Platform MCP server configuration
server:
  mcp:
    enabled: true
    discoverable:
      capabilities:
        - "workspace_*"
      jobs: []

# Platform tools and federation policies
tools:
  mcp:
    client_config:
      timeout:
        progressTimeout: "2m"
        maxTotalTimeout: "30m"
    tool_policy:
      type: "allowlist"
      allow: ["filesystem-mcp", "memory-mcp"]

# No platform-specific agents for this example
agents: {}

# Use default supervisors (inherit from platform)
supervisors:
  workspace:
    model: "claude-sonnet-4-6"
    supervision:
      level: "standard"
      cache_enabled: true
      cache_adapter: "memory"
      cache_ttl_hours: 1
      parallel_llm_calls: true
      timeouts:
        analysis: "10s"
        validation: "8s"
    prompts:
      system: "You are a WorkspaceSupervisor for the telephone game workspace."
  session:
    model: "claude-sonnet-4-6"
    supervision:
      level: "standard"
      cache_enabled: true
      cache_adapter: "memory"
      cache_ttl_hours: 1
      parallel_llm_calls: true
      timeouts:
        analysis: "10s"
        validation: "8s"
    prompts:
      system: "You are a SessionSupervisor for the telephone game workspace."
  agent:
    model: "claude-sonnet-4-6"
    supervision:
      level: "minimal"
      cache_enabled: true
      cache_adapter: "memory"
      cache_ttl_hours: 1
      parallel_llm_calls: true
      timeouts:
        analysis: "2s"
        validation: "1s"
    prompts:
      system: "You are an AgentSupervisor for the telephone game workspace."
