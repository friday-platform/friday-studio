version: "1.0"

# Atlas Platform Workspace - "Everything is a workspace" model
workspace:
  id: "atlas-platform"
  name: "Atlas Platform"
  description: "Platform workspace with global management capabilities"

# Platform MCP server configuration
server:
  mcp:
    enabled: true
    discoverable:
      capabilities:
        - "workspace_*"
      jobs: []

# Platform tools and federation policies
tools:
  mcp:
    client_config:
      timeout: "30s"
    tool_policy:
      type: "allowlist"
      allow: ["filesystem-mcp", "memory-mcp"]

# No platform-specific agents for this example
agents: {}

# Use default supervisors (inherit from platform)
supervisors:
  workspace:
    model: "claude-3-7-sonnet-latest"
    memory: "workspace"
    supervision:
      level: "standard"
      cache_enabled: true
      cache_adapter: "memory"
      cache_ttl_hours: 1
      parallel_llm_calls: true
      timeouts:
        analysis: "10s"
        validation: "8s"
    prompts:
      system: "You are a WorkspaceSupervisor for the telephone game workspace."
  session:
    model: "claude-3-7-sonnet-latest"
    memory: "session"
    supervision:
      level: "standard"
      cache_enabled: true
      cache_adapter: "memory"
      cache_ttl_hours: 1
      parallel_llm_calls: true
      timeouts:
        analysis: "10s"
        validation: "8s"
    prompts:
      system: "You are a SessionSupervisor for the telephone game workspace."
  agent:
    model: "claude-3-7-sonnet-latest"
    memory: "agent"
    supervision:
      level: "minimal"
      cache_enabled: true
      cache_adapter: "memory"
      cache_ttl_hours: 1
      parallel_llm_calls: true
      timeouts:
        analysis: "2s"
        validation: "1s"
    prompts:
      system: "You are an AgentSupervisor for the telephone game workspace."

# Override memory configuration for telephone game
memory:
  # Default memory configuration
  default:
    enabled: true
    storage: "coala-local"
    cognitive_loop: true
    retention:
      max_age_days: 30
      max_entries: 1000
      cleanup_interval_hours: 24

  # Session-level memory configuration
  session:
    enabled: true
    scope: "session"
    include_in_context: false # Don't include session memory in agent context for clean telephone game
    context_limits:
      relevant_memories: 0 # No relevant memories in context
      past_successes: 0 # No past successes in context
      past_failures: 0 # No past failures in context
    memory_types:
      working:
        enabled: true # Still track working memory for supervisors
        max_age_hours: 24
        max_entries: 100
      episodic:
        enabled: false # Disable episodic memory for telephone game
        max_age_days: 1
        max_entries: 10
      procedural:
        enabled: false # Disable procedural memory for telephone game
        max_age_days: 1
        max_entries: 10
      semantic:
        enabled: false # Disable semantic memory for telephone game
        max_age_days: 1
        max_entries: 10
      contextual:
        enabled: false # Disable contextual memory for telephone game
        max_age_hours: 1
        max_entries: 5

  # Agent-level memory configuration
  agent:
    enabled: true
    scope: "agent"
    include_in_context: false # Agents get no memory context for clean telephone game
    context_limits:
      relevant_memories: 0
      past_successes: 0
      past_failures: 0
    memory_types:
      working:
        enabled: false # No agent working memory
      procedural:
        enabled: false # No agent procedural memory
      episodic:
        enabled: false # No agent episodic memory
      semantic:
        enabled: false # No agent semantic memory
      contextual:
        enabled: false # No agent contextual memory

  # Workspace-level memory configuration (minimal, inherited from platform)
  workspace:
    enabled: true
    scope: "workspace"
    include_in_context: false
    context_limits:
      relevant_memories: 10
      past_successes: 5
      past_failures: 3
    memory_types:
      working:
        enabled: false
        max_entries: 0
      episodic:
        enabled: true
        max_age_days: 90
        max_entries: 1000
      procedural:
        enabled: true
        max_age_days: 365
        max_entries: 500
      semantic:
        enabled: true
        max_age_days: 365
        max_entries: 2000
      contextual:
        enabled: true
        max_age_days: 30
        max_entries: 200
# Note: This atlas.yml overrides platform settings specifically for clean telephone game behavior
