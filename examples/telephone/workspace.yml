version: "1.0"

workspace:
  name: "Multi-Provider Telephone Game"
  description: "A game where messages transform through multiple agents using different LLM providers"
  timeout:
    progressTimeout: "2m" # Time allowed between progress signals
    maxTotalTimeout: "30m" # Hard upper limit for any operation

# Server configuration - how this workspace exposes itself via MCP
server:
  mcp:
    enabled: true
    discoverable:
      capabilities:
        - "workspace_jobs_*"
      jobs:
        - telephone

# Tools configuration - MCP servers this workspace connects to
tools:
  mcp:
    client_config:
      timeout:
        progressTimeout: "2m"
        maxTotalTimeout: "30m"
    servers:
      filesystem-context:
        transport:
          type: "stdio"
          command: "npx"
          args: ["-y", "@modelcontextprotocol/server-filesystem"]
        env:
          FILESYSTEM_ROOT: "/workspace"
        tools:
          allow: ["read_file", "list_directory"]
      # Atlas Platform is automatically provided - no need to configure it here
# Signal definitions
signals:
  telephone-message:
    description: "Trigger a telephone game with a message"
    provider: "http"
    schema:
      type: "object"
      properties:
        message:
          type: "string"
        required:
          - "message"
    config:
      path: "/telephone"
      timeout: 30s

# NOTE: Jobs are deprecated. This workspace needs migration to FSM format.
# Create a telephone.fsm.yaml file to define the workflow as a finite state machine.
# See conversation.fsm.yaml for an example FSM structure.

# Agent definitions
agents:
  mishearing-agent:
    type: "llm"
    description: "Specializes in phonetic errors and mishearing transformations"
    config:
      provider: "anthropic"
      model: "claude-sonnet-4-5"
      tools: ["filesystem-context"] # References tools.mcp.servers.filesystem-context
      prompt: |
        You are a specialized agent in the telephone game focusing on phonetic errors and mishearing.
        Your task is to introduce realistic phonetic distortions and sound-alike substitutions to messages.
        Focus on words that sound similar but have different meanings, and common mishearing patterns.
        The transformations should be plausible and natural, as if someone slightly misheard the message.
        Mishear the following message:

  embellishment-agent:
    type: "llm"
    description: "Adds creative details and context to messages"
    config:
      provider: "anthropic"
      model: "claude-sonnet-4-5"
      tools: ["filesystem-context", "atlas-platform"]
      prompt: |
        You are a creative embellishment agent in the telephone game.
        Your task is to add vivid details, context, and narrative elements to the message you receive.
        Enhance the story with descriptive language, background information, and creative flourishes.
        The core message should remain recognizable but enriched with additional elements.
        Embellish the following message:

  reinterpretation-agent:
    type: "llm"
    description: "Dramatically transforms and reinterprets messages"
    config:
      provider: "anthropic"
      model: "claude-sonnet-4-5"
      tools: ["filesystem-context", "atlas-platform"]
      prompt: |
        You are a reinterpretation agent in the telephone game.
        Your task is to dramatically transform and reinterpret the message while maintaining some plausible connection.
        Apply creative misunderstandings, context shifts, and meaning transformations.
        The result should show how information can mutate through sequential processing.
        Reinterpret the following message:
