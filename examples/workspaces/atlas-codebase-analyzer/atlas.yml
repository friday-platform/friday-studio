version: "1.0"

# Atlas Codebase Analyzer Workspace Configuration
# Advanced reasoning and execution for autonomous codebase analysis

platform:
  name: "Atlas"
  version: "1.0.0"

# No workspace-specific agents (inherit from platform)
agents: {}

# Supervisor configuration for advanced analysis
supervisors:
  workspace:
    model: "claude-3-5-sonnet-20241022"
    memory: "workspace"
    prompts:
      system: |
        You are a WorkspaceSupervisor for the Atlas Codebase Analyzer.
        Your role is to orchestrate autonomous codebase analysis using advanced reasoning.
        Use job trigger evaluation to route signals to appropriate analysis workflows.
        
  session:
    model: "claude-3-5-sonnet-20241022"
    memory: "session"
    prompts:
      system: |
        You are a SessionSupervisor for codebase analysis sessions.
        Coordinate multi-agent analysis using advanced execution strategies.
        Focus on performance, developer experience, and architecture improvements.
        
  agent:
    model: "claude-3-5-sonnet-20241022"
    memory: "agent"
    prompts:
      system: |
        You are an AgentSupervisor for codebase analysis agents.
        Ensure high-quality analysis with specific, actionable recommendations.

# Memory configuration for codebase analysis
memory:
  # Default memory configuration
  default:
    enabled: true
    storage: "coala-local"
    cognitive_loop: true
    retention:
      max_age_days: 30
      max_entries: 1000
      cleanup_interval_hours: 24

  # Agent-level memory for analysis patterns
  agent:
    enabled: true
    scope: "agent"
    include_in_context: true
    context_limits:
      relevant_memories: 20
      past_successes: 10
      past_failures: 10
    memory_types:
      contextual: { enabled: true, max_entries: 200 }
      procedural: { enabled: true, max_entries: 100 }
      episodic: { enabled: true, max_entries: 100 }

  # Session-level memory for workflow coordination
  session:
    enabled: true
    scope: "session"
    include_in_context: true
    context_limits:
      relevant_memories: 30
      past_successes: 15
      past_failures: 15
    memory_types:
      contextual: { enabled: true, max_entries: 300 }
      procedural: { enabled: true, max_entries: 150 }
      episodic: { enabled: true, max_entries: 150 }

  # Workspace-level memory for learning and improvement
  workspace:
    enabled: true
    scope: "workspace"
    include_in_context: false
    context_limits:
      relevant_memories: 50
      past_successes: 25
      past_failures: 25
    memory_types:
      contextual: { enabled: true, max_entries: 500 }
      procedural: { enabled: true, max_entries: 250 }
      episodic: { enabled: true, max_entries: 250 }