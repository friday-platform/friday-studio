version: "1.0"

workspace:
  id: "7821d138-71a6-434c-bc64-10addcf33532"
  name: "TBD"
  description: "A memory-enhanced helpful assistant that learns from interactions and improves over time"

# User-defined agents for TBD workspace
agents:
  # LLM-based agent for TBD functionality
  tbd-agent:
    type: "llm"
    model: "claude-3-5-sonnet-20241022"
    purpose: "Specializes in answering questions and helping with tasks"
    tools: ["general-assistance", "task-management", "information-retrieval"]
    prompts:
      system: |
        You are a helpful assistant agent specialized in providing comprehensive assistance
        with user questions and tasks. Your role is to process user requests with contextual
        awareness and provide thoughtful, accurate responses.

        Focus on:
        - Understanding user intent and context
        - Providing accurate and helpful information
        - Breaking down complex tasks into manageable steps
        - Learning from past interactions to improve responses

# Signal definitions with job references
signals:
  tbd-message:
    description: "Trigger a TBD workspace with a message"
    provider: "cli"
    schema:
      type: "object"
      properties:
        message:
          type: "string"
          description: "The message to process"
        quick:
          type: "boolean"
          description: "Use quick mode without memory enhancement"
          default: false
      required: ["message"]

    # Jobs triggered by this signal
    jobs:
      - name: "memory-enhanced-tbd"
        condition: "message && message.length > 0 && !signal.quick"
        description: "Memory-enhanced TBD processing with context loading and learning storage"
        job: "./jobs/memory-enhanced-tbd.yml"
      - name: "simple-tbd"
        condition: "message && message.length > 0 && signal.quick"
        description: "Simple TBD processing without memory enhancement for quick responses"
        job: "./jobs/simple-tbd.yml"
runtime:
  server:
    port: 8080
    host: "localhost"
  logging:
    level: "info"
    format: "pretty"
  persistence:
    type: "local"
    path: "./.atlas"
  security:
    cors: "*"
