version: "1.0"

job:
  name: "memory-enhanced-tbd"
  description: "Memory-enhanced TBD processing with context loading and learning storage"

  session_prompts:
    planning: |
      This job implements a memory-enhanced TBD workflow that learns from interactions:
      Stage 1: Load context and patterns from past user interactions (memory-agent LOAD)
      Stage 2: Process user request with contextual awareness (tbd-agent)
      Stage 3: Store session learnings for future improvement (memory-agent STORE)

      The memory agent provides context at the start and captures learnings at the end,
      creating a continuous learning loop for improved assistance over time.

    evaluation: |
      Job is complete when all three phases have executed successfully:
      - Context Loading: Memory agent has loaded relevant patterns and context
      - Request Processing: TBD agent has processed request with contextual awareness
      - Learning Storage: Memory agent has stored insights for future improvement

      Validate that the TBD response incorporates loaded context and that meaningful
      learnings are extracted and stored for future sessions.

  execution:
    strategy: "sequential"
    agents:
      - id: "memory-agent"
        mode: "load"
        prompt: |
          LOAD MODE: Load relevant context and patterns from past user interactions.
          Analyze previous sessions to provide guidance for this user request.

          User message: "{signal.message}"

          Retrieve and summarize:
          - Similar past requests and successful response patterns
          - User preferences and communication style
          - Relevant domain knowledge from previous interactions
          - Effective strategies for this type of request

      - id: "tbd-agent"
        prompt: |
          Process this user request with contextual awareness from memory:

          Context from memory: {previous_output}
          User message: "{signal.message}"

          Provide a comprehensive, helpful response that:
          - Takes advantage of any relevant context and patterns from past interactions
          - Incorporates learned preferences and communication styles
          - Builds upon previous knowledge and successful strategies
          - Demonstrates continuous improvement through memory integration

      - id: "memory-agent"
        mode: "store"
        prompt: |
          STORE MODE: Analyze the complete TBD session and extract learnings.
          Store insights in appropriate memory types for future improvement.

          Original request: "{signal.message}"
          Context provided: {agent.memory-agent.output}
          TBD response: {previous_output}

          Extract and store:
          - Patterns in user requests and effective response strategies
          - Successful integration of context into responses
          - Quality indicators and user satisfaction cues
          - Domain knowledge and task-specific insights
          - Communication preferences and interaction patterns

  # Success criteria
  success_criteria:
    context_loaded: true
    contextual_response: true
    learnings_stored: true
    response_quality: "high"
    memory_integration: "successful"

  # Error handling
  error_handling:
    max_retries: 2
    retry_delay_seconds: 5
    timeout_seconds: 180
    agent_failure_strategy: "continue" # Continue to next agent if one fails

  # Resource requirements
  resources:
    estimated_duration_seconds: 120
    max_memory_mb: 512
    required_capabilities: [
      "memory-operations",
      "context-loading",
      "general-assistance",
      "learning-storage",
    ]
    concurrent_agent_limit: 1 # Sequential execution only
