version: "1.0"

workspace:
  id: "7821d138-71a6-434c-bc64-10addcf33532"
  name: "remote-acp-demo"
  description: "Demonstration of Atlas remote agent capabilities using local ACP server"

# Top-level job definitions
jobs:
  echo-test:
    name: "echo-test"
    description: |
      Remote agent connectivity and response validation test:
      1. Echo agent receives input message and processes through ACP protocol
      2. Validates remote agent communication, authentication, and response formatting
      3. Confirms round-trip message integrity and protocol compliance
      Result: Verification that remote ACP agent is properly connected and responsive
      with accurate message processing and protocol adherence
    triggers:
      - signal: "http-echo"
    execution:
      strategy: "sequential"
      agents:
        - id: "echo-agent"

  chat-test:
    name: "chat-test"
    description: |
      Conversational AI remote agent functionality test:
      1. Chat agent processes natural language input through ACP protocol
      2. Generates contextually appropriate conversational responses
      3. Validates advanced language understanding and response quality
      Result: Confirmation that remote conversational agent can handle complex
      natural language processing tasks with high-quality outputs
    triggers:
      - signal: "http-chat"
    execution:
      strategy: "sequential"
      agents:
        - id: "chat-agent"

  dual-agent-processing:
    name: "dual-agent-processing"
    description: |
      Sequential remote agent processing workflow:
      1. Echo agent processes initial input and validates message structure
      2. Chat agent receives echo output and provides intelligent analysis/response
      3. Demonstrates inter-agent communication and output chaining
      Result: End-to-end validation of multi-agent workflow coordination
      with proper data flow between different remote agent capabilities
    triggers:
      - signal: "http-dual"
    execution:
      strategy: "sequential"
      agents:
        - id: "echo-agent"
        - id: "chat-agent"

  parallel-acp-test:
    name: "parallel-acp-test"
    description: |
      Concurrent remote agent execution stress test:
      1. Echo and chat agents process the same input simultaneously via ACP
      2. Tests concurrent connection handling and resource management
      3. Validates parallel processing capabilities and response consistency
      Result: Proof that multiple remote agents can operate concurrently
      without interference, with proper load balancing and error isolation
    triggers:
      - signal: "cli-test"
    execution:
      strategy: "parallel"
      agents:
        - id: "echo-agent"
        - id: "chat-agent"

# Remote agents configuration pointing to local ACP server
agents:
  # Echo agent from local ACP server
  echo-agent:
    type: "remote"
    protocol: "acp"
    endpoint: "http://localhost:8000"
    purpose: "Simple echo agent for testing remote agent functionality"

    # No authentication needed for local server
    # auth:
    #   type: "bearer"
    #   token_env: "LOCAL_ACP_TOKEN"

    # ACP-specific settings
    acp:
      agent_name: "echo" # Name of agent on local ACP server
      default_mode: "sync" # sync | async | stream
      timeout_ms: 30000 # 30 second timeout
      max_retries: 3 # Retry failed requests 3 times
      health_check_interval: 60000 # Health check every minute

    # Schema validation (optional)
    schema:
      validate_input: false
      validate_output: false

    # Monitoring and reliability
    monitoring:
      enabled: true
      circuit_breaker:
        failure_threshold: 5 # Open circuit after 5 failures
        timeout_ms: 60000 # Stay open for 60 seconds
        half_open_max_calls: 3 # Test with 3 calls when half-open

  # Chat agent from local ACP server
  chat-agent:
    type: "remote"
    protocol: "acp"
    endpoint: "http://localhost:8000"
    purpose: "Conversational agent for natural language processing"

    # No authentication needed for local server
    # auth:
    #   type: "api_key"
    #   api_key_env: "LOCAL_API_KEY"
    #   header: "X-API-Key"

    acp:
      agent_name: "chat" # Name of agent on local ACP server
      default_mode: "sync" # Use sync for quick responses
      timeout_ms: 30000 # 30 second timeout
      max_retries: 2

  # Local LLM agent for comparison
  local-llm-agent:
    type: "llm"
    model: "claude-3-5-sonnet-20241022"
    purpose: "Local AI agent for comparison and fallback"
    tools: ["computer_use"]
    prompts:
      system: "You are a helpful AI assistant that works alongside remote agents."

# Signal configurations
signals:
  # HTTP webhook for echo testing
  http-echo:
    description: "HTTP endpoint for echo agent testing"
    provider: "http"
    path: "/echo"
    method: "POST"

  # HTTP endpoint for chat testing
  http-chat:
    description: "HTTP endpoint for chat agent testing"
    provider: "http"
    path: "/chat"
    method: "POST"

  # HTTP endpoint for dual agent processing
  http-dual:
    description: "HTTP endpoint for dual agent processing"
    provider: "http"
    path: "/dual"
    method: "POST"

  # CLI signal for testing
  cli-test:
    description: "CLI signal for testing ACP agents"
    provider: "cli"
    command: "test-acp"
