version: "1.0"

workspace:
  id: "7821d138-71a6-434c-bc64-10addcf33532"
  name: "Telephone Game"
  description: "A game where messages transform through multiple agents"

# Agent definitions - no supervisor logic here
agents:
  # LLM-based agent with custom prompts and tools
  memory-agent:
    type: "llm"
    model: "claude-4-sonnet-20250514"
    purpose: "Manages memory operations at session start and end"
    tools: ["memory-storage", "pattern-analysis", "context-retrieval"]
    prompts:
      system: |
        You are a memory management agent for the telephone game.
        You can operate in two modes: LOAD (retrieve context) and STORE (save learnings).

        LOAD mode: Retrieve relevant patterns and context from past telephone game sessions
        to inform the current transformation pipeline.

        STORE mode: Analyze the complete session results and extract learnings about
        transformation patterns, successful strategies, and interesting outcomes.

  # LLM-based agent with specialized prompts
  mishearing-agent:
    type: "llm"
    model: "claude-4-sonnet-20250514"
    purpose: "Specializes in phonetic errors and mishearing transformations"
    tools: ["text-analysis", "phonetic-processing"]
    prompts:
      system: |
        You are a mishearing specialist agent. Your role is to transform messages
        as if they were misheard in a noisy environment.

        Focus on:
        - Phonetic similarities and sound-alike words
        - Common mishearing patterns
        - Plausible but incorrect interpretations
        - Maintaining some connection to the original meaning

  # LLM-based agent for creative embellishment
  embellishment-agent:
    type: "llm"
    model: "claude-4-sonnet-20250514"
    purpose: "Adds creative context and embellishments to messages"
    tools: ["creative-writing", "context-generation"]
    prompts:
      system: |
        You are a creative embellishment agent. Your role is to add vivid details,
        context, and creative flourishes to messages while preserving the core meaning.

        Focus on:
        - Adding sensory details and vivid imagery
        - Expanding simple statements into richer narratives
        - Introducing creative context and backstory
        - Maintaining logical coherence while being imaginative

  # LLM-based agent for dramatic reinterpretation
  reinterpretation-agent:
    type: "llm"
    model: "claude-4-sonnet-20250514"
    purpose: "Dramatically transforms and reinterprets messages"
    tools: ["semantic-analysis", "creative-reinterpretation"]
    prompts:
      system: |
        You are a reinterpretation specialist agent. Your role is to dramatically
        transform messages by finding alternative meanings and creative interpretations.

        Focus on:
        - Finding unexpected connections and alternative meanings
        - Dramatic shifts in context or perspective
        - Creative reframing of the core elements
        - Surprising but plausible reinterpretations

  # Tempest first-party agent for content synthesis
  tempest-synthesizer:
    type: "tempest"
    agent: "content-synthesizer"
    version: "2.1.0"
    purpose: "Synthesizes multiple inputs into coherent summaries and analyses"
    config:
      synthesis_modes: ["comprehensive", "summary", "analytical"]
      output_formats: ["markdown", "json", "plain_text"]
      max_input_sources: 10

  # Remote agent for security analysis
  security-scanner:
    type: "remote"
    endpoint: "https://security-api.example.com/analyze"
    purpose: "Analyzes content for security concerns and sensitive information"
    auth:
      type: "bearer"
      token_env: "SECURITY_API_TOKEN"
    timeout: 30000
    schema:
      input:
        type: "object"
        properties:
          content:
            type: "string"
            description: "Content to analyze for security issues"
          analysis_type:
            type: "string"
            enum: ["content_safety", "data_privacy", "malware_detection"]
        required: ["content"]
      output:
        type: "object"
        properties:
          risk_score:
            type: "number"
            minimum: 0
            maximum: 10
          findings:
            type: "array"
            items:
              type: "object"
              properties:
                type: { type: "string" }
                severity: { type: "string" }
                description: { type: "string" }
          recommendations:
            type: "array"
            items: { type: "string" }

# Signal definitions with job references
signals:
  telephone-message:
    description: "Trigger a telephone game with a message"
    provider: "cli"
    schema:
      type: "object"
      properties:
        message:
          type: "string"
          description: "The message to transform through the telephone game"
      required: ["message"]

    # Jobs triggered by this signal
    jobs:
      - name: "memory-enhanced-telephone"
        condition: "message && message.length > 0 && message.length < 100"
        job: "./jobs/telephone-game.yml"
      - name: "comprehensive-processing"
        condition: "message && message.length >= 100"
        job: "./jobs/comprehensive-example.yml"

# Runtime configuration
runtime:
  server:
    port: 8080
    host: "localhost"
  logging:
    level: "info"
    format: "pretty"
  persistence:
    type: "local"
    path: "./.atlas"
  security:
    cors: "*"
