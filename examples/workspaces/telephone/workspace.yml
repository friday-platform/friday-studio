version: "1.0"

workspace:
  id: "7821d138-71a6-434c-bc64-10addcf33532"
  name: "Multi-Provider Telephone Game"
  description: "A game where messages transform through multiple agents using different LLM providers"

# Signal definitions
signals:
  telephone-message:
    description: "Trigger a telephone game with a message"
    provider: "http"
    path: "/telephone"
    method: "POST"

# Job definitions
jobs:
  telephone:
    name: "telephone"
    description: |
      Telephone game message transformation workflow:
      1. Mishearing agent introduces phonetic distortions and sound-alike substitutions
      2. Embellishment agent adds creative details, vivid imagery, and narrative context
      3. Reinterpretation agent dramatically transforms meaning while maintaining plausibility
      Result: Original message transformed through realistic telephone game effects demonstrating
      how information degrades and mutates through sequential processing
    triggers:
      - signal: "telephone-message"
        condition: {"and": [{"var": "message"}, {">": [{"length": {"var": "message"}}, 0]}, {"<": [{"length": {"var": "message"}}, 100]}]}
    execution:
      strategy: "sequential"
      agents:
        - id: "mishearing-agent"
          input_source: "signal"
        - id: "embellishment-agent"
          input_source: "previous"
        - id: "reinterpretation-agent"
          input_source: "previous"

# Agent definitions  
agents:
  mishearing-agent:
    type: "llm"
    model: "claude-3-5-haiku-20241022"  # Use Claude Haiku for faster responses
    purpose: "Specializes in phonetic errors and mishearing transformations"

  embellishment-agent:
    type: "llm"
    model: "claude-3-5-haiku-20241022"
    purpose: "Adds creative details and context to messages"

  reinterpretation-agent:
    type: "llm"
    model: "claude-3-5-haiku-20241022"
    purpose: "Dramatically transforms and reinterprets messages"
