version: "1.0"

workspace:
  id: "7821d138-71a6-434c-bc64-10addcf33532"
  name: "Telephone Game"
  description: "A simple telephone game where messages transform through agents"

agents:
  mishearing-agent:
    type: "mishearing"
    model: "claude-4-sonnet-20250514" # Configurable model per agent

  embellishment-agent:
    type: "embellishment"
    model: "claude-4-sonnet-20250514"

  reinterpretation-agent:
    type: "reinterpretation"
    model: "claude-4-sonnet-20250514"

signals:
  telephone-message:
    provider: "cli"
    jobs:
      - name: "telephone"
        job: "./jobs/telephone-game.yml"
