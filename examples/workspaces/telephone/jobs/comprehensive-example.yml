version: "1.0"

job:
  name: "comprehensive-multi-agent-example"
  description: "Demonstrates all three agent types working together in a staged execution"

  session_prompts:
    planning: |
      This job demonstrates the full Atlas agent orchestration capabilities:
      Stage 1: Load context and analyze input (memory + security analysis)
      Stage 2: Transform content through specialized agents (telephone game)
      Stage 3: Synthesize and store results (comprehensive review + memory storage)

      Each stage uses different agent types to showcase platform flexibility.

    evaluation: |
      Job is complete when all three stages have executed successfully:
      - Stage 1: Context loaded and security analysis completed
      - Stage 2: Message transformed through telephone game pipeline
      - Stage 3: Results synthesized and stored for future use

      Validate that each stage produces meaningful outputs and the overall
      transformation demonstrates clear progression from input to final result.

  execution:
    strategy: "staged"

    stages:
      # Stage 1: Content Transformation (Sequential)
      - name: "transformation_pipeline"
        strategy: "sequential"
        agents:
          - id: "mishearing-agent"
            prompt: |
              Transform the input through phonetic mishearing, incorporating guidance from context analysis.

              Context from memory: {stage.context_and_security.memory-agent.output}
              Security considerations: {stage.context_and_security.security-scanner.output}
              Original input: "{signal.message}"

              Apply phonetic transformations while respecting any security guidelines.

          - id: "embellishment-agent"
            prompt: |
              Embellish the misheard content with creative details and narrative expansion.

              Context guidance: {stage.context_and_security.memory-agent.output}
              Misheard content: {previous_output}

              Add vivid details and creative elements that enhance the transformation
              while maintaining narrative coherence.

          - id: "reinterpretation-agent"
            prompt: |
              Provide the final dramatic reinterpretation of the transformed content.

              Context guidance: {stage.context_and_security.memory-agent.output}
              Embellished content: {previous_output}

              Create a surprising but plausible reinterpretation that completes
              the transformation journey from original to dramatically altered meaning.

      # Stage 3: Synthesis and Storage (Sequential)
      - name: "synthesis_and_storage"
        strategy: "sequential"
        agents:
          - id: "tempest-synthesizer"
            config:
              synthesis_mode: "comprehensive"
              include_metadata: true
            prompt: |
              Synthesize the complete transformation journey into a coherent summary.

              Include:
              - Original input: "{signal.message}"
              - Context insights: {stage.context_and_security.memory-agent.output}
              - Security assessment: {stage.context_and_security.security-scanner.output}
              - Transformation progression: {stage.transformation_pipeline.output_summary}

              Create a comprehensive analysis of the transformation process and outcomes.

          - id: "memory-agent"
            mode: "store"
            prompt: |
              STORE MODE: Analyze the complete comprehensive processing session and extract learnings.

              Store insights about:
              - Effective multi-stage processing patterns
              - Security considerations and handling strategies
              - Successful transformation techniques across agent types
              - Quality indicators for comprehensive session outcomes

              Session results: {all_stage_outputs}

  # Success criteria for comprehensive job
  success_criteria:
    all_stages_executed: true
    meaningful_transformations: true
    security_assessment_completed: true
    synthesis_quality: "high"
    memory_operations_completed: true
    multi_agent_coordination: "successful"

  # Enhanced error handling for complex job
  error_handling:
    max_retries: 3
    retry_delay_seconds: 10
    timeout_seconds: 600
    stage_failure_strategy: "abort" # Stop if any stage fails

  # Resource requirements for comprehensive processing
  resources:
    estimated_duration_seconds: 300
    max_memory_mb: 1024
    required_capabilities: [
      "text-processing",
      "creative-generation",
      "security-analysis",
      "memory-storage",
      "content-synthesis",
    ]
    concurrent_agent_limit: 3
