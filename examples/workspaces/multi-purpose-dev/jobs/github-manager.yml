name: github-manager
description: GitHub repository management and automation agent
type: remote
version: "1.0.0"

configuration:
  endpoint: "https://api.github.com/mcp"
  authentication:
    type: "bearer"
    token_env: "GITHUB_TOKEN"

capabilities:
  - name: "repository_operations"
    description: "Create, clone, and manage GitHub repositories"
    tools:
      - create_repository
      - clone_repository
      - list_repositories
      - get_repository_info
      - update_repository_settings

  - name: "issue_management"
    description: "Manage GitHub issues and pull requests"
    tools:
      - create_issue
      - list_issues
      - update_issue
      - close_issue
      - create_pull_request
      - review_pull_request
      - merge_pull_request

  - name: "code_analysis"
    description: "Analyze code structure and changes"
    tools:
      - get_file_content
      - search_code
      - compare_branches
      - get_commit_history
      - analyze_code_quality

prompts:
  system: |
    You are a GitHub management agent specialized in repository operations, issue tracking, and code analysis.
    You can create repositories, manage issues and pull requests, and analyze code structure.
    Always follow GitHub best practices and maintain clear commit messages and documentation.

  user: |
    Execute GitHub operations as requested. Provide clear status updates and handle errors gracefully.
    When creating repositories, ensure proper README and license files are included.

execution:
  timeout: 300
  retry_count: 3
  error_handling: "graceful"
