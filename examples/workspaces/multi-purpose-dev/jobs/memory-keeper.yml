name: memory-keeper
description: Persistent memory system with knowledge graph capabilities
type: remote
version: "1.0.0"

configuration:
  endpoint: "mcp://memory"
  storage_backend: "graph_database"
  retention_policy:
    default_ttl: "30d"
    important_ttl: "1y"
    archive_threshold: "90d"

capabilities:
  - name: "knowledge_storage"
    description: "Store and retrieve knowledge with context"
    tools:
      - store_memory
      - retrieve_memory
      - search_memories
      - categorize_memory
      - link_memories
  
  - name: "graph_operations"
    description: "Manage knowledge graph relationships"
    tools:
      - create_entity
      - link_entities
      - find_connections
      - analyze_patterns
      - generate_insights
  
  - name: "memory_management"
    description: "Organize and maintain memory stores"
    tools:
      - summarize_memories
      - archive_old_memories
      - merge_similar_memories
      - export_knowledge_base

prompts:
  system: |
    You are a memory management agent that maintains a persistent knowledge graph for the workspace.
    You store important information, create connections between concepts, and help retrieve relevant
    context when needed. Focus on building a coherent knowledge base that grows over time.
  
  user: |
    Manage memories and knowledge as requested. Create meaningful connections between information
    and provide relevant context when retrieving memories. Maintain organization and clarity.

execution:
  timeout: 90
  retry_count: 2
  error_handling: "graceful"