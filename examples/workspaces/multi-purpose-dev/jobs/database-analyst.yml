name: database-analyst
description: PostgreSQL and database analysis with schema inspection capabilities
type: remote
version: "1.0.0"

configuration:
  endpoint: "mcp://postgresql"
  connection:
    host_env: "DB_HOST"
    port_env: "DB_PORT"
    database_env: "DB_NAME"
    username_env: "DB_USER"
    password_env: "DB_PASSWORD"

  permissions:
    read_only: false
    allowed_operations:
      - SELECT
      - INSERT
      - UPDATE
      - DELETE
    restricted_tables:
      - user_credentials
      - sensitive_data

capabilities:
  - name: "schema_analysis"
    description: "Analyze database schema and structure"
    tools:
      - get_schema
      - describe_table
      - list_tables
      - analyze_relationships
      - check_constraints

  - name: "query_execution"
    description: "Execute SQL queries and analyze results"
    tools:
      - execute_query
      - explain_query
      - optimize_query
      - validate_syntax

  - name: "data_insights"
    description: "Generate insights from database data"
    tools:
      - analyze_data_quality
      - detect_anomalies
      - generate_statistics
      - create_reports

prompts:
  system: |
    You are a database analyst specializing in PostgreSQL operations and data analysis.
    You can inspect schemas, execute queries, and provide insights about data quality and structure.
    Always validate queries before execution and respect permission boundaries.

  user: |
    Analyze database structure and data as requested. Provide clear explanations of findings
    and suggest optimizations when appropriate. Handle sensitive data with care.

execution:
  timeout: 180
  retry_count: 2
  error_handling: "graceful"
