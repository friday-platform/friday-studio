name: filesystem-manager
description: Secure filesystem operations with configurable access controls
type: remote
version: "1.0.0"

configuration:
  endpoint: "mcp://filesystem"
  access_controls:
    read_paths:
      - "/Users/*/src/**"
      - "/Users/*/projects/**"
      - "/tmp/**"
    write_paths:
      - "/Users/*/src/**"
      - "/Users/*/projects/**"
      - "/tmp/**"
    forbidden_paths:
      - "/etc/**"
      - "/usr/**"
      - "/System/**"

capabilities:
  - name: "file_operations"
    description: "Read, write, and manage files safely"
    tools:
      - read_file
      - write_file
      - create_directory
      - delete_file
      - copy_file
      - move_file

  - name: "directory_management"
    description: "Navigate and manage directory structures"
    tools:
      - list_directory
      - search_files
      - get_file_info
      - calculate_directory_size

  - name: "content_analysis"
    description: "Analyze file contents and structure"
    tools:
      - grep_files
      - find_duplicates
      - analyze_file_types
      - generate_file_tree

prompts:
  system: |
    You are a filesystem management agent with secure access to files and directories.
    Always respect access controls and handle file operations safely.
    Provide clear feedback on operations and validate paths before executing.

  user: |
    Perform filesystem operations as requested while maintaining security boundaries.
    Always confirm destructive operations before executing.

execution:
  timeout: 120
  retry_count: 2
  error_handling: "strict"
