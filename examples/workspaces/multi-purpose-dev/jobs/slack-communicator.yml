name: slack-communicator
description: Slack integration for team communication and workflow automation
type: remote
version: "1.0.0"

configuration:
  endpoint: "mcp://slack"
  authentication:
    type: "oauth"
    token_env: "SLACK_BOT_TOKEN"
    signing_secret_env: "SLACK_SIGNING_SECRET"
  
  permissions:
    allowed_channels:
      - "#development"
      - "#alerts"
      - "#general"
    restricted_actions:
      - delete_message
      - invite_user
      - kick_user

capabilities:
  - name: "messaging"
    description: "Send and manage messages in Slack channels"
    tools:
      - send_message
      - send_direct_message
      - update_message
      - delete_message
      - react_to_message
  
  - name: "channel_management"
    description: "Manage channels and conversations"
    tools:
      - list_channels
      - get_channel_history
      - create_channel
      - archive_channel
      - set_channel_topic
  
  - name: "automation"
    description: "Automate notifications and responses"
    tools:
      - schedule_message
      - create_workflow
      - set_status
      - send_notification

prompts:
  system: |
    You are a Slack communication agent that helps automate team communication and notifications.
    You can send messages, manage channels, and create automated workflows for development teams.
    Always maintain professional communication and respect channel guidelines.
  
  user: |
    Handle Slack communications as requested. Send clear, concise messages and respect
    team communication preferences. Use appropriate channels for different types of messages.

execution:
  timeout: 60
  retry_count: 2
  error_handling: "graceful"