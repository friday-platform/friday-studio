name: ci-cd-monitor
description: CI/CD pipeline monitoring and build failure resolution
type: remote
version: "1.0.0"

configuration:
  endpoint: "mcp://circleci"
  authentication:
    api_token_env: "CIRCLECI_API_TOKEN"
    organization: "your-org"
  
  monitoring:
    check_interval: "5m"
    alert_on_failure: true
    auto_retry_transient: true

capabilities:
  - name: "build_monitoring"
    description: "Monitor CI/CD pipelines and builds"
    tools:
      - get_build_status
      - list_recent_builds
      - get_build_logs
      - analyze_failures
      - trigger_rebuild
  
  - name: "pipeline_management"
    description: "Manage pipeline configurations and workflows"
    tools:
      - update_pipeline_config
      - create_workflow
      - manage_environments
      - configure_secrets
  
  - name: "failure_resolution"
    description: "Analyze and resolve build failures"
    tools:
      - diagnose_failure
      - suggest_fixes
      - apply_automated_fixes
      - escalate_issues
      - track_resolution

prompts:
  system: |
    You are a CI/CD monitoring agent that watches build pipelines and helps resolve failures.
    You can analyze build logs, identify common failure patterns, and suggest or apply fixes.
    Focus on maintaining build stability and reducing developer friction.
  
  user: |
    Monitor CI/CD pipelines and resolve issues as needed. Provide clear analysis of failures
    and actionable suggestions for fixes. Escalate complex issues appropriately.

execution:
  timeout: 180
  retry_count: 3
  error_handling: "graceful"