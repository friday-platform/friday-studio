version: "1.0"

workspace:
  name: "Multi-Purpose Development Workspace"
  description: "Comprehensive development workspace with 10 specialized agents based on popular MCP servers"

# Job definitions referencing agent specifications
jobs:
  # Code analysis and development assistance
  code-review:
    name: "code-review"
    description: "Automated code review with quality analysis and suggestions"
    triggers:
      - signal: "pull-request-opened"
        condition: "pr.files && pr.files.length > 0"
      - signal: "code-review-request"
        condition: "files && files.length > 0"
    execution:
      strategy: "sequential"
      agents:
        - id: "code-assistant"
        - id: "github-manager"

  # Repository management and automation
  repo-management:
    name: "repo-management"
    description: "GitHub repository operations and issue management"
    triggers:
      - signal: "create-repository"
        condition: "repository_name && repository_name.length > 0"
      - signal: "issue-created"
        condition: "issue.title && issue.body"
    execution:
      strategy: "sequential"
      agents:
        - id: "github-manager"
        - id: "slack-communicator"

  # Database operations and analysis
  database-operations:
    name: "database-operations"
    description: "Database schema analysis and query optimization"
    triggers:
      - signal: "database-analysis-request"
      - signal: "performance-issue"
    execution:
      strategy: "sequential"
      agents:
        - id: "database-analyst"
        - id: "memory-keeper"

  # File system operations
  file-operations:
    name: "file-operations"
    description: "Secure file and directory management"
    triggers:
      - signal: "file-operation-request"
        condition: "operation && path"
      - signal: "project-setup"
        condition: "project_name && project_type"
    execution:
      strategy: "sequential"
      agents:
        - id: "filesystem-manager"
        - id: "code-assistant"

  # Research and documentation
  research-task:
    name: "research-task"
    description: "Web research and documentation generation"
    triggers:
      - signal: "research-request"
        condition: "topic || urls"
      - signal: "documentation-request"
        condition: "project_path"
    execution:
      strategy: "parallel"
      agents:
        - id: "web-researcher"
        - id: "code-assistant"

  # CI/CD monitoring and incident response
  build-monitoring:
    name: "build-monitoring"
    description: "Continuous monitoring of CI/CD pipelines with automated failure resolution"
    triggers:
      - signal: "build-failed"
        condition: "build_id && failure_reason"
      - signal: "deployment-failed"
        condition: "deployment_id"
    execution:
      strategy: "sequential"
      agents:
        - id: "ci-cd-monitor"
        - id: "error-tracker"
        - id: "slack-communicator"

  # Error tracking and performance monitoring
  error-analysis:
    name: "error-analysis"
    description: "Application error analysis and performance optimization"
    triggers:
      - signal: "error-spike"
        condition: "error_count > 10"
      - signal: "performance-degradation"
        condition: "response_time > 2000"
    execution:
      strategy: "parallel"
      agents:
        - id: "error-tracker"
        - id: "database-analyst"

  # Cloud infrastructure management
  cloud-management:
    name: "cloud-management"
    description: "AWS infrastructure deployment and monitoring"
    triggers:
      - signal: "deploy-infrastructure"
        condition: "template_path || resource_type"
      - signal: "infrastructure-alert"
        condition: "alert_type && severity"
    execution:
      strategy: "sequential"
      agents:
        - id: "cloud-operator"
        - id: "memory-keeper"
        - id: "slack-communicator"

  # Team communication and notifications
  team-communication:
    name: "team-communication"
    description: "Automated team notifications and status updates"
    triggers:
      - signal: "status-update-request"
        condition: "message && channels"
      - signal: "alert-notification"
        condition: "alert_type && severity"
    execution:
      strategy: "sequential"
      agents:
        - id: "slack-communicator"
        - id: "memory-keeper"

  # Comprehensive project analysis
  project-health-check:
    name: "project-health-check"
    description: "Comprehensive project health analysis combining multiple data sources"
    triggers:
      - signal: "health-check-request"
        condition: "project_name"
      - signal: "weekly-report"
        condition: "schedule_trigger"
    execution:
      strategy: "parallel"
      agents:
        - id: "github-manager"
        - id: "database-analyst"
        - id: "error-tracker"
        - id: "ci-cd-monitor"
        - id: "code-assistant"

# Agent definitions - these agents execute the jobs defined above
agents:
  github-manager:
    type: "remote"
    protocol: "mcp"
    endpoint: "http://localhost:3020/mcp"
    purpose: "GitHub repository management and automation"
    tools: ["repository_operations", "issue_management", "code_analysis"]

  filesystem-manager:
    type: "remote"
    protocol: "mcp"
    endpoint: "http://localhost:3021/mcp"
    purpose: "Secure filesystem operations with configurable access controls"
    tools: ["file_operations", "directory_management", "content_analysis"]

  database-analyst:
    type: "remote"
    protocol: "mcp"
    endpoint: "http://localhost:3022/mcp"
    purpose: "PostgreSQL and database analysis with schema inspection"
    tools: ["schema_analysis", "query_execution", "data_insights"]

  web-researcher:
    type: "remote"
    protocol: "mcp"
    endpoint: "http://localhost:3023/mcp"
    purpose: "Web content fetching and analysis for development research"
    tools: ["content_fetching", "api_integration", "documentation_analysis"]

  slack-communicator:
    type: "remote"
    protocol: "mcp"
    endpoint: "http://localhost:3024/mcp"
    purpose: "Slack integration for team communication and workflow automation"
    tools: ["messaging", "channel_management", "automation"]

  memory-keeper:
    type: "remote"
    protocol: "mcp"
    endpoint: "http://localhost:3025/mcp"
    purpose: "Persistent memory system with knowledge graph capabilities"
    tools: ["knowledge_storage", "graph_operations", "memory_management"]

  cloud-operator:
    type: "remote"
    protocol: "mcp"
    endpoint: "http://localhost:3026/mcp"
    purpose: "AWS cloud operations and infrastructure management"
    tools: ["resource_management", "deployment_operations", "monitoring_analysis"]

  ci-cd-monitor:
    type: "remote"
    protocol: "mcp"
    endpoint: "http://localhost:3027/mcp"
    purpose: "CI/CD pipeline monitoring and build failure resolution"
    tools: ["build_monitoring", "pipeline_management", "failure_resolution"]

  error-tracker:
    type: "remote"
    protocol: "mcp"
    endpoint: "http://localhost:3028/mcp"
    purpose: "Sentry integration for error tracking and performance monitoring"
    tools: ["error_monitoring", "performance_tracking", "alerting_automation"]

  code-assistant:
    type: "llm"
    provider: "anthropic"
    model: "claude-3-5-sonnet-20241022"
    purpose: "Advanced code analysis and development assistance using LLM capabilities"
    tools: ["code_analyzer", "documentation_generator", "refactoring_assistant", "test_generator"]
    prompts:
      system: |
        You are an advanced code assistant that helps developers with analysis, documentation, and development tasks.
        You can analyze code structure, generate documentation, suggest improvements, and assist with debugging.
        Always provide clear explanations and follow programming best practices.

# Signal definitions for various development workflows
signals:
  # Code-related triggers
  pull-request-opened:
    description: "Triggered when a new pull request is opened"
    provider: "github_webhook"
    schema:
      type: "object"
      properties:
        pr:
          type: "object"
          properties:
            id: { type: "string" }
            title: { type: "string" }
            files: { type: "array", items: { type: "string" } }
            author: { type: "string" }
      required: ["pr"]

  code-review-request:
    description: "Manual code review request"
    provider: "cli"
    schema:
      type: "object"
      properties:
        files: { type: "array", items: { type: "string" } }
        focus_areas: { type: "array", items: { type: "string" } }
      required: ["files"]

  # Repository management
  create-repository:
    description: "Create a new GitHub repository"
    provider: "cli"
    schema:
      type: "object"
      properties:
        repository_name: { type: "string" }
        description: { type: "string" }
        private: { type: "boolean", default: false }
        template: { type: "string" }
      required: ["repository_name"]

  issue-created:
    description: "Triggered when a new issue is created"
    provider: "github_webhook"
    schema:
      type: "object"
      properties:
        issue:
          type: "object"
          properties:
            id: { type: "string" }
            title: { type: "string" }
            body: { type: "string" }
            labels: { type: "array", items: { type: "string" } }
      required: ["issue"]

  # Database operations
  database-analysis-request:
    description: "Request database schema analysis or query optimization"
    provider: "cli"
    schema:
      type: "object"
      properties:
        query: { type: "string" }
        schema_name: { type: "string" }
        analysis_type: { type: "string", enum: ["schema", "performance", "quality"] }
      anyOf:
        - required: ["query"]
        - required: ["schema_name"]

  performance-issue:
    description: "Triggered when slow queries are detected"
    provider: "monitoring"
    schema:
      type: "object"
      properties:
        query: { type: "string" }
        execution_time: { type: "number" }
        threshold: { type: "number" }
      required: ["query", "execution_time"]

  # File operations
  file-operation-request:
    description: "Request file or directory operations"
    provider: "cli"
    schema:
      type: "object"
      properties:
        operation: { type: "string", enum: ["read", "write", "copy", "move", "delete", "search"] }
        path: { type: "string" }
        target_path: { type: "string" }
        content: { type: "string" }
      required: ["operation", "path"]

  project-setup:
    description: "Initialize a new project with boilerplate code"
    provider: "cli"
    schema:
      type: "object"
      properties:
        project_name: { type: "string" }
        project_type: { type: "string", enum: ["nodejs", "python", "react", "typescript"] }
        template: { type: "string" }
      required: ["project_name", "project_type"]

  # Research and documentation
  research-request:
    description: "Request web research on a specific topic"
    provider: "cli"
    schema:
      type: "object"
      properties:
        topic: { type: "string" }
        urls: { type: "array", items: { type: "string" } }
        focus_areas: { type: "array", items: { type: "string" } }
      anyOf:
        - required: ["topic"]
        - required: ["urls"]

  documentation-request:
    description: "Generate documentation for a project"
    provider: "cli"
    schema:
      type: "object"
      properties:
        project_path: { type: "string" }
        doc_type: { type: "string", enum: ["api", "readme", "guide", "reference"] }
        output_format: { type: "string", enum: ["markdown", "html", "pdf"] }
      required: ["project_path"]

  # CI/CD and monitoring
  build-failed:
    description: "Triggered when a build fails"
    provider: "ci_webhook"
    schema:
      type: "object"
      properties:
        build_id: { type: "string" }
        project: { type: "string" }
        branch: { type: "string" }
        failure_reason: { type: "string" }
      required: ["build_id", "failure_reason"]

  deployment-failed:
    description: "Triggered when a deployment fails"
    provider: "ci_webhook"
    schema:
      type: "object"
      properties:
        deployment_id: { type: "string" }
        environment: { type: "string" }
        error_message: { type: "string" }
      required: ["deployment_id"]

  # Error tracking
  error-spike:
    description: "Triggered when error count exceeds threshold"
    provider: "sentry_webhook"
    schema:
      type: "object"
      properties:
        error_count: { type: "number" }
        time_window: { type: "string" }
        project: { type: "string" }
      required: ["error_count"]

  performance-degradation:
    description: "Triggered when response time exceeds threshold"
    provider: "monitoring"
    schema:
      type: "object"
      properties:
        response_time: { type: "number" }
        endpoint: { type: "string" }
        threshold: { type: "number" }
      required: ["response_time"]

  # Cloud infrastructure
  deploy-infrastructure:
    description: "Deploy AWS infrastructure resources"
    provider: "cli"
    schema:
      type: "object"
      properties:
        template_path: { type: "string" }
        resource_type: { type: "string" }
        environment: { type: "string" }
        parameters: { type: "object" }
      anyOf:
        - required: ["template_path"]
        - required: ["resource_type"]

  infrastructure-alert:
    description: "Triggered by AWS CloudWatch alarms"
    provider: "aws_webhook"
    schema:
      type: "object"
      properties:
        alert_type: { type: "string" }
        severity: { type: "string", enum: ["low", "medium", "high", "critical"] }
        resource_id: { type: "string" }
        message: { type: "string" }
      required: ["alert_type", "severity"]

  # Communication
  status-update-request:
    description: "Send status updates to team channels"
    provider: "cli"
    schema:
      type: "object"
      properties:
        message: { type: "string" }
        channels: { type: "array", items: { type: "string" } }
        priority: { type: "string", enum: ["low", "normal", "high"] }
      required: ["message", "channels"]

  alert-notification:
    description: "Send alert notifications to team"
    provider: "monitoring"
    schema:
      type: "object"
      properties:
        alert_type: { type: "string" }
        severity: { type: "string", enum: ["low", "medium", "high", "critical"] }
        message: { type: "string" }
        affected_systems: { type: "array", items: { type: "string" } }
      required: ["alert_type", "severity", "message"]

  # Scheduled tasks
  health-check-request:
    description: "Comprehensive project health check"
    provider: "cli"
    schema:
      type: "object"
      properties:
        project_name: { type: "string" }
        scope: { type: "array", items: { type: "string" } }
      required: ["project_name"]

  weekly-report:
    description: "Scheduled weekly project report"
    provider: "scheduler"
    schema:
      type: "object"
      properties:
        schedule_trigger: { type: "string" }
        projects: { type: "array", items: { type: "string" } }
      required: ["schedule_trigger"]
