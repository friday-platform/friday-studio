version: "1.0"

workspace:
  id: "e8f4c2a0-9b3d-4f2e-a1b7-c5d8f6e9a2b3"
  name: "Web Page Analysis with Playwright MCP"
  description: "Comprehensive web page analysis using Playwright MCP server for browser automation and content extraction"

# Tools configuration
tools:
  mcp:
    servers:
      playwright:
    transport:
      type: "stdio"
      command: "npx"
      args: ["@playwright/mcp@latest"]
    tools:
      allowed:
        [
          "browser_navigate",
          "browser_snapshot",
          "browser_take_screenshot",
          "browser_click",
          "browser_type",
          "browser_wait_for",
          "browser_network_requests",
          "browser_console_messages",
          "browser_pdf_save",
        ]
    timeout_ms: 30000

# User-defined agents for web analysis
agents:
  web-analyzer:
    type: "llm"
    provider: "anthropic"
    model: "claude-3-5-sonnet-20241022"
    purpose: "Comprehensive web page analysis using browser automation tools"
    tools:
      mcp: ["playwright"]
    max_steps: 5
    tool_choice: "auto"
    prompts:
      system: |
        You are a professional web analyst with access to browser automation tools via Playwright MCP.

        Available tools:
        - browser_navigate: Navigate to any URL
        - browser_snapshot: Capture accessibility snapshots of pages (preferred for analysis)
        - browser_take_screenshot: Take visual screenshots when needed
        - browser_click: Click on page elements
        - browser_type: Type text into form fields
        - browser_wait_for: Wait for elements or text to appear/disappear
        - browser_network_requests: Analyze network requests made by the page
        - browser_console_messages: Check browser console for errors/warnings
        - browser_pdf_save: Save pages as PDF documents

        When analyzing a web page:
        1. Use browser_navigate to go to the URL
        2. Use browser_snapshot to get the accessibility tree (better than screenshots for analysis)
        3. Take a browser_take_screenshot for visual reference if needed
        4. Check browser_network_requests to see what resources are loaded
        5. Check browser_console_messages for any errors or issues
        6. Provide comprehensive analysis of content, structure, performance, and accessibility

        Always use browser_snapshot first as it provides structured data about the page content and accessibility tree.

# Top-level job definitions
jobs:
  analyze-webpage:
    name: "analyze-webpage"
    description: |
      Comprehensive web page analysis workflow using Playwright MCP integration:
      1. Navigate to the specified URL using browser automation
      2. Capture screenshot for visual analysis
      3. Extract page title, content, and structural elements
      4. Analyze content quality, accessibility, and user experience
      5. Generate detailed report with insights and recommendations

      This showcases Atlas MCP integration capabilities:
      - Browser automation with Playwright MCP server
      - Multi-step tool execution workflows
      - Real-world web analysis
    triggers:
      - signal: "webpage-analysis"
        condition: "payload.url"
    execution:
      strategy: "sequential"
      agents:
        - id: "web-analyzer"
          task: "Analyze the webpage at {{payload.url}} with analysis type {{payload.analysis_type}}"

# Signal definitions
signals:
  webpage-analysis:
    description: "Trigger web page analysis with a URL"
    provider: "cli"
    schema:
      type: "object"
      properties:
        url:
          type: "string"
          description: "The URL of the webpage to analyze"
          examples:
            - "https://example.com"
            - "https://news.ycombinator.com"
            - "https://github.com/anthropics/claude-code"
        analysis_type:
          type: "string"
          enum: ["basic", "detailed", "accessibility"]
          default: "detailed"
          description: "Type of analysis to perform"
      required: ["url"]
