version: "1.0"

workspace:
  id: "7821d138-71a6-434c-bc64-10addcf33533"
  name: "playwright-mcp-example"
  description: "Example workspace demonstrating Playwright MCP integration with Atlas"

# Top-level job definitions
jobs:
  webpage-analysis:
    name: "webpage-analysis"
    description: |
      Comprehensive webpage analysis and content evaluation:
      1. Playwright browser navigates to target URL and captures full-page screenshot
      2. Browser extracts page structure, accessibility tree, and performance metrics
      3. Web analyst examines visual layout, content quality, and user experience factors
      Result: Detailed webpage assessment covering visual design, content structure,
      accessibility compliance, and recommendations for improvement
    triggers:
      - signal: "manual-analysis"
    execution:
      strategy: "sequential"
      agents:
        - id: "playwright-browser"
        - id: "web-analyst"

  ui-interaction-test:
    name: "ui-interaction-test"
    description: |
      Automated UI interaction testing and validation:
      1. Playwright browser performs specified user interactions (clicks, form fills, navigation)
      2. Captures screenshots at each step and validates expected UI state changes
      3. Tests responsiveness, error handling, and workflow completion
      Result: Comprehensive UI test execution with visual proof of functionality
      and detailed validation of user interaction flows
    triggers:
      - signal: "ui-test"
    execution:
      strategy: "sequential"
      agents:
        - id: "playwright-browser"

agents:
  playwright-browser:
    type: "remote"
    protocol: "mcp"
    purpose: "Browser automation and web testing using Playwright tools"
    endpoint: "http://localhost:8001"

    # MCP-specific configuration
    mcp:
      timeout_ms: 60000 # Longer timeout for browser operations
      allowed_tools:
        [
          "browser_navigate",
          "browser_take_screenshot",
          "browser_click",
          "browser_type",
          "browser_snapshot",
          "browser_wait_for",
          "browser_close",
        ]
      # Safety: deny potentially dangerous operations
      denied_tools: ["exec", "shell"]

  web-analyst:
    type: "llm"
    model: "claude-3-5-sonnet-20241022"
    purpose: "Analyze web content and provide insights about page structure and content"
    tools: []

signals:
  manual-analysis:
    description: "Manually trigger webpage analysis"
    provider: "cli"
    command: "manual-analysis"

  ui-test:
    description: "Manually trigger UI interaction testing"
    provider: "cli"
    command: "ui-test"

# Example payloads for testing:
#
# For webpage-analysis:
# atlas signal trigger manual-analysis --payload '{"url": "https://example.com"}'
#
# For ui-interaction-test:
# atlas signal trigger ui-test --payload '{"url": "https://example.com", "actions": [{"type": "click", "selector": "button#submit"}]}'

