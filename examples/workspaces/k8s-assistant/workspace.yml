version: "1.0"

workspace:
  id: "a8c4d759-2e5b-4f3c-9a1d-8c7b3e6f2a9d"
  name: "k8s-assistant"
  description: "Atlas workspace for Kubernetes management with real-time monitoring using AI-powered agents via ACP protocol and stream signals"

# Top-level job definitions
jobs:
  unified-k8s-operation:
    name: "unified-k8s-operation"
    description: |
      Comprehensive Kubernetes operation handler via HTTP API:
      1. K8s main agent analyzes the request and determines required kubectl operations
      2. Executes deployments, scaling, configuration updates, or troubleshooting commands
      3. Validates operation success and provides detailed status report with resource states
      Result: Reliable execution of any Kubernetes management task with full audit trail
      and error recovery for production cluster operations
    triggers:
      - signal: "http-k8s"
    execution:
      strategy: "sequential"
      agents:
        - id: "k8s-main-agent"

  direct-k8s-operation:
    name: "direct-k8s-operation"
    description: |
      Direct Kubernetes operation execution via CLI interface:
      1. K8s main agent processes CLI command input and validates request syntax
      2. Executes kubectl operations with appropriate context and namespace handling
      3. Returns formatted output with success/failure status and next steps
      Result: Direct CLI-style interaction with Kubernetes cluster through intelligent
      agent that understands context and provides enhanced error handling
    triggers:
      - signal: "cli-k8s"
    execution:
      strategy: "sequential"
      agents:
        - id: "k8s-main-agent"

  handle-k8s-event:
    name: "handle-k8s-event"
    description: |
      Real-time Kubernetes event processing and incident response:
      1. K8s main agent analyzes incoming cluster events and determines severity level
      2. Performs automated diagnostics and immediate remediation if possible
      3. Local assistant generates detailed incident report with troubleshooting guidance
      Result: Automated incident response with intelligent triage, immediate fixes
      where possible, and comprehensive documentation for manual intervention
    triggers:
      - signal: "k8s-events"
    execution:
      strategy: "sequential"
      agents:
        - id: "k8s-main-agent"
        - id: "local-assistant"

  # Linear webhook automation jobs for DevOps ticket handling
  linear-cluster-issue-triage:
    name: "linear-cluster-issue-triage"
    description: |
      Automated cluster issue triage from Linear tickets:
      1. K8s main agent analyzes Linear issue for cluster-related keywords and severity
      2. Performs immediate cluster health check and resource diagnostics
      3. Local assistant documents findings and posts status update to Linear issue
      Result: Instant cluster analysis when DevOps tickets are created, reducing
      manual investigation time and providing immediate context for engineers
    triggers:
      - signal: "linear-webhook"
        condition: |
          data.action === "create" && 
          data.data.type === "Issue" &&
          (data.data.labels?.some(l => ["k8s", "cluster", "devops", "deployment", "pod"].some(keyword => l.name.toLowerCase().includes(keyword))) ||
           ["kubernetes", "cluster", "pod", "deployment", "service", "ingress"].some(keyword => 
             data.data.title.toLowerCase().includes(keyword) || 
             data.data.description?.toLowerCase().includes(keyword)))
    execution:
      strategy: "sequential"
      agents:
        - id: "k8s-main-agent"
        - id: "local-assistant"

  linear-devops-automation:
    name: "linear-devops-automation"
    description: |
      Automated DevOps task execution from Linear issue updates:
      1. K8s main agent parses Linear comments for actionable kubectl commands or requests
      2. Executes safe cluster operations (restarts, scaling, status checks, log collection)
      3. Local assistant formats results and updates Linear issue with operation outcomes
      Result: Hands-free execution of routine DevOps tasks triggered by Linear issue
      updates, eliminating context switching and manual command execution
    triggers:
      - signal: "linear-webhook"
        condition: |
          (data.action === "update" || data.action === "create") &&
          data.data.type === "Comment" &&
          data.data.body &&
          ["kubectl", "restart", "scale", "logs", "describe", "get pods", "get services"].some(cmd =>
            data.data.body.toLowerCase().includes(cmd))
    execution:
      strategy: "sequential"
      agents:
        - id: "k8s-main-agent"
        - id: "local-assistant"

  linear-incident-resolution:
    name: "linear-incident-resolution"
    description: |
      Automated incident resolution workflow for assigned cluster issues:
      1. K8s main agent analyzes issue priority and performs comprehensive diagnostics
      2. Attempts automated remediation for common issues (pod restarts, resource scaling)
      3. Local assistant documents resolution steps and closes issue if successful
      Result: Fully automated resolution of routine cluster incidents, with detailed
      audit trail and automatic Linear issue closure for successfully resolved problems
    triggers:
      - signal: "linear-webhook"
        condition: |
          data.action === "update" &&
          data.data.type === "Issue" &&
          data.data.assignee?.email?.includes("atlas") &&
          data.data.state.name === "In Progress" &&
          data.data.priority <= 2
    execution:
      strategy: "sequential"
      agents:
        - id: "k8s-main-agent"
        - id: "local-assistant"

# Agent Configuration
# This workspace uses a multi-agent architecture:
# - k8s-main-agent: Primary AI agent for K8s operations (port 8080)
# - local-assistant: Fallback LLM agent for documentation and support
# Note: k8s-monitor-agent replaced by built-in k8s-watch signal provider
agents:
  # Primary Kubernetes management agent with ReAct framework
  k8s-main-agent:
    type: "remote"
    protocol: "acp"
    endpoint: "http://localhost:8080"
    purpose: "AI-powered Kubernetes management agent using ReAct framework for intelligent deployment generation, validation, cluster operations, and Linear issue automation"

    # ACP-specific settings for reliable K8s operations
    acp:
      agent_name: "k8s-deployment-manager"
      default_mode: "sync" # Synchronous mode for reliable operations
      timeout_ms: 120000 # 2-minute timeout for complex operations
      max_retries: 2 # Retry failed requests
      health_check_interval: 30000 # Health check every 30 seconds

    # Production monitoring and reliability
    monitoring:
      enabled: true
      circuit_breaker:
        failure_threshold: 3 # Open circuit after 3 failures
        timeout_ms: 120000 # Stay open for 2 minutes
        half_open_max_calls: 2 # Test with 2 calls when half-open

    # Linear integration context for DevOps automation
    context:
      linear_integration: true
      automation_mode: "devops_worker"
      safe_operations:
        - "kubectl get"
        - "kubectl describe"
        - "kubectl logs"
        - "kubectl restart deployment"
        - "kubectl scale deployment"
        - "kubectl rollout status"
      requires_approval:
        - "kubectl delete"
        - "kubectl apply"
        - "kubectl patch"

  # Note: k8s-monitor-agent configuration removed - replaced by built-in k8s-watch signal provider
  # The built-in provider connects directly to Kubernetes API without external dependencies

  # Local LLM agent for fallback and additional processing
  local-assistant:
    type: "llm"
    model: "claude-3-5-sonnet-20241022"
    purpose: "Local AI assistant for documentation, explanations, fallback operations, and Linear issue management"
    tools: ["computer_use"]
    integrations:
      linear:
        api_key: "${LINEAR_API_KEY}"
        team_id: "${LINEAR_TEAM_ID}"
        enabled: true
        auto_update: true
    prompts:
      system: |
        You are a Kubernetes assistant with Linear integration capabilities. Your responsibilities include:
        
        1. K8s Documentation & Support: Provide explanations, troubleshooting guidance, and fallback support
        2. Linear Issue Management: Format cluster analysis results for Linear issues, post status updates, and manage issue lifecycle
        3. DevOps Automation: Document automated remediation outcomes and maintain issue audit trails
        
        When working with Linear issues:
        - Format all cluster information clearly with proper markdown
        - Include kubectl commands, resource states, and troubleshooting steps
        - Use structured updates with clear action items and resolution status
        - Automatically close issues when problems are fully resolved
        - Tag relevant team members for manual intervention when automation limits are reached
        
        Always provide actionable information that helps engineers quickly understand and resolve cluster issues.

# Signal Configuration
# Atlas supports multiple signal types for different interaction patterns:
# - HTTP signals: For direct API calls and webhook integrations
# - CLI signals: For command-line driven operations
# - K8s Watch signals: For real-time Kubernetes event streaming (built-in API integration)
signals:
  # Single HTTP endpoint for all k8s operations
  http-k8s:
    description: "Unified HTTP endpoint for all Kubernetes operations"
    provider: "http"
    path: "/k8s"
    method: "POST"

  # CLI interface for direct operations
  cli-k8s:
    description: "CLI interface for Kubernetes operations"
    provider: "cli"
    command: "k8s"

  # Built-in Kubernetes events streaming - Direct API integration
  k8s-events:
    description: "Real-time Kubernetes event monitoring via built-in Events API"
    provider: "k8s-events"
    kubeconfig: "~/.kube/config"  # Local kubeconfig for testing
    namespace: "default"          # Watch default namespace (can be omitted for all namespaces)
    insecure: true                # For local development with minikube/kind
    timeout_ms: 120000
    retry_config:
      max_retries: 3
      retry_delay_ms: 2000

  # Linear webhook integration for automated DevOps ticket handling
  linear-webhook:
    description: "Linear issue webhooks for automated K8s cluster issue resolution"
    provider: "http-webhook"
    endpoint: "/webhooks/linear"
    method: "POST"
    headers:
      Linear-Event: "required"
    config:
      webhook_secret: "${LINEAR_WEBHOOK_SECRET}"
      signature_validation: true
      allowed_event_types:
        - "Issue"
        - "Comment"
        - "IssueLabel"

# Memory configuration for k8s operations
memory:
  enabled: true
  scope: "workspace"
  retention:
    max_age_days: 7 # Keep k8s operation history for 7 days
    max_entries: 500
  include_types:
    - "deployment_history"
    - "troubleshooting_patterns"
    - "successful_configurations"
    - "error_resolutions"
    - "linear_issue_resolutions"
    - "automated_remediation_patterns"
    - "devops_task_outcomes"
