version: "1.0"

workspace:
  id: "a8c4d759-2e5b-4f3c-9a1d-8c7b3e6f2a9d"
  name: "k8s-assistant"
  description: "Atlas workspace for Kubernetes management using AI-powered agents via ACP protocol"

# Remote agents configuration pointing to k8s main agent
agents:
  # Main k8s agent with ReAct framework
  k8s-main-agent:
    type: "remote"
    protocol: "acp"
    endpoint: "http://localhost:8080"
    purpose: "AI-powered Kubernetes management agent using ReAct framework for intelligent deployment generation, validation, and cluster operations"

    # No authentication needed for local development
    # auth:
    #   type: "bearer"
    #   token_env: "K8S_AGENT_TOKEN"

    # ACP-specific settings
    acp:
      agent_name: "k8s-main" # Name of agent on k8s server
      default_mode: "sync" # sync | async | stream
      timeout_ms: 60000 # 60 second timeout for k8s operations
      max_retries: 2 # Retry failed requests 2 times
      health_check_interval: 30000 # Health check every 30 seconds

    # Schema validation (optional)
    schema:
      validate_input: false
      validate_output: false

    # Monitoring and reliability
    monitoring:
      enabled: true
      circuit_breaker:
        failure_threshold: 3 # Open circuit after 3 failures
        timeout_ms: 120000 # Stay open for 2 minutes
        half_open_max_calls: 2 # Test with 2 calls when half-open

  # Local LLM agent for fallback and additional processing
  local-assistant:
    type: "llm"
    model: "claude-3-5-sonnet-20241022"
    purpose: "Local AI assistant for documentation, explanations, and fallback operations"
    tools: ["computer_use"]
    prompts:
      system: "You are a helpful Kubernetes assistant that works alongside the main k8s agent. You can help with documentation, explanations, and provide fallback support when the main agent is unavailable."

# Signal configurations for triggering k8s operations
signals:
  # HTTP endpoint for deployment creation
  http-deploy:
    description: "HTTP endpoint for creating Kubernetes deployments"
    provider: "http"
    path: "/deploy"
    method: "POST"
    jobs:
      - name: "create-deployment"
        description: "Create a new Kubernetes deployment using AI agent"
        execution:
          strategy: "sequential"
          agents:
            - id: "k8s-main-agent"

  # HTTP endpoint for scaling operations
  http-scale:
    description: "HTTP endpoint for scaling Kubernetes deployments"
    provider: "http"
    path: "/scale"
    method: "POST"
    jobs:
      - name: "scale-deployment"
        description: "Scale existing Kubernetes deployment"
        execution:
          strategy: "sequential"
          agents:
            - id: "k8s-main-agent"

  # HTTP endpoint for health checks
  http-health:
    description: "HTTP endpoint for cluster health checks"
    provider: "http"
    path: "/health"
    method: "GET"
    jobs:
      - name: "cluster-health-check"
        description: "Check Kubernetes cluster health status"
        execution:
          strategy: "sequential"
          agents:
            - id: "k8s-main-agent"

  # HTTP endpoint for listing resources
  http-list:
    description: "HTTP endpoint for listing Kubernetes resources"
    provider: "http"
    path: "/list"
    method: "POST"
    jobs:
      - name: "list-resources"
        description: "List Kubernetes resources (pods, services, deployments)"
        execution:
          strategy: "sequential"
          agents:
            - id: "k8s-main-agent"

  # HTTP endpoint for troubleshooting
  http-troubleshoot:
    description: "HTTP endpoint for troubleshooting Kubernetes issues"
    provider: "http"
    path: "/troubleshoot"
    method: "POST"
    jobs:
      - name: "troubleshoot-cluster"
        description: "Analyze and troubleshoot Kubernetes cluster issues"
        execution:
          strategy: "sequential"
          agents:
            - id: "k8s-main-agent"

  # HTTP endpoint for general k8s assistance
  http-assist:
    description: "HTTP endpoint for general Kubernetes assistance"
    provider: "http"
    path: "/assist"
    method: "POST"
    jobs:
      - name: "k8s-assistance"
        description: "General Kubernetes assistance and guidance"
        execution:
          strategy: "sequential"
          agents:
            - id: "k8s-main-agent"
            - id: "local-assistant"

  # CLI signal for direct k8s operations
  cli-k8s:
    description: "CLI signal for direct Kubernetes operations"
    provider: "cli"
    command: "k8s"
    jobs:
      - name: "direct-k8s-operation"
        description: "Direct Kubernetes operation via CLI"
        execution:
          strategy: "sequential"
          agents:
            - id: "k8s-main-agent"

  # CLI signal for deployment management
  cli-deploy:
    description: "CLI signal for deployment management"
    provider: "cli"
    command: "deploy"
    jobs:
      - name: "deployment-management"
        description: "Manage Kubernetes deployments via CLI"
        execution:
          strategy: "sequential"
          agents:
            - id: "k8s-main-agent"

# Runtime configuration
runtime:
  server:
    port: 3001
    host: "localhost"
  logging:
    level: "info"
    format: "pretty"
  persistence:
    type: "local"
    path: "./.atlas"
  security:
    cors: "*"
    
# Memory configuration for k8s operations
memory:
  enabled: true
  scope: "workspace"
  retention:
    max_age_days: 7  # Keep k8s operation history for 7 days
    max_entries: 500
  include_types:
    - "deployment_history"
    - "troubleshooting_patterns"
    - "successful_configurations"
    - "error_resolutions" 