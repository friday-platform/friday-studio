version: "1.0"

workspace:
  id: "a8c4d759-2e5b-4f3c-9a1d-8c7b3e6f2a9d"
  name: "k8s-assistant"
  description: "Atlas workspace for Kubernetes management with real-time monitoring using AI-powered agents via ACP protocol and stream signals"

# MCP server configurations
mcp_servers:
  linear:
    transport:
      type: "stdio"
      command: "npx"
      args: ["-y", "linear-mcp-server"]
      env:
        LINEAR_API_KEY: "auto"
    tools:
      allowed: [
        "linear_create_issue",
        "linear_update_issue",
        "linear_get_issue",
        "linear_search_issues",
        "linear_get_user_issues",
        "linear_add_comment",
      ]
    timeout_ms: 30000

# =============================================================================
# JOB DEFINITIONS
# =============================================================================
# Jobs define workflows triggered by signals. Each job specifies:
# - description: Job purpose (used by supervisor for intelligent task generation)
# - triggers: Signal conditions that activate the job
# - execution: Agent coordination strategy
# Note: Task templates removed to test intelligent task preparation by supervisor
# =============================================================================

jobs:
  # -------------------------
  # Direct Operations
  # -------------------------
  unified-k8s-operation:
    name: "unified-k8s-operation"
    description: "Comprehensive Kubernetes operation handler via HTTP API"
    triggers:
      - signal: "http-k8s"
    execution:
      strategy: "sequential"
      agents:
        - id: "k8s-main-agent"

  direct-k8s-operation:
    name: "direct-k8s-operation"
    description: "Direct Kubernetes operation execution via CLI interface"
    triggers:
      - signal: "cli-k8s"
    execution:
      strategy: "sequential"
      agents:
        - id: "k8s-main-agent"

  # -------------------------
  # Real-time Monitoring (KEPT INACTIVE)
  # -------------------------

  # handle-k8s-event:
  #   name: "handle-k8s-event"
  #   description: "Real-time Kubernetes event processing and automated incident response"
  #   triggers:
  #     - signal: "k8s-events"
  #   execution:
  #     strategy: "sequential"
  #     agents:
  #       - id: "k8s-main-agent"
  #       - id: "local-assistant"

  # -------------------------
  # Linear Integration
  # -------------------------

  linear-cluster-issue-triage:
    name: "linear-cluster-issue-triage"
    description: "Automated cluster issue triage from Linear tickets with k8s coordinator and Linear update"
    triggers:
      - signal: "linear-webhook"
        condition: |
          data.action === "create" &&
          data.data.type === "Issue" &&
          (data.data.labels?.some(l => ["k8s", "cluster", "devops", "deployment", "pod"].some(keyword => l.name.toLowerCase().includes(keyword))) ||
           ["kubernetes", "cluster", "pod", "deployment", "service", "ingress"].some(keyword =>
             data.data.title.toLowerCase().includes(keyword) ||
             data.data.description?.toLowerCase().includes(keyword)))
    execution:
      strategy: "sequential"
      agents:
        - id: "k8s-main-agent"
        - id: "linear-writer"

  linear-devops-automation:
    name: "linear-devops-automation"
    description: "Automated DevOps task execution from Linear issue updates with k8s coordinator and Linear update"
    triggers:
      - signal: "linear-webhook"
        condition: |
          (data.action === "update" || data.action === "create") &&
          data.data.type === "Comment" &&
          data.data.body &&
          ["kubectl", "restart", "scale", "logs", "describe", "get pods", "get services"].some(cmd =>
            data.data.body.toLowerCase().includes(cmd))
    execution:
      strategy: "sequential"
      agents:
        - id: "k8s-main-agent"
        - id: "linear-writer"

  linear-incident-resolution:
    name: "linear-incident-resolution"
    description: "Automated incident resolution workflow for assigned cluster issues with k8s coordinator and Linear update"
    triggers:
      - signal: "linear-webhook"
        condition: |
          data.action === "update" &&
          data.data.type === "Issue" &&
          data.data.assignee?.email?.includes("atlas") &&
          data.data.state.name === "In Progress" &&
          data.data.priority <= 2
    execution:
      strategy: "sequential"
      agents:
        - id: "k8s-main-agent"
        - id: "linear-writer"

# =============================================================================
# AGENT CONFIGURATION
# =============================================================================
# Multi-agent architecture for Kubernetes management:
# - k8s-main-agent: Primary AI agent for K8s operations via ACP protocol
# - local-assistant: LLM agent for documentation, Linear integration, and support
# =============================================================================

agents:
  k8s-main-agent:
    type: "remote"
    protocol: "acp"
    endpoint: "http://localhost:8085"
    purpose: "AI-powered Kubernetes management agent using ReAct framework for intelligent deployment generation, validation, cluster operations, and Linear issue automation"

    # ACP Protocol Configuration
    acp:
      agent_name: "standalone-coordinator"
      default_mode: "sync"
      timeout_ms: 120000 # 2-minute timeout for complex operations
      max_retries: 2
      health_check_interval: 30000 # Health check every 30 seconds

    # Monitoring & Reliability
    monitoring:
      enabled: true
      circuit_breaker:
        failure_threshold: 3
        timeout_ms: 120000
        half_open_max_calls: 2

    # DevOps Safety Context
    context:
      linear_integration: true
      automation_mode: "devops_worker"
      safe_operations:
        - "kubectl get"
        - "kubectl describe"
        - "kubectl logs"
        - "kubectl restart deployment"
        - "kubectl scale deployment"
        - "kubectl rollout status"
      requires_approval:
        - "kubectl delete"
        - "kubectl apply"
        - "kubectl patch"

  linear-writer:
    type: "llm"
    model: "claude-3-5-sonnet-20241022"
    purpose: "Linear issue management agent using MCP tools for creating and updating Linear issues"
    mcp_servers: ["linear"]
    max_steps: 3
    tool_choice: "auto"

    # Agent Behavior
    prompts:
      system: |
        You are a Linear issue management specialist with access to Linear MCP tools.

        Your primary responsibilities:
        1. Create new Linear issues with proper descriptions and metadata
        2. Update existing issues with status changes and progress notes
        3. Set issue states using Linear state UUIDs (NOT human-readable names)
        4. Manage issue assignments and priorities

        IMPORTANT: When updating issue states, you MUST use Linear state UUIDs, not human-readable names.
        Common Linear state UUIDs (use these exact values):
        - Backlog: Use the actual UUID from Linear API (query available states first)
        - Todo: Use the actual UUID from Linear API (query available states first)
        - In Progress: Use the actual UUID from Linear API (query available states first)
        - Done: Use the actual UUID from Linear API (query available states first)

        When working with Linear:
        - Always use the Linear MCP tools to interact with the Linear API
        - ALWAYS query available states first using linear_search_issues or similar tools to get valid state UUIDs
        - Format issue descriptions clearly with proper markdown
        - Include relevant context and actionable information
        - Set appropriate priorities and labels based on content
        - When updating issue status, use the actual UUID value, not human-readable names like "In Progress"

        For testing purposes, when you receive a webhook signal:
        1. Create or update the issue with a clear description
        2. Query available states to get the correct UUID for "In Progress" state
        3. Set the issue status using the UUID (not "In Progress" string)
        4. Provide a summary of actions taken

# =============================================================================
# SIGNAL CONFIGURATION
# =============================================================================
# Atlas supports multiple signal types for different interaction patterns:
# - HTTP: Direct API calls and webhook integrations
# - CLI: Command-line driven operations
# - K8s Events: Real-time Kubernetes event streaming
# =============================================================================

signals:
  # HTTP Endpoints
  http-k8s:
    description: "Unified HTTP endpoint for all Kubernetes operations"
    provider: "http"
    path: "/k8s"
    method: "POST"

  # CLI Interface
  cli-k8s:
    description: "CLI interface for Kubernetes operations"
    provider: "cli"
    command: "k8s"

  # Real-time Monitoring
  k8s-events:
    description: "Real-time Kubernetes event monitoring via built-in Events API"
    provider: "k8s-events"
    kubeconfig: "~/.kube/config"
    namespace: "default" # Watch default namespace
    insecure: true # For local development with minikube/kind
    timeout_ms: 120000
    retry_config:
      max_retries: 3
      retry_delay_ms: 2000

  # External Integrations
  linear-webhook:
    description: "Linear issue webhooks for automated K8s cluster issue resolution"
    provider: "http-webhook"
    endpoint: "/webhooks/linear"
    method: "POST"
    headers:
      Linear-Event: "required"
    config:
      webhook_secret: "${LINEAR_WEBHOOK_SECRET}"
      signature_validation: true
      allowed_event_types:
        - "Issue"
        - "Comment"
        - "IssueLabel"

# =============================================================================
# MEMORY CONFIGURATION
# =============================================================================
# Workspace memory for learning and pattern recognition across K8s operations
# =============================================================================

memory:
  enabled: true
  scope: "workspace"
  retention:
    max_age_days: 7 # Keep operation history for 7 days
    max_entries: 500
  include_types:
    - "deployment_history"
    - "troubleshooting_patterns"
    - "successful_configurations"
    - "error_resolutions"
    - "linear_issue_resolutions"
    - "automated_remediation_patterns"
    - "devops_task_outcomes"
