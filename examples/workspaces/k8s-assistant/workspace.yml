version: "1.0"

workspace:
  id: "a8c4d759-2e5b-4f3c-9a1d-8c7b3e6f2a9d"
  name: "k8s-assistant"
  description: "Atlas workspace for Kubernetes management with real-time monitoring using AI-powered agents via ACP protocol and stream signals"

# MCP server configurations
mcp_servers:
  linear:
    transport:
      type: "stdio"
      command: "npx"
      args: ["-y", "linear-mcp-server"]
      env:
        LINEAR_API_KEY: "auto"
    tools:
      allowed: [
        "linear_create_issue",
        "linear_update_issue",
        "linear_get_issue",
        "linear_search_issues",
        "linear_get_user_issues",
        "linear_add_comment",
      ]
    timeout_ms: 30000

# =============================================================================
# JOB DEFINITIONS
# =============================================================================
# Jobs define workflows triggered by signals. Each job specifies:
# - description: Job purpose (used by supervisor for intelligent task generation)
# - triggers: Signal conditions that activate the job
# - execution: Agent coordination strategy
# Note: Task templates removed to test intelligent task preparation by supervisor
# =============================================================================

jobs:
  # -------------------------
  # Direct Operations
  # -------------------------
  unified-k8s-operation:
    name: "unified-k8s-operation"
    description: "Comprehensive Kubernetes operation handler via HTTP API"
    triggers:
      - signal: "http-k8s"
    execution:
      strategy: "sequential"
      agents:
        - id: "k8s-main-agent"

  direct-k8s-operation:
    name: "direct-k8s-operation"
    description: "Direct Kubernetes operation execution via CLI interface"
    triggers:
      - signal: "cli-k8s"
    execution:
      strategy: "sequential"
      agents:
        - id: "k8s-main-agent"

  # -------------------------
  # Real-time Monitoring (KEPT INACTIVE)
  # -------------------------

  # handle-k8s-event:
  #   name: "handle-k8s-event"
  #   description: "Real-time Kubernetes event processing and automated incident response"
  #   triggers:
  #     - signal: "k8s-events"
  #   execution:
  #     strategy: "sequential"
  #     agents:
  #       - id: "k8s-main-agent"
  #       - id: "local-assistant"

  # -------------------------
  # Linear Integration
  # -------------------------

  linear-devops-task:
    name: "linear-devops-task"
    description: "DevOps and infrastructure task automation from Linear issues. Handles Kubernetes operations, deployments, scaling, troubleshooting, and infrastructure management based on Linear tickets."
    triggers:
      - signal: "linear-webhook"
        condition: |
          (data.action === "create" || data.action === "update") &&
          data.data.type === "Issue" &&
          (data.data.labels?.some(l => ["k8s", "kubernetes", "cluster", "devops", "deployment", "pod", "infrastructure", "scale", "restart"].some(keyword => l.name.toLowerCase().includes(keyword))) ||
           ["kubernetes", "cluster", "pod", "deployment", "service", "ingress", "scale", "restart", "logs", "kubectl"].some(keyword =>
             data.data.title.toLowerCase().includes(keyword) ||
             data.data.description?.toLowerCase().includes(keyword)))
    success_criteria:
      k8s_operation_completed: "Kubernetes operation executed successfully with valid kubectl response"
      linear_issue_updated: "Linear issue status updated with operation results and proper state transition"
      workflow_completion: "Both agents completed their tasks without critical errors"
    execution:
      strategy: "sequential"
      agents:
        - id: "k8s-main-agent"
        - id: "linear-writer"

# =============================================================================
# AGENT CONFIGURATION
# =============================================================================
# Clear separation of responsibilities:
# - k8s-main-agent: Kubernetes cluster operations worker (kubectl, deployments, scaling, monitoring)
# - linear-writer: Linear issue management specialist (creates/updates issues, manages status)
# =============================================================================

agents:
  k8s-main-agent:
    type: "remote"
    protocol: "acp"
    endpoint: "http://localhost:8080"
    purpose: "Kubernetes cluster operations worker. Handles kubectl commands, deployment management, scaling, troubleshooting, log retrieval, and cluster monitoring. Does NOT handle Linear issue management."

    # ACP Protocol Configuration
    acp:
      agent_name: "k8s-deployment-manager"
      default_mode: "sync"
      timeout_ms: 180000 # 2-minute timeout for complex operations
      max_retries: 2
      health_check_interval: 30000 # Health check every 30 seconds

    # Monitoring & Reliability
    monitoring:
      enabled: true
      circuit_breaker:
        failure_threshold: 3
        timeout_ms: 120000
        half_open_max_calls: 2

  linear-writer:
    type: "llm"
    model: "claude-3-5-sonnet-20241022"
    purpose: "Linear issue management specialist. Responsible for ALL Linear operations: creating issues, updating status, adding comments, managing assignments and priorities. Uses MCP tools to interact with Linear API."
    tools:
      mcp: ["linear"]
    max_steps: 3
    tool_choice: "auto"

    # Agent Behavior
    prompts:
      system: |
        You are a Linear issue management specialist with access to Linear MCP tools.

        Your primary responsibilities:
        1. Create new Linear issues with proper descriptions and metadata
        2. Add detailed comments to issues with progress updates and results
        3. Manage issue assignments and priorities when needed
        4. Format all communications clearly with proper markdown

        FOCUS: Your main job is to provide excellent communication through comments.
        Always add comprehensive, helpful comments when operations are performed.

        Linear interaction rules:
        - Always use Linear MCP tools to interact with the Linear API
        - Format issue comments clearly with proper markdown
        - Include relevant context and actionable information
        - Add detailed progress updates and results from operations
        - Provide clear summaries of what was accomplished

        Comment workflow:
        When work starts:
        - Add comment indicating work is starting and what will be done
        
        When work completes:
        - Add detailed completion comment with comprehensive results
        - Include technical details, logs, or findings
        - Summarize what was accomplished and next steps if relevant
        - Use clear formatting with emojis and markdown for readability
        
        When operations fail:
        - Add comment with error details and troubleshooting information
        - Explain what went wrong and suggest next steps

        Required workflow for webhook signals:
        1. Add comment indicating automation is processing the request
        2. After k8s operations complete, add final detailed comment with results
        3. Ensure comments are comprehensive and helpful for the team
        
        Focus on providing excellent communication and documentation through comments.

# =============================================================================
# SIGNAL CONFIGURATION
# =============================================================================
# Atlas supports multiple signal types for different interaction patterns:
# - HTTP: Direct API calls and webhook integrations
# - CLI: Command-line driven operations
# - K8s Events: Real-time Kubernetes event streaming
# =============================================================================

signals:
  # HTTP Endpoints
  http-k8s:
    description: "Unified HTTP endpoint for all Kubernetes operations"
    provider: "http"
    path: "/k8s"
    method: "POST"

  # CLI Interface
  cli-k8s:
    description: "CLI interface for Kubernetes operations"
    provider: "cli"
    command: "k8s"

  # Real-time Monitoring
  k8s-events:
    description: "Real-time Kubernetes event monitoring via built-in Events API"
    provider: "k8s-events"
    kubeconfig: "~/.kube/config"
    namespace: "default" # Watch default namespace
    insecure: true # For local development with minikube/kind
    timeout_ms: 120000
    retry_config:
      max_retries: 3
      retry_delay_ms: 2000

  # External Integrations
  linear-webhook:
    description: "Linear issue webhooks for automated K8s cluster issue resolution"
    provider: "http-webhook"
    endpoint: "/webhooks/linear"
    method: "POST"
    headers:
      Linear-Event: "required"
    config:
      webhook_secret: "${LINEAR_WEBHOOK_SECRET}"
      signature_validation: true
      allowed_event_types:
        - "Issue"
        - "Comment"
        - "IssueLabel"

# =============================================================================
# MEMORY CONFIGURATION
# =============================================================================
# Workspace memory for learning and pattern recognition across K8s operations
# =============================================================================

memory:
  enabled: true
  scope: "workspace"
  retention:
    max_age_days: 7 # Keep operation history for 7 days
    max_entries: 500
  include_types:
    - "deployment_history"
    - "troubleshooting_patterns"
    - "successful_configurations"
    - "error_resolutions"
    - "linear_issue_resolutions"
    - "automated_remediation_patterns"
    - "devops_task_outcomes"
