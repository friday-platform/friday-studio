version: '1.0'
workspace:
  name: QA Code Agent Test
  description: Tests code agent execution through the workspace runtime

signals:
  run-echo:
    provider: http
    title: Run Echo Agent
    description: Triggers the echo agent
    config:
      path: /webhooks/run-echo
    schema:
      type: object
      properties:
        message:
          type: string
      required:
        - message
  run-tools:
    provider: http
    title: Run Tools Agent
    description: Triggers the tools agent
    config:
      path: /webhooks/run-tools
    schema:
      type: object
      properties:
        input:
          type: string
      required:
        - input
  run-bash-test:
    provider: http
    title: Run Bash Test Agent
    description: Triggers bash tool test agent
    config:
      path: /webhooks/run-bash-test
    schema:
      type: object
      properties:
        action:
          type: string
      required:
        - action
  run-bb:
    provider: http
    title: Run BB Agent
    description: Triggers Bitbucket agent
    config:
      path: /webhooks/run-bb
    schema:
      type: object
      properties:
        operation:
          type: string
      required:
        - operation
  run-gh:
    provider: http
    title: Run GH Agent
    description: Triggers GitHub agent
    config:
      path: /webhooks/run-gh
    schema:
      type: object
      properties:
        operation:
          type: string
      required:
        - operation

tools:
  mcp:
    servers:
      echo-server:
        transport:
          type: stdio
          command: node
          args:
            - ../../tools/echo-mcp-server.mjs

agents:
  echo:
    type: user
    agent: echo
    description: Echoes input via WASM code agent
  tools:
    type: user
    agent: tools-agent
    description: Exercises all host capabilities
  bash-test:
    type: user
    agent: bash-test
    description: Exercises bash tool through WASM
  bb:
    type: user
    agent: bb
    description: Bitbucket PR operations
  gh:
    type: user
    agent: gh
    description: GitHub PR operations

jobs:
  echo-test:
    title: Echo Test
    triggers:
      - signal: run-echo
    fsm:
      id: echo-test-pipeline
      initial: idle
      states:
        idle:
          'on':
            run-echo:
              target: step_echo
        step_echo:
          entry:
            - type: agent
              agentId: echo
              outputTo: echo-output
              prompt: Echo the input message back.
            - type: emit
              event: ADVANCE
          'on':
            ADVANCE:
              target: completed
        completed:
          type: final
      functions: {}
      tools: {}
  tools-test:
    title: Tools Test
    triggers:
      - signal: run-tools
    fsm:
      id: tools-test-pipeline
      initial: idle
      states:
        idle:
          'on':
            run-tools:
              target: step_tools
        step_tools:
          entry:
            - type: agent
              agentId: tools
              outputTo: tools-output
              prompt: Test host functions
            - type: emit
              event: ADVANCE
          'on':
            ADVANCE:
              target: completed
        completed:
          type: final
      functions: {}
      tools: {}
  bash-test-job:
    title: Bash Test
    triggers:
      - signal: run-bash-test
    fsm:
      id: bash-test-pipeline
      initial: idle
      states:
        idle:
          'on':
            run-bash-test:
              target: step_bash_test
        step_bash_test:
          entry:
            - type: agent
              agentId: bash-test
              outputTo: bash-test-output
              prompt: Execute action from signal data
            - type: emit
              event: ADVANCE
          'on':
            ADVANCE:
              target: completed
        completed:
          type: final
      functions: {}
      tools: {}
  bb-job:
    title: BB Agent
    triggers:
      - signal: run-bb
    fsm:
      id: bb-pipeline
      initial: idle
      states:
        idle:
          'on':
            run-bb:
              target: step_bb
        step_bb:
          entry:
            - type: agent
              agentId: bb
              outputTo: bb-output
              prompt: Execute operation from signal data
            - type: emit
              event: ADVANCE
          'on':
            ADVANCE:
              target: completed
        completed:
          type: final
      functions: {}
      tools: {}
  gh-job:
    title: GH Agent
    triggers:
      - signal: run-gh
    fsm:
      id: gh-pipeline
      initial: idle
      states:
        idle:
          'on':
            run-gh:
              target: step_gh
        step_gh:
          entry:
            - type: agent
              agentId: gh
              outputTo: gh-output
              prompt: Execute operation from signal data
            - type: emit
              event: ADVANCE
          'on':
            ADVANCE:
              target: completed
        completed:
          type: final
      functions: {}
      tools: {}
