version: "1.0"

workspace:
  name: "Atlas Codebase Analyzer"
  description: "Autonomous Atlas codebase analysis using enhanced EMCP filesystem capabilities"

# No MCP servers needed - using EMCP context provisioning

# Signal definitions for autonomous operation
signals:
  # File change trigger - fires on significant code changes
  file-change:
    provider: "http"
    description: "File monitoring for autonomous analysis"
    config:
      path: "/file-change"

  # Manual trigger for immediate analysis
  manual-analysis:
    provider: "http"
    description: "Manual trigger for codebase analysis"
    config:
      path: "/analyze"

  # Weekly comprehensive analysis
  weekly-review:
    provider: "schedule"
    description: "Scheduled weekly analysis"
    config:
      schedule: "0 9 * * 1" # Every Monday at 9 AM
      timezone: "America/Los_Angeles"

# Agent definitions - using EMCP context provisioning (no MCP servers)
agents:
  # Performance analysis agent with secure filesystem context
  performance-analyzer:
    type: "llm"
    description: "Deep performance analysis using Atlas EMCP filesystem context"
    config:
      model: "claude-3-7-sonnet-latest"
      max_steps: 3
      prompt: |
        You are a performance analysis expert with secure read-only access to the Atlas codebase.
        You receive comprehensive codebase context through Atlas EMCP filesystem provisioning.
        Analyze code patterns, identify bottlenecks, and suggest optimizations.
        Focus on worker architecture, state management, and async patterns.

  # Developer experience analyzer with metadata capabilities
  dx-analyzer:
    type: "llm"
    description: "Developer experience analysis with advanced filesystem metadata"
    config:
      model: "claude-3-7-sonnet-latest"
      max_steps: 3
      prompt: |
        You are a developer experience expert with access to enhanced filesystem analysis.
        You receive detailed codebase context with metadata through Atlas EMCP.
        Understand code complexity, dependencies, and maintainability patterns.
        Focus on developer workflows, testing patterns, and code organization.

  # Architecture analysis agent with comprehensive context
  architecture-analyzer:
    type: "llm"
    description: "System architecture analysis using comprehensive codebase context"
    config:
      model: "claude-3-7-sonnet-latest"
      max_steps: 3
      prompt: |
        You are an architecture expert with advanced codebase analysis capabilities.
        You receive comprehensive system context through Atlas EMCP context provisioning.
        Understand system design, patterns, and relationships.
        Focus on supervision hierarchy, communication patterns, and architectural consistency.

  # Report generator with secure context access
  report-generator:
    type: "llm"
    description: "Generate comprehensive reports using secure filesystem context"
    config:
      model: "claude-3-7-sonnet-latest"
      max_steps: 2
      prompt: |
        You are a technical report generator with read-only filesystem context.
        Synthesize analysis findings into actionable markdown reports with priorities.
        Use the provided context to understand file relationships and generate comprehensive documentation.

# Job definitions for different analysis workflows
jobs:
  comprehensive-analysis:
    name: "comprehensive-analysis"
    description: "Complete Atlas codebase analysis covering performance, DX, and architecture"
    triggers:
      - signal: "manual-analysis"
        condition:
          jsonlogic:
            or:
              - "!": { "var": "type" }
              - "==": [{ "var": "type" }, "comprehensive"]
    prompt: |
      Planning:
        Focus your analysis on these key areas of the Atlas codebase:
        - Worker architecture and communication patterns
        - XState FSM implementations
        - Signal processing and session lifecycle
        - Memory management and library integration
        - Agent supervision hierarchy
        - EMCP provider architecture and context provisioning
        - Hierarchical resource scoping (Memory vs Context vs Tools)

        Provide specific, actionable recommendations based on the actual codebase implementation.

      Evaluation:
        Evaluate whether the analysis has covered all critical architectural aspects:
        - Is the worker communication analysis comprehensive?
        - Are the FSM patterns properly evaluated?
        - Has the signal/session lifecycle been thoroughly examined?
        - Are memory and context management patterns well understood?
        - Has the supervision hierarchy been properly analyzed?

        The session is complete only when all areas have been thoroughly analyzed.
    execution:
      strategy: "sequential"
      context:
        files:
          patterns:
            - "src/core/workspace-runtime.ts"
            - "src/core/session-supervisor.ts"
            - "src/core/supervisor.ts"
            - "src/core/workers/*.ts" # Use glob pattern instead of directory
            - "src/core/emcp/*.ts" # Include new EMCP infrastructure
            - "src/core/context/*.ts" # Include new context system
            - "src/cli/commands/workspace.tsx"
            - "atlas.yml"
            - "CLAUDE.md"
          base_path: "/Users/kenneth/tempest/atlas"
          max_file_size: 100000
          include_content: true
      agents:
        - "performance-analyzer"
        - "dx-analyzer"
        - "architecture-analyzer"
        - "report-generator"

  performance-focused:
    name: "performance-focused"
    description: "Performance analysis and optimization recommendations"
    triggers:
      - signal: "manual-analysis"
        condition:
          jsonlogic:
            "==": [{ "var": "type" }, "performance"]
    execution:
      strategy: "sequential"
      agents:
        - "performance-analyzer"
        - "report-generator"

  dx-focused:
    name: "dx-focused"
    description: "Developer experience analysis and improvements"
    triggers:
      - signal: "manual-analysis"
        condition:
          jsonlogic:
            "==": [{ "var": "type" }, "dx"]
    execution:
      strategy: "sequential"
      agents:
        - "dx-analyzer"
        - "report-generator"

  architecture-review:
    name: "architecture-review"
    description: "System architecture analysis and design recommendations"
    triggers:
      - signal: "manual-analysis"
        condition:
          jsonlogic:
            "==": [{ "var": "type" }, "architecture"]
    execution:
      strategy: "sequential"
      agents:
        - "architecture-analyzer"
        - "report-generator"

  weekly-health-check:
    name: "weekly-health-check"
    description: "Comprehensive weekly codebase health analysis"
    triggers:
      - signal: "weekly-review"
    execution:
      strategy: "sequential"
      agents:
        - "performance-analyzer"
        - "dx-analyzer"
        - "architecture-analyzer"
        - "report-generator"
