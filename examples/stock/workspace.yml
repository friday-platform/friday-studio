version: "1.0"
workspace:
  name: top-stocks-emailer
  description: "Fetches top 5 performing stocks from Barchart, summarizes them, and sends via email"
tools:
  mcp:
    client_config:
      timeout:
        progressTimeout: 2m
        maxTotalTimeout: 30m
    servers: {} # Atlas Platform is automatically provided - no need to configure it here
signals:
  fetch-stocks:
    description: Manually trigger stock fetching and email process
    provider: http
    config:
      path: /trigger/fetch-stocks
jobs:
  process-stocks:
    name: process-stocks
    description: "Fetch stocks, analyze performance, and send email"
    triggers:
      - signal: fetch-stocks
    execution:
      strategy: sequential
      agents:
        - id: stock-fetcher
          context:
            signal: true
        - id: stock-analyzer
          context:
            steps: previous
        - id: email-sender
          context:
            steps: previous
agents:
  stock-fetcher:
    description: >-
      Fetch top 5 performing stocks from finance.yahoo.com using targeted research. MUST capture and
      include specific source URLs where each piece of stock data was obtained (individual stock
      pages, screener results) so recipients can verify the information. Include both the main
      source URL and individual stock page URLs in the output.
    type: llm
    config:
      provider: anthropic
      model: claude-3-5-haiku-latest
      prompt: >
        You fetch the top 5 performing stocks from finance.yahoo.com using session-based web
        automation.


        Follow this workflow:

        1. Create a web session using web_session_create with sessionId "stocks-session"

        2. Navigate to https://finance.yahoo.com/markets/stocks/gainers/ using web_session_navigate

        3. Handle any cookie consent banners using web_session_handle_consent with action "accept"

        4. Extract the page content using web_session_extract with format "markdown"

        5. Close the session using web_session_close when done


        From the extracted data, identify the top 5 stocks and extract:

        - Symbol

        - Name

        - Price

        - Price change

        - Percent change

        - Volume

        - Weighted Alpha (performance metric)


        Output the result as a well formatted JSON document.
      temperature: 0.3
      tools:
        - atlas-platform
  stock-analyzer:
    description: >-
      Analyze and summarize stock performance data. MUST preserve all source URLs from the fetched
      data and include them in the analysis output. Ensure source links are maintained throughout
      the analysis for verification purposes.
    type: llm
    config:
      provider: anthropic
      model: claude-3-7-sonnet-latest
      prompt: |
        You analyze the top 5 performing stocks data provided to you.

        For each stock, create a concise performance summary that includes:
        1. What the company does (based on company name)
        2. Recent price performance
        3. Notable metrics (volume, momentum, etc.)
        4. Brief assessment of why it might be performing well

        Combine all summaries into a well-formatted report suitable for an email.
        Include a brief market overview at the beginning.

        Format the output in HTML to make it look good in an email.
      temperature: 0.3
  email-sender:
    description: >-
      Send email with stock performance report including source links. MUST format the email to
      include clickable source URLs for each stock so recipients can verify and explore the
      information further. Use atlas_notify_email to send the formatted report with proper HTML
      formatting for links.
    type: llm
    config:
      provider: anthropic
      model: claude-3-5-haiku-latest
      prompt: |
        You send an email with the stock performance report.

        The email should be sent to: michal@tempest.team
        Subject: Top 5 Performing Stocks Report - [Current Date]

        Use the provided HTML-formatted stock report as the email body.
        Add a brief introduction and conclusion to the email.

        Use the atlas_notify_email from the atlas-platform tool to send the email.
      temperature: 0.3
      tools:
        - atlas-platform
