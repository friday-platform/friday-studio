# =============================================================================
# MEMORY CONFIGURATION
# =============================================================================
# Workspace memory for SOC 2 evaluation patterns and learning
# NOTE: Actual evaluation reports are automatically stored in Atlas Library
# =============================================================================

memory:
  enabled: true
  scope: "workspace"
  retention:
    max_age_days: 730 # Keep evaluation patterns for 2 years
    max_entries: 500
  include_types:
    - "evaluation_patterns"
    - "security_questionnaire_analysis_methods"
    - "compliance_assessment_criteria"
    - "vendor_risk_assessment_patterns"
    - "evaluation_best_practices"
    - "document_analysis_insights"
