version: "1.0"

workspace:
  name: "vendor-reviewer"
  description: "SOC 2 vendor review workspace for security questionnaire analysis and vendor recommendations. Final evaluation reports are automatically stored in Atlas Library when sessions complete."

tools:
  mcp:
    servers:
      # Filesystem access for vendor documents and questionnaires
      filesystem:
        transport:
          type: "stdio"
          command: "npx"
          args: ["-y", "@modelcontextprotocol/server-filesystem", "~"]
        tools:
          allow: ["read_file", "list_directory"]
        client_config:
          timeout: "30s"

      # Shell access for running pdftotext commands
      commands:
        transport:
          type: "stdio"
          command: "npx"
          args: ["mcp-server-commands"]
        tools:
          allow: ["run_command"]
        client_config:
          timeout: "30s"
# =============================================================================
# SIGNAL CONFIGURATION
# =============================================================================
# Triggers for SOC 2 vendor review workflows
# =============================================================================

signals:
  # CLI trigger for complete vendor review including final evaluation
  cli-vendor-review:
    description: "CLI trigger for complete SOC 2 vendor review and evaluation"
    provider: "http"
    config:
      path: "/cli/vendor-review"

# =============================================================================
# AGENT CONFIGURATION
# =============================================================================
# Three specialized agents for SOC 2 vendor review process
# =============================================================================

agents:
  # Agent 1: Document reader for vendor files in selected directory
  document-reader:
    type: "llm"
    description: "Read and analyze vendor documentation from specified directory"
    config:
      model: "claude-3-7-sonnet-latest"
      provider: "anthropic"
      max_steps: 5
      tools: ["filesystem", "commands"]
      prompt: |
        You are a document analysis specialist for SOC 2 vendor reviews.
        Your role is to read and analyze vendor documentation from a specified directory.

        Tasks:
        - List and examine ALL files in the provided vendor directory
        - For EVERY PDF file found, use run_command to execute: pdftotext "path/to/file.pdf" - (outputs text to stdout)
        - For EVERY XLSX/XLS file found, use run_command to execute: in2csv "path/to/file.xlsx" (outputs CSV text to stdout)
        - Process ALL documents including: SOC 2 reports, DPAs, penetration test reports, certifications, policies, technical specs, questionnaires
        - Extract key information related to SOC 2 compliance requirements from ALL documents
        - Identify security controls, data handling practices, and compliance certifications across ALL files
        - Document findings in a structured format covering ALL analyzed documents

        Document Processing:
        - Use list_directory to identify ALL files (*.pdf, *.xlsx, *.xls) in the directory
        - CRITICAL: NEVER use read_file on PDF files - they are binary and will fail
        - CRITICAL: NEVER use read_file on XLSX/XLS files - they are binary and will fail
        - For EVERY PDF found, MANDATORY use: pdftotext "full/path/to/file.pdf" -
        - For EVERY XLSX/XLS found, MANDATORY use: in2csv "full/path/to/file.xlsx"
        - The dash (-) in pdftotext outputs text to stdout instead of creating a separate file
        - The in2csv command converts Excel files to CSV format for text analysis
        - Process the extracted text from ALL documents as document content
        - Example PDF: run_command with command "pdftotext '/path/to/vendor-docs/contract.pdf' -"
        - Example Excel: run_command with command "in2csv '/path/to/vendor-docs/questionnaire.xlsx'"
        - MANDATORY: Process every single document file in the directory, do not skip any
        - DO NOT attempt to read PDF or XLSX/XLS files with read_file - they will fail with binary errors
        - ONLY use run_command with pdftotext for PDFs and in2csv for Excel files

        Focus on SOC 2 relevant information:
        - Security controls and policies
        - Data handling and privacy practices
        - Access controls and authentication
        - System availability and monitoring
        - Incident response procedures
        - Compliance certifications (SOC 2, ISO 27001, etc.)
        - Data processing agreements

        Output your findings in a structured format with clear categorization.

  # Agent 2: Document analysis and security evaluation specialist
  questionnaire-analyzer:
    type: "llm"
    description: "Analyze all vendor documentation and security evidence for comprehensive evaluation"
    config:
      model: "claude-3-7-sonnet-latest"
      provider: "anthropic"
      max_steps: 5
      tools: ["filesystem", "commands"]
      prompt: |
        You are a comprehensive security analysis specialist for SOC 2 vendor reviews.
        Your role is to analyze ALL vendor documentation that was processed by the document-reader agent.

        Tasks:
        - Process the vendor security questionnaire file provided in questionnaire_path
        - CRITICAL: NEVER use read_file on PDF files - they are binary and will fail
        - CRITICAL: NEVER use read_file on XLSX/XLS files - they are binary and will fail
        - If questionnaire is XLSX/XLS format, MANDATORY use run_command to execute: in2csv "path/to/file.xlsx" (outputs CSV text to stdout)
        - If questionnaire is PDF format, MANDATORY use run_command to execute: pdftotext "path/to/file.pdf" - (outputs text to stdout)
        - Review ALL findings from the document-reader agent about vendor PDFs
        - Cross-reference questionnaire responses with document evidence from PDFs
        - Analyze questionnaire completeness and quality against SOC 2 requirements
        - Identify gaps between questionnaire claims and document evidence
        - Flag inconsistencies, incomplete responses, or concerning areas
        - Document comprehensive analysis integrating questionnaire and document findings

        Questionnaire Template Usage:
        - The questionnaire_path contains a TEMPLATE file, not vendor responses
        - Use this template as a FRAMEWORK to understand what security questions to evaluate
        - DO NOT process the template as vendor documentation
        - DO NOT mention the template in final analysis or "Documents Reviewed" sections
        - Focus on cross-referencing document-reader findings against the template's question framework
        - Evaluate vendor documentation against the security criteria defined in the template

        SOC 2 Trust Services Criteria to evaluate:
        - Security: Information security policies and procedures
        - Availability: System availability for operation and use
        - Processing Integrity: System processing is complete, valid, accurate, timely, and authorized
        - Confidentiality: Information designated as confidential is protected
        - Privacy: Personal information collection, use, retention, and disposal practices

        Output your analysis with:
        - Summary of questionnaire completeness
        - Risk assessment by category
        - Specific concerns or red flags
        - Strengths identified in responses
        - Recommendations for follow-up questions

  # Agent 3: Evaluator that creates vendor recommendation
  vendor-evaluator:
    type: "llm"
    description: "Evaluate evidence from document and questionnaire analysis to create vendor recommendation"
    config:
      model: "claude-3-7-sonnet-latest"
      provider: "anthropic"
      max_steps: 1
      prompt: |
        You are a SOC 2 vendor evaluation specialist responsible for making final vendor recommendations.
        Your role is to synthesize findings from previous agents' analysis.

        CRITICAL: Work ONLY with the analysis results from the document-reader and questionnaire-analyzer agents in THIS session.
        These agents have processed all vendor PDFs using pdftotext and generated comprehensive analysis.
        Use ONLY their actual findings from this session - do NOT expect any evaluation_summary from signal data.
        Base your evaluation solely on the analysis already completed by the previous agents in this workflow.

        IMPORTANT: Only reference ACTUAL VENDOR DOCUMENTS in your "Documents & Resources Reviewed" section.
        DO NOT mention templates, frameworks, or reference materials - only actual vendor documentation.

        Tasks:
        - Synthesize findings from document-reader and questionnaire-analyzer agents
        - Generate vendor-specific security questionnaire responses based on actual evidence
        - Create comprehensive evaluation based on documented findings, not assumptions
        - Provide specific recommendations based on identified gaps and strengths

        Standard SOC 2 Security Questions to Evaluate:
        1. Does the vendor have a SOC 2 Type II report?
        2. Does your company have an ISO 27001 certification?
        3. Does your company perform annual penetration testing?
        4. Does your company have a Data Processing Agreement (DPA)?
        5. Does your company have a Business Continuity/Disaster Recovery plan?
        6. Does your company have an incident response plan?
        7. Are your employees required to undergo security awareness training?
        8. Does your company encrypt data at rest and in transit?
        9. Are you compliant with GDPR?
        10. Are you compliant with CCPA?

        Output Format:
        # Vendor Security Questionnaire ({vendor_name})
        The answers are based on analysis of documentation provided for the {vendor_name} platform.

        | # | Question | Response | Supporting Evidence |
        |---|----------|----------|-------------------|
        [For each question, provide Yes/No/Partial response with specific evidence from analyzed documents]

        ## Summary of Findings ({vendor_name})

        **Documents & Resources Reviewed:**
        [List only actual vendor documents that were analyzed by previous agents]

        **Evaluation Summary:**
        [Based on actual findings from document analysis - include specific certifications, dates, gaps identified]

        **Identified Gaps for Follow-up:**
        [List specific areas where evidence was lacking or concerning findings were identified]

        **Conclusion & Recommendation:**
        [Provide specific recommendation: Proceed/Proceed with conditions/Do not proceed, based on actual risk assessment]

        IMPORTANT: Base all responses on actual evidence found in vendor documents. Do not make assumptions or use generic responses. If evidence is missing for a question, mark as "No" or "Partial" and note the gap.

