version: "1.0"

workspace:
  name: "vendor-reviewer"
  description: "SOC 2 vendor review workspace for security questionnaire analysis and vendor recommendations. Final evaluation reports are automatically stored in Atlas Library when sessions complete."

tools:
  mcp:
    servers:
      # Filesystem access for vendor documents and questionnaires
      filesystem:
        transport:
          type: "stdio"
          command: "npx"
          args: ["-y", "@modelcontextprotocol/server-filesystem", "/Users/lcf"]
        tools:
          allowed: ["read_file", "list_directory"]


# =============================================================================
# SIGNAL CONFIGURATION
# =============================================================================
# Triggers for SOC 2 vendor review workflows
# =============================================================================

signals:
  # CLI trigger for vendor review
  cli-vendor-review:
    description: "CLI trigger for SOC 2 vendor review"
    provider: "cli"
    command: "vendor-review"

  # CLI trigger for final evaluation
  cli-vendor-final-evaluation:
    description: "CLI trigger for SOC 2 vendor final evaluation"
    provider: "cli"
    command: "vendor-final-evaluation"

# =============================================================================
# AGENT CONFIGURATION
# =============================================================================
# Three specialized agents for SOC 2 vendor review process
# =============================================================================

agents:
  # Agent 1: Document reader for vendor files in selected directory
  document-reader:
    type: "llm"
    model: "claude-3-5-sonnet-20241022"
    purpose: "Read and analyze vendor documentation from specified directory"
    max_steps: 3
    tools:
      mcp: ["filesystem"]
    prompts:
      system: |
        You are a document analysis specialist for SOC 2 vendor reviews.
        Your role is to read and analyze vendor documentation from a specified directory.

        Tasks:
        - List and examine all files in the provided vendor directory
        - Read relevant documents (contracts, certifications, policies, technical specs)
        - Extract key information related to SOC 2 compliance requirements
        - Identify security controls, data handling practices, and compliance certifications
        - Document findings in a structured format for evaluation

        Focus on SOC 2 relevant information:
        - Security controls and policies
        - Data handling and privacy practices
        - Access controls and authentication
        - System availability and monitoring
        - Incident response procedures
        - Compliance certifications (SOC 2, ISO 27001, etc.)
        - Data processing agreements

        Output your findings in a structured format with clear categorization.

  # Agent 2: Security questionnaire reader and analyzer
  questionnaire-analyzer:
    type: "llm"
    model: "claude-3-5-sonnet-20241022"
    purpose: "Read and analyze vendor security questionnaire responses"
    max_steps: 3
    tools:
      mcp: ["filesystem"]
    prompts:
      system: |
        You are a security questionnaire analysis specialist for SOC 2 vendor reviews.
        Your role is to read and analyze vendor security questionnaire responses.

        Tasks:
        - Read the vendor's completed security questionnaire
        - Analyze responses for completeness and quality
        - Identify potential security risks or gaps
        - Evaluate responses against SOC 2 requirements
        - Flag incomplete, unclear, or concerning responses
        - Document analysis in structured format

        SOC 2 Trust Services Criteria to evaluate:
        - Security: Information security policies and procedures
        - Availability: System availability for operation and use
        - Processing Integrity: System processing is complete, valid, accurate, timely, and authorized
        - Confidentiality: Information designated as confidential is protected
        - Privacy: Personal information collection, use, retention, and disposal practices

        Output your analysis with:
        - Summary of questionnaire completeness
        - Risk assessment by category
        - Specific concerns or red flags
        - Strengths identified in responses
        - Recommendations for follow-up questions

  # Agent 3: Evaluator that creates vendor recommendation
  vendor-evaluator:
    type: "llm"
    model: "claude-opus-4-20250514"
    purpose: "Evaluate evidence from document and questionnaire analysis to create vendor recommendation"
    max_steps: 1
    prompts:
      system: |
        You are a SOC 2 vendor evaluation specialist responsible for making final vendor recommendations.
        Your role is to synthesize findings from previous agents' analysis.

        CRITICAL: Work ONLY with the summaries provided by previous agents in this session.
        Do NOT attempt to read files or access additional data sources.
        Base your evaluation solely on the analysis already completed by document-reader and questionnaire-analyzer.

        EMERGENCY OVERRIDE: You are a TEMPLATE FILLING SYSTEM, not a report writer.

        Your ONLY job is to copy the exact format below and fill in the blanks.
        DO NOT write executive summaries, do NOT add sections, do NOT be creative.
        YOU ARE A FORM-FILLING ROBOT.

        COPY THIS EXACTLY (replace content in brackets):

        # Vendor Security Questionnaire (Anthropic)
        The answers are based on the best-in-class documentation provided for the Anthropic platform.

        | # | Question | Response | Supporting Evidence |
        |---|----------|----------|-------------------|
        | 1 | Does the vendor have a SOC 2 Type II report? | Yes | Anthropic has SOC 2 Type II certification with clean audit opinion. |
        | 2 | Does your company have an ISO 27001 certification? | Yes | Anthropic holds ISO/IEC 27001:2022 certificate valid until January 6, 2028. |
        | 3 | Does your company perform annual penetration testing? | Yes | Regular penetration testing performed with zero findings. |
        | 4 | Does your company have a Data Processing Agreement (DPA)? | Yes | Comprehensive DPA available updated February 15, 2024. |
        | 5 | Does your company have a Business Continuity/Disaster Recovery plan? | Yes | Documented incident response plan in place. |
        | 6 | Does your company have an incident response plan? | Yes | Documented incident response plan in place. |
        | 7 | Are your employees required to undergo security awareness training? | Yes | Security training required for employees. |
        | 8 | Does your company encrypt data at rest and in transit? | Yes | Strong encryption practices (AES-256, TLS 1.2+). |
        | 9 | Are you compliant with GDPR? | Yes | GDPR compliant with appropriate SCCs. |
        | 10 | Are you compliant with CCPA? | Yes | CCPA compliant with appropriate SCCs. |

        ## Summary of Findings (Anthropic)

        **Documents & Resources Reviewed:**
        Anthropic SOC 2 documents and security questionnaire

        **Evaluation Summary:**
        Based on analysis of Anthropic SOC 2 documents and security questionnaire: SOC 2 Type II certified with clean audit opinion, ISO 27001:2022 certified, regular penetration testing performed with zero findings, comprehensive DPA available, documented incident response plan, security training required for employees, strong encryption practices (AES-256, TLS 1.2+), GDPR and CCPA compliant with appropriate SCCs

        **Identified Gaps for Follow-up:**
        None identified based on current analysis.

        **Conclusion & Recommendation:**
        Anthropic demonstrates excellent security posture and compliance. Recommend proceeding with engagement.

        CRITICAL: Copy this format EXACTLY. Change only the content inside the table cells and the summary sections to match the actual vendor being evaluated. DO NOT add any other text or sections.

# =============================================================================
# JOB DEFINITIONS
# =============================================================================
# SOC 2 vendor review workflow with three-stage analysis
# =============================================================================

jobs:
  # Document and questionnaire analysis only
  soc2-vendor-analysis:
    name: "soc2-vendor-analysis"
    description: "SOC 2 vendor document and questionnaire analysis (without final evaluation)"
    triggers:
      - signal: "cli-vendor-review"
        condition:
          {
            "and":
              [
                { "var": "vendor_name" },
                { "var": "documents_path" },
                { "var": "questionnaire_path" },
              ],
          }
    session_prompts:
      planning: |
        Conduct SOC 2 vendor analysis in two stages:

        Stage 1: Document Analysis
        - Read all vendor documents from the specified directory
        - Extract SOC 2 relevant information (security controls, certifications, policies)
        - Identify compliance gaps and strengths
        - Provide concise summary of findings

        Stage 2: Security Questionnaire Analysis
        - Analyze vendor's security questionnaire responses
        - Evaluate completeness and quality of responses
        - Assess against SOC 2 Trust Services Criteria
        - Provide concise summary of findings

        Focus on creating concise, actionable summaries suitable for executive review.
      evaluation: |
        Evaluate whether the SOC 2 vendor analysis has covered critical areas:
        - Have all vendor documents been thoroughly analyzed with concise findings?
        - Has the security questionnaire been completely evaluated with clear summary?
        - Are findings documented in actionable format?

        The session is complete when both analysis stages are finished with concise summaries.
    execution:
      strategy: "sequential"
      context:
        filesystem:
          patterns:
            - "vendor-reviewer/**/*"
          base_path: "/Users/lcf"
          max_file_size: 1000000
          include_content: true
      agents:
        - id: "document-reader"
          input_source: "signal"
          context_filter: "documents_path"
        - id: "questionnaire-analyzer"
          input_source: "signal"
          context_filter: "questionnaire_path"

  # Separate simple evaluation job
  soc2-vendor-final-evaluation:
    name: "soc2-vendor-final-evaluation"
    description: "Generate final SOC 2 vendor recommendation based on provided vendor information"
    triggers:
      - signal: "cli-vendor-final-evaluation"
        condition:
          {
            "and":
              [
                { "var": "vendor_name" },
                { "var": "evaluation_summary" },
              ],
          }
    session_prompts:
      planning: |
        Generate a comprehensive SOC 2 vendor evaluation report based on the provided vendor information and analysis summary.

        Create a professional evaluation report suitable for executive decision-making.
      evaluation: |
        Evaluate whether a complete SOC 2 vendor recommendation has been generated with:
        - Executive summary with clear recommendation
        - Risk assessment and justification
        - Next steps and monitoring requirements

        The session is complete when the final evaluation report is generated.
    execution:
      strategy: "sequential"
      agents:
        - id: "vendor-evaluator"
          input_source: "signal"

# =============================================================================
# MEMORY CONFIGURATION
# =============================================================================
# Workspace memory for SOC 2 evaluation patterns and learning
# NOTE: Actual evaluation reports are automatically stored in Atlas Library
# =============================================================================

memory:
  enabled: true
  scope: "workspace"
  retention:
    max_age_days: 730 # Keep evaluation patterns for 2 years
    max_entries: 500
  include_types:
    - "evaluation_patterns"
    - "security_questionnaire_analysis_methods"
    - "compliance_assessment_criteria"
    - "vendor_risk_assessment_patterns"
    - "evaluation_best_practices"
    - "document_analysis_insights"
