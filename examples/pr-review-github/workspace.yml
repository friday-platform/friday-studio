version: '1.0'
workspace:
  name: PR Review (GitHub)
  description: >-
    Reviews pull requests and posts inline comments on GitHub. Supports initial
    reviews and follow-up rounds where it responds to author feedback.

signals:
  review-pr:
    provider: http
    title: Review PR
    description: Run a fresh code review on a pull request.
    config:
      path: /webhooks/review-pr
    schema:
      type: object
      properties:
        pr_url:
          type: string
          title: Pull request URL
          description: >-
            Full GitHub pull request URL
            (e.g., https://github.com/owner/repo/pull/123)
      required:
        - pr_url

  continue-review:
    provider: http
    title: Continue review
    description: >-
      Pick up where the last review left off — respond to author replies and
      review new changes.
    config:
      path: /webhooks/continue-review
    schema:
      type: object
      properties:
        pr_url:
          type: string
          title: Pull request URL
          description: >-
            Full GitHub pull request URL
            (e.g., https://github.com/owner/repo/pull/123)
      required:
        - pr_url

agents:
  gh:
    type: atlas
    agent: gh
    description: >-
      Runs GitHub CLI commands — clone repos, fetch PR metadata, post reviews.
    prompt: Execute GitHub CLI operation.
    env:
      GH_TOKEN: from_environment

  claude-code:
    type: atlas
    agent: claude-code
    description: >-
      Reviews code in a cloned repository. Reads full files for context,
      analyzes the diff, and produces a structured review.
    prompt: >-
      You are Code Reviewer. Reviews the pull request diff in the already-cloned
      repository. Reads full changed files for context and produces a structured
      review report with file-level and line-level findings.
    env:
      ANTHROPIC_API_KEY: from_environment
      GH_TOKEN: from_environment

jobs:
  pr-code-review:
    title: Review PR
    description: Inline review comments posted on the pull request.
    triggers:
      - signal: review-pr
    fsm:
      id: pr-code-review-pipeline
      initial: idle
      states:
        idle:
          on:
            review-pr:
              target: step_clone_repo

        step_clone_repo:
          entry:
            - type: agent
              agentId: gh
              outputTo: clone-output
              prompt: >-
                Clone the pull request repository. The PR URL is in the signal
                payload as `pr_url`. Parse owner, repo, and PR number from the
                URL, then:
                1. Clone the repo to a temp directory.
                2. Check out the PR branch.
                3. Return a JSON object with: operation="clone", success=true,
                   data.path (clone dir), data.repo, data.branch, data.head_sha,
                   data.pr_number, data.base_branch, data.pr_metadata (title,
                   author, description), data.changed_files (array of paths).
            - type: emit
              event: ADVANCE
          on:
            ADVANCE:
              target: step_review_pr

        step_review_pr:
          entry:
            - type: agent
              agentId: claude-code
              inputFrom: clone-output
              outputTo: review-output
              prompt: >-
                You are an expert code reviewer. The repository has already been
                cloned and the PR branch checked out. Your input contains the PR
                metadata, changed file list, clone path (data.path), and
                base_branch (data.base_branch).

                Follow these steps:

                1. Run `git diff <base_branch>...HEAD` in the clone path to get
                   the full diff.

                2. For every changed file, read the FULL file content (not just
                   the diff hunks) so you understand the surrounding context,
                   imports, type definitions, and how each change fits into the
                   broader module.

                3. Review against these criteria: correctness, security,
                   performance, error handling, testing, and style.

                4. Use the `complete` tool to output your review as structured
                   JSON with this shape:

                   {
                     "verdict": "APPROVE" | "REQUEST_CHANGES" | "COMMENT",
                     "summary": "2-3 sentence summary of the PR and your assessment",
                     "findings": [
                       {
                         "severity": "CRITICAL" | "WARNING" | "SUGGESTION" | "NITPICK",
                         "category": "correctness" | "security" | "performance" | "error-handling" | "testing" | "style",
                         "file": "path/to/file.ts",
                         "line": 42,
                         "start_line": 40,
                         "title": "One-line title of the finding",
                         "description": "Explanation of the issue and its impact.",
                         "suggestion": "const name = user?.name ?? \"anonymous\";"
                       }
                     ]
                   }

                Rules for findings:
                - `line` is required: the line to comment on (single-line), or
                  end line of a multi-line range.
                - `start_line` is optional: set it for multi-line findings where
                  the issue spans multiple lines. Omit for single-line findings.
                - `suggestion` is optional: when provided, it MUST be the exact
                  replacement source code for the line range (start_line..line).
                  GitHub renders this as an "Apply suggestion" button that
                  literally replaces those lines with your text. Therefore:
                  • It must be syntactically valid, compilable code — NOT
                    English prose, advice, or commentary.
                  • Do NOT wrap in markdown fences — raw code only.
                  • If you cannot provide a concrete code fix, OMIT the
                    `suggestion` field entirely and put your advice in
                    `description` instead.
                  WRONG: "suggestion": "Consider adding error handling here"
                  RIGHT: "suggestion": "if (!user) throw new Error(\"missing user\");\nconst name = user.name;"
                - Lines must be actual lines in the changed files (from the
                  diff). Use the diff output to verify line numbers.
                - Order findings by severity: CRITICAL first, NITPICK last.
                - Cap at 15 findings. Keep highest severity if more exist.

                Verdict decision tree:
                - Any CRITICAL → REQUEST_CHANGES
                - Multiple WARNING → REQUEST_CHANGES
                - Only SUGGESTION/NITPICK → COMMENT
                - No findings or all minor → APPROVE
            - type: emit
              event: ADVANCE
          on:
            ADVANCE:
              target: step_post_review

        step_post_review:
          entry:
            - type: agent
              agentId: gh
              inputFrom: [clone-output, review-output]
              outputTo: post-review-output
              prompt: >-
                Post the code review to GitHub as inline comments. Your input
                contains two sections: clone-output (with data.head_sha,
                data.pr_number, the repo) and review-output (with verdict,
                summary, and findings array).

                Use the GitHub API to submit a pull request review with:
                - commit_id: head_sha from clone-output
                - verdict mapped to GitHub event: APPROVE → "APPROVE",
                  REQUEST_CHANGES → "REQUEST_CHANGES", COMMENT → "COMMENT"
                - body: the summary
                - comments: one per finding, each with path, line,
                  start_line (if present), and body combining title +
                  description + suggestion (if present)

                Return: operation="pr-inline-review", success=true/false,
                data.pr_number, data.repo, data.posted_comments,
                data.failed_comments.
            - type: emit
              event: ADVANCE
          on:
            ADVANCE:
              target: completed

        completed:
          type: final

  pr-followup-review:
    title: Continue review
    description: Replies to author feedback and comments on new changes.
    triggers:
      - signal: continue-review
    fsm:
      id: pr-followup-review-pipeline
      initial: idle
      states:
        idle:
          on:
            continue-review:
              target: step_clone_repo

        step_clone_repo:
          entry:
            - type: agent
              agentId: gh
              outputTo: clone-output
              prompt: >-
                Clone the pull request repository. The PR URL is in the signal
                payload as `pr_url`. Parse owner, repo, and PR number from the
                URL, then:
                1. Clone the repo to a temp directory.
                2. Check out the PR branch.
                3. Return a JSON object with: operation="clone", success=true,
                   data.path (clone dir), data.repo, data.branch, data.head_sha,
                   data.pr_number, data.base_branch, data.pr_metadata (title,
                   author, description), data.changed_files (array of paths).
            - type: emit
              event: ADVANCE
          on:
            ADVANCE:
              target: step_read_threads

        step_read_threads:
          entry:
            - type: agent
              agentId: gh
              inputFrom: clone-output
              outputTo: threads-output
              prompt: >-
                Read all existing review threads on this pull request. Your
                input contains clone-output with data.pr_number and data.repo.

                Use the GitHub API to fetch all pull request review comments.
                Group them into threads by in_reply_to_id. For each root
                comment, collect: comment_id, path, line, body, and any
                replies (user, body, created_at).

                Return: operation="pr-read-threads", success=true,
                data.bot_user (your GitHub login), data.threads (array),
                data.total_threads, data.threads_with_replies.
            - type: emit
              event: ADVANCE
          on:
            ADVANCE:
              target: step_followup_review

        step_followup_review:
          entry:
            - type: agent
              agentId: claude-code
              inputFrom: [clone-output, threads-output]
              outputTo: followup-output
              prompt: >-
                You are continuing a code review on a PR that was previously
                reviewed. Your input contains two sections: clone-output (with
                data.path, data.base_branch, data.changed_files) and
                threads-output (with data.threads — the existing review
                threads and any author replies).

                Follow these steps:

                1. Run `git diff <base_branch>...HEAD` in the clone path to
                   see the current diff.

                2. For each thread in threads-output.data.threads:
                   a. If the thread has NO replies and the code is unchanged
                      — skip it.
                   b. If the thread has replies:
                      - Read the author's response.
                      - Check the current code at that file:line.
                      - If the finding is addressed → reply
                        "Looks good, resolved."
                      - If the author disagrees → engage with their argument
                        (concede or explain).
                      - If the author asks a question → answer it with code
                        context.
                   c. If the code at that location changed but no reply →
                      check if the change addresses the finding, reply
                      accordingly.

                3. Review the full diff for any NEW issues not covered by
                   existing threads. Apply the same criteria: correctness,
                   security, performance, error handling, testing, style.

                4. Use the `complete` tool to output your follow-up as
                   structured JSON:

                   {
                     "thread_replies": [
                       { "comment_id": 123, "body": "Confirmed fixed — the null check is correct." }
                     ],
                     "new_findings": [
                       {
                         "severity": "WARNING",
                         "category": "correctness",
                         "file": "path/to/file.ts",
                         "line": 10,
                         "title": "...",
                         "description": "...",
                         "suggestion": "..."
                       }
                     ],
                     "summary": "Follow-up: 3 of 5 findings resolved. 2 new issues found."
                   }

                Rules:
                - Don't repeat findings already in threads — the original
                  inline comment is still visible.
                - Be conversational in thread replies — this is a dialog, not
                  a report. Keep replies concise (1-3 sentences).
                - New findings follow the same schema as the initial review.
                - `line` is required for new findings. `start_line` is
                  optional for multi-line ranges. `suggestion` is optional —
                  when provided it MUST be exact replacement code, never
                  English advice.
                - Cap at 15 new findings. Keep highest severity if more exist.
            - type: emit
              event: ADVANCE
          on:
            ADVANCE:
              target: step_post_followup

        step_post_followup:
          entry:
            - type: agent
              agentId: gh
              inputFrom: [clone-output, followup-output]
              outputTo: post-followup-output
              prompt: >-
                Post the follow-up review to GitHub. Your input contains two
                sections: clone-output (with data.head_sha, data.pr_number,
                data.repo) and followup-output (with thread_replies,
                new_findings, summary).

                1. For each entry in thread_replies: post a reply to that
                   comment_id using the GitHub API.

                2. For each entry in new_findings: post a new inline review
                   comment (path, line, start_line if present, body combining
                   title + description + suggestion if present).

                3. If there are new_findings, also post an overall review
                   comment with the summary.

                Return: operation="pr-post-followup", success=true/false,
                data.pr_number, data.repo, data.thread_replies_posted,
                data.new_comments_posted, data.failed_comments.
            - type: emit
              event: ADVANCE
          on:
            ADVANCE:
              target: completed

        completed:
          type: final

memory:
  own:
    - name: notes
      type: short_term
      strategy: narrative
  mounts: []
